# Default values for omnia.
# This is a YAML-formatted file.
#
# =============================================================================
# QUICK START
# =============================================================================
#
# Read the full README first: ./README.md
#
# Minimum to install (the chart REFUSES to render without this):
#
#   helm install omnia oci://ghcr.io/altairalabs/charts/omnia \
#     --set dashboard.auth.mode=oauth       # or: builtin, proxy, anonymous
#
# If mode=anonymous, also pass:
#   --set dashboard.auth.allowAnonymous=true
#
# Three starting value profiles — see README.md "Deployment profiles":
#   - Local dev:        values-dev.yaml
#   - Local dev + EE:   values-dev-enterprise.yaml
#   - Observability:    values-demo-observability.yaml
#
# Cloud-native use (CSI secret-stores, workload identity, GPU scheduling): set
# `podOverrides:` on the AgentRuntime / Workspace / ArenaJob / ArenaDevSession
# CRs. Docs:
#   https://omnia.altairalabs.ai/docs/how-to/configure-pod-overrides
#
# =============================================================================
# Table of Contents
# =============================================================================
#
# Core Configuration:
#   - Basic Settings (replicaCount, image, serviceAccount)  ~Line 30
#   - License Configuration                                  ~Line 64
#   - API Configuration                                      ~Line 80
#
# Enterprise Features (requires license):
#   - Enterprise Settings (enterprise.enabled, arena)        ~Line 10
#
# Dashboard:
#   - Dashboard Configuration                                ~Line 180
#
# Multi-Tenancy:
#   - Workspace Configuration                                ~Line 430
#   - Workspace Content Storage                              ~Line 455
#
# Storage:
#   - NFS Storage Configuration                              ~Line 480
#   - VS Code Server (dev only)                              ~Line 550
#
# Observability:
#   - Tracing Configuration                                  ~Line 600
#   - Prometheus, Grafana, Loki, Tempo, Alloy               ~Line 615
#
# Networking:
#   - Gateway API Configuration                              ~Line 965
#   - Istio Service Mesh Integration                         ~Line 950
#
# Advanced:
#   - KEDA Autoscaling                                       ~Line 1010
#   - Redis                                                  ~Line 1050
#   - Authentication                                         ~Line 1075
#
# =============================================================================

# -- Number of operator replicas (use 3+ for HA with leader election)
replicaCount: 3

# -- Enable development mode with full-featured license. DO NOT USE IN PRODUCTION.
devMode: false

# ============================================================================
# Enterprise Features (requires license)
# ============================================================================
enterprise:
  # -- Enable enterprise features (Arena, licensing)
  enabled: false

  # Arena controller configuration
  arena:
    controller:
      # -- Number of arena controller replicas
      replicaCount: 1
      image:
        # -- Arena controller image repository
        repository: ghcr.io/altairalabs/omnia-arena-controller
        # -- Arena controller image tag (defaults to Chart appVersion)
        tag: ""
        # -- Arena controller image pull policy
        pullPolicy: IfNotPresent
      # -- Resource limits for arena controller
      resources: {}
      # -- Pod security context for arena controller
      podSecurityContext:
        # -- Run as non-root user
        runAsNonRoot: true
        # -- User ID (65532 = nonroot distroless user)
        runAsUser: 65532
        # -- Group ID for volume ownership
        fsGroup: 65532
      # -- Extra environment variables for the arena-controller container.
      extraEnv: []
      # -- Extra envFrom entries (secretRef / configMapRef).
      extraEnvFrom: []
      # -- Extra volumes on the arena-controller pod.
      extraVolumes: []
      # -- Extra volumeMounts on the arena-controller container.
      extraVolumeMounts: []
      # -- Extra command-line args appended to the arena-controller binary.
      # Use for undocumented Go flags or feature toggles not yet surfaced by
      # first-class values.
      extraArgs: []
      # -- Host path the arena-controller mounts the shared workspace content
      # at. Defaults to `workspaceContent.mountPath` (`/workspace-content`),
      # which matches the rest of the Omnia stack. Override only if you
      # remount content under a non-default path inside the pod.
      workspaceContentPath: ""
      # -- Graceful-shutdown window in seconds.
      terminationGracePeriodSeconds: 10
      # -- Pod-level overrides. Same shape as CRD PodOverrides
      # (docs/how-to/configure-pod-overrides). Additive on top of the
      # legacy extraEnv/extraEnvFrom/extraVolumes/extraVolumeMounts above.
      podOverrides: {}
      # Admission webhook serving for the arena-controller. Only used when
      # the top-level `webhook.enabled` is true (the in-container port and
      # cert mount path are shared with the operator via `webhook.port` /
      # `webhook.certPath`). cert-manager issues this Secret per release.
      webhook:
        # -- Name of the Secret cert-manager writes the arena-controller serving cert into
        certSecretName: "omnia-arena-controller-webhook-server-cert"

    # Worker configuration for ArenaJob execution
    worker:
      image:
        # -- Worker image repository
        repository: ghcr.io/altairalabs/omnia-arena-worker
        # -- Worker image tag (defaults to Chart appVersion)
        tag: ""
        # -- Worker image pull policy
        pullPolicy: IfNotPresent

      # -- ServiceAccount the arena worker pod runs as. Set to the workspace
      # runtime ServiceAccount so evaluations inherit its cloud identity (Azure
      # Workload Identity, AWS IRSA, GKE Workload Identity) and can authenticate
      # to keyless providers (auth.type: workloadIdentity). Empty = controller
      # creates a per-job arena-worker SA with no cloud identity (keyless
      # providers will fail). The worker Role is still bound to whichever SA is
      # used, so CRD-read permissions are preserved either way.
      serviceAccountName: ""
      # -- Extra labels added to the arena worker pod template, e.g. to opt into
      # a cloud-identity webhook: {azure.workload.identity/use: "true"}.
      podLabels: {}

      # -- Default resource limits for worker pods
      resources:
        limits:
          cpu: 1000m
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 128Mi

    # Work queue configuration for job distribution.
    queue:
      # -- Queue backend: "memory" (in-process, dev only — single
      # arena-controller replica, jobs lost on restart) or "redis"
      # (production — requires a resolvable Redis URL).
      type: redis

      # Per-consumer Redis override for the Arena queue. Same shape as
      # `redis.default`. Empty fields fall through to redis.default.
      # Set when the queue needs to point at a different Redis than
      # the rest of the cluster (e.g. job durability requirements).
      redis:
        existingSecret:
          name: ""
          key: ""
        url: ""
        host: ""
        port: 6379
        db: 0
        user: ""
        tls:
          caExistingSecret:
            name: ""
            key: ""

    # Dev console for interactive agent testing
    # Dev console image settings used by ArenaDevSession controller to create
    # dynamic per-project pods. No static deployment - pods are created on-demand.
    devConsole:
      image:
        # -- Dev console image repository (used by ArenaDevSession controller)
        repository: ghcr.io/altairalabs/omnia-arena-dev-console
        # -- Dev console image tag (defaults to Chart appVersion)
        tag: ""
        # -- Dev console image pull policy
        pullPolicy: IfNotPresent
      # -- ServiceAccount the dev-console pod runs as. Set to the workspace
      # runtime ServiceAccount so the dev console inherits its cloud identity
      # (Azure Workload Identity, AWS IRSA). Empty = controller creates a
      # per-session SA with no cloud identity (keyless providers will fail).
      serviceAccountName: ""
      # -- Extra labels added to the dev-console pod template, e.g. to opt into
      # a cloud-identity webhook: {azure.workload.identity/use: "true"}.
      podLabels: {}

  # Community templates source (deployed automatically when enabled)
  communityTemplates:
    # -- Enable community templates source. When true, the operator reconciles
    # an ArenaTemplateSource that fetches from github.com/AltairaLabs/promptkit-templates
    # on the configured syncInterval. Default is `false` so air-gapped and
    # regulated installs opt in explicitly; enable it when you want the built-in
    # template gallery to stay in sync.
    enabled: false
    # -- Name of the ArenaTemplateSource resource
    name: community-templates
    # -- Namespace to deploy the ArenaTemplateSource
    namespace: dev-agents
    # -- Whether the chart creates the namespace above. Creation is skipped
    # automatically when the namespace already exists (idempotent on upgrade).
    # Set to false to never create it and rely on a pre-existing namespace —
    # e.g. an operator-managed workspace namespace.
    createNamespace: true
    # -- Git repository URL for community templates
    url: https://github.com/AltairaLabs/promptkit-templates.git
    # -- Branch to track
    branch: main
    # -- Path within fetched content where templates are located (empty = root)
    templatesPath: ""
    # -- Sync interval for fetching updates
    syncInterval: 1h
    # -- Fetch timeout
    timeout: 2m

  # Policy broker sidecar for ToolPolicy enforcement
  policyBroker:
    image:
      # -- Policy broker image repository
      repository: ghcr.io/altairalabs/omnia-policy-broker
      # -- Policy broker image tag (defaults to Chart appVersion)
      tag: ""
      # -- Policy broker image pull policy
      pullPolicy: IfNotPresent

  # PromptKit LSP server for YAML validation
  promptkitLsp:
    # -- Enable the PromptKit LSP server (powers the Arena Project Editor's YAML
    # validation/autocomplete). On by default; also gated on enterprise.enabled,
    # so it has no effect unless enterprise is enabled. Set false to opt out.
    enabled: true
    # -- Number of PromptKit LSP replicas
    replicaCount: 1
    image:
      # -- PromptKit LSP image repository
      repository: ghcr.io/altairalabs/omnia-promptkit-lsp
      # -- PromptKit LSP image tag (defaults to Chart appVersion)
      tag: ""
      # -- PromptKit LSP image pull policy
      pullPolicy: IfNotPresent
    service:
      # -- PromptKit LSP service port
      port: 8080
    # -- Container HTTP port (passed as `--addr=:<port>`).
    port: 8080
    # -- Container health-probe port (passed as `--health-addr=:<port>`).
    healthPort: 8081
    # -- Dashboard API URL the LSP calls for runtime data.
    # Leave empty to auto-construct from the in-release dashboard Service
    # (`http://<release>-dashboard:<dashboard.service.port>`). Set explicitly
    # when the dashboard lives in a different release or namespace.
    dashboardApiUrl: ""
    # -- Extra command-line args appended to the LSP binary.
    extraArgs: []
    # -- Extra environment variables for the LSP container.
    extraEnv: []
    # -- Liveness probe tuning.
    livenessProbe:
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 1
      failureThreshold: 3
    # -- Readiness probe tuning.
    readinessProbe:
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 1
      failureThreshold: 3
    # -- Graceful-shutdown window in seconds.
    terminationGracePeriodSeconds: 30
    resources: {}
    # -- Pod-level overrides for the PromptKit LSP Deployment. Same shape
    # as CRD PodOverrides (docs/how-to/configure-pod-overrides). Additive
    # on top of legacy `extraEnv` / `extraArgs` above.
    podOverrides: {}

# License configuration
license:
  # -- License key (JWT). If set, creates the arena-license Secret.
  # Generate at https://omnia.altairalabs.ai/trial or via license server.
  key: ""
  # -- Use an existing Secret instead of creating one.
  # The secret must have a 'license' key containing the JWT.
  existingSecret: ""

image:
  # -- Image repository for the Omnia operator (controller-manager binary).
  # NOTE: renamed from `ghcr.io/altairalabs/omnia` in v0.9.0-beta.3 — if you
  # pinned `image.repository` in your values, update it.
  repository: ghcr.io/altairalabs/omnia-operator
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Image tag (defaults to Chart appVersion)
  tag: ""

# -- Image pull secrets
imagePullSecrets: []

# -- Override the name of the chart
nameOverride: ""

# -- Override the full name of the chart
fullnameOverride: ""

serviceAccount:
  # -- Create a service account
  create: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account (generated if not set)
  name: ""

# -- Pod annotations
podAnnotations: {}

# -- Pod security context
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# -- Container security context
securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# -- Resource limits and requests
resources:
  limits:
    cpu: "1"
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

# Pod Disruption Budget for HA deployments
podDisruptionBudget:
  # -- Enable PDB for operator
  enabled: true
  # -- Minimum available pods (mutually exclusive with maxUnavailable)
  minAvailable: 1
  # -- Maximum unavailable pods (mutually exclusive with minAvailable)
  # maxUnavailable: 1

# -- Node selector
nodeSelector: {}

# -- Tolerations
tolerations: []

# -- Affinity rules (default: prefer spreading operator pods across nodes)
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - omnia
              - key: app.kubernetes.io/component
                operator: In
                values:
                  - operator
          topologyKey: kubernetes.io/hostname

# Operator API server configuration
#
# The injection hooks below (extraEnv/extraEnvFrom/extraVolumes/extraVolumeMounts)
# apply ONLY to this chart-owned operator Deployment. For operator-GENERATED
# pods (facade+runtime, session-api, memory-api, arena workers, dev console)
# use the per-CRD `podOverrides:` field instead. Docs:
#   https://omnia.altairalabs.ai/docs/how-to/configure-pod-overrides
# A unified `podOverrides:` block for chart-owned deployments is planned
# (tracked in #895 W4).
operator:
  # -- Bind address for the operator tool-test API. Empty uses the default:
  # ":8083" when the dashboard is enabled (its only consumer), disabled
  # otherwise. Set an explicit ":port" to override. When the dashboard is
  # enabled the API is authenticated via TokenReview, accepting only the
  # dashboard ServiceAccount (#1303); an explicit override without the
  # dashboard runs it unauthenticated (local/dev only).
  apiBindAddress: ""

  # -- controller-runtime zap logger verbosity. One of:
  # "" (operator default), "debug", "info", "warn", "error". Set to "debug"
  # when chasing a reconciler issue; revert for production.
  logLevel: ""

  # -- Extra command-line args appended to the manager binary. Use for
  # undocumented Go flags that don't yet have a first-class values entry
  # (e.g. reconciler worker counts, webhook cert paths).
  extraArgs: []

  # -- Extra environment variables to inject into the operator container.
  # Standard Kubernetes EnvVar shape (each entry has `name` + `value` or
  # `valueFrom`).
  extraEnv: []

  # -- Extra envFrom entries (secretRef / configMapRef) for the operator.
  # Useful for injecting bulk config from a Secret synced by a CSI
  # secret-store driver (Azure Key Vault, AWS Secrets Manager, Vault).
  extraEnvFrom: []

  # -- Extra volumes to attach to the operator pod.
  extraVolumes: []

  # -- Extra volumeMounts on the operator container.
  extraVolumeMounts: []

  # -- Pod-level customization for the chart-owned operator Deployment.
  # Same shape as the CRD `PodOverrides` struct (api/v1alpha1/shared_types.go)
  # so users have one mental model for BOTH chart-owned pods AND
  # operator-generated CRD pods.
  #
  # Additive on top of the legacy `operator.extraEnv`/`extraEnvFrom`/
  # `extraVolumes`/`extraVolumeMounts` values (kept for backward compat).
  # `serviceAccountName` here overrides the chart-wide `serviceAccount.name`
  # on the operator pod only — useful when the operator needs a different
  # IRSA/WLI identity than other chart components.
  #
  # Docs: https://omnia.altairalabs.ai/docs/how-to/configure-pod-overrides
  podOverrides: {}
  # Example:
  #   podOverrides:
  #     serviceAccountName: omnia-operator-wli
  #     priorityClassName: system-cluster-critical
  #     imagePullSecrets:
  #       - name: ecr-creds
  #     labels:
  #       azure.workload.identity/use: "true"
  #     annotations:
  #       iam.gke.io/gcp-service-account: omnia-operator@my-project.iam.gserviceaccount.com
  #     topologySpreadConstraints:
  #       - maxSkew: 1
  #         topologyKey: topology.kubernetes.io/zone
  #         whenUnsatisfiable: ScheduleAnyway
  #         labelSelector:
  #           matchLabels:
  #             app.kubernetes.io/component: controller-manager

# Rollout traffic-routing configuration
rollout:
  # -- Istio ambient mesh is enabled; allows AgentRuntime rollout
  # trafficRouting mode=mesh (operator-owned VirtualService/DestinationRule).
  # Requires ambient + a waypoint for the agent Service
  # (see examples/values-istio-ambient.yaml). When false the operator
  # falls back to replica-weighted routing for any mode=mesh AgentRuntime.
  meshEnabled: false

# Leader election configuration
leaderElection:
  # -- Enable leader election for HA
  enabled: true

# Health probes configuration
probes:
  # -- Port for health probes
  port: 8081
  liveness:
    # -- Initial delay for liveness probe
    initialDelaySeconds: 15
    # -- Period for liveness probe
    periodSeconds: 20
    # -- Timeout for liveness probe
    timeoutSeconds: 5
    # -- Failure threshold before restarting
    failureThreshold: 3
  readiness:
    # -- Initial delay for readiness probe
    initialDelaySeconds: 5
    # -- Period for readiness probe
    periodSeconds: 10
    # -- Timeout for readiness probe
    timeoutSeconds: 5
    # -- Failure threshold before marking unready
    failureThreshold: 3

# Metrics configuration
metrics:
  # -- Enable metrics endpoint
  enabled: true
  # -- Port for metrics
  port: 8443
  # -- Enable secure metrics (HTTPS)
  secure: true

# PodMonitor for agent pods (facade + runtime), consumed by an EXTERNAL
# Prometheus Operator (kube-prometheus-stack, managed Prometheus). The bundled
# Prometheus already scrapes agent pods via prometheus.extraScrapeConfigs, so
# leave this off unless a separate operator-based Prometheus is collecting
# metrics. Requires the monitoring.coreos.com/v1 PodMonitor CRD in the cluster;
# off by default so installs without it don't fail to render/apply.
podMonitor:
  # -- Create a PodMonitor selecting agent pods' "metrics"-named container ports
  enabled: false
  # -- Scrape interval
  interval: 30s
  # -- Extra labels (e.g. release: kube-prometheus-stack) so the operator's
  #    PodMonitor selector adopts it
  labels: {}

# Webhook configuration. Disabled by default. When enabled, cert-manager MUST
# be installed in the cluster (it issues the serving cert and injects the
# webhook caBundle). When disabled, no cert-manager dependency exists and a
# malformed function-mode schema falls back to facade-startup validation.
webhook:
  # -- Enable admission webhooks (requires cert-manager when true)
  enabled: false
  # -- Port the webhook server listens on
  port: 9443
  # -- Directory the serving cert is mounted into in the operator container
  certPath: "/etc/webhook/certs"
  # -- Name of the Secret cert-manager writes the serving cert into
  certSecretName: "omnia-webhook-server-cert"

# RBAC configuration
rbac:
  # -- Create RBAC resources
  create: true

# ============================================================================
# Dashboard Configuration
# Web UI for managing Omnia agents and resources
# ============================================================================

dashboard:
  # -- Enable dashboard deployment
  enabled: true

  # -- Dedicated ServiceAccount for the dashboard, bound to a scoped
  # ClusterRole (omnia-dashboard-role) distinct from the operator's
  # manager role. See templates/dashboard/{serviceaccount,clusterrole,
  # clusterrolebinding}.yaml.
  serviceAccount:
    # -- Whether to create the dashboard ServiceAccount. Set to false when
    # binding an externally-managed SA (e.g., cloud workload identity).
    create: true
    # -- Annotations to add to the dashboard ServiceAccount. Use this for
    # cloud workload-identity bindings (AWS IRSA, GCP WI, Azure AD WI).
    annotations: {}
    # -- Override the generated ServiceAccount name. Leave empty to use
    # "<release>-dashboard" (or "default" when create=false).
    name: ""

  # -- Hide enterprise features completely instead of showing upgrade prompts
  # When false (default): Shows enterprise features with upgrade prompts when enterprise.enabled=false
  # When true: Hides enterprise features entirely from the UI
  hideEnterprise: false

  # -- White-label branding (Enterprise). Emitted to the dashboard as
  # NEXT_PUBLIC_BRAND_* env only when enterprise.enabled=true AND a license
  # with the whiteLabel feature is active (the dashboard enforces the license
  # gate at runtime). Leave productName empty to keep the default Omnia brand.
  branding:
    # -- Product name shown in the sidebar, page title and auth screens
    productName: ""
    # -- Logo URL for light backgrounds
    logoLightUrl: ""
    # -- Logo URL for dark backgrounds (sidebar)
    logoDarkUrl: ""
    # -- Favicon URL
    faviconUrl: ""
    # -- Design-token color overrides (any CSS color value)
    colors:
      # -- Primary/brand color (maps to --primary)
      primary: ""
      # -- Accent color (maps to --accent)
      accent: ""
      # -- Sidebar background (maps to --sidebar)
      sidebar: ""
    fonts:
      # -- Font family name applied to --font-sans
      family: ""
      # -- Optional web-font stylesheet URL to load the family
      url: ""
    links:
      # -- Base URL for in-app documentation links
      docsBaseUrl: ""
      # -- Support contact (email or URL)
      support: ""
      # -- Sales contact (email or URL)
      sales: ""
      # -- Upgrade/enterprise URL shown on license gates
      upgradeUrl: ""
    # -- Optional token-scoped custom CSS appended to :root only. Overrides
    # design tokens; targeting internal selectors is unsupported.
    customCss: ""

  image:
    # -- Dashboard image repository
    repository: ghcr.io/altairalabs/omnia-dashboard
    # -- Dashboard image pull policy
    pullPolicy: IfNotPresent
    # -- Dashboard image tag (defaults to Chart appVersion)
    tag: ""

  # -- Number of dashboard replicas. Defaults to 1 because multi-
  # replica installs require a shared Redis session store (chart fails
  # render via omnia.validateSession otherwise — see _helpers.tpl).
  # Production deployments scaling the dashboard horizontally must
  # configure redis.default OR dashboard.session.redis AND raise this.
  replicaCount: 1

  # -- Dashboard service configuration
  service:
    # -- Service type (ClusterIP, NodePort, LoadBalancer)
    type: ClusterIP
    # -- Service port
    port: 3000

  # -- Absolute base URL for the dashboard (used for OAuth callbacks as
  # `${baseUrl}/api/auth/callback`). If empty, falls back to computing a URL
  # from dashboard.ingress.* when dashboard.ingress.enabled=true. Set this
  # directly when exposing the dashboard via Gateway API rather than a
  # Kubernetes Ingress. Example: "https://dashboard.example.com"
  baseUrl: ""

  # -- Expose the dashboard through the external Gateway (TLS-terminated)
  # instead of the HTTP-only internalGateway. Requires gateway.enabled=true
  # and the external Gateway to have a listener matching `hostname` below.
  # Mutually exclusive with the internalGateway-bound HTTPRoute.
  externalGateway:
    enabled: false
    # -- Optional hostname filter on the HTTPRoute. Leave empty to attach to
    # all hostnames the external Gateway accepts.
    hostname: ""

  # -- Dashboard ingress configuration
  ingress:
    # -- Enable ingress
    enabled: false
    # -- Ingress class name
    className: ""
    # -- Ingress annotations
    annotations: {}
    # -- Ingress host
    host: dashboard.example.com
    # -- TLS configuration
    tls: []
    #  - secretName: dashboard-tls
    #    hosts:
    #      - dashboard.example.com

  # -- Dashboard resource limits and requests
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

  # -- Extra environment variables for the dashboard container.
  # Use this for OAuth client secrets, custom feature flags, or values
  # synced from a cloud secret store:
  #   extraEnv:
  #     - name: OMNIA_AUTH_OAUTH_CLIENT_SECRET
  #       valueFrom:
  #         secretKeyRef:
  #           name: dashboard-oauth
  #           key: client_secret
  extraEnv: []

  # -- Extra envFrom entries (secretRef / configMapRef). Common with
  # CSI secret-store drivers: mount a SecretProviderClass that syncs to
  # a K8s Secret, then envFrom: secretRef: { name: that-secret } here.
  extraEnvFrom: []

  # -- Extra volumes on the dashboard pod (CSI secret-store, extra CA
  # trust bundles, etc.). Example — Azure Key Vault via CSI:
  #   extraVolumes:
  #     - name: kv-secrets
  #       csi:
  #         driver: secrets-store.csi.k8s.io
  #         readOnly: true
  #         volumeAttributes:
  #           secretProviderClass: dashboard-oauth-spc
  extraVolumes: []

  # -- Extra volumeMounts on the dashboard container.
  extraVolumeMounts: []

  # -- Pod-level overrides for the dashboard Deployment. Same shape as
  # CRD PodOverrides (docs/how-to/configure-pod-overrides). Additive on
  # top of the legacy dashboard.extraEnv/extraEnvFrom/extraVolumes/
  # extraVolumeMounts and the existing dashboard.nodeSelector/affinity/
  # tolerations values.
  podOverrides: {}

  # -- Management-plane JWT signing keypair. The dashboard uses the
  # private half to mint short-lived tokens for the "Try this agent"
  # debug view and serves the public half over /api/auth/jwks for
  # facade pods to verify against. First install generates a self-
  # signed 10-year RSA keypair; upgrades preserve the existing Secret
  # (helm.sh/resource-policy: keep). Rotation is a manual operator
  # action — delete the Secret, upgrade, and roll dashboard + facade
  # pods.
  signingKey:
    # -- Reference an externally-managed Secret instead of the chart-generated
    # keypair. The Secret must be kubernetes.io/tls with tls.crt + tls.key.
    # Leave empty to use the chart-managed keypair.
    existingSecret: ""

  # -- Override the JWKS URL the operator passes to facade pods as
  # OMNIA_MGMT_PLANE_JWKS_URL. Empty = derive from the in-cluster
  # dashboard service (http://<dashboard-fullname>.<release-namespace>.
  # svc.cluster.local:<dashboard.service.port>/api/auth/jwks). Set
  # this when the facade pods reach the dashboard via a non-default
  # path (Ingress, Gateway API, an external proxy) or when running in
  # a cluster with a non-default DNS suffix.
  jwksUrl: ""

  # -- Allowlist of in-cluster ServiceAccounts permitted to mint
  # mgmt-plane JWTs via /api/auth/service-token. Each entry is
  # "<namespace>/<sa-name>". The chart auto-includes Doctor's SA
  # when doctor.enabled is true; extend this list to grant other
  # in-cluster services (Arena dev-console, custom operators) the
  # same privilege. Empty list (and Doctor disabled) → endpoint
  # returns 503.
  serviceTokenAllowlist: []

  # Pod Disruption Budget for HA deployments
  podDisruptionBudget:
    # -- Enable PDB for dashboard
    enabled: false
    # -- Minimum available pods (mutually exclusive with maxUnavailable)
    minAvailable: 1
    # -- Maximum unavailable pods (mutually exclusive with minAvailable)
    # maxUnavailable: 1

  # -- Dashboard pod annotations
  podAnnotations: {}

  # -- Dashboard node selector
  nodeSelector: {}

  # -- Dashboard tolerations
  tolerations: []

  # -- Dashboard affinity rules
  affinity: {}

  # -- Dashboard startup probe (optional, for slow-starting containers)
  startupProbe: {}
  # Example:
  #   httpGet:
  #     path: /api/health
  #     port: http
  #   initialDelaySeconds: 0
  #   periodSeconds: 10
  #   timeoutSeconds: 5
  #   failureThreshold: 30

  # -- Dashboard liveness probe configuration
  livenessProbe:
    # -- Initial delay before starting liveness probes
    initialDelaySeconds: 10
    # -- How often to perform the probe
    periodSeconds: 30
    # -- Timeout for each probe
    timeoutSeconds: 5
    # -- Number of failures before marking unhealthy
    failureThreshold: 3

  # -- Dashboard readiness probe configuration
  readinessProbe:
    # -- Initial delay before starting readiness probes
    initialDelaySeconds: 5
    # -- How often to perform the probe
    periodSeconds: 10
    # -- Timeout for each probe
    timeoutSeconds: 5
    # -- Number of failures before marking not ready
    failureThreshold: 3

  # -- Authentication configuration
  auth:
    # -- Authentication mode: anonymous, proxy, oauth, or builtin.
    # -- Intentionally has no default: the chart fails if this is unset to
    # -- prevent accidental unauthenticated deployments. Set this explicitly
    # -- in your values file.
    mode: ""
    # -- Explicit opt-in required when mode=anonymous. Anonymous mode
    # -- disables authentication entirely; the chart will fail unless
    # -- this is set to true alongside mode=anonymous. Intended for
    # -- isolated development only.
    allowAnonymous: false
    # -- Session secret (required for non-anonymous modes)
    # Generate with: openssl rand -base64 32
    sessionSecret: ""
    # -- Use existing secret for session secret
    # Secret must contain OMNIA_SESSION_SECRET key
    existingSessionSecret: ""
    # -- Session cookie name
    cookieName: omnia_session
    # -- Session TTL in seconds (default: 24 hours)
    ttl: 86400
    # -- Default role for anonymous users
    anonymousRole: viewer
    # -- TTL (seconds) for CLI deploy-login tokens minted via /api/cli/token.
    # Short-lived by design; the deploy CLI re-logs in when it expires.
    cliTokenTtlSeconds: 3600
    # -- Role mapping from groups
    roleMapping:
      # -- Groups that get admin role
      adminGroups: []
      # -- Groups that get editor role
      editorGroups: []

  # -- Proxy authentication settings (when auth.mode=proxy)
  proxy:
    # -- Header containing username
    headerUser: X-Forwarded-User
    # -- Header containing email
    headerEmail: X-Forwarded-Email
    # -- Header containing groups
    headerGroups: X-Forwarded-Groups
    # -- Header containing display name
    headerDisplayName: X-Forwarded-Preferred-Username
    # -- Auto-create users on first login
    autoSignup: true

  # -- OAuth settings (when auth.mode=oauth)
  oauth:
    # -- OAuth provider: generic, google, github, azure, okta
    provider: generic
    # -- OAuth client ID
    clientId: ""
    # -- OAuth client secret
    clientSecret: ""
    # -- Use existing secret for OAuth credentials
    # Secret must contain OMNIA_OAUTH_CLIENT_ID and OMNIA_OAUTH_CLIENT_SECRET keys
    existingSecret: ""
    # -- OIDC issuer URL (required for generic provider)
    issuerUrl: ""
    # -- OAuth scopes (comma-separated)
    scopes: "openid,profile,email"
    # -- Azure AD tenant ID (for azure provider)
    azureTenantId: ""
    # -- Okta domain (for okta provider)
    oktaDomain: ""
    # -- Claim mapping
    claims:
      username: preferred_username
      email: email
      displayName: name
      groups: groups

  # -- Builtin authentication settings (when auth.mode=builtin)
  builtin:
    # -- Storage backend: sqlite or postgresql
    storeType: sqlite
    # -- SQLite database path (for sqlite store)
    sqlitePath: /data/omnia-users.db
    # -- PostgreSQL connection URL (for postgresql store)
    # Use existingSecret for production
    postgresUrl: ""
    # -- Use existing secret for PostgreSQL URL
    # Secret must contain OMNIA_BUILTIN_POSTGRES_URL key
    existingPostgresSecret: ""
    # -- Allow public signup
    allowSignup: false
    # -- Require email verification
    verifyEmail: false
    # -- Minimum password length
    minPasswordLength: 8
    # -- Max failed login attempts before lockout
    maxFailedAttempts: 5
    # -- Lockout duration in seconds
    lockoutDuration: 900
    # -- Initial admin user (created on first run)
    admin:
      # -- Admin username
      username: admin
      # -- Admin email
      email: admin@example.com
      # -- Admin password (use existingSecret for production)
      password: ""
      # -- Use existing secret for admin password
      # Secret must contain OMNIA_BUILTIN_ADMIN_PASSWORD key
      existingSecret: ""

  # -- API keys configuration
  apiKeys:
    # -- Enable API key authentication
    enabled: true
    # -- Store backend: memory (ephemeral, dev only), file (read-only K8s Secret, GitOps), or postgres (durable). Left at "memory" while a postgresUrl/existingPostgresSecret is set, it is auto-promoted to postgres so a wired durable backend is not silently ignored (#1582).
    store: memory
    # -- File store: path the keys Secret is mounted at (when store=file)
    filePath: /etc/omnia/api-keys/keys.json
    # -- File store: name of an existing Secret holding keys.json (when store=file)
    keysSecret: ""
    # -- Postgres store: connection URL (when store=postgres). Falls back to builtin.postgresUrl when empty. Use existingPostgresSecret in production.
    postgresUrl: ""
    # -- Postgres store: existing Secret with an OMNIA_AUTH_API_KEYS_POSTGRES_URL key (when store=postgres)
    existingPostgresSecret: ""
    # -- Maximum keys per user
    maxPerUser: 10
    # -- Default expiration in days (0 = never)
    defaultExpiration: 90

  # -- Operator API URL (for dashboard to communicate with operator)
  # Defaults to in-cluster service URL
  operatorApiUrl: ""

  # -- Enable read-only mode (disables mutations)
  readOnlyMode: false

  # -- Custom read-only message
  readOnlyMessage: ""

  # -- Grafana integration (direct browser access)
  grafana:
    # -- Grafana URL for embedded metrics (must be browser-accessible)
    # For local dev: http://localhost:3001
    # For production: use ingress URL
    url: ""
    # -- Grafana subpath (must match Grafana's serve_from_sub_path setting)
    path: /grafana/
    # -- Grafana organization ID
    orgId: 1

  # -- Prometheus integration (for cost metrics)
  prometheus:
    # -- Prometheus URL for cost queries
    # Defaults to in-cluster Prometheus service when prometheus.enabled=true
    url: ""

  # -- WebSocket proxy configuration (for agent console connections)
  wsProxy:
    # -- WebSocket proxy URL for browser connections
    # For local dev: ws://localhost:3002
    # For production with gateway: leave empty (uses gateway routing)
    url: ""

  # -- Persistent volume for builtin auth SQLite database
  persistence:
    # -- Enable persistence (required for builtin auth with SQLite)
    enabled: false
    # -- Storage class (empty = cluster default; local-path works)
    storageClass: ""
    # -- Access modes — RWO. This PVC backs the single-writer builtin-auth
    # SQLite file mounted by the one dashboard pod; it is NOT a shared/content
    # volume (content moved to the operator content API, #1462). Must not be
    # ReadWriteMany — RWO-only classes like local-path reject RWX outright.
    accessModes:
      - ReadWriteOnce
    # -- Volume size (the SQLite store is a few MB)
    size: 1Gi
    # -- Existing PVC to use
    existingClaim: ""

  # -- Server-side session store for OAuth PKCE records and session
  # metadata. The dashboard auto-selects its backend by Redis-URL
  # presence: a resolvable URL → Redis store; empty → in-process map.
  # In-process is single-replica only — multi-replica installs require
  # a resolvable Redis URL (chart render fails otherwise; see
  # `omnia.validateSession` helper).
  session:
    # -- TTL for in-flight PKCE records in seconds (default: 300 = 5 minutes).
    pkceTtl: 300
    # Per-consumer Redis override. Same shape as `redis.default`.
    # Empty fields fall through to redis.default. Set when the dashboard
    # session store needs to point at a different Redis than the rest of
    # the cluster (e.g. cross-region replicated Redis for sessions while
    # cache + queue use a local instance).
    redis:
      existingSecret:
        name: ""
        key: ""
      url: ""
      host: ""
      port: 6379
      db: 0
      user: ""
      tls:
        caExistingSecret:
          name: ""
          key: ""

# ============================================================================
# Session Retention Policy Configuration
# Defines how long session history is retained across hot/warm/cold tiers
# ============================================================================

sessionRetention:
  defaultPolicy:
    # -- Create a default SessionRetentionPolicy resource
    create: true
    hotCache:
      # -- Enable Redis hot cache for active sessions
      enabled: true
      # -- TTL for inactive sessions in the hot cache
      ttlAfterInactive: "24h"
      # -- Maximum number of sessions in the hot cache
      maxSessions: 500
      # -- Maximum messages per session in the hot cache
      maxMessagesPerSession: 200
    warmStore:
      # -- Number of days to retain data in the Postgres warm store
      retentionDays: 7
      # -- Partitioning strategy for warm store tables
      partitionBy: "week"
    coldArchive:
      # -- Enable cold archival (e.g., S3, GCS)
      enabled: false

  # Session compaction CronJob configuration
  # Moves sessions from Postgres warm store to S3/Parquet cold archive
  compaction:
    # -- Enable the compaction CronJob
    enabled: false
    # -- Cron schedule for compaction runs
    schedule: "0 2 * * *"
    # -- Name of the SessionRetentionPolicy whose ConfigMap to mount
    policyName: "default"
    # -- Number of sessions per compaction batch
    batchSize: 1000
    # -- Maximum retry attempts per operation
    maxRetries: 3
    # -- Parquet compression codec (snappy, gzip, zstd)
    compression: "snappy"
    # -- Log actions without making changes
    dryRun: false
    # -- Number of retries before marking job as failed
    backoffLimit: 2
    # -- Maximum time in seconds for the job to run
    activeDeadlineSeconds: 7200
    # -- Number of successful jobs to keep
    successfulJobsHistoryLimit: 3
    # -- Number of failed jobs to keep
    failedJobsHistoryLimit: 3
    image:
      # -- Compaction image repository
      repository: ghcr.io/altairalabs/omnia-compaction
      # -- Compaction image tag (defaults to Chart.AppVersion)
      tag: ""
      # -- Image pull policy
      pullPolicy: IfNotPresent
    postgres:
      # -- Name of the Secret containing the Postgres connection string
      secretName: omnia-postgres
      # -- Key in the Secret for the connection string
      secretKey: connection-string
    coldArchive:
      # -- Cold archive backend: s3, gcs, azure
      backend: "s3"
      # -- Bucket/container name for cold storage
      bucket: ""
      # -- Cloud region (S3)
      region: ""
      # -- Custom endpoint for S3-compatible storage
      endpoint: ""
    # Hot-cache Redis for compaction (optional). Same per-consumer
    # override shape as redis.default — falls through when empty.
    redis:
      existingSecret:
        name: ""
        key: ""
      url: ""
      host: ""
      port: 6379
      db: 0
      user: ""
      tls:
        caExistingSecret:
          name: ""
          key: ""
    serviceAccount:
      # -- Annotations for the compaction ServiceAccount (e.g., IRSA, Workload Identity)
      annotations: {}
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    # -- Additional environment variables for the compaction container
    extraEnv: []

# ============================================================================
# Workspace Service Images
# Images used by the workspace controller when deploying per-workspace services
# ============================================================================

workspaceServices:
  sessionApi:
    image:
      # -- Session API image repository
      repository: ghcr.io/altairalabs/omnia-session-api
      # -- Session API image tag (defaults to chart appVersion)
      tag: ""  # defaults to chart appVersion
      # -- Image pull policy
      pullPolicy: IfNotPresent
  memoryApi:
    image:
      # -- Memory API image repository
      repository: ghcr.io/altairalabs/omnia-memory-api
      # -- Memory API image tag (defaults to chart appVersion)
      tag: ""
      # -- Image pull policy
      pullPolicy: IfNotPresent

    # Read-through Redis cache for memory-api Retrieve/List paths.
    # Active only when a Redis URL resolves (consumer override → default
    # → Bitnami subchart). Workers (compaction, retention, tombstone GC,
    # re-embed) always use the unwrapped Postgres store — the cache
    # only fronts API reads.
    consolidation:
      # -- Schedule-evaluation (poll) interval for the consolidation
      # worker, forwarded to memory-api as --consolidation-interval. Each
      # consolidation axis fires per its MemoryPolicy cron schedule
      # (spec.consolidation.schedule / .schedules.<axis>); this value only
      # controls how often those schedules are checked. Empty disables the
      # worker — the default. Operators opt in per environment (e.g. "1m").
      # See docs/local-backlog/2026-05-22-memory-consolidation-design.md.
      interval: ""
    projection:
      # -- Poll interval for the Memory Galaxy pre-render worker, forwarded
      # to memory-api as --projection-interval. The worker pre-renders the
      # workspace-wide galaxy layout into memory_projections so the
      # projection endpoint serves it instantly. Renders are gated per
      # MemoryPolicy spec.projection (enabled / schedule / changeThreshold);
      # this value only controls how often those gates are checked. Empty
      # disables the worker — the default. Operators opt in per environment
      # (e.g. "30s").
      interval: ""
    cache:
      # -- TTL for cached Retrieve/List results. Empty or "0" disables
      # the cache even when Redis resolves (operators sometimes enable
      # Redis for the event publisher first, cache later). Invalidation
      # is version-keyed on every write, so this TTL only bounds stale
      # reads on inactive scopes; it is NOT the staleness window after
      # a write.
      ttl: "5m"
      # Per-consumer Redis override. Same shape as `redis.default`.
      # Empty fields fall through to redis.default. Set when memory
      # cache needs to point at a different Redis than the rest of the
      # cluster (e.g. local cache Redis vs. cross-region session Redis).
      redis:
        existingSecret:
          name: ""
          key: ""
        url: ""
        host: ""
        port: 6379
        db: 0
        user: ""
        tls:
          caExistingSecret:
            name: ""
            key: ""
  evalWorker:
    image:
      # -- Per-service-group eval-worker image repository
      repository: ghcr.io/altairalabs/omnia-eval-worker
      # -- Eval-worker image tag (defaults to chart appVersion)
      tag: ""
      # -- Image pull policy
      pullPolicy: IfNotPresent
  privacyApi:
    image:
      # -- Privacy API image repository. The operator reconciles a per-workspace
      # privacy-api Deployment for every Workspace with spec.privacy set.
      repository: ghcr.io/altairalabs/omnia-privacy-api
      # -- Privacy API image tag (defaults to chart appVersion)
      tag: ""
      # -- Image pull policy
      pullPolicy: IfNotPresent

# ============================================================================
# Internal service-to-service authentication (session-api / memory-api)
# ============================================================================
#
# When enabled, the operator-managed per-workspace session-api requires every
# caller (facade/agent, dashboard, memory-api, eval-worker) to present a
# Kubernetes ServiceAccount bearer token, validated server-side via the
# TokenReview API against an allowlist of caller ServiceAccount subjects. This
# closes SEC-1 (unauthenticated session-api JSON API) and SEC-5 (unauthenticated
# OTLP listeners). Callers read their token from a projected SA-token volume
# (audience-bound) and send it as `Authorization: Bearer <token>`.
#
# Default is `true` (secure by default, #1720). Every caller the operator and
# chart manage (facade/agent, dashboard, memory-api, eval-worker) already
# presents an audience-bound SA token, so default-on authenticates all in-tree
# callers automatically. UPGRADE NOTE: if you run a custom, non-enumerated
# caller of session-api that cannot present an SA token, it will start getting
# 401s once this is on — set `internalServiceAuth.enabled: false` (or add its
# ServiceAccount to the allowlist) before upgrading. The mechanism is
# fail-safe: with a CNI that does not enforce NetworkPolicy the default-deny
# policy is a no-op, but the TokenReview gate still applies.
#
# How the pieces are provisioned when enabled:
#   - The chart passes --session-api-auth-* flags to the operator, which
#     renders SESSION_API_AUTH_* env onto each per-workspace session-api
#     Deployment and grants its ServiceAccount RBAC to create TokenReviews.
#   - The operator mounts an audience-bound projected SA token onto every
#     caller pod it manages (facade/agent, memory-api, eval-worker) and sets
#     SESSION_API_TOKEN_PATH to it.
#   - The chart-owned dashboard Deployment gets the same projected token +
#     SESSION_API_TOKEN_PATH (see templates/dashboard/deployment.yaml).
#   - The allowlist of caller subjects is computed from the release:
#     system:serviceaccount:<release-namespace>:<dashboard-sa>, plus the
#     per-workspace facade / memory-api / eval-worker ServiceAccounts the
#     operator creates (operator side; see internal/controller).
#
# NOTE (OTLP senders): session-api's OTLP listeners (--otlp-enabled) are also
# gated by this auth when enabled. The default chart trace path is
# agents → alloy → Tempo ONLY (see templates/alloy-config.yaml — alloy has a
# single OTLP exporter pointing at Tempo, NOT session-api). There is no
# alloy→session-api OTLP exporter in the default chart, so no bearer_token_file
# is wired on alloy. If you add an OTLP exporter that targets session-api while
# auth is enabled, that sender MUST present an SA token (bearer_token_file
# pointing at its own projected token). See cmd/session-api/SERVICE.md.
internalServiceAuth:
  # -- Require ServiceAccount auth on session-api (TokenReview + allowlist).
  # Default true (secure by default): closes SEC-1/SEC-5 (#1720). The operator
  # mounts audience-bound projected SA tokens on every caller pod it manages
  # (facade, memory-api, eval-worker) and enrols the dashboard SA as an
  # exact-match subject, so all in-tree callers authenticate automatically.
  # Set to false ONLY if you run a custom, non-enumerated caller of session-api
  # that cannot present an SA token (it will otherwise get 401s). See the
  # "internal service auth" trust-boundary note in the chart README.
  enabled: true
  # -- Audience bound into caller projected SA tokens and enforced by
  # session-api (--auth-audiences). Must match on both sides. The audience
  # scopes the token so it is only valid for session-api, not arbitrary
  # in-cluster API access.
  audience: omnia-session-api
  # -- Expiration (seconds) for the projected SA token. The kubelet rotates
  # the file before expiry; callers re-read it. 3600 = 1h.
  tokenExpirationSeconds: 3600
  istio:
    # -- Additionally enforce STRICT mTLS for session-api / memory-api via an
    # Istio PeerAuthentication (defence-in-depth on top of SA-token auth).
    # Requires Istio installed. Independent of `istio.enabled` (Telemetry).
    enabled: false

# ============================================================================
# Dev Postgres
# ============================================================================
#
# DEV-ONLY in-cluster Postgres (single replica, no backups, no persistence
# unless you set it up yourself). Provided so kind/k3d installs can run
# without an external database.
#
# NOT FOR PRODUCTION. For production, leave `postgres.dev.enabled: false` and
# supply a Postgres connection string via a Secret referenced on the
# `Workspace.spec.services[].session.database.secretRef` field.
#
# The chart does NOT manage cloud-provider Postgres (RDS, Cloud SQL, AlloyDB,
# Azure Database for PostgreSQL, Supabase). Provision those out-of-band and
# point Workspace CRs at them.
#
# PgBouncer sidecar (`postgres.dev.pgbouncer.enabled`) mirrors the standard
# Omnia session-api access pattern in dev so you can debug pool behavior
# without running a separate stack.
# ============================================================================

# Dev-only Postgres for local development and CI
# Deploys a single-node Postgres StatefulSet with PgBouncer sidecar option
postgres:
  dev:
    # -- Deploy a dev Postgres instance (NOT for production)
    enabled: false
    # -- Secret name for the Postgres connection string
    secretName: omnia-postgres
    # -- Key in the secret containing the connection string
    secretKey: connection-string
    # -- Postgres container image. Pinned to pgvector (required for memory-api
    # embeddings). Bump `tag` deliberately when upstream Postgres majors move.
    image:
      repository: pgvector/pgvector
      tag: pg17
      pullPolicy: IfNotPresent
    # -- Postgres container resource requests/limits. The 500m/256Mi default
    # is sized for kind/k3d; bump for serious dev workloads.
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi
    # -- Postgres readiness probe (uses `pg_isready` exec).
    readinessProbe:
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 1
      failureThreshold: 3
    pgbouncer:
      # -- Enable PgBouncer connection pooling sidecar
      enabled: false
      # -- PgBouncer sidecar image. Pinned (NOT `:latest`) to avoid silent
      # behavior changes; dev-only, bump deliberately when you want to.
      image: edoburu/pgbouncer:1.24.0
      poolMode: transaction
      defaultPoolSize: 20
      maxClientConn: 100
      maxDbConnections: 20
      # -- PgBouncer sidecar resource requests/limits.
      resources:
        limits:
          cpu: 200m
          memory: 128Mi
        requests:
          cpu: 50m
          memory: 64Mi
      # -- PgBouncer readiness probe (TCP check on port 6432).
      readinessProbe:
        initialDelaySeconds: 5
        periodSeconds: 5
        timeoutSeconds: 1
        failureThreshold: 3

# ============================================================================
# Doctor Configuration
# Cluster diagnostic service for Omnia health checks
# ============================================================================

doctor:
  # -- Enable the doctor diagnostic server deployment
  enabled: false
  image:
    # -- Doctor image repository
    repository: ghcr.io/altairalabs/omnia-doctor
    # -- Doctor image tag (defaults to Chart.AppVersion)
    tag: ""
    # -- Image pull policy
    pullPolicy: IfNotPresent
  service:
    # -- Service type
    type: ClusterIP
    # -- Service port
    port: 8080
  # -- Workspace name for per-workspace service discovery (session-api, memory-api)
  workspace: ""
  # -- Service group within the workspace (default: "default")
  serviceGroup: "default"
  # -- Agent namespace to test
  agentNamespace: ""
  # -- Agent name to test
  agentName: ""
  # -- Ollama service name override
  ollamaService: ""
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  # -- Liveness probe tuning for the doctor container.
  livenessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 3
  # -- Readiness probe tuning for the doctor container.
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 3
  # -- Pod-level overrides for the doctor Deployment. Same shape as CRD
  # PodOverrides (docs/how-to/configure-pod-overrides).
  podOverrides: {}
  # Mgmt-plane token wiring (#1040 part 2). Doctor exchanges its
  # k8s ServiceAccount token for a freshly-minted JWT at the
  # dashboard's /api/auth/service-token endpoint, then attaches that
  # JWT to every WS dial. The dashboard validates the SA token via
  # TokenReview and gates mints on
  # dashboard.serviceTokenAllowlist (see below). The previous design
  # mounted the signing keypair Secret directly into Doctor —
  # removed because it duplicated private-key material across pods,
  # defeating the JWKS architecture.
  mgmtPlaneToken:
    # -- Wire Doctor to the dashboard's service-token endpoint.
    # Defaults to true when both doctor.enabled and dashboard.enabled
    # are set. Set to false when the facade does not enforce mgmt-plane
    # validation (Arena E2E, anonymous test setups).
    enabled: true
    # -- Override the dashboard endpoint URL. Defaults to the
    # in-cluster Service URL of the chart's dashboard.
    url: ""

# ============================================================================
# Session Privacy Configuration
# Privacy policies for session data: PII handling, encryption, opt-out
# ============================================================================

sessionPrivacy:
  defaultPolicy:
    # -- Create the default global SessionPrivacyPolicy (requires enterprise.enabled)
    create: true
    pii:
      # -- Enable automatic PII redaction
      redact: true
      # -- PII patterns to detect (built-in: ssn, credit_card, phone_number, email, ip_address)
      patterns:
        - ssn
        - credit_card
        - phone_number
        - email
        - ip_address
    userOptOut:
      # -- Allow users to opt out of session recording
      enabled: true
      # -- Honor user data deletion requests
      honorDeleteRequests: true

# ============================================================================
# Compliance Presets
# Pre-configured SessionPrivacyPolicy resources for regulatory compliance.
# Requires enterprise.enabled=true. Multiple presets can be enabled together.
# ============================================================================

compliance:
  presets:
    # -- Deploy a GDPR-compliant SessionPrivacyPolicy (EU data protection)
    gdpr: false
    # -- Deploy a HIPAA-compliant SessionPrivacyPolicy (US healthcare)
    hipaa: false
    # -- Deploy a CCPA-compliant SessionPrivacyPolicy (California consumer privacy)
    ccpa: false

# ============================================================================
# Workspace Multi-Tenancy Configuration
# Multi-tenant workspace isolation with namespace, RBAC, and quotas
# ============================================================================

workspaces:
  # -- Enable Workspace controller for multi-tenant isolation
  enabled: true

  # Default storage settings for workspace PVCs
  # These are used when Workspace.spec.storage doesn't specify values
  storage:
    # -- Default storage class for workspace content PVCs
    # For production: Use NFS-backed class (efs-sc, azurefile, nfs-client)
    # For development: Leave empty to use cluster default
    storageClass: ""
    # -- Default volume size for workspace content
    size: 10Gi
    # -- Default access modes (ReadWriteMany for jobs to mount same PVC)
    # For development with local-path, override to: ["ReadWriteOnce"]
    accessModes:
      - ReadWriteMany

# ============================================================================
# Starter Workspace (optional)
# Create one Workspace + its namespace so a fresh install isn't an empty state.
# The chart owns the namespace and the operator adopts it (spec.namespace.create
# is false). Disabled by default so air-gapped / GitOps installs opt in.
# ============================================================================

defaultWorkspace:
  # -- Create a starter Workspace + namespace.
  enabled: false
  # -- Workspace (and Workspace CR) name.
  name: default
  # -- Human-friendly name shown in the dashboard. Defaults to `name`.
  displayName: ""
  # -- Optional description.
  description: ""
  # -- Workspace environment (development | staging | production).
  environment: development
  namespace:
    # -- Namespace the Workspace is realised in.
    name: omnia-default
    # -- Whether the chart creates the namespace (Helm-owned; the operator
    # adopts it). Set false when the namespace is provided externally.
    create: true
  # -- roleBindings map OIDC groups to workspace roles. See the Workspace CRD.
  roleBindings: []
  # -- directGrants grant access by individual user (OIDC email claim).
  directGrants: []
  # -- Managed service groups (session-api / memory-api). Each entry follows the
  # Workspace CRD's spec.services[] shape; database.secretRef names a Secret
  # (with POSTGRES_CONN) that must exist in the namespace — provide it via
  # extraObjects below.
  services: []

# ============================================================================
# Extra objects (escape hatch)
# A list of raw manifests rendered verbatim (through `tpl`) into the release.
# Use it to make workspace-scoped objects exist without modelling them in a
# CRD or a values-DSL — most commonly ExternalSecrets that project DB
# connection strings / provider API keys into a workspace namespace from the
# deployer's own secret store. Works for any resource type.
# Example:
#   extraObjects:
#     - |
#       apiVersion: external-secrets.io/v1beta1
#       kind: ExternalSecret
#       metadata:
#         name: omnia-postgres
#         namespace: omnia-default
#       spec:
#         secretStoreRef: { kind: ClusterSecretStore, name: my-store }
#         target: { name: omnia-postgres }
#         data:
#           - secretKey: POSTGRES_CONN
#             remoteRef: { key: omnia-default-session-conn }
# ============================================================================
extraObjects: []

# ============================================================================
# Workspace Content Storage Configuration
# Dashboard mount for browsing all workspace content
# ============================================================================

workspaceContent:
  # Workspace-content storage is REQUIRED — Omnia does not function without it.
  # The operator writes SkillSource content here and serves it via the content
  # API; skills and arena read from it. You MUST provide a ReadWriteMany (RWX)
  # StorageClass via workspaces.storage.storageClass / workspaceContent.persistence
  # (ReadWriteOnce is acceptable only on single-node clusters). The default cloud
  # block StorageClasses (Azure Disk, AWS EBS, GKE PD) are NOT RWX and will fail
  # to provision this volume — use Azure Files, EFS, Filestore, or an NFS/RWX CSI.

  # -- When true, the operator mounts each workspace's content volume as
  # already scoped to the workspace's own subtree (storage-enforced
  # multi-tenant isolation) and computes a workspace-relative mount subPath.
  # Requires the deployment to back workspace-<ns>-content PVCs with
  # per-workspace subtree-scoped volumes (see cloud umbrella charts).
  # Default false = legacy shared-volume + full subPath.
  scoped: false

  # -- Mount path. The OPERATOR mounts the content share root here and serves
  # it via the content API. The dashboard no longer mounts it (#1462) but still
  # reads this as a path-string for arena template preview/render (the
  # arena-controller owns its own mount).
  mountPath: /workspace-content

  # -- Operator workspace-content API. The dashboard reads/writes workspace
  # content through this authenticated operator endpoint instead of mounting
  # the NFS volume directly (#1462). The operator verifies the dashboard-minted
  # identity JWT and recomputes the workspace role server-side. Served only when
  # `dashboard.enabled` is true.
  contentApi:
    # -- Enable the operator workspace-content API.
    enabled: true
    # -- Bind address for the operator content API (port-only form, e.g. ":8084").
    bindAddress: ":8084"

  # -- Operator deploy-intent API. The dashboard forwards DeployIntent bodies
  # through this authenticated operator endpoint (#1866). The operator
  # verifies the dashboard-minted identity JWT and applies the resulting
  # spec. Served only when `dashboard.enabled` is true.
  deployApi:
    # -- Enable the operator deploy-intent API.
    enabled: true
    # -- Bind address for the operator deploy API (port-only form, e.g.
    # ":8085"). NOT ":8083" -- the tool-test API (operator.apiBindAddress)
    # also defaults to ":8083" whenever dashboard.enabled is true, so that
    # value would collide with it on the same operator process.
    bindAddress: ":8085"

  # -- Layer-2 isolation backstop (#1463): a ValidatingAdmissionPolicy that
  # denies a pod in a workspace namespace from mounting any workspace-content
  # PVC other than its own `workspace-<namespace>-content` (catches foreign and
  # share-root claims). Requires Kubernetes >= 1.30 with the
  # ValidatingAdmissionPolicy feature; default off so older / VAP-less clusters
  # install cleanly. Gatekeeper / Kyverno equivalents are documented in the
  # workspace-content-isolation how-to.
  admissionPolicy:
    # -- Enable the workspace-content mount admission policy.
    enabled: false
    # -- failurePolicy for the policy (Fail = closed; Ignore = open on errors).
    failurePolicy: Fail
    # -- Optional: deny PersistentVolume creation whose nfs.path equals this
    # share-root path (install-specific). Empty disables the PV policy.
    shareRootPath: ""
    # -- Optional: provisioner username exempted from the PV policy
    # (e.g. system:serviceaccount:kube-system:<csi-provisioner>).
    provisionerUsername: ""

  persistence:
    # -- Storage class for dashboard's workspace content PVC
    # For production: Use your cloud's RWX storage class (efs-sc, azurefile-csi-nfs, filestore-sc)
    # For development: Leave empty and enable nfs.csiDriver to use internal NFS
    storageClass: ""
    # -- Access modes for dashboard content PVC (ReadWriteMany for shared access)
    accessModes:
      - ReadWriteMany
    # -- Volume size for dashboard content view
    size: 50Gi
    # -- Use existing PVC instead of creating one
    existingClaim: ""

# ============================================================================
# NFS Storage Configuration
# Shared storage backend for workspace content across namespaces
# ============================================================================

nfs:
  # Internal NFS server for development environments
  server:
    # -- Deploy internal NFS server (dev only, not for production)
    enabled: false
    # -- Use internal NFS server (when enabled, auto-configures CSI driver)
    internal: true
    # -- Storage class for NFS server's backing storage (only for internal server)
    storageClass: ""
    # -- Size of NFS server's backing storage
    size: 50Gi
    image:
      # -- NFS server image repository (erichough/nfs-server is compatible with most K8s distributions)
      repository: erichough/nfs-server
      # -- NFS server image tag
      tag: "2.2.1"
      # -- Image pull policy
      pullPolicy: IfNotPresent
    # -- Resource limits for NFS server pod
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 64Mi

  # External NFS server configuration (for production with self-managed NFS)
  external:
    # -- External NFS server hostname or IP
    server: ""
    # -- Export path on NFS server
    path: /exports/omnia

  # NFS CSI driver configuration (csi-driver-nfs subchart)
  # The CSI driver mounts NFS from within pods, so DNS resolution works correctly
  csiDriver:
    # -- Enable NFS CSI driver for dynamic PVC provisioning
    # For local dev: Set to true along with nfs.server.enabled
    # For production: Use cloud-native storage classes instead (EFS, Azure Files, Filestore)
    enabled: false
    # StorageClass configuration
    storageClass:
      # -- Storage class name for NFS-backed PVCs
      name: omnia-nfs
      # -- Reclaim policy for provisioned PVs
      reclaimPolicy: Delete
      # -- Subdirectory for PVC data (optional, creates per-PVC subdirs automatically)
      subDir: ""
      # -- NFS client mount options for provisioned volumes. `soft` makes I/O
      # fail (EIO) after timeo*retrans deciseconds instead of hanging forever
      # when the server is unreachable — so a dead/restarting NFS server can't
      # wedge pods (they can unmount and terminate instead of getting stuck,
      # which would otherwise pin the workspace-content PVC and block the
      # control plane). Trade-off: a write interrupted by an outage returns an
      # error rather than retrying indefinitely; acceptable here because the
      # operator reconcile retries and content is largely write-once. Drop
      # `soft` (or raise timeo/retrans) if you need write durability over
      # liveness.
      mountOptions:
        - nfsvers=4.1
        - soft
        - timeo=150
        - retrans=3

# NFS CSI driver subchart values (when nfs.csiDriver.enabled)
# See: https://github.com/kubernetes-csi/csi-driver-nfs
nfscsi:
  # Controller configuration
  controller:
    # -- Number of controller replicas
    replicas: 1
  # Feature gates
  feature:
    # -- Enable fsGroupPolicy for proper file permissions
    enableFSGroupPolicy: true
  # External snapshotter sidecar (disabled - VolumeSnapshot CRDs not installed)
  externalSnapshotter:
    enabled: false

# ============================================================================
# VS Code Server (Development Only)
# Web-based VS Code for browsing/editing workspace content
# ============================================================================

# VS Code server (local dev workspace-content browser) is NOT a chart feature —
# it's defined inline in the Tiltfile for local dev only. Same for pgweb.

# Facade container configuration (used by AgentRuntime)
facade:
  image:
    # -- Facade image repository
    repository: ghcr.io/altairalabs/omnia-facade
    # -- Facade image tag (defaults to Chart appVersion)
    tag: ""
    # -- Facade image pull policy
    pullPolicy: IfNotPresent
  # NOTE: For high WebSocket connection counts (>10k per pod), ensure nodes have
  # sufficient file descriptor limits. Kubernetes does not support setting ulimits
  # directly (that is a Docker/containerd concept). Configure nofile limits at the
  # node level via /etc/security/limits.conf or systemd LimitNOFILE.
  # See: https://kubernetes.io/docs/tasks/administer-cluster/sysctl-cluster/

# Framework container configuration (used by AgentRuntime)
# This aligns with the CRD's spec.framework field
framework:
  image:
    # -- Framework (runtime) image repository
    repository: ghcr.io/altairalabs/omnia-runtime
    # -- Framework image tag (defaults to Chart appVersion)
    tag: ""
    # -- Framework image pull policy
    pullPolicy: IfNotPresent
  # -- Additional framework runtime images keyed by AgentRuntime
  # `spec.framework.type`. The operator selects the runtime image per declared
  # framework type; a type with no image here (and no spec.framework.image
  # override) is blocked loudly rather than silently running PromptKit (#1206).
  # `image` above supplies the `promptkit` entry (back-compat). Each entry
  # renders a `--framework-image=<type>=<repository>:<tag>` operator arg.
  #
  # Only `promptkit` is built and tested by this repo. Other framework
  # runtimes (e.g. langchain) are UNSUPPORTED — not built, tested, or
  # released by this repo: they implement the omnia.runtime.v1 contract
  # independently and may lag it. Set one here only if you have verified the
  # image against the contract version documented at
  # docs/src/content/docs/reference/platform/facade-runtime-protocol.md, and
  # pin an explicit tag — do not rely on :latest.
  images: {}

# Observability configuration (for Omnia-specific templates)
observability:
  # -- Enable Omnia dashboards/datasources
  enabled: true

# ============================================================================
# Tracing Configuration
# Distributed tracing for agent runtime containers
# ============================================================================

tracing:
  # -- Enable distributed tracing for agent runtime containers
  enabled: false
  # -- OTLP gRPC endpoint for traces
  # Resolution order when empty:
  #   1) <release>-alloy:4317 (if alloy.enabled=true)
  #   2) <release>-tempo:4317 (if tempo.enabled=true)
  # Example explicit override: omnia-alloy.omnia-system.svc.cluster.local:4317
  endpoint: ""

  # Grafana Alloy OTLP fan-out configuration
  # When enabled, templates a ConfigMap with Alloy River config that receives
  # OTLP traces and forwards to both session-api (for session reconstruction)
  # and Tempo (for distributed tracing).
  # Note: The Alloy Deployment + Service are not included here — they will be
  # added when the full observability stack is wired.
  alloy:
    # -- Enable Alloy OTLP fan-out config
    enabled: false
    tempo:
      # -- Tempo OTLP gRPC endpoint (e.g., "tempo.monitoring:4317")
      endpoint: ""

# ============================================================================
# Subchart configurations (optional observability stack)
# Set enabled: true to deploy each component
# ============================================================================

# Prometheus configuration (metrics)
# See: https://github.com/prometheus-community/helm-charts/tree/main/charts/prometheus
prometheus:
  # -- Enable Prometheus
  enabled: false
  server:
    # -- Disable persistent storage for dev/test
    persistentVolume:
      enabled: false
    # Configure Prometheus to serve from sub-path
    prefixURL: /prometheus
    baseURL: /prometheus
    # Enable remote write receiver for Tempo metrics-generator
    # Enable lifecycle API so configmap-reload can trigger config reloads
    extraFlags:
      - web.enable-remote-write-receiver
      - web.enable-lifecycle
  # -- Disable alertmanager
  alertmanager:
    enabled: false
  # -- Disable pushgateway
  prometheus-pushgateway:
    enabled: false
  # -- Disable node-exporter
  prometheus-node-exporter:
    enabled: false
  # -- Disable kube-state-metrics (usually already present)
  kube-state-metrics:
    enabled: false
  # Override the default self-scrape job to use the /prometheus path prefix.
  # Without this, the auto-generated job targets localhost:9090/metrics which
  # fails because Prometheus is configured with baseURL=/prometheus.
  serverFiles:
    prometheus.yml:
      scrape_configs:
        - job_name: prometheus
          metrics_path: /prometheus/metrics
          static_configs:
            - targets:
              - localhost:9090
  # -- Extra scrape configs for Omnia agent metrics
  extraScrapeConfigs: |
    # Scrape Omnia agent pods (facade + runtime in one pod).
    #
    # An agent pod serves Prometheus metrics on TWO ports across TWO containers —
    # the facade on its health port (8081, omnia_agent_*/omnia_facade_*) and the
    # runtime on its health port (9001, PromptKit SDK + omnia_runtime_*) — and
    # there is no in-pod consolidation of the two. A single prometheus.io/port
    # annotation cannot express both, which is why the facade metrics were never
    # scraped before (the old job trusted prometheus.io/port=8080, a port with no
    # /metrics handler). Instead, both metrics-serving containers declare a
    # container port NAMED "metrics", and pod service-discovery emits one target
    # per declared container port — so this single job scrapes every agent
    # metrics endpoint by matching the port NAME, independent of the port number
    # and of which facade/runtime implementation is deployed.
    - job_name: 'omnia-agents'
      kubernetes_sd_configs:
        - role: pod
      relabel_configs:
        # Only scrape pods with the omnia agent component label
        - source_labels: [__meta_kubernetes_pod_label_omnia_altairalabs_ai_component]
          action: keep
          regex: agent
        # Keep only the container port named "metrics" (facade 8081 + runtime 9001).
        # role: pod sets __address__ to <podIP>:<containerPort> per port, so no
        # manual __address__ rewrite is needed.
        - source_labels: [__meta_kubernetes_pod_container_port_name]
          action: keep
          regex: metrics
        # Add useful labels
        - source_labels: [__meta_kubernetes_namespace]
          target_label: namespace
        - source_labels: [__meta_kubernetes_pod_name]
          target_label: pod
        - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_instance]
          target_label: agent
        # Distinguish facade vs runtime by the actual container name
        - source_labels: [__meta_kubernetes_pod_container_name]
          target_label: container
    # Scrape Omnia session-api pods (HTTP request metrics, event publishing)
    - job_name: 'omnia-session-api'
      kubernetes_sd_configs:
        - role: pod
      relabel_configs:
        - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
          action: keep
          regex: session-api
        - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
          action: replace
          regex: ([^:]+)(?::\d+)?;(\d+)
          replacement: $1:$2
          target_label: __address__
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
          action: replace
          target_label: __metrics_path__
          regex: (.+)
        - source_labels: [__meta_kubernetes_namespace]
          target_label: namespace
        - source_labels: [__meta_kubernetes_pod_name]
          target_label: pod
    # Scrape Omnia memory-api pods (cache lookups, write suppression, Redis/worker health)
    - job_name: 'omnia-memory-api'
      kubernetes_sd_configs:
        - role: pod
      relabel_configs:
        - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
          action: keep
          regex: memory-api
        - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
          action: replace
          regex: ([^:]+)(?::\d+)?;(\d+)
          replacement: $1:$2
          target_label: __address__
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
          action: replace
          target_label: __metrics_path__
          regex: (.+)
        - source_labels: [__meta_kubernetes_namespace]
          target_label: namespace
        - source_labels: [__meta_kubernetes_pod_name]
          target_label: pod
    # Scrape Omnia eval-worker pods (eval execution, event processing, stream lag)
    - job_name: 'omnia-eval-worker'
      kubernetes_sd_configs:
        - role: pod
      relabel_configs:
        - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
          action: keep
          regex: eval-worker
        - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
          action: replace
          regex: ([^:]+)(?::\d+)?;(\d+)
          replacement: $1:$2
          target_label: __address__
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
          action: replace
          target_label: __metrics_path__
          regex: (.+)
        - source_labels: [__meta_kubernetes_namespace]
          target_label: namespace
        - source_labels: [__meta_kubernetes_pod_name]
          target_label: pod
    # Scrape Omnia arena-worker Job pods (work item execution, queue operations)
    - job_name: 'omnia-arena-worker'
      honor_labels: true
      kubernetes_sd_configs:
        - role: pod
      relabel_configs:
        - source_labels: [__meta_kubernetes_pod_label_omnia_altairalabs_ai_component]
          action: keep
          regex: arena-worker
        - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
          action: replace
          regex: ([^:]+)(?::\d+)?;(\d+)
          replacement: $1:$2
          target_label: __address__
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
          action: replace
          target_label: __metrics_path__
          regex: (.+)
        - source_labels: [__meta_kubernetes_namespace]
          target_label: namespace
        - source_labels: [__meta_kubernetes_pod_name]
          target_label: pod
        - source_labels: [__meta_kubernetes_pod_label_omnia_altairalabs_ai_job]
          target_label: job_name
    # Scrape Omnia compaction CronJob pods (session data compaction metrics)
    - job_name: 'omnia-compaction'
      kubernetes_sd_configs:
        - role: pod
      relabel_configs:
        - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
          action: keep
          regex: compaction
        - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
          action: replace
          regex: ([^:]+)(?::\d+)?;(\d+)
          replacement: $1:$2
          target_label: __address__
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
          action: replace
          target_label: __metrics_path__
          regex: (.+)
        - source_labels: [__meta_kubernetes_namespace]
          target_label: namespace
        - source_labels: [__meta_kubernetes_pod_name]
          target_label: pod

# Grafana configuration (dashboards)
# See: https://github.com/grafana/helm-charts/tree/main/charts/grafana
grafana:
  # -- Enable Grafana
  enabled: false
  # -- Admin password (change in production!)
  adminPassword: admin
  # Configure Grafana to serve from sub-path
  grafana.ini:
    server:
      root_url: "%(protocol)s://%(domain)s:%(http_port)s/grafana/"
      serve_from_sub_path: true
    # Enable anonymous access for iframe embedding
    auth.anonymous:
      enabled: true
      org_role: Viewer
    # Allow embedding in iframes
    security:
      allow_embedding: true
  # -- Grafana plugins to install
  # Redis plugin provides Redis datasource for monitoring and visualization
  plugins:
    - redis-datasource
  # Sidecar configuration for auto-loading dashboards/datasources
  sidecar:
    dashboards:
      # -- Enable dashboard sidecar
      enabled: true
      # -- Label to identify dashboard ConfigMaps
      label: grafana_dashboard
      # -- Search all namespaces for dashboards
      searchNamespace: ALL
    datasources:
      # -- Enable datasource sidecar
      enabled: true
      # -- Label to identify datasource ConfigMaps
      label: grafana_datasource
      # -- Search all namespaces for datasources
      searchNamespace: ALL
  # -- Grafana service type
  service:
    type: ClusterIP

# Loki configuration (logs)
# See: https://github.com/grafana/helm-charts/tree/main/charts/loki
loki:
  # -- Enable Loki
  enabled: false
  # -- Deploy in single binary mode
  deploymentMode: SingleBinary
  loki:
    # -- Disable auth for simplicity
    auth_enabled: false
    # -- Use test schema for quick deployment
    useTestSchema: true
    # -- Use filesystem storage
    storage:
      type: filesystem
    # -- Common config for single-binary mode
    commonConfig:
      replication_factor: 1
    # -- Enable log volume for Grafana Explore
    limits_config:
      volume_enabled: true
  singleBinary:
    # -- Single replica for dev/test
    replicas: 1
    persistence:
      # -- Enable persistence for dev/test
      enabled: true
      size: 10Gi
  # -- Disable distributed components
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0
  # -- Disable gateway
  gateway:
    enabled: false
  # -- Disable caches for simpler deployment
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false
  # -- Disable ruler to avoid "no space left on device" errors on Docker Desktop
  # The ruler tries to mkdir /var/loki/rules which fails with local-path provisioner
  # See: https://github.com/grafana/helm-charts/issues/577
  ruler:
    enabled: false

# Alloy configuration (unified telemetry collector)
# See: https://github.com/grafana/helm-charts/tree/main/charts/alloy
# Alloy replaces Promtail and can collect logs, metrics, and traces
alloy:
  # -- Enable Alloy telemetry collector
  enabled: false
  alloy:
    # Expose OTLP gRPC port so facade/runtime can send traces
    extraPorts:
      - name: otlp-grpc
        port: 4317
        targetPort: 4317
        protocol: TCP
      - name: otlp-http
        port: 4318
        targetPort: 4318
        protocol: TCP
    # Alloy configuration using River syntax
    configMap:
      content: |
        // Discover Kubernetes pods
        discovery.kubernetes "pods" {
          role = "pod"
        }

        // Relabel discovered pods for log collection
        discovery.relabel "pods" {
          targets = discovery.kubernetes.pods.targets

          // Keep only running pods
          rule {
            source_labels = ["__meta_kubernetes_pod_phase"]
            regex         = "Pending|Succeeded|Failed|Unknown"
            action        = "drop"
          }

          // Set namespace label
          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label  = "namespace"
          }

          // Set pod label
          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label  = "pod"
          }

          // Set container label
          rule {
            source_labels = ["__meta_kubernetes_pod_container_name"]
            target_label  = "container"
          }

          // Set app label from pod label
          rule {
            source_labels = ["__meta_kubernetes_pod_label_app"]
            target_label  = "app"
          }

          // Set app.kubernetes.io/name label
          rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
            target_label  = "app_name"
          }

          // Set agent name from app.kubernetes.io/instance (e.g. "tools-demo")
          rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_instance"]
            target_label  = "agent"
          }

          // Set component from omnia.altairalabs.ai/component (e.g. "agent")
          rule {
            source_labels = ["__meta_kubernetes_pod_label_omnia_altairalabs_ai_component"]
            target_label  = "component"
          }

          // Build service_name to match Tempo's OTEL service.name: omnia-{container}-{agent}
          // This enables Grafana to correlate Loki logs with Tempo traces by service.
          // Only sets the label when both container and agent are present (Omnia pods).
          rule {
            source_labels = ["__meta_kubernetes_pod_container_name", "__meta_kubernetes_pod_label_app_kubernetes_io_instance"]
            separator     = "/"
            regex         = "(.+)/(.+)"
            replacement   = "omnia-$1-$2"
            target_label  = "service_name"
          }

          // Build log file path
          rule {
            source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
            separator     = "/"
            target_label  = "__path__"
            replacement   = "/var/log/pods/*$1/*.log"
          }
        }

        // Collect logs from discovered pods
        loki.source.kubernetes "pods" {
          targets    = discovery.relabel.pods.output
          forward_to = [loki.process.pods.receiver]
        }

        // Process logs (parse JSON, extract level, filter noise)
        loki.process "pods" {
          forward_to = [loki.write.default.receiver]

          // Parse CRI format
          stage.cri {}

          // Drop noisy health check and metrics logs
          stage.drop {
            expression  = ".*(GET|POST) /(health|healthz|ready|readyz|metrics|livez).*"
            drop_counter_reason = "health_metrics_filter"
          }

          // Try to parse JSON logs and extract fields
          stage.json {
            expressions = {
              level      = "level",
              msg        = "msg",
              caller     = "caller",
              timestamp  = "time",
              ts         = "ts",
              agent      = "agent",
              session_id = "session_id",
              trace_id   = "trace_id",
            }
          }

          // Extract timestamp from JSON 'time' field (common in structured logs)
          stage.timestamp {
            source = "timestamp"
            format = "RFC3339"
            fallback_formats = ["RFC3339Nano", "Unix", "UnixMs", "UnixUs", "UnixNs"]
          }

          // Fallback: try 'ts' field (used by zap and other loggers)
          stage.timestamp {
            source = "ts"
            format = "RFC3339"
            fallback_formats = ["RFC3339Nano", "Unix", "UnixMs", "UnixUs", "UnixNs"]
          }

          // Promote key fields to indexed labels for filtering
          stage.labels {
            values = {
              level = "",
              agent = "",
            }
          }

          // Store extracted fields as structured metadata (queryable but not indexed)
          // Requires Loki 3.0+ with structured metadata enabled
          stage.structured_metadata {
            values = {
              msg        = "",
              caller     = "",
              session_id = "",
              trace_id   = "",
            }
          }

          // Keep the full JSON log line so all structured fields are preserved
          // and queryable in Grafana. Labels and metadata above handle indexing.
        }

        // Write logs to Loki
        loki.write "default" {
          endpoint {
            url = "http://omnia-loki:3100/loki/api/v1/push"
          }
        }

        // ======================================================================
        // OTLP Trace Fan-Out
        // Receives OTLP traces from facade/runtime and forwards to both
        // session-api (session reconstruction) and Tempo (distributed tracing).
        // ======================================================================

        // OTLP gRPC receiver — agents send traces here on port 4317
        otelcol.receiver.otlp "default" {
          grpc {
            endpoint = "0.0.0.0:4317"
          }
          output {
            traces = [otelcol.exporter.otlphttp.session_api.input, otelcol.exporter.otlp.tempo.input]
          }
        }

        // Fan-out 1: Session-API (HTTP — for session reconstruction)
        otelcol.exporter.otlphttp "session_api" {
          client {
            endpoint = "http://omnia-session-api.omnia-system.svc.cluster.local:4318"
            tls {
              insecure = true
            }
          }
        }

        // Fan-out 2: Tempo (gRPC — distributed tracing backend)
        otelcol.exporter.otlp "tempo" {
          client {
            endpoint = "omnia-tempo:4317"
            tls {
              insecure = true
            }
          }
        }

# Tempo configuration (traces)
# See: https://github.com/grafana/helm-charts/tree/main/charts/tempo
tempo:
  # -- Enable Tempo
  enabled: false
  tempo:
    # -- Disable telemetry reporting
    reportingEnabled: false
    # Enable metrics generator for service graphs
    metricsGenerator:
      enabled: true
      remoteWriteUrl: "http://omnia-prometheus-server:80/prometheus/api/v1/write"
    # -- Storage: vParquet4 enables columnar search indexing for fast TraceQL queries.
    # Without this, Tempo does brute-force scans of all blocks.
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal
        block:
          version: vParquet4
    # -- Querier: allow more concurrent queries for dashboard panels
    querier:
      max_concurrent_queries: 20
    # -- Query frontend: increase search concurrency and remove duration cap
    queryFrontend:
      search:
        max_duration: "0"
        concurrent_jobs: 2000
  # Disable Jaeger query UI (we use Grafana instead)
  tempoQuery:
    enabled: false
  # -- Enable persistence (required for Tempo storage)
  persistence:
    enabled: true
    size: 5Gi

# ============================================================================
# Istio Service Mesh Integration
# Istio should be installed separately before deploying Omnia
# See: https://istio.io/latest/docs/setup/install/helm/
# ============================================================================

istio:
  # -- Enable Istio integration (Telemetry resources for tracing/logging)
  # Requires Istio to be installed separately in istio-system namespace
  enabled: false
  # -- Tempo service for trace export (adjust if using different release name)
  tempoService: omnia-tempo.omnia-system.svc.cluster.local
  # -- Tempo OTLP port
  tempoPort: 4317

# ============================================================================
# Gateway API Configuration
# Kubernetes Gateway API is required for agent ingress
#
# Two gateways — both disabled by default. You want AT MOST one of each.
#
#   gateway:          external LB for agent WebSocket traffic (public / VPC-
#                     facing). Deploy when users/apps connect from outside
#                     the cluster.
#
#   internalGateway:  internal LB (or NodePort / ClusterIP depending on
#                     controller) for observability tools. Deploy when you
#                     want browser access to Grafana/Prometheus without
#                     exposing them publicly. Not required when you use
#                     `kubectl port-forward` or a VPN.
#
# Controllers: set `className` to match what's installed in the cluster.
# Common values:
#   className: istio              # Istio 1.21+ ambient or sidecar
#   className: envoy              # Envoy Gateway
#   className: cilium             # Cilium Gateway API
#   className: gke-l7-rilb        # GKE (external regional)
#   className: eks-alb            # EKS ALB Controller
#
# Cloud LB annotations go on `infrastructureAnnotations` (forwarded to the
# provisioned Service by GWAPI v1.1+), NOT on `annotations` (which land on
# the Gateway resource only). Per-cloud examples are inline below.
# ============================================================================

# External gateway for agent traffic (WebSocket connections)
# defaultExposure has the operator provision a per-agent Gateway API HTTPRoute so
# agents are reachable from outside the cluster (the chart can't template per-agent
# routes — agents are CRs created at runtime). Opt-in: an agent is exposed only
# when it sets spec.facade.expose.enabled AND this is enabled. Exposure does NOT
# add authentication — spec.externalAuth is still the gate; an exposed agent with
# no externalAuth validators is management-plane-only at the facade. (#1553)
defaultExposure:
  # -- Turn the feature on. When false the operator never provisions agent routes.
  enabled: false
  # -- Base domain for generated hostnames ({name}.{namespace}.{baseDomain}).
  # Required when enabled. The Gateway listener's TLS cert must cover these hosts
  # (e.g. a wildcard *.{baseDomain} certificate on the Gateway).
  baseDomain: ""
  # -- The Gateway agent HTTPRoutes attach to. May be the chart-provisioned
  # `gateway:` below (name "{fullname}-agents") or a pre-existing external one.
  gateway:
    # -- Gateway name. Required when enabled.
    name: ""
    # -- Gateway namespace. Empty = same namespace as the agent. A cross-namespace
    # attachment requires a ReferenceGrant, which the operator does NOT create.
    namespace: ""
    # -- Optional listener sectionName on the Gateway.
    sectionName: ""

gateway:
  # -- Enable external Gateway for agent ingress (requires Istio or Gateway controller)
  enabled: false
  # -- Gateway name suffix
  name: agents
  # -- Gateway class name (istio when using Istio, or external controller)
  className: istio
  # -- Gateway listener configuration
  listeners:
    # -- HTTP listener for agent WebSocket connections
    http:
      port: 80
      protocol: HTTP
    # -- HTTPS listener (requires TLS secret)
    https:
      enabled: false
      port: 443
      protocol: HTTPS
      # -- TLS secret name (must exist in the namespace)
      tlsSecretName: ""
  # -- Annotations for the external gateway resource.
  # Use implementation-specific annotations for WebSocket idle timeout, e.g.:
  #   gateway.envoyproxy.io/timeout-idle: "3600s"
  #   gateway.istio.io/controller-name: "istio.io/gateway-controller"
  annotations: {}
  # -- Annotations rendered under spec.infrastructure.annotations of the Gateway.
  # These are forwarded by the Gateway API controller (Istio 1.21+ with GWAPI v1.1+)
  # onto the provisioned LoadBalancer Service, which is where cloud LB annotations
  # (static IP, resource group, etc.) actually need to land. Example (AKS):
  #   service.beta.kubernetes.io/azure-load-balancer-resource-group: my-rg
  #   service.beta.kubernetes.io/azure-load-balancer-ipv4: 10.0.0.42
  infrastructureAnnotations: {}

# Internal gateway for observability tools (Grafana, Prometheus, etc.)
internalGateway:
  # -- Enable internal Gateway for observability tools (requires Istio or Gateway controller)
  enabled: false
  # -- Gateway name suffix
  name: internal
  # -- Gateway class name
  className: istio
  # -- Gateway listener port
  port: 8080
  # -- Annotations rendered under spec.infrastructure.annotations of the internal
  # Gateway. Useful for forcing an internal-only LB via cloud-specific annotations,
  # e.g. (AKS): service.beta.kubernetes.io/azure-load-balancer-internal: "true"
  infrastructureAnnotations: {}
  # -- Expose Grafana (main observability UI - includes Prometheus, Loki, Tempo datasources)
  grafana:
    enabled: true
    path: /grafana
  # -- Expose Prometheus UI (optional - metrics also available in Grafana)
  prometheus:
    enabled: true
    path: /prometheus

# ============================================================================
# Authentication Configuration
# JWT-based authentication using Istio RequestAuthentication
# ============================================================================

authentication:
  # -- Enable JWT authentication for agent endpoints
  enabled: false

  # -- OIDC/JWT provider configuration
  jwt:
    # -- JWT issuer URL (e.g., https://auth.example.com, https://accounts.google.com)
    issuer: ""
    # -- JWKS URI for validating JWT signatures
    # If empty, defaults to {issuer}/.well-known/jwks.json
    jwksUri: ""
    # -- JWT audiences to accept (optional, validates 'aud' claim)
    audiences: []
    # -- Forward the original token to the upstream service
    forwardOriginalToken: true
    # -- Headers to output payload claims (optional)
    # Example: outputClaimToHeaders:
    #   - header: x-user-id
    #     claim: sub
    outputClaimToHeaders: []

  # -- Authorization rules (optional, defaults to requiring valid JWT)
  authorization:
    # -- Require specific claims in the JWT
    # Example: requiredClaims:
    #   - claim: "scope"
    #     values: ["agents:access"]
    requiredClaims: []
    # -- Allow unauthenticated access to specific paths (e.g., health checks)
    excludePaths:
      - /healthz
      - /readyz

  # -- Edge-trust header strip.
  # When an AgentRuntime uses spec.externalAuth.edgeTrust, the facade TRUSTS
  # claim-headers (x-user-id, x-user-roles, x-user-email, etc.) injected by the
  # upstream edge without re-verifying the JWT. Istio's RequestAuthentication
  # only ADDS verified claim headers — it does not strip an attacker-supplied
  # inbound copy, so a caller holding any valid JWT can spoof identity by
  # setting these headers directly. The EnvoyFilter below uses a Lua filter to
  # remove the spoofable headers on SIDECAR_INBOUND before Istio's jwt_authn
  # filter runs, then the RequestAuthentication re-adds the verified claims.
  #
  # Enabled by default when authentication.enabled=true — safe for every
  # deployment (legitimate clients never send these headers). Set to false
  # only if you have an upstream that legitimately forwards them.
  edgeTrust:
    # -- Strip the spoofable claim-headers on SIDECAR_INBOUND before JWT
    # validation. Defaults to true. Requires istio.enabled=true and
    # authentication.enabled=true — no effect otherwise.
    stripInboundClaimHeaders: true
    # -- Additional header names to strip. The defaults (below) cover
    # x-user-id, x-user-roles, x-user-email plus whatever is listed in
    # authentication.jwt.outputClaimToHeaders. Add names here when an
    # AgentRuntime's spec.externalAuth.edgeTrust.claimsFromHeaders references
    # headers the defaults don't cover.
    additionalStripHeaders: []
    # -- Default headers the facade's edgeTrust validator trusts (see
    # internal/facade/auth/edge_trust.go). Rarely overridden — adjust
    # additionalStripHeaders instead.
    defaultStripHeaders:
      - x-user-id
      - x-user-roles
      - x-user-email

# ============================================================================
# KEDA Configuration (Advanced Autoscaling)
# KEDA enables scale-to-zero, custom metrics scaling, and cron-based scaling
# See: https://keda.sh/docs/
#
# IMPORTANT: If KEDA is already installed in your cluster (e.g., via
# `helm install keda kedacore/keda`), you MUST keep this disabled to avoid
# CRD ownership conflicts. The chart will detect existing KEDA installations
# and fail with a helpful message if you try to enable this subchart.
# ============================================================================

keda:
  # -- Enable KEDA (Kubernetes Event-driven Autoscaler)
  # Required for AgentRuntime autoscaling with type: keda
  # Set to false if KEDA is already installed in your cluster
  enabled: false
  # -- KEDA operator configuration
  # See: https://github.com/kedacore/charts/tree/main/keda
  operator:
    # -- Watch all namespaces (recommended for cluster-wide use)
    watchNamespace: ""
  # -- Prometheus metrics adapter
  prometheus:
    # -- Prometheus server address for KEDA triggers
    # This is the default when using the Prometheus subchart
    serverAddress: "http://omnia-prometheus-server.omnia-system.svc.cluster.local"

# ============================================================================
# Redis (Bitnami)
# Optional Redis deployment for Arena queue, sessions, caching, etc.
# See: https://github.com/bitnami/charts/tree/main/bitnami/redis
# ============================================================================

redis:
  # -- Enable the in-repo dev Redis (templates/redis/redis.yaml)
  # Dev convenience. When true, populates redis.default.url with the
  # in-cluster service URL automatically. Production installs typically
  # leave this false and point redis.default at an external Redis
  # (ElastiCache, MemoryStore, Azure Cache).
  enabled: false

  # ============================================================================
  # Cluster-wide default Redis target.
  #
  # Every consumer (memory cache, dashboard session store, arena queue, eval
  # worker, A2A task store) falls back to this when its own override is not
  # set. Empty here AND empty per-consumer = consumer is disabled.
  #
  # Two ways to specify the target. Use ONE form per block:
  #
  #   1. `url` — full connection string `redis(s)://[user:pass@]host:port[/db]`.
  #      Preferred when the password is a literal or when there's no auth.
  #      Cloud Redis vendors document this form (`rediss://...` for TLS).
  #
  #   2. Decomposed `{host, port, db, user, tls, auth.existingSecret}`.
  #      Use when the password lives in a Kubernetes Secret. The chart
  #      mounts the Secret as REDIS_PASSWORD env and synthesises a URL
  #      via `$(VAR)` substitution at pod startup.
  #
  # Resolution order at consumer-rendering time:
  #   consumer.url → consumer.{host,...} → default.url → default.{host,...}
  #   → in-repo dev Redis (when redis.enabled=true) → "" (disabled)
  # ============================================================================
  default:
    # ONE OF the three forms below. Resolution order on this block:
    #   existingSecret (URL from Secret) > url (literal URL) > host (decomposed).
    #
    # FORM 1 — URL stored in a Kubernetes Secret. Preferred for any
    # auth'd Redis (the password never appears in chart values, never
    # in `helm get values` output, never in container env logs).
    existingSecret:
      # -- Secret name. The Secret must contain a single key holding
      # the full Redis URL (`redis(s)://[user:pass@]host:port[/db]`).
      name: ""
      # -- Key within the Secret whose value is the URL.
      key: ""

    # FORM 2 — literal URL in chart values. Acceptable for unauthenticated
    # Redis (dev) or where the password is already an opaque chart-input
    # (e.g. external-secrets reconciles it into chart values).
    url: ""

    # FORM 3 — decomposed for convenience. Cleartext only; the chart
    # cannot synthesise auth from this form (use existingSecret for
    # auth'd Redis). Useful when pointing at unauthenticated in-cluster
    # Redis without typing out the URL.
    host: ""
    port: 6379
    db: 0
    user: ""

    # TLS CA bundle for self-signed Redis TLS certs. Optional regardless
    # of which form is used — leave empty when the Redis cert chains to
    # a system CA root (true for ElastiCache, MemoryStore, Azure Cache).
    # Mounted as a file at /etc/omnia/redis-ca/<key> on every consumer
    # pod when set.
    tls:
      caExistingSecret:
        name: ""
        key: ""

  # ============================================================================
  # In-repo development Redis (rendered by templates/redis/redis.yaml when
  # redis.enabled=true). Single-replica StatefulSet, no auth, no persistence — a
  # dev/local convenience only. For production, leave redis.enabled=false and
  # point redis.default at an external managed Redis. Replaces the former Bitnami
  # Redis subchart (dropped with the wound-down Bitnami/Broadcom catalog).
  # ============================================================================

  # -- Redis image for the in-cluster dev instance (official multi-arch image).
  image:
    repository: redis
    tag: "7.4-alpine"
    pullPolicy: IfNotPresent

  # -- maxmemory ceiling for the dev Redis.
  maxmemory: "256mb"
  # -- Eviction policy once maxmemory is reached.
  maxmemoryPolicy: "allkeys-lru"

  # -- Resource requests/limits for the dev Redis pod.
  resources:
    limits:
      cpu: 200m
      memory: 320Mi
    requests:
      cpu: 50m
      memory: 128Mi

  # -- Pod customization for the dev Redis StatefulSet. See charts/omnia/CLAUDE.md
  # for the podOverrides contract.
  podOverrides: {}

# ============================================================================
# Memory Consolidation Reference Packs
# Helm-bundled system PromptPacks + AgentRuntimes used by the memory-api
# consolidation worker. See
# docs/local-backlog/2026-05-22-memory-consolidation-design.md.
#
# Disabled by default — operators opt in by setting
# consolidation.systemPacks.enabled: true AND configuring the memory-api
# CONSOLIDATION_INTERVAL + CONSOLIDATION_FUNCTIONS_URL env vars.
# ============================================================================
consolidation:
  systemPacks:
    # -- Install the helm-bundled safe-default consolidation pack.
    # When true the chart creates:
    #   - omnia-system-packs Namespace
    #   - safe-default-summarizer PromptPack + AgentRuntime (function-mode)
    # Both carry the omnia.altairalabs.ai/pack-class=system label.
    enabled: false

    safeDefault:
      # -- Container image for the safe-default-summarizer function-mode
      # runtime. Reuses the standard runtime image — no special pipeline.
      image:
        repository: ghcr.io/altairalabs/omnia/runtime
        tag: "0.1.0"
        pullPolicy: IfNotPresent
      # -- Pod replicas for the safe-default-summarizer AgentRuntime.
      replicas: 1
      # -- Provider CRD reference for the function-mode pod's LLM. Must
      # exist in the omnia-system-packs namespace before enabling
      # systemPacks.enabled=true. Required when systemPacks.enabled
      # is true; chart render will produce an AgentRuntime referencing
      # this Provider by name.
      providerRef:
        name: ""

# ============================================================================
# Demo Mode (Separate Chart)
# Demo agents are now deployed via the omnia-demos chart.
# See: charts/omnia-demos/
# ============================================================================

# Prometheus scrape configs for Istio metrics
# Used when ENABLE_FULL_STACK=true in Tilt
#
# Scrapes:
# - Istio control plane (istiod) metrics
# - Envoy sidecar metrics from all pods
# - Istio gateway metrics

prometheus:
  extraScrapeConfigs: |
    # Scrape Omnia agent pods (facade + runtime) by the "metrics"-named container
    # port — the SAME approach as charts/omnia/values.yaml. Even under Istio
    # sidecars we scrape the metrics ports (8081/9001) DIRECTLY rather than via
    # merge-metrics on :15020: the operator excludes both ports from sidecar
    # inbound interception (traffic.sidecar.istio.io/excludeInboundPorts), so a
    # plain scrape works and we get full app metrics without depending on the
    # merge. Envoy's own stats are collected separately by the envoy-stats job
    # below.
    - job_name: 'omnia-agents'
      kubernetes_sd_configs:
        - role: pod
      relabel_configs:
        # Only scrape pods with the omnia agent component label
        - source_labels: [__meta_kubernetes_pod_label_omnia_altairalabs_ai_component]
          action: keep
          regex: agent
        # Keep only the container port named "metrics" (facade 8081 + runtime 9001)
        - source_labels: [__meta_kubernetes_pod_container_port_name]
          action: keep
          regex: metrics
        # Add useful labels
        - source_labels: [__meta_kubernetes_namespace]
          target_label: namespace
        - source_labels: [__meta_kubernetes_pod_name]
          target_label: pod
        - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_instance]
          target_label: agent
        - source_labels: [__meta_kubernetes_pod_container_name]
          target_label: container

    # Scrape Istio control plane (istiod)
    - job_name: 'istiod'
      kubernetes_sd_configs:
        - role: pod
          namespaces:
            names:
              - istio-system
      relabel_configs:
        - source_labels: [__meta_kubernetes_pod_label_app]
          action: keep
          regex: istiod
        - source_labels: [__meta_kubernetes_pod_container_port_name]
          action: keep
          regex: http-monitoring
        - source_labels: [__meta_kubernetes_namespace]
          target_label: namespace
        - source_labels: [__meta_kubernetes_pod_name]
          target_label: pod

    # Scrape Envoy sidecar metrics from all pods
    - job_name: 'envoy-stats'
      metrics_path: /stats/prometheus
      kubernetes_sd_configs:
        - role: pod
      relabel_configs:
        # Only scrape pods with Istio sidecar
        - source_labels: [__meta_kubernetes_pod_container_name]
          action: keep
          regex: istio-proxy
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
          action: drop
          regex: 'false'
        # Use the sidecar's stats port (15090)
        - source_labels: [__address__]
          action: replace
          regex: ([^:]+)(?::\d+)?
          replacement: $1:15090
          target_label: __address__
        - source_labels: [__meta_kubernetes_namespace]
          target_label: namespace
        - source_labels: [__meta_kubernetes_pod_name]
          target_label: pod
        - source_labels: [__meta_kubernetes_pod_label_app]
          target_label: app

    # Scrape Istio ingress gateway
    - job_name: 'istio-gateway'
      kubernetes_sd_configs:
        - role: pod
          namespaces:
            names:
              - istio-system
      relabel_configs:
        - source_labels: [__meta_kubernetes_pod_label_istio]
          action: keep
          regex: ingressgateway
        - source_labels: [__address__]
          action: replace
          regex: ([^:]+)(?::\d+)?
          replacement: $1:15090
          target_label: __address__
        - source_labels: [__meta_kubernetes_namespace]
          target_label: namespace
        - source_labels: [__meta_kubernetes_pod_name]
          target_label: pod

suite: doctor mgmt-plane token wiring (#1040 part 2 / #1058)
release:
  name: omnia
values:
  - ../values-chart-tests.yaml
templates:
  - templates/doctor/deployment.yaml
tests:
  - it: wires the dashboard service-token URL when Doctor is enabled
    set:
      doctor.enabled: true
    template: templates/doctor/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OMNIA_MGMT_PLANE_TOKEN_URL
            value: "http://omnia-dashboard.NAMESPACE.svc.cluster.local:3000/api/auth/service-token"
      # The previous design mounted the dashboard's signing keypair
      # Secret into Doctor — removed in #1058 (private key duplication
      # defeated the JWKS architecture). Volumes / volumeMounts must
      # NOT include the signing key any more.
      - isNull:
          path: spec.template.spec.containers[0].volumeMounts
      - isNull:
          path: spec.template.spec.volumes

  - it: honours doctor.mgmtPlaneToken.url override
    set:
      doctor.enabled: true
      doctor.mgmtPlaneToken.url: "https://custom-dashboard.example/api/auth/service-token"
    template: templates/doctor/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OMNIA_MGMT_PLANE_TOKEN_URL
            value: "https://custom-dashboard.example/api/auth/service-token"

  - it: skips token wiring when dashboard is disabled
    set:
      doctor.enabled: true
      dashboard.enabled: false
    template: templates/doctor/deployment.yaml
    asserts:
      - isNull:
          path: spec.template.spec.containers[0].env
      - isNull:
          path: spec.template.spec.containers[0].volumeMounts
      - isNull:
          path: spec.template.spec.volumes

  - it: skips token wiring when doctor.mgmtPlaneToken.enabled=false
    set:
      doctor.enabled: true
      doctor.mgmtPlaneToken.enabled: false
    template: templates/doctor/deployment.yaml
    asserts:
      - isNull:
          path: spec.template.spec.containers[0].env
      - isNull:
          path: spec.template.spec.containers[0].volumeMounts
      - isNull:
          path: spec.template.spec.volumes

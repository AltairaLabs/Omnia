suite: service pods can read Workspaces and MemoryPolicies cluster-wide
release:
  name: omnia
values:
  - ../values-chart-tests.yaml
templates:
  - templates/agent-workspace-reader-clusterrole.yaml
tests:
  # The memory-api consolidation worker lists MemoryPolicy CRs cluster-wide
  # each pass (internal/memory/consolidation/k8s_policy_lister.go). Without
  # this grant the worker fails every tick with "memorypolicies ... is
  # forbidden ... at the cluster scope" and consolidation never runs. The
  # same ClusterRole also backs the Workspace reads agents and the worker's
  # workspace lister depend on, so assert both resources stay in one grant.
  #
  # The enterprise privacy watcher's sessionprivacypolicies + agentruntimes
  # reads are deliberately NOT here — adding an EE CRD the core operator
  # doesn't hold trips Kubernetes' RBAC escalation check and blocks the
  # per-pod ClusterRoleBindings (#1444). That grant needs its own EE role.
  - it: grants read on workspaces and memorypolicies
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - omnia.altairalabs.ai
            resources:
              - workspaces
              - memorypolicies
            verbs:
              - get
              - list
              - watch

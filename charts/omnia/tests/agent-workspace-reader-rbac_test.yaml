suite: service pods can read Workspaces, MemoryPolicies and SessionPrivacyPolicies cluster-wide
release:
  name: omnia
values:
  - ../values-chart-tests.yaml
templates:
  - templates/agent-workspace-reader-clusterrole.yaml
tests:
  # The memory-api consolidation worker lists MemoryPolicy CRs cluster-wide
  # each pass (internal/memory/consolidation/k8s_policy_lister.go). Without
  # this grant the worker fails every tick with "memorypolicies ... is
  # forbidden ... at the cluster scope" and consolidation never runs. The
  # same ClusterRole also backs the Workspace reads agents and the worker's
  # workspace lister depend on, plus the enterprise memory-policy/privacy
  # watcher's cluster-wide SessionPrivacyPolicy list (#1444), so assert all
  # three resources stay in one grant.
  - it: grants read on workspaces, memorypolicies and sessionprivacypolicies
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - omnia.altairalabs.ai
            resources:
              - workspaces
              - memorypolicies
              - sessionprivacypolicies
            verbs:
              - get
              - list
              - watch

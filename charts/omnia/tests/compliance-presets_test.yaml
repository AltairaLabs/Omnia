suite: compliance presets
templates:
  - templates/enterprise/compliance-gdpr.yaml
  - templates/enterprise/compliance-hipaa.yaml
  - templates/enterprise/compliance-ccpa.yaml
tests:
  - it: should not render any preset when enterprise is disabled
    set:
      enterprise.enabled: false
      compliance.presets.gdpr: true
      compliance.presets.hipaa: true
      compliance.presets.ccpa: true
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render any preset when all presets are false
    set:
      enterprise.enabled: true
      compliance.presets.gdpr: false
      compliance.presets.hipaa: false
      compliance.presets.ccpa: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render GDPR preset with expected spec
    template: templates/enterprise/compliance-gdpr.yaml
    set:
      enterprise.enabled: true
      compliance.presets.gdpr: true
      compliance.presets.hipaa: false
      compliance.presets.ccpa: false
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: gdpr-compliant
      - equal:
          path: metadata.labels["omnia.altairalabs.ai/compliance-preset"]
          value: gdpr
      - equal:
          path: spec.recording.pii.redact
          value: true
      - equal:
          path: spec.recording.pii.encrypt
          value: true
      - equal:
          path: spec.recording.pii.strategy
          value: replace
      - equal:
          path: spec.retention.facade.warmDays
          value: 30
      - equal:
          path: spec.retention.facade.coldDays
          value: 90
      - equal:
          path: spec.userOptOut.enabled
          value: true
      - equal:
          path: spec.userOptOut.deleteWithinDays
          value: 30
      - equal:
          path: spec.auditLog.enabled
          value: true
      - equal:
          path: spec.auditLog.retentionDays
          value: 365

  - it: should not render GDPR when only HIPAA enabled
    template: templates/enterprise/compliance-gdpr.yaml
    set:
      enterprise.enabled: true
      compliance.presets.gdpr: false
      compliance.presets.hipaa: true
      compliance.presets.ccpa: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render HIPAA preset with expected spec
    template: templates/enterprise/compliance-hipaa.yaml
    set:
      enterprise.enabled: true
      compliance.presets.gdpr: false
      compliance.presets.hipaa: true
      compliance.presets.ccpa: false
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: hipaa-compliant
      - equal:
          path: metadata.labels["omnia.altairalabs.ai/compliance-preset"]
          value: hipaa
      - equal:
          path: spec.retention.facade.coldDays
          value: 2555
      - equal:
          path: spec.recording.pii.encrypt
          value: true
      - equal:
          path: spec.auditLog.retentionDays
          value: 2555

  - it: should render CCPA preset with expected spec
    template: templates/enterprise/compliance-ccpa.yaml
    set:
      enterprise.enabled: true
      compliance.presets.gdpr: false
      compliance.presets.hipaa: false
      compliance.presets.ccpa: true
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: ccpa-compliant
      - equal:
          path: metadata.labels["omnia.altairalabs.ai/compliance-preset"]
          value: ccpa
      - equal:
          path: spec.recording.richData
          value: false
      - equal:
          path: spec.recording.pii.encrypt
          value: false
      - equal:
          path: spec.recording.pii.strategy
          value: mask
      - equal:
          path: spec.retention.facade.coldDays
          value: 30
      - equal:
          path: spec.userOptOut.deleteWithinDays
          value: 45

  - it: should render all three presets when all are enabled
    set:
      enterprise.enabled: true
      compliance.presets.gdpr: true
      compliance.presets.hipaa: true
      compliance.presets.ccpa: true
    asserts:
      - hasDocuments:
          count: 1

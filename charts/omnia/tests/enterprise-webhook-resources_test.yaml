suite: enterprise webhook render-gating
# Covers issue #1176 — the enterprise (arena-controller) webhook resources are
# gated behind enterprise.enabled && webhook.enabled. A single flag renders
# none of them. SessionPrivacyPolicy is served by the operator (its VWC entry
# is enterprise-gated), while the Arena webhooks live on the arena-controller.
values:
  - ../values-chart-tests.yaml
tests:
  # --- Single flag: nothing enterprise-webhook renders ---

  - it: arena-controller webhook service does not render with webhook only
    template: templates/enterprise/arena-controller-webhook-service.yaml
    set:
      webhook.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: arena-controller webhook service does not render with enterprise only
    template: templates/enterprise/arena-controller-webhook-service.yaml
    set:
      enterprise.enabled: true
      enterprise.arena.queue.type: memory
    asserts:
      - hasDocuments:
          count: 0

  - it: arena-controller webhook certificate does not render with enterprise only
    template: templates/enterprise/arena-controller-webhook-certificate.yaml
    set:
      enterprise.enabled: true
      enterprise.arena.queue.type: memory
    asserts:
      - hasDocuments:
          count: 0

  - it: enterprise VWC does not render with enterprise only
    template: templates/enterprise/validatingwebhookconfiguration.yaml
    set:
      enterprise.enabled: true
      enterprise.arena.queue.type: memory
    asserts:
      - hasDocuments:
          count: 0

  # --- Both flags: enterprise webhook resources render ---

  - it: arena-controller webhook service renders when both enabled
    template: templates/enterprise/arena-controller-webhook-service.yaml
    set:
      enterprise.enabled: true
      enterprise.arena.queue.type: memory
      webhook.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Service
      - equal:
          path: spec.ports[0].targetPort
          value: webhook

  - it: arena-controller certificate renders sharing the operator self-signed Issuer
    template: templates/enterprise/arena-controller-webhook-certificate.yaml
    set:
      enterprise.enabled: true
      enterprise.arena.queue.type: memory
      webhook.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Certificate
      - matchRegex:
          path: spec.issuerRef.name
          pattern: -webhook-selfsign$
      - equal:
          path: spec.issuerRef.kind
          value: Issuer

  - it: enterprise VWC renders the Arena webhooks plus the custom-facade gate with inject-ca-from
    template: templates/enterprise/validatingwebhookconfiguration.yaml
    set:
      enterprise.enabled: true
      enterprise.arena.queue.type: memory
      webhook.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ValidatingWebhookConfiguration
      - isNotEmpty:
          path: metadata.annotations["cert-manager.io/inject-ca-from"]
      - lengthEqual:
          path: webhooks
          count: 4
      - equal:
          path: webhooks[0].failurePolicy
          value: Fail

  # --- AgentRuntime custom-facade license gate (#1774) ---

  - it: enterprise VWC includes the AgentRuntime custom-facade webhook scoped and fail-closed
    template: templates/enterprise/validatingwebhookconfiguration.yaml
    set:
      enterprise.enabled: true
      enterprise.arena.queue.type: memory
      webhook.enabled: true
    asserts:
      # Fail-closed: a matched (custom-facade) object is denied if the
      # arena-controller is down, so the feature is UNAVAILABLE without EE.
      - equal:
          path: webhooks[?(@.name=='vagentruntimecustomfacade.kb.io')].failurePolicy
          value: Fail
      # Scoped to agentruntimes create+update only.
      - equal:
          path: webhooks[?(@.name=='vagentruntimecustomfacade.kb.io')].rules[0].resources[0]
          value: agentruntimes
      - contains:
          path: webhooks[?(@.name=='vagentruntimecustomfacade.kb.io')].rules[0].operations
          content: CREATE
      - contains:
          path: webhooks[?(@.name=='vagentruntimecustomfacade.kb.io')].rules[0].operations
          content: UPDATE
      # matchConditions restrict the webhook to custom-facade AgentRuntimes so an
      # EE-operator outage never blocks ordinary AgentRuntime admissions.
      - matchRegex:
          path: webhooks[?(@.name=='vagentruntimecustomfacade.kb.io')].matchConditions[0].expression
          pattern: "f.type == 'custom'"
      # Points at the arena-controller webhook service, not the operator's.
      - equal:
          path: webhooks[?(@.name=='vagentruntimecustomfacade.kb.io')].clientConfig.service.path
          value: /validate-ee-omnia-altairalabs-ai-v1alpha1-agentruntime

  - it: enterprise VWC does not render the custom-facade webhook without webhook enabled
    template: templates/enterprise/validatingwebhookconfiguration.yaml
    set:
      enterprise.enabled: true
      enterprise.arena.queue.type: memory
    asserts:
      - hasDocuments:
          count: 0

  # --- Operator VWC: SessionPrivacyPolicy entry is enterprise-gated ---

  - it: operator VWC has no SessionPrivacyPolicy webhook without enterprise
    template: templates/webhook/validatingwebhookconfiguration.yaml
    set:
      webhook.enabled: true
    asserts:
      - notContains:
          path: webhooks
          content:
            name: vsessionprivacypolicy.kb.io
          any: true

  - it: operator VWC gains the SessionPrivacyPolicy webhook when enterprise enabled
    template: templates/webhook/validatingwebhookconfiguration.yaml
    set:
      enterprise.enabled: true
      enterprise.arena.queue.type: memory
      webhook.enabled: true
    asserts:
      - contains:
          path: webhooks
          content:
            name: vsessionprivacypolicy.kb.io
          any: true

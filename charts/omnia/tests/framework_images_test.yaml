suite: framework images
templates:
  - templates/deployment.yaml
values:
  - ../values-chart-tests.yaml
tests:
  - it: renders the promptkit framework-image arg from framework.image
    set:
      framework.image.tag: testtag
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --framework-image=promptkit=ghcr.io/altairalabs/omnia-runtime:testtag
  - it: renders no langchain framework-image arg by default (custom-runtime wave 1)
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --framework-image=langchain=ghcr.io/altairalabs/omnia-langchain-runtime:latest
  - it: renders a langchain framework-image arg when explicitly configured
    set:
      framework.images.langchain.repository: ghcr.io/altairalabs/omnia-langchain-runtime
      framework.images.langchain.tag: testtag
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --framework-image=langchain=ghcr.io/altairalabs/omnia-langchain-runtime:testtag

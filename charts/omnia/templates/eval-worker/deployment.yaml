{{- if and .Values.enterprise.enabled .Values.enterprise.evalWorker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "omnia.evalWorker.fullname" . }}
  labels:
    {{- include "omnia.evalWorker.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.enterprise.evalWorker.replicaCount }}
  selector:
    matchLabels:
      {{- include "omnia.evalWorker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "omnia.evalWorker.selectorLabels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ include "omnia.evalWorker.fullname" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
      containers:
        - name: eval-worker
          image: {{ include "omnia.evalWorker.image" . }}
          imagePullPolicy: {{ .Values.enterprise.evalWorker.image.pullPolicy }}
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            {{- if .Values.enterprise.evalWorker.namespaces }}
            - name: NAMESPACES
              value: {{ join "," .Values.enterprise.evalWorker.namespaces | quote }}
            {{- else }}
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- end }}
            # OMNIA_NAMESPACE tells the service-discovery resolver which
            # Workspace CRD to read session-api/memory-api URLs from. In a
            # multi-tenant deployment, set workspaceNamespace to the namespace
            # of the workspace this eval-worker serves. Defaults to the
            # eval-worker's own pod namespace, which only works if there is a
            # Workspace CRD matching that namespace. See #742.
            {{- if .Values.enterprise.evalWorker.workspaceNamespace }}
            - name: OMNIA_NAMESPACE
              value: {{ .Values.enterprise.evalWorker.workspaceNamespace | quote }}
            {{- else }}
            - name: OMNIA_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- end }}
            - name: METRICS_ADDR
              value: ":9090"
            {{- if .Values.redis.enabled }}
            - name: REDIS_ADDR
              value: {{ printf "%s-redis-master:6379" .Release.Name }}
            {{- else if .Values.enterprise.arena.queue.redis.host }}
            - name: REDIS_ADDR
              value: {{ printf "%s:%v" .Values.enterprise.arena.queue.redis.host (.Values.enterprise.arena.queue.redis.port | default 6379) }}
            {{- end }}
            {{- if .Values.enterprise.arena.queue.redis.passwordSecret }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.enterprise.arena.queue.redis.passwordSecret }}
                  key: redis-password
            {{- end }}
            {{- $tracingEndpoint := include "omnia.tracing.endpoint" . | trim }}
            {{- if and .Values.tracing.enabled $tracingEndpoint }}
            - name: TRACING_ENABLED
              value: "true"
            - name: TRACING_ENDPOINT
              value: {{ $tracingEndpoint | quote }}
            - name: TRACING_INSECURE
              value: "true"
            {{- end }}
            {{- with .Values.enterprise.evalWorker.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 3
            periodSeconds: 10
          {{- with .Values.enterprise.evalWorker.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
{{- end }}

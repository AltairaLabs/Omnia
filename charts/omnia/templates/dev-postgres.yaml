{{- if .Values.postgres.dev.enabled }}
{{- $pgbouncerEnabled := .Values.postgres.dev.pgbouncer.enabled }}
{{- $clientPort := ternary 6432 5432 $pgbouncerEnabled }}
# =============================================================================
# Dev-only Postgres — NOT for production use.
# Provides the omnia-postgres Secret and a single-node Postgres StatefulSet
# so that per-workspace services can start without external infrastructure.
# When pgbouncer.enabled=true, a PgBouncer sidecar pools connections.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.postgres.dev.secretName }}
  labels:
    {{- include "omnia.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
stringData:
  {{ .Values.postgres.dev.secretKey }}: "postgres://omnia:omnia@{{ include "omnia.fullname" . }}-postgres:{{ $clientPort }}/omnia_sessions?sslmode=disable"
  POSTGRES_CONN: "postgres://omnia:omnia@{{ include "omnia.fullname" . }}-postgres:{{ $clientPort }}/omnia_sessions?sslmode=disable"
---
# Separate secret for memory-api database
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.postgres.dev.secretName }}-memory
  labels:
    {{- include "omnia.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
stringData:
  POSTGRES_CONN: "postgres://omnia:omnia@{{ include "omnia.fullname" . }}-postgres:{{ $clientPort }}/omnia_memory?sslmode=disable"
{{- if $pgbouncerEnabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "omnia.fullname" . }}-pgbouncer
  labels:
    {{- include "omnia.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
data:
  pgbouncer.ini: |
    [databases]
    omnia = host=127.0.0.1 port=5432 dbname=omnia

    [pgbouncer]
    listen_addr = 0.0.0.0
    listen_port = 6432
    auth_type = md5
    auth_file = /etc/pgbouncer/userlist.txt
    pool_mode = {{ .Values.postgres.dev.pgbouncer.poolMode }}
    default_pool_size = {{ .Values.postgres.dev.pgbouncer.defaultPoolSize }}
    max_client_conn = {{ .Values.postgres.dev.pgbouncer.maxClientConn }}
    max_db_connections = {{ .Values.postgres.dev.pgbouncer.maxDbConnections }}
    ignore_startup_parameters = extra_float_digits
    log_connections = 1
    log_disconnections = 1
    stats_period = 60
  userlist.txt: |
    "omnia" "md55b67425b5ec6058d90ce3e21f576a7cf"
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "omnia.fullname" . }}-postgres
  labels:
    {{- include "omnia.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  ports:
    - port: {{ $clientPort }}
      targetPort: {{ $clientPort }}
      protocol: TCP
      name: {{ ternary "pgbouncer" "postgres" $pgbouncerEnabled }}
  selector:
    app.kubernetes.io/name: {{ include "omnia.name" . }}-postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "omnia.fullname" . }}-postgres
  labels:
    {{- include "omnia.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  serviceName: {{ include "omnia.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "omnia.name" . }}-postgres
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "omnia.name" . }}-postgres
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.postgres.dev.image.repository | default "pgvector/pgvector" }}:{{ .Values.postgres.dev.image.tag | default "pg17" }}"
          imagePullPolicy: {{ .Values.postgres.dev.image.pullPolicy | default "IfNotPresent" }}
          env:
            - name: POSTGRES_USER
              value: omnia
            - name: POSTGRES_PASSWORD
              value: omnia
            - name: POSTGRES_DB
              value: omnia_sessions
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    until pg_isready -U omnia; do sleep 1; done
                    psql -U omnia -d omnia_sessions -c "CREATE DATABASE omnia_memory;" 2>/dev/null || true
          ports:
            - containerPort: 5432
              protocol: TCP
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "omnia"]
            {{- with .Values.postgres.dev.readinessProbe }}
            initialDelaySeconds: {{ .initialDelaySeconds | default 5 }}
            periodSeconds:       {{ .periodSeconds       | default 5 }}
            timeoutSeconds:      {{ .timeoutSeconds      | default 1 }}
            failureThreshold:    {{ .failureThreshold    | default 3 }}
            {{- end }}
          {{- with .Values.postgres.dev.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
{{- if $pgbouncerEnabled }}
        - name: pgbouncer
          # Dev-only sidecar. Pinned to avoid silent behavior changes on image
          # updates; bump deliberately via `postgres.dev.pgbouncer.image`.
          image: {{ .Values.postgres.dev.pgbouncer.image | default "edoburu/pgbouncer:1.24.0" }}
          ports:
            - containerPort: 6432
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: 6432
            {{- with .Values.postgres.dev.pgbouncer.readinessProbe }}
            initialDelaySeconds: {{ .initialDelaySeconds | default 5 }}
            periodSeconds:       {{ .periodSeconds       | default 5 }}
            timeoutSeconds:      {{ .timeoutSeconds      | default 1 }}
            failureThreshold:    {{ .failureThreshold    | default 3 }}
            {{- end }}
          {{- with .Values.postgres.dev.pgbouncer.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: pgbouncer-config
              mountPath: /etc/pgbouncer
              readOnly: true
      volumes:
        - name: pgbouncer-config
          configMap:
            name: {{ include "omnia.fullname" . }}-pgbouncer
{{- end }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
{{- end }}

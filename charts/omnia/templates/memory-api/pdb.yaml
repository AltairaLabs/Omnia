{{- if and .Values.memoryApi.enabled .Values.memoryApi.podDisruptionBudget.enabled (gt (int .Values.memoryApi.replicaCount) 1) }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "omnia.memoryApi.fullname" . }}
  labels:
    {{- include "omnia.memoryApi.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.memoryApi.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "omnia.memoryApi.selectorLabels" . | nindent 6 }}
{{- end }}

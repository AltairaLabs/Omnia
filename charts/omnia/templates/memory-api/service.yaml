{{- if .Values.memoryApi.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "omnia.memoryApi.fullname" . }}
  labels:
    {{- include "omnia.memoryApi.labels" . | nindent 4 }}
spec:
  type: {{ .Values.memoryApi.service.type }}
  ports:
    - port: {{ .Values.memoryApi.service.port }}
      targetPort: api
      protocol: TCP
      name: api
  selector:
    {{- include "omnia.memoryApi.selectorLabels" . | nindent 4 }}
{{- end }}

{{- if .Values.rbac.create -}}
# ClusterRole granting service pods (facade/runtime/session-api/memory-api)
# read access to cluster-scoped CRDs they resolve at runtime:
#   - workspaces: agents resolve per-workspace service URLs from
#     Workspace.status.services; the memory-api consolidation worker lists
#     Workspaces cluster-wide to find those opted into each MemoryPolicy.
#   - memorypolicies: the memory-api consolidation worker lists MemoryPolicy
#     CRs cluster-wide each pass to decide which workspaces to consolidate.
#   - sessionprivacypolicies: the enterprise memory-policy/privacy watcher
#     lists SessionPrivacyPolicy CRs cluster-wide at startup to load consent
#     enforcement (without this the watcher fails forbidden and privacy
#     enforcement is silently skipped).
#   - agentruntimes: the same watcher resolves which agents/workspaces a policy
#     applies to by listing AgentRuntimes cluster-wide; without it the watcher's
#     initial load fails forbidden and the projection/policy pipeline stalls.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "omnia.fullname" . }}-agent-workspace-reader
  labels:
    {{- include "omnia.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - omnia.altairalabs.ai
    resources:
      - workspaces
      - memorypolicies
      - sessionprivacypolicies
      - agentruntimes
    verbs:
      - get
      - list
      - watch
{{- end }}

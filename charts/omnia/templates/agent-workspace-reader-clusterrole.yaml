{{- if .Values.rbac.create -}}
# ClusterRole granting service pods (facade/runtime/session-api/memory-api)
# read access to cluster-scoped CRDs they resolve at runtime:
#   - workspaces: agents resolve per-workspace service URLs from
#     Workspace.status.services; the memory-api consolidation worker lists
#     Workspaces cluster-wide to find those opted into each MemoryPolicy.
#   - memorypolicies: the memory-api consolidation worker lists MemoryPolicy
#     CRs cluster-wide each pass to decide which workspaces to consolidate.
#
# NOTE: the enterprise memory-policy/privacy watcher also needs cluster reads on
# sessionprivacypolicies + agentruntimes, but those must NOT be added here — the
# core operator doesn't hold sessionprivacypolicies (an EE CRD) and has no
# bind/escalate, so adding it makes Kubernetes' escalation check block the
# operator from creating service-pod ClusterRoleBindings to this role. That EE
# grant belongs in a separate enterprise-gated reader role (tracked in #1444).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "omnia.fullname" . }}-agent-workspace-reader
  labels:
    {{- include "omnia.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - omnia.altairalabs.ai
    resources:
      - workspaces
      - memorypolicies
    verbs:
      - get
      - list
      - watch
{{- end }}

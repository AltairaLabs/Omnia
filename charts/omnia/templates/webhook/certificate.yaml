{{- if .Values.webhook.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "omnia.fullname" . }}-webhook-cert
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "omnia.labels" . | nindent 4 }}
spec:
  secretName: {{ .Values.webhook.certSecretName }}
  dnsNames:
    - {{ include "omnia.fullname" . }}-webhook.{{ .Release.Namespace }}.svc
    - {{ include "omnia.fullname" . }}-webhook.{{ .Release.Namespace }}.svc.cluster.local
  issuerRef:
    name: {{ include "omnia.fullname" . }}-webhook-selfsign
    kind: Issuer
{{- end }}

{{- if .Values.consolidation.systemPacks.enabled }}
{{- $sd := .Values.consolidation.systemPacks.safeDefault }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: safe-default-summarizer
  namespace: omnia-system-packs
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service | quote }}
    app.kubernetes.io/component: memory-consolidation
    omnia.altairalabs.ai/pack-class: system
data:
  pack.json: |
    {
      "id": "safe-default-summarizer",
      "name": "safe-default-summarizer",
      "version": "1.0.0",
      "template_engine": { "version": "v1", "syntax": "{{`{{variable}}`}}" },
      "prompts": {
        "default": {
          "id": "default",
          "name": "default",
          "version": "1.0.0",
          "system_template": "You are a memory consolidation worker. Input is a JSON object with axis=staleObservations and a buckets array of grouped observations sharing entity kind+name. For each bucket, emit exactly one create_summary action over the entries plus one supersede action marking them replaced. Output a JSON array of those typed actions and nothing else. Do not emit rescope, invalidate, merge_entities, discard, or rescore — those are out of scope for this pack."
        }
      }
    }
---
apiVersion: omnia.altairalabs.ai/v1alpha1
kind: PromptPack
metadata:
  name: safe-default-summarizer
  namespace: omnia-system-packs
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service | quote }}
    app.kubernetes.io/component: memory-consolidation
    omnia.altairalabs.ai/pack-class: system
  annotations:
    omnia.altairalabs.ai/pack-role: consolidation-safe-default
    omnia.altairalabs.ai/system-pack-version: "0.1.0"
spec:
  source:
    type: configmap
    configMapRef:
      name: safe-default-summarizer
  version: "1.0.0"
---
apiVersion: omnia.altairalabs.ai/v1alpha1
kind: AgentRuntime
metadata:
  name: safe-default-summarizer
  namespace: omnia-system-packs
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service | quote }}
    app.kubernetes.io/component: memory-consolidation
    omnia.altairalabs.ai/pack-class: system
  annotations:
    omnia.altairalabs.ai/pack-role: consolidation-safe-default
    omnia.altairalabs.ai/system-pack-version: "0.1.0"
spec:
  mode: function
  promptPackRef:
    name: safe-default-summarizer
  facades:
    - type: rest
      port: 8080
  inputSchema:
    type: object
    required:
      - axis
      - workspaceID
      - buckets
    properties:
      axis:
        type: string
      workspaceID:
        type: string
      buckets:
        type: array
      gates:
        type: object
  outputSchema:
    type: array
    items:
      type: object
      required:
        - action
      properties:
        action:
          type: string
  runtime:
    replicas: {{ $sd.replicas }}
  providers:
    - name: default
      providerRef:
        name: {{ $sd.providerRef.name | quote }}
{{- end }}

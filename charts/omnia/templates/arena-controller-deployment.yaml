{{- include "omnia.validateArenaQueue" . -}}
{{- if .Values.enterprise.enabled }}
{{- $po := .Values.enterprise.arena.controller.podOverrides | default dict }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "omnia.fullname" . }}-arena-controller
  labels:
    {{- include "omnia.labels" . | nindent 4 }}
    app.kubernetes.io/component: arena-controller
spec:
  replicas: {{ .Values.enterprise.arena.controller.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "omnia.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: arena-controller
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with $po.annotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- with $po.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- include "omnia.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: arena-controller
    spec:
      {{- $pullSecrets := concat (.Values.imagePullSecrets | default list) ($po.imagePullSecrets | default list) }}
      {{- with $pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ $po.serviceAccountName | default (include "omnia.serviceAccountName" .) }}
      {{- with $po.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      securityContext:
        runAsNonRoot: {{ .Values.enterprise.arena.controller.podSecurityContext.runAsNonRoot | default true }}
        runAsUser: {{ .Values.enterprise.arena.controller.podSecurityContext.runAsUser | default 65532 }}
        fsGroup: {{ .Values.enterprise.arena.controller.podSecurityContext.fsGroup | default 65532 }}
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: {{ .Values.enterprise.arena.controller.image.repository | default "ghcr.io/altairalabs/omnia-arena-controller" }}:{{ .Values.enterprise.arena.controller.image.tag | default .Chart.AppVersion }}
          imagePullPolicy: {{ .Values.enterprise.arena.controller.image.pullPolicy | default "IfNotPresent" }}
          command:
            - /arena-controller
          args:
            {{- if .Values.leaderElection.enabled }}
            - --leader-elect
            {{- end }}
            - --health-probe-bind-address=:{{ .Values.probes.port }}
            - --arena-worker-image={{ .Values.enterprise.arena.worker.image.repository | default "ghcr.io/altairalabs/omnia-arena-worker" }}:{{ .Values.enterprise.arena.worker.image.tag | default .Chart.AppVersion }}
            - --arena-worker-image-pull-policy={{ .Values.enterprise.arena.worker.image.pullPolicy | default "IfNotPresent" }}
            - --arena-dev-console-image={{ .Values.enterprise.arena.devConsole.image.repository | default "ghcr.io/altairalabs/omnia-arena-dev-console" }}:{{ .Values.enterprise.arena.devConsole.image.tag | default .Chart.AppVersion }}
            {{- /*
              Run dev-console pods under the workspace runtime ServiceAccount
              (with a cloud-identity opt-in label) so the agent they run can
              authenticate to keyless providers (Azure WI, AWS IRSA). Empty =
              controller creates a per-session SA with no cloud identity.
            */}}
            {{- with .Values.enterprise.arena.devConsole.serviceAccountName }}
            - --dev-console-service-account={{ . }}
            {{- end }}
            {{- with .Values.enterprise.arena.devConsole.podLabels }}
            {{- $labels := . }}
            - --dev-console-pod-labels={{ range $i, $k := (keys $labels | sortAlpha) }}{{ if $i }},{{ end }}{{ $k }}={{ index $labels $k }}{{ end }}
            {{- end }}
            {{- /*
              Arena queue Redis. URL-canonical: arena-controller takes
              --redis-url, OR REDIS_URL env from secretKeyRef when the
              consumer is on the existingSecret form. Worker pods
              spawned by the controller see the same URL via the
              forwarded --redis-url-secret-{name,key} flags +
              ArenaJobReconciler env mount.
            */}}
            {{- if and .Values.enterprise.arena.queue (eq (default "redis" .Values.enterprise.arena.queue.type) "redis") }}
            {{- $arenaConsumer := dict "ctx" . "consumer" "enterprise.arena.queue.redis" }}
            {{- $arenaHasSecret := include "omnia.redis.hasSecret" $arenaConsumer }}
            {{- if $arenaHasSecret }}
            {{- $arenaSecret := fromYaml (include "omnia.redis._existingSecret" $arenaConsumer) }}
            - --redis-url-secret-name={{ $arenaSecret.name }}
            - --redis-url-secret-key={{ $arenaSecret.key }}
            {{- else }}
            {{- $arenaURL := include "omnia.redis.url" $arenaConsumer }}
            {{- if $arenaURL }}
            - --redis-url={{ $arenaURL }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- if and (or .Values.nfs.server.enabled .Values.nfs.external.server) (not .Values.nfs.csiDriver.enabled) }}
            - --nfs-server={{ include "omnia.nfsServer" . }}
            - --nfs-path={{ include "omnia.nfsPath" . }}
            {{- end }}
            {{- /*
              Workspace storage class. The platform-wide class
              (.Values.workspaces.storage.storageClass) is authoritative and
              flows through exactly like the operator's flag — independent of
              the in-cluster NFS CSI driver. The NFS-CSI-derived class is only
              a fallback when no platform-wide class is set (local-dev NFS).
              See issue #1322.
            */}}
            {{- if .Values.workspaces.storage.storageClass }}
            - --workspace-storage-class={{ .Values.workspaces.storage.storageClass }}
            {{- else if and .Values.nfs.csiDriver.enabled (or .Values.nfs.server.enabled .Values.nfs.external.server) }}
            - --workspace-storage-class={{ include "omnia.nfsStorageClass" . }}
            {{- end }}
            {{- if .Values.workspaceContent.enabled }}
            - --workspace-content-path={{ .Values.enterprise.arena.controller.workspaceContentPath | default (.Values.workspaceContent.mountPath | default "/workspace-content") }}
            {{- else }}
            # workspaceContent.enabled=false — pass an empty path so the
            # arena-controller reports ContentStorageUnavailable on any
            # ArenaSource/ArenaTemplateSource instead of silently writing
            # to a non-existent directory.
            - --workspace-content-path=
            {{- end }}
            - --workspace-content-scoped={{ .Values.workspaceContent.scoped | default false }}
            {{- if .Values.dashboard.enabled }}
            # Injected onto worker pods as OMNIA_MGMT_PLANE_SERVICE_TOKEN_URL so
            # fleet-mode loadtests mint a mgmt-plane JWT (via their SA token) to
            # authenticate WS dials to agent facades. The dashboard is the sole
            # signing-key holder; only set when the dashboard ships.
            - --mgmt-plane-token-url={{ .Values.dashboard.serviceTokenUrl | default (printf "http://%s.%s.svc.cluster.local:%d/api/auth/service-token" (include "omnia.dashboard.fullname" .) .Release.Namespace (int .Values.dashboard.service.port)) }}
            {{- end }}
            {{- if .Values.devMode }}
            - --dev-mode
            {{- end }}
            {{- if .Values.webhook.enabled }}
            - --enable-webhooks
            - --enable-license-webhooks
            - --webhook-cert-path={{ .Values.webhook.certPath }}
            {{- end }}
            {{- if .Values.metrics.enabled }}
            - --metrics-bind-address=:{{ .Values.metrics.port }}
            {{- if .Values.metrics.secure }}
            - --metrics-secure=true
            {{- else }}
            - --metrics-secure=false
            {{- end }}
            {{- end }}
            {{- $resolvedTracingEndpoint := include "omnia.tracing.endpoint" . | trim }}
            {{- if and .Values.tracing.enabled $resolvedTracingEndpoint }}
            - --tracing-enabled=true
            - --tracing-endpoint={{ $resolvedTracingEndpoint }}
            {{- end }}
            - --api-bind-address=:{{ ((.Values.enterprise.arena.controller).api).port | default 8082 }}
            {{- with .Values.enterprise.arena.controller.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: api
              containerPort: {{ ((.Values.enterprise.arena.controller).api).port | default 8082 }}
              protocol: TCP
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            {{- end }}
            {{- if .Values.webhook.enabled }}
            - name: webhook
              containerPort: {{ .Values.webhook.port }}
              protocol: TCP
            {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.probes.port }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.probes.port }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          resources:
            {{- toYaml .Values.enterprise.arena.controller.resources | default .Values.resources | nindent 12 }}
          {{- /*
            Mount REDIS_URL on the arena-controller pod when the
            consumer is on the existingSecret form. The binary picks
            it up via the env fallback on its --redis-url flag. When
            the consumer uses url/host form, --redis-url is passed
            literally and no env mount is needed.
          */}}
          {{- $arenaConsumer := dict "ctx" . "consumer" "enterprise.arena.queue.redis" }}
          {{- $arenaHasSecretEnv := include "omnia.redis.hasSecret" $arenaConsumer }}
          {{- $env := concat (.Values.enterprise.arena.controller.extraEnv | default list) ($po.extraEnv | default list) }}
          {{- if or $arenaHasSecretEnv $env }}
          env:
            {{- if $arenaHasSecretEnv }}
            {{- include "omnia.redis.urlEnv" (merge (dict "envName" "REDIS_URL") $arenaConsumer) | nindent 12 }}
            {{- end }}
            {{- with $env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- $envFrom := concat (.Values.enterprise.arena.controller.extraEnvFrom | default list) ($po.extraEnvFrom | default list) }}
          {{- with $envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- if .Values.workspaceContent.enabled }}
            - name: workspace-content
              mountPath: /workspace-content
            {{- end }}
            - name: tmp
              mountPath: /tmp
            {{- if .Values.webhook.enabled }}
            - name: webhook-cert
              mountPath: {{ .Values.webhook.certPath }}
              readOnly: true
            {{- end }}
            {{- $vm := concat (.Values.enterprise.arena.controller.extraVolumeMounts | default list) ($po.extraVolumeMounts | default list) }}
            {{- with $vm }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        {{- if .Values.workspaceContent.enabled }}
        - name: workspace-content
          persistentVolumeClaim:
            claimName: {{ .Values.workspaceContent.persistence.existingClaim | default (printf "%s-workspace-content" (include "omnia.fullname" .)) }}
        {{- end }}
        - name: tmp
          emptyDir: {}
        {{- if .Values.webhook.enabled }}
        - name: webhook-cert
          secret:
            secretName: {{ .Values.enterprise.arena.controller.webhook.certSecretName }}
            defaultMode: 0o644
        {{- end }}
        {{- $vols := concat (.Values.enterprise.arena.controller.extraVolumes | default list) ($po.extraVolumes | default list) }}
        {{- with $vols }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- $nodeSel := mergeOverwrite (deepCopy (.Values.nodeSelector | default dict)) ($po.nodeSelector | default dict) }}
      {{- with $nodeSel }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $aff := $po.affinity | default .Values.affinity }}
      {{- with $aff }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $tols := concat (.Values.tolerations | default list) ($po.tolerations | default list) }}
      {{- with $tols }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $po.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.enterprise.arena.controller.terminationGracePeriodSeconds | default 10 }}
{{- end }}

{{- if .Values.doctor.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "omnia.doctor.fullname" . }}
  labels:
    {{- include "omnia.doctor.labels" . | nindent 4 }}
rules:
  # Read Omnia CRDs for health checks and diagnostics
  - apiGroups:
      - omnia.altairalabs.ai
    resources:
      - agentruntimes
      - promptpacks
      - toolregistries
      - workspaces
    verbs:
      - get
      - list
      - watch
  # Read pods and services for discovery
  - apiGroups:
      - ""
    resources:
      - pods
      - services
    verbs:
      - get
      - list
      - watch
{{- end }}

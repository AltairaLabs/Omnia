{{- if .Values.doctor.enabled }}
{{- $po := .Values.doctor.podOverrides | default dict }}
{{- /*
  Mgmt-plane signing key wiring (issue #1040 part 2).
  Defaults: mount the dashboard's existing signing-keypair Secret when
  Doctor is enabled alongside the dashboard. existingSecret overrides
  the Secret name for installs with externally-managed signing keys
  (cloud KMS / CSI). enabled=false skips the volume + env var entirely
  for clusters without mgmt-plane validation.
*/ -}}
{{- $signingKeyCfg := .Values.doctor.signingKey | default dict }}
{{- $signingKeyEnabled := and (hasKey $signingKeyCfg "enabled" | ternary $signingKeyCfg.enabled true) .Values.dashboard.enabled }}
{{- if hasKey $signingKeyCfg "enabled" }}{{- $signingKeyEnabled = and $signingKeyCfg.enabled .Values.dashboard.enabled }}{{- end }}
{{- $signingSecretName := default (printf "%s-signing-keypair" (include "omnia.dashboard.fullname" .)) $signingKeyCfg.existingSecret }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "omnia.doctor.fullname" . }}
  labels:
    {{- include "omnia.doctor.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "omnia.doctor.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with $po.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- with $po.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- include "omnia.doctor.selectorLabels" . | nindent 8 }}
    spec:
      {{- with $po.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ $po.serviceAccountName | default (include "omnia.doctor.fullname" .) }}
      {{- with $po.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: doctor
          image: {{ include "omnia.doctor.image" . }}
          imagePullPolicy: {{ .Values.doctor.image.pullPolicy }}
          {{- $args := list }}
          {{- if .Values.doctor.workspace }}
          {{- $args = append $args (printf "--workspace=%s" .Values.doctor.workspace) }}
          {{- end }}
          {{- if .Values.doctor.serviceGroup }}
          {{- $args = append $args (printf "--service-group=%s" .Values.doctor.serviceGroup) }}
          {{- end }}
          {{- if .Values.doctor.agentNamespace }}
          {{- $args = append $args (printf "--agent-namespace=%s" .Values.doctor.agentNamespace) }}
          {{- end }}
          {{- if .Values.doctor.agentName }}
          {{- $args = append $args (printf "--agent-name=%s" .Values.doctor.agentName) }}
          {{- end }}
          {{- if .Values.doctor.ollamaService }}
          {{- $args = append $args (printf "--ollama-url=http://%s.%s.svc.cluster.local:%d" .Values.doctor.ollamaService .Values.doctor.agentNamespace 11434) }}
          {{- end }}
          {{- if $args }}
          args:
            {{- range $args }}
            - {{ . | quote }}
            {{- end }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            {{- with .Values.doctor.livenessProbe }}
            initialDelaySeconds: {{ .initialDelaySeconds | default 5 }}
            periodSeconds:       {{ .periodSeconds       | default 10 }}
            timeoutSeconds:      {{ .timeoutSeconds      | default 1 }}
            failureThreshold:    {{ .failureThreshold    | default 3 }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            {{- with .Values.doctor.readinessProbe }}
            initialDelaySeconds: {{ .initialDelaySeconds | default 5 }}
            periodSeconds:       {{ .periodSeconds       | default 10 }}
            timeoutSeconds:      {{ .timeoutSeconds      | default 1 }}
            failureThreshold:    {{ .failureThreshold    | default 3 }}
            {{- end }}
          resources:
            {{- toYaml .Values.doctor.resources | nindent 12 }}
          {{- if or $signingKeyEnabled $po.extraEnv }}
          env:
            {{- if $signingKeyEnabled }}
            - name: OMNIA_MGMT_PLANE_SIGNING_KEY_PATH
              value: /etc/omnia/mgmt-plane/tls.key
            {{- end }}
            {{- with $po.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- with $po.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or $signingKeyEnabled $po.extraVolumeMounts }}
          volumeMounts:
            {{- if $signingKeyEnabled }}
            - name: mgmt-plane-signing-key
              mountPath: /etc/omnia/mgmt-plane
              readOnly: true
            {{- end }}
            {{- with $po.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      {{- if or $signingKeyEnabled $po.extraVolumes }}
      volumes:
        {{- if $signingKeyEnabled }}
        - name: mgmt-plane-signing-key
          secret:
            secretName: {{ $signingSecretName }}
            defaultMode: 0o400
        {{- end }}
        {{- with $po.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with $po.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $po.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $po.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $po.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

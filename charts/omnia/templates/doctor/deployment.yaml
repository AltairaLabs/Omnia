{{- if .Values.doctor.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "omnia.doctor.fullname" . }}
  labels:
    {{- include "omnia.doctor.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "omnia.doctor.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "omnia.doctor.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "omnia.doctor.fullname" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: doctor
          image: {{ include "omnia.doctor.image" . }}
          imagePullPolicy: {{ .Values.doctor.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.doctor.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
{{- end }}

{{- if .Values.doctor.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "omnia.doctor.fullname" . }}
  labels:
    {{- include "omnia.doctor.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "omnia.doctor.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "omnia.doctor.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "omnia.doctor.fullname" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: doctor
          image: {{ include "omnia.doctor.image" . }}
          imagePullPolicy: {{ .Values.doctor.image.pullPolicy }}
          {{- $args := list }}
          {{- if .Values.doctor.workspace }}
          {{- $args = append $args (printf "--workspace=%s" .Values.doctor.workspace) }}
          {{- end }}
          {{- if .Values.doctor.serviceGroup }}
          {{- $args = append $args (printf "--service-group=%s" .Values.doctor.serviceGroup) }}
          {{- end }}
          {{- if .Values.doctor.agentNamespace }}
          {{- $args = append $args (printf "--agent-namespace=%s" .Values.doctor.agentNamespace) }}
          {{- end }}
          {{- if .Values.doctor.agentName }}
          {{- $args = append $args (printf "--agent-name=%s" .Values.doctor.agentName) }}
          {{- end }}
          {{- if .Values.doctor.ollamaService }}
          {{- $args = append $args (printf "--ollama-url=http://%s.%s.svc.cluster.local:%d" .Values.doctor.ollamaService .Values.doctor.agentNamespace 11434) }}
          {{- end }}
          {{- if $args }}
          args:
            {{- range $args }}
            - {{ . | quote }}
            {{- end }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            {{- with .Values.doctor.livenessProbe }}
            initialDelaySeconds: {{ .initialDelaySeconds | default 5 }}
            periodSeconds:       {{ .periodSeconds       | default 10 }}
            timeoutSeconds:      {{ .timeoutSeconds      | default 1 }}
            failureThreshold:    {{ .failureThreshold    | default 3 }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            {{- with .Values.doctor.readinessProbe }}
            initialDelaySeconds: {{ .initialDelaySeconds | default 5 }}
            periodSeconds:       {{ .periodSeconds       | default 10 }}
            timeoutSeconds:      {{ .timeoutSeconds      | default 1 }}
            failureThreshold:    {{ .failureThreshold    | default 3 }}
            {{- end }}
          resources:
            {{- toYaml .Values.doctor.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
{{- end }}

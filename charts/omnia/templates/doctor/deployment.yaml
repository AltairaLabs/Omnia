{{- if .Values.doctor.enabled }}
{{- $po := .Values.doctor.podOverrides | default dict }}
{{- /*
  Mgmt-plane token wiring. Doctor exchanges its k8s SA token for a
  fresh JWT at the dashboard's /api/auth/service-token endpoint and
  attaches that JWT to every WS dial. Defaults to enabled when
  dashboard.enabled is true (the dashboard is the only pod with the
  signing private key); set doctor.mgmtPlaneToken.enabled=false to
  skip the env var entirely for installs where the facade does not
  enforce mgmt-plane validation. The previous design mounted the
  signing keypair Secret directly into Doctor — removed in #1058
  because it duplicated private-key material across pods, defeating
  the JWKS architecture.
*/ -}}
{{- $tokenCfg := .Values.doctor.mgmtPlaneToken | default dict }}
{{- $tokenEnabled := and (hasKey $tokenCfg "enabled" | ternary $tokenCfg.enabled true) .Values.dashboard.enabled }}
{{- if hasKey $tokenCfg "enabled" }}{{- $tokenEnabled = and $tokenCfg.enabled .Values.dashboard.enabled }}{{- end }}
{{- $dashFullname := include "omnia.dashboard.fullname" . }}
{{- $defaultURL := printf "http://%s.%s.svc.cluster.local:%v/api/auth/service-token" $dashFullname .Release.Namespace (.Values.dashboard.service.port | default 3000) }}
{{- $tokenURL := default $defaultURL $tokenCfg.url }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "omnia.doctor.fullname" . }}
  labels:
    {{- include "omnia.doctor.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "omnia.doctor.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with $po.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- with $po.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- include "omnia.doctor.selectorLabels" . | nindent 8 }}
    spec:
      {{- with $po.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ $po.serviceAccountName | default (include "omnia.doctor.fullname" .) }}
      {{- with $po.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: doctor
          image: {{ include "omnia.doctor.image" . }}
          imagePullPolicy: {{ .Values.doctor.image.pullPolicy }}
          {{- $args := list }}
          {{- if .Values.doctor.workspace }}
          {{- $args = append $args (printf "--workspace=%s" .Values.doctor.workspace) }}
          {{- end }}
          {{- if .Values.doctor.serviceGroup }}
          {{- $args = append $args (printf "--service-group=%s" .Values.doctor.serviceGroup) }}
          {{- end }}
          {{- if .Values.doctor.agentNamespace }}
          {{- $args = append $args (printf "--agent-namespace=%s" .Values.doctor.agentNamespace) }}
          {{- end }}
          {{- if .Values.doctor.agentName }}
          {{- $args = append $args (printf "--agent-name=%s" .Values.doctor.agentName) }}
          {{- end }}
          {{- if .Values.doctor.ollamaService }}
          {{- $args = append $args (printf "--ollama-url=http://%s.%s.svc.cluster.local:%d" .Values.doctor.ollamaService .Values.doctor.agentNamespace 11434) }}
          {{- end }}
          {{- /*
            Doctor takes --redis-url. Resolved from the same memory-
            cache consumer path as the operator's --memory-redis-url
            so Doctor's TCPCheck dials the same Redis the rest of the
            cluster talks to. The literal-URL and decomposed forms
            pass through as --redis-url=<url>. The existingSecret form
            mounts REDIS_URL env from the Secret on the Doctor pod;
            the binary's --redis-url flag falls back to the env. Empty
            resolution → check skipped (OSS/no-Redis).
          */}}
          {{- $redisConsumer := dict "ctx" . "consumer" "workspaceServices.memoryApi.cache.redis" }}
          {{- $redisHasSecret := include "omnia.redis.hasSecret" $redisConsumer }}
          {{- if not $redisHasSecret }}
          {{- $redisURL := include "omnia.redis.url" $redisConsumer }}
          {{- if $redisURL }}
          {{- $args = append $args (printf "--redis-url=%s" $redisURL) }}
          {{- end }}
          {{- end }}
          {{- if $args }}
          args:
            {{- range $args }}
            - {{ . | quote }}
            {{- end }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            {{- with .Values.doctor.livenessProbe }}
            initialDelaySeconds: {{ .initialDelaySeconds | default 5 }}
            periodSeconds:       {{ .periodSeconds       | default 10 }}
            timeoutSeconds:      {{ .timeoutSeconds      | default 1 }}
            failureThreshold:    {{ .failureThreshold    | default 3 }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            {{- with .Values.doctor.readinessProbe }}
            initialDelaySeconds: {{ .initialDelaySeconds | default 5 }}
            periodSeconds:       {{ .periodSeconds       | default 10 }}
            timeoutSeconds:      {{ .timeoutSeconds      | default 1 }}
            failureThreshold:    {{ .failureThreshold    | default 3 }}
            {{- end }}
          resources:
            {{- toYaml .Values.doctor.resources | nindent 12 }}
          {{- /*
            Mount REDIS_URL on the Doctor pod when the consumer is on
            the existingSecret form. Doctor's --redis-url flag falls
            back to REDIS_URL env, so the binary parses the resolved
            URL at startup. When the consumer is literal/decomposed,
            the URL is passed via --redis-url (above) and no env mount
            is needed.
          */}}
          {{- if or $tokenEnabled $redisHasSecret $po.extraEnv }}
          env:
            {{- if $tokenEnabled }}
            - name: OMNIA_MGMT_PLANE_TOKEN_URL
              value: {{ $tokenURL | quote }}
            {{- end }}
            {{- if $redisHasSecret }}
            {{- include "omnia.redis.urlEnv" (merge (dict "envName" "REDIS_URL") $redisConsumer) | nindent 12 }}
            {{- end }}
            {{- with $po.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- with $po.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $po.extraVolumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      {{- with $po.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $po.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $po.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $po.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $po.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

{{- if .Values.doctor.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "omnia.doctor.fullname" . }}
  labels:
    {{- include "omnia.doctor.labels" . | nindent 4 }}
spec:
  type: {{ .Values.doctor.service.type }}
  ports:
    - port: {{ .Values.doctor.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "omnia.doctor.selectorLabels" . | nindent 4 }}
{{- end }}

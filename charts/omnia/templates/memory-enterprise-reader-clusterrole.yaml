{{- if and .Values.rbac.create .Values.enterprise.enabled -}}
{{- /*
  Enterprise memory-api privacy/memory-policy watcher (ee/pkg/privacy/watcher.go)
  lists SessionPrivacyPolicy + AgentRuntime CRDs cluster-wide to resolve the
  effective privacy policy for each agent. These are cluster-scoped reads, so
  the grant must be a ClusterRole; the operator binds each per-workspace
  memory-api ServiceAccount to this role at reconcile time (it is told the name
  via --memory-enterprise-reader-clusterrole). Workspaces are already covered by
  the agent-workspace-reader ClusterRole.

  This is deliberately a SEPARATE role bound only to memory-api SAs (not the
  shared agent-workspace-reader, which every facade/session pod binds) to keep
  least privilege — only the enterprise memory-api needs sessionprivacypolicies.
  Enterprise-gated because sessionprivacypolicies is an EE CRD (#1444).
*/}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "omnia.fullname" . }}-memory-enterprise-reader
  labels:
    {{- include "omnia.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - omnia.altairalabs.ai
    resources:
      - sessionprivacypolicies
      - agentruntimes
    verbs:
      - get
      - list
      - watch
{{- end }}

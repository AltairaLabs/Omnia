{{- include "omnia.validateAuth" . -}}
{{- include "omnia.validateSession" . -}}
{{- if .Values.dashboard.enabled }}
{{- $po := .Values.dashboard.podOverrides | default dict }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "omnia.dashboard.fullname" . }}
  labels:
    {{- include "omnia.dashboard.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.dashboard.replicaCount }}
  selector:
    matchLabels:
      {{- include "omnia.dashboard.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/dashboard/configmap.yaml") . | sha256sum }}
        {{- with .Values.dashboard.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with $po.annotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- with $po.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- include "omnia.dashboard.selectorLabels" . | nindent 8 }}
    spec:
      {{- $pullSecrets := concat (.Values.imagePullSecrets | default list) ($po.imagePullSecrets | default list) }}
      {{- with $pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ $po.serviceAccountName | default (include "omnia.dashboard.serviceAccountName" .) }}
      {{- with $po.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.dashboard.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- else }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      {{- end }}
      containers:
        - name: dashboard
          image: {{ include "omnia.dashboard.image" . }}
          imagePullPolicy: {{ .Values.dashboard.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
            - name: ws
              containerPort: 3002
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "omnia.dashboard.fullname" . }}
            {{- $ef := concat (.Values.dashboard.extraEnvFrom | default list) ($po.extraEnvFrom | default list) }}
            {{- with $ef }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            {{- if and (ne .Values.dashboard.auth.mode "anonymous") .Values.dashboard.auth.sessionSecret }}
            - name: OMNIA_SESSION_SECRET
              value: {{ .Values.dashboard.auth.sessionSecret | quote }}
            {{- else if and (ne .Values.dashboard.auth.mode "anonymous") .Values.dashboard.auth.existingSessionSecret }}
            - name: OMNIA_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.dashboard.auth.existingSessionSecret }}
                  key: OMNIA_SESSION_SECRET
            {{- end }}
            {{- if eq .Values.dashboard.auth.mode "oauth" }}
            {{- if .Values.dashboard.oauth.existingSecret }}
            - name: OMNIA_OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.dashboard.oauth.existingSecret }}
                  key: OMNIA_OAUTH_CLIENT_ID
            - name: OMNIA_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.dashboard.oauth.existingSecret }}
                  key: OMNIA_OAUTH_CLIENT_SECRET
            {{- else }}
            {{- if .Values.dashboard.oauth.clientId }}
            - name: OMNIA_OAUTH_CLIENT_ID
              value: {{ .Values.dashboard.oauth.clientId | quote }}
            {{- end }}
            {{- if .Values.dashboard.oauth.clientSecret }}
            - name: OMNIA_OAUTH_CLIENT_SECRET
              value: {{ .Values.dashboard.oauth.clientSecret | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- if eq .Values.dashboard.auth.mode "builtin" }}
            {{- if .Values.dashboard.builtin.existingPostgresSecret }}
            - name: OMNIA_BUILTIN_POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.dashboard.builtin.existingPostgresSecret }}
                  key: OMNIA_BUILTIN_POSTGRES_URL
            {{- else if .Values.dashboard.builtin.postgresUrl }}
            - name: OMNIA_BUILTIN_POSTGRES_URL
              value: {{ .Values.dashboard.builtin.postgresUrl | quote }}
            {{- end }}
            {{- if .Values.dashboard.builtin.admin.existingSecret }}
            - name: OMNIA_BUILTIN_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.dashboard.builtin.admin.existingSecret }}
                  key: OMNIA_BUILTIN_ADMIN_PASSWORD
            {{- else if .Values.dashboard.builtin.admin.password }}
            - name: OMNIA_BUILTIN_ADMIN_PASSWORD
              value: {{ .Values.dashboard.builtin.admin.password | quote }}
            {{- end }}
            {{- end }}
            {{- /*
              Arena queue Redis URL — exposed to the dashboard so its
              stats / job-state views can read queue state directly.
              Routed through the unified omnia.redis.urlEnv helper so
              cluster default and per-consumer overrides flow through
              one path.
            */}}
            {{- if and .Values.enterprise.enabled .Values.enterprise.arena.queue (eq (default "redis" .Values.enterprise.arena.queue.type) "redis") }}
            {{- include "omnia.redis.urlEnv" (dict "ctx" . "consumer" "enterprise.arena.queue.redis" "envName" "ARENA_REDIS_URL") | nindent 12 }}
            {{- end }}
            {{- /*
              LSP service URL for the Arena Project Editor. The dashboard's WS
              proxy (server.js) forwards /api/lsp to the promptkit-lsp service.
              Without this env it falls back to a hardcoded omnia-system
              namespace, which only resolves when the release happens to live
              there — so wire it explicitly to the LSP service in THIS release's
              namespace whenever the LSP server is enabled.
            */}}
            {{- if and .Values.enterprise.enabled .Values.enterprise.promptkitLsp.enabled }}
            - name: LSP_SERVICE_URL
              value: "ws://{{ include "omnia.fullname" . }}-promptkit-lsp.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.enterprise.promptkitLsp.service.port | default 8080 }}/lsp"
            {{- end }}
            {{- /*
              PKCE TTL: orthogonal to Redis (in-flight OAuth records have
              their own TTL even when sessions live in memory).
            */}}
            - name: OMNIA_SESSION_PKCE_TTL
              value: {{ .Values.dashboard.session.pkceTtl | quote }}
            {{- /*
              Session Redis URL. The dashboard auto-selects backend by
              env presence: OMNIA_SESSION_REDIS_URL set → Redis store;
              empty/unset → in-process memory store. Helper handles all
              resolution paths (consumer override, default, secret form,
              Bitnami subchart). Empty resolution → no env emitted →
              memory store (single-replica installs only; multi-replica
              fails render via omnia.validateSession).
            */}}
            {{- $sessionConsumer := dict "ctx" . "consumer" "dashboard.session.redis" }}
            {{- include "omnia.redis.urlEnv" (merge (dict "envName" "OMNIA_SESSION_REDIS_URL") $sessionConsumer) | nindent 12 }}
            {{- /*
              Mgmt-plane signing key path. Pointed at the mounted private
              half of the dashboard signing keypair. server.js loads it at
              boot and mints short-lived JWTs that the WS proxy attaches
              to upstream connections so the facade's mgmt-plane validator
              admits them. Skipped when an existingSecret override is
              configured but the operator hasn't actually mounted it via
              extraVolumeMounts — those deployments take ownership of the
              path themselves.
            */}}
            - name: OMNIA_MGMT_PLANE_SIGNING_KEY_PATH
              value: /etc/omnia/mgmt-plane/tls.key
            {{- /*
              Comma-separated allowlist of <namespace>/<sa-name>
              entries permitted to mint mgmt-plane JWTs via the
              dashboard's /api/auth/service-token endpoint. The
              chart auto-includes Doctor's SA when doctor.enabled
              is true; operators can extend via
              dashboard.serviceTokenAllowlist for other in-cluster
              services (Arena dev-console, etc.). Empty list →
              endpoint returns 503 (no service principals expected).
            */}}
            {{- $sas := .Values.dashboard.serviceTokenAllowlist | default (list) }}
            {{- if and .Values.doctor.enabled (default true (index (.Values.doctor.mgmtPlaneToken | default dict) "enabled")) }}
            {{- $sas = append $sas (printf "%s/%s" .Release.Namespace (include "omnia.doctor.fullname" .)) }}
            {{- end }}
            {{- if $sas }}
            - name: OMNIA_DASHBOARD_SERVICE_TOKEN_ALLOWED_SAS
              value: {{ join "," $sas | quote }}
            {{- end }}
            {{- /*
              Internal service-to-service auth (SEC-1/SEC-5). When enabled,
              session-api/memory-api require an audience-bound ServiceAccount
              bearer token. The dashboard server-side proxy reads it from
              SESSION_API_TOKEN_PATH (a projected SA token, mounted below) and
              forwards it on every outbound session-api/memory-api call.
            */}}
            {{- if .Values.internalServiceAuth.enabled }}
            - name: SESSION_API_TOKEN_PATH
              value: /var/run/secrets/omnia/session-api/token
            {{- end }}
            {{- with .Values.dashboard.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with $po.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- with .Values.dashboard.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: {{ .Values.dashboard.livenessProbe.initialDelaySeconds | default 10 }}
            periodSeconds: {{ .Values.dashboard.livenessProbe.periodSeconds | default 30 }}
            timeoutSeconds: {{ .Values.dashboard.livenessProbe.timeoutSeconds | default 5 }}
            failureThreshold: {{ .Values.dashboard.livenessProbe.failureThreshold | default 3 }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: {{ .Values.dashboard.readinessProbe.initialDelaySeconds | default 5 }}
            periodSeconds: {{ .Values.dashboard.readinessProbe.periodSeconds | default 10 }}
            timeoutSeconds: {{ .Values.dashboard.readinessProbe.timeoutSeconds | default 5 }}
            failureThreshold: {{ .Values.dashboard.readinessProbe.failureThreshold | default 3 }}
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
          volumeMounts:
            {{- if and .Values.dashboard.persistence.enabled (eq .Values.dashboard.builtin.storeType "sqlite") }}
            - name: data
              mountPath: /data
            {{- end }}
            {{- /*
              The dashboard no longer mounts the NFS workspace-content volume
              (#1462) — it reads/writes content through the operator content API
              (OPERATOR_CONTENT_API_URL). Removing the mount eliminates the
              cross-UID writer that caused the EACCES.
            */}}
            - name: mgmt-plane-signing-key
              mountPath: /etc/omnia/mgmt-plane
              readOnly: true
            {{- if .Values.internalServiceAuth.enabled }}
            - name: session-api-token
              mountPath: /var/run/secrets/omnia/session-api
              readOnly: true
            {{- end }}
            {{- $vmMounts := concat (.Values.dashboard.extraVolumeMounts | default list) ($po.extraVolumeMounts | default list) }}
            {{- with $vmMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        {{- if and .Values.dashboard.persistence.enabled (eq .Values.dashboard.builtin.storeType "sqlite") }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.dashboard.persistence.existingClaim | default (printf "%s-data" (include "omnia.dashboard.fullname" .)) }}
        {{- end }}
        - name: mgmt-plane-signing-key
          secret:
            secretName: {{ .Values.dashboard.signingKey.existingSecret | default (printf "%s-signing-keypair" (include "omnia.dashboard.fullname" .)) }}
            defaultMode: 0o400
        {{- if .Values.internalServiceAuth.enabled }}
        # Audience-bound projected SA token the dashboard proxy presents to
        # session-api/memory-api. The kubelet rotates it before expiry.
        - name: session-api-token
          projected:
            sources:
              - serviceAccountToken:
                  path: token
                  audience: {{ .Values.internalServiceAuth.audience }}
                  expirationSeconds: {{ .Values.internalServiceAuth.tokenExpirationSeconds }}
        {{- end }}
        {{- $vols := concat (.Values.dashboard.extraVolumes | default list) ($po.extraVolumes | default list) }}
        {{- with $vols }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- $nodeSel := mergeOverwrite (deepCopy (.Values.dashboard.nodeSelector | default dict)) ($po.nodeSelector | default dict) }}
      {{- with $nodeSel }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $aff := $po.affinity | default .Values.dashboard.affinity }}
      {{- with $aff }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $tols := concat (.Values.dashboard.tolerations | default list) ($po.tolerations | default list) }}
      {{- with $tols }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $po.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

{{- if .Values.dashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "omnia.dashboard.fullname" . }}
  labels:
    {{- include "omnia.dashboard.labels" . | nindent 4 }}
data:
  # Namespace where the operator/arena-controller and shared CRDs (system-wide
  # Providers/ToolRegistries) live — the Helm release namespace. The dashboard
  # reads OMNIA_SYSTEM_NAMESPACE for shared-CRD lookups and to build the
  # arena-controller service URL (template preview/render); without it the
  # dashboard falls back to the literal "omnia-system" and breaks on installs
  # into any other namespace. See AltairaLabs/Omnia#1251.
  OMNIA_SYSTEM_NAMESPACE: {{ .Release.Namespace | quote }}

  # Operator API URL (server-side for proxy)
  {{- if .Values.dashboard.operatorApiUrl }}
  OPERATOR_API_URL: {{ .Values.dashboard.operatorApiUrl | quote }}
  {{- else if .Values.enterprise.enabled }}
  OPERATOR_API_URL: "http://{{ include "omnia.fullname" . }}-arena-controller:{{ ((.Values.enterprise.arena.controller).api).port | default 8082 }}"
  {{- end }}

  # Operator tool test API URL (server-side for tool testing proxy)
  {{- $apiAddr := include "omnia.toolTest.bindAddress" . }}
  {{- if .Values.dashboard.operatorToolTestUrl }}
  OPERATOR_TOOL_TEST_URL: {{ .Values.dashboard.operatorToolTestUrl | quote }}
  {{- else if $apiAddr }}
  OPERATOR_TOOL_TEST_URL: "http://{{ include "omnia.fullname" . }}-operator:{{ trimPrefix ":" $apiAddr }}"
  {{- end }}

  # Mode settings (demo mode defaults to false, not exposed in config)
  {{- if .Values.devMode }}
  NEXT_PUBLIC_DEV_MODE: "true"
  {{- end }}
  NEXT_PUBLIC_READ_ONLY_MODE: {{ .Values.dashboard.readOnlyMode | quote }}
  {{- if .Values.dashboard.readOnlyMessage }}
  NEXT_PUBLIC_READ_ONLY_MESSAGE: {{ .Values.dashboard.readOnlyMessage | quote }}
  {{- end }}

  # Grafana integration (direct browser access, no proxy). The dashboard renders
  # "View in Grafana" links — and the Loki/Tempo "Explore" deep-links — in the
  # BROWSER, so this must be a browser-reachable URL. Set dashboard.grafana.url to
  # wherever Grafana is exposed to users (e.g. https://<host>/grafana via the
  # gateway). We deliberately do NOT fall back to the in-cluster Service URL
  # (http://<release>-grafana:80): a browser can't reach it, so it only produces
  # dead links (this also affects the Loki/Tempo Explore links, which target
  # Grafana). When unset, the dashboard hides the links rather than render broken
  # ones.
  {{- if .Values.dashboard.grafana.url }}
  NEXT_PUBLIC_GRAFANA_URL: {{ .Values.dashboard.grafana.url | quote }}
  {{- end }}
  NEXT_PUBLIC_GRAFANA_PATH: {{ .Values.dashboard.grafana.path | quote }}
  NEXT_PUBLIC_GRAFANA_ORG_ID: {{ .Values.dashboard.grafana.orgId | quote }}

  # Prometheus integration (for cost metrics)
  {{- if .Values.dashboard.prometheus.url }}
  PROMETHEUS_URL: {{ .Values.dashboard.prometheus.url | quote }}
  {{- else if .Values.prometheus.enabled }}
  {{- /* The bundled Prometheus is served under server.prefixURL (default
         /prometheus), so its API lives at <prefix>/api/v1/... — include the
         prefix here or the dashboard's /api/v1 queries 404 and the UI reports
         "Prometheus not configured". */}}
  PROMETHEUS_URL: "http://{{ .Release.Name }}-prometheus-server:80{{ .Values.prometheus.server.prefixURL | default "" }}"
  {{- end }}

  # Loki and Tempo integration (for logs/traces links)
  NEXT_PUBLIC_LOKI_ENABLED: {{ .Values.loki.enabled | quote }}
  NEXT_PUBLIC_TEMPO_ENABLED: {{ .Values.tempo.enabled | quote }}

  # Enterprise features configuration
  # enterpriseEnabled: Whether enterprise CRDs/controllers are deployed
  # hideEnterprise: Whether to hide enterprise features completely (vs showing upgrade prompts)
  NEXT_PUBLIC_ENTERPRISE_ENABLED: {{ .Values.enterprise.enabled | quote }}
  NEXT_PUBLIC_HIDE_ENTERPRISE: {{ .Values.dashboard.hideEnterprise | default false | quote }}

  # White-label branding (Enterprise). Emitted only when enterprise is enabled
  # and a product name is set; the dashboard additionally enforces the
  # whiteLabel license feature at runtime before applying any override.
  {{- if and .Values.enterprise.enabled .Values.dashboard.branding.productName }}
  {{- $b := .Values.dashboard.branding }}
  NEXT_PUBLIC_BRAND_PRODUCT_NAME: {{ $b.productName | quote }}
  NEXT_PUBLIC_BRAND_LOGO_LIGHT: {{ $b.logoLightUrl | quote }}
  NEXT_PUBLIC_BRAND_LOGO_DARK: {{ $b.logoDarkUrl | quote }}
  NEXT_PUBLIC_BRAND_FAVICON: {{ $b.faviconUrl | quote }}
  NEXT_PUBLIC_BRAND_COLOR_PRIMARY: {{ $b.colors.primary | quote }}
  NEXT_PUBLIC_BRAND_COLOR_ACCENT: {{ $b.colors.accent | quote }}
  NEXT_PUBLIC_BRAND_COLOR_SIDEBAR: {{ $b.colors.sidebar | quote }}
  NEXT_PUBLIC_BRAND_FONT_FAMILY: {{ $b.fonts.family | quote }}
  NEXT_PUBLIC_BRAND_FONT_URL: {{ $b.fonts.url | quote }}
  NEXT_PUBLIC_BRAND_DOCS_URL: {{ $b.links.docsBaseUrl | quote }}
  NEXT_PUBLIC_BRAND_SUPPORT: {{ $b.links.support | quote }}
  NEXT_PUBLIC_BRAND_SALES: {{ $b.links.sales | quote }}
  NEXT_PUBLIC_BRAND_UPGRADE_URL: {{ $b.links.upgradeUrl | quote }}
  NEXT_PUBLIC_BRAND_CUSTOM_CSS: {{ $b.customCss | quote }}
  {{- end }}

  # WebSocket proxy URL (for agent console connections)
  {{- if .Values.dashboard.wsProxy.url }}
  NEXT_PUBLIC_WS_PROXY_URL: {{ .Values.dashboard.wsProxy.url | quote }}
  {{- end }}

  # Authentication mode
  OMNIA_AUTH_MODE: {{ .Values.dashboard.auth.mode | quote }}
  {{- if .Values.dashboard.auth.allowAnonymous }}
  # Acknowledge that mode=anonymous disables auth. Required by the server's
  # auth boot guard when NODE_ENV=production (the helm-time check in
  # _helpers.tpl alone doesn't reach the running container).
  OMNIA_ALLOW_ANONYMOUS: "true"
  {{- end }}
  OMNIA_SESSION_COOKIE_NAME: {{ .Values.dashboard.auth.cookieName | quote }}
  OMNIA_SESSION_TTL: {{ .Values.dashboard.auth.ttl | quote }}
  OMNIA_AUTH_ANONYMOUS_ROLE: {{ .Values.dashboard.auth.anonymousRole | quote }}
  OMNIA_AUTH_CLI_TOKEN_TTL_SECONDS: {{ .Values.dashboard.auth.cliTokenTtlSeconds | quote }}

  # Role mapping
  {{- if .Values.dashboard.auth.roleMapping.adminGroups }}
  OMNIA_AUTH_ROLE_ADMIN_GROUPS: {{ .Values.dashboard.auth.roleMapping.adminGroups | join "," | quote }}
  {{- end }}
  {{- if .Values.dashboard.auth.roleMapping.editorGroups }}
  OMNIA_AUTH_ROLE_EDITOR_GROUPS: {{ .Values.dashboard.auth.roleMapping.editorGroups | join "," | quote }}
  {{- end }}

  # Base URL for OAuth callbacks.
  # Prefer an explicit dashboard.baseUrl; otherwise derive from ingress when enabled.
  {{- if .Values.dashboard.baseUrl }}
  OMNIA_BASE_URL: {{ .Values.dashboard.baseUrl | quote }}
  {{- else if .Values.dashboard.ingress.enabled }}
  {{- $scheme := "http" }}
  {{- if .Values.dashboard.ingress.tls }}
  {{- $scheme = "https" }}
  {{- end }}
  OMNIA_BASE_URL: "{{ $scheme }}://{{ .Values.dashboard.ingress.host }}"
  {{- end }}

  # Proxy mode settings
  {{- if eq .Values.dashboard.auth.mode "proxy" }}
  OMNIA_AUTH_PROXY_HEADER_USER: {{ .Values.dashboard.proxy.headerUser | quote }}
  OMNIA_AUTH_PROXY_HEADER_EMAIL: {{ .Values.dashboard.proxy.headerEmail | quote }}
  OMNIA_AUTH_PROXY_HEADER_GROUPS: {{ .Values.dashboard.proxy.headerGroups | quote }}
  OMNIA_AUTH_PROXY_HEADER_DISPLAY_NAME: {{ .Values.dashboard.proxy.headerDisplayName | quote }}
  OMNIA_AUTH_PROXY_AUTO_SIGNUP: {{ .Values.dashboard.proxy.autoSignup | quote }}
  {{- end }}

  # OAuth mode settings
  {{- if eq .Values.dashboard.auth.mode "oauth" }}
  OMNIA_OAUTH_PROVIDER: {{ .Values.dashboard.oauth.provider | quote }}
  {{- if .Values.dashboard.oauth.issuerUrl }}
  OMNIA_OAUTH_ISSUER_URL: {{ .Values.dashboard.oauth.issuerUrl | quote }}
  {{- end }}
  OMNIA_OAUTH_SCOPES: {{ .Values.dashboard.oauth.scopes | quote }}
  {{- if .Values.dashboard.oauth.azureTenantId }}
  OMNIA_OAUTH_AZURE_TENANT_ID: {{ .Values.dashboard.oauth.azureTenantId | quote }}
  {{- end }}
  {{- if .Values.dashboard.oauth.oktaDomain }}
  OMNIA_OAUTH_OKTA_DOMAIN: {{ .Values.dashboard.oauth.oktaDomain | quote }}
  {{- end }}
  OMNIA_OAUTH_CLAIM_USERNAME: {{ .Values.dashboard.oauth.claims.username | quote }}
  OMNIA_OAUTH_CLAIM_EMAIL: {{ .Values.dashboard.oauth.claims.email | quote }}
  OMNIA_OAUTH_CLAIM_DISPLAY_NAME: {{ .Values.dashboard.oauth.claims.displayName | quote }}
  OMNIA_OAUTH_CLAIM_GROUPS: {{ .Values.dashboard.oauth.claims.groups | quote }}
  {{- end }}

  # Builtin mode settings
  {{- if eq .Values.dashboard.auth.mode "builtin" }}
  OMNIA_BUILTIN_STORE_TYPE: {{ .Values.dashboard.builtin.storeType | quote }}
  {{- if eq .Values.dashboard.builtin.storeType "sqlite" }}
  OMNIA_BUILTIN_SQLITE_PATH: {{ .Values.dashboard.builtin.sqlitePath | quote }}
  {{- end }}
  OMNIA_BUILTIN_ALLOW_SIGNUP: {{ .Values.dashboard.builtin.allowSignup | quote }}
  OMNIA_BUILTIN_VERIFY_EMAIL: {{ .Values.dashboard.builtin.verifyEmail | quote }}
  OMNIA_BUILTIN_MIN_PASSWORD_LENGTH: {{ .Values.dashboard.builtin.minPasswordLength | quote }}
  OMNIA_BUILTIN_MAX_FAILED_ATTEMPTS: {{ .Values.dashboard.builtin.maxFailedAttempts | quote }}
  OMNIA_BUILTIN_LOCKOUT_DURATION: {{ .Values.dashboard.builtin.lockoutDuration | quote }}
  OMNIA_BUILTIN_ADMIN_USERNAME: {{ .Values.dashboard.builtin.admin.username | quote }}
  OMNIA_BUILTIN_ADMIN_EMAIL: {{ .Values.dashboard.builtin.admin.email | quote }}
  {{- end }}

  # API keys
  OMNIA_AUTH_API_KEYS_ENABLED: {{ .Values.dashboard.apiKeys.enabled | quote }}
  {{- $apiKeyStore := include "omnia.dashboard.apiKeyStore" . }}
  OMNIA_AUTH_API_KEYS_STORE: {{ $apiKeyStore | quote }}
  {{- if eq $apiKeyStore "file" }}
  OMNIA_AUTH_API_KEYS_FILE_PATH: {{ .Values.dashboard.apiKeys.filePath | quote }}
  {{- end }}
  OMNIA_AUTH_API_KEYS_MAX_PER_USER: {{ .Values.dashboard.apiKeys.maxPerUser | quote }}
  OMNIA_AUTH_API_KEYS_DEFAULT_EXPIRATION: {{ .Values.dashboard.apiKeys.defaultExpiration | quote }}

  # Workspace content storage
  # WORKSPACE_CONTENT_PATH is no longer an NFS mount in the dashboard pod; it is
  # retained as a path-string config so arena template preview/render can build
  # the absolute paths the arena-controller (which owns its own mount) expects.
  WORKSPACE_CONTENT_PATH: {{ .Values.workspaceContent.mountPath | default "/workspace-content" | quote }}
  {{- /*
    OPERATOR_CONTENT_API_URL points the dashboard's content-api-service at the
    operator's authenticated workspace-content API (#1462). Set whenever that
    API is served (dashboard enabled).
  */}}
  {{- $contentApiAddr := include "omnia.contentApi.bindAddress" . }}
  {{- if $contentApiAddr }}
  OPERATOR_CONTENT_API_URL: {{ printf "http://%s-operator.%s.svc.cluster.local:%s" (include "omnia.fullname" .) .Release.Namespace (trimPrefix ":" $contentApiAddr) | quote }}
  {{- end }}
  {{- /*
    OPERATOR_DEPLOY_API_URL points the dashboard's deploy-intent forwarder at
    the operator's authenticated deploy-intent API (#1866). Set whenever that
    API is served (dashboard enabled).
  */}}
  {{- $deployApiAddr := include "omnia.deployApi.bindAddress" . }}
  {{- if $deployApiAddr }}
  OPERATOR_DEPLOY_API_URL: {{ printf "http://%s-operator.%s.svc.cluster.local:%s" (include "omnia.fullname" .) .Release.Namespace (trimPrefix ":" $deployApiAddr) | quote }}
  {{- end }}
{{- end }}

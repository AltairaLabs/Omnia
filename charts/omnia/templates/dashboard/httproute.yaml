{{- $fullName := include "omnia.fullname" . }}
{{- $routeName := printf "%s-route" (include "omnia.dashboard.fullname" .) }}
{{- $useExternal := and .Values.dashboard.enabled .Values.dashboard.externalGateway.enabled .Values.gateway.enabled }}
{{- $useInternal := and .Values.dashboard.enabled (not .Values.dashboard.externalGateway.enabled) .Values.internalGateway.enabled }}

{{- if $useExternal }}
{{- $externalGatewayName := printf "%s-%s" $fullName .Values.gateway.name }}
---
# HTTPRoute for Dashboard via External Gateway (TLS-terminated)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $routeName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "omnia.dashboard.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ $externalGatewayName }}
      namespace: {{ .Release.Namespace }}
  {{- with .Values.dashboard.externalGateway.hostname }}
  hostnames:
    - {{ . | quote }}
  {{- end }}
  rules:
    # WebSocket routes for the dashboard's WS proxy (server.js, port 3002):
    # agent consoles (/api/agents/{ns}/{name}/ws), the Arena dev console
    # (/api/dev-console), and the PromptKit LSP (/api/lsp). All three must be
    # routed to :3002 *before* the catch-all, or the browser's wss upgrade
    # falls through to :3000 (Next.js) and never connects. See issues #936,
    # #1243.
    # NOTE: uses PathPrefix, not RegularExpression. Istio 1.24 silently drops
    # Gateway API regex path matches (the rule vanishes from the generated
    # Envoy config with no warning on HTTPRoute status or in istiod logs).
    # These prefixes are WS-only — the dashboard has no Next.js routes under
    # them.
    - matches:
        - path:
            type: PathPrefix
            value: /api/agents/
        - path:
            type: PathPrefix
            value: /api/dev-console
        - path:
            type: PathPrefix
            value: /api/lsp
      backendRefs:
        - name: {{ include "omnia.dashboard.fullname" . }}
          port: 3002
    # Dashboard routes at root path
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "omnia.dashboard.fullname" . }}
          port: 3000
{{- else if $useInternal }}
{{- $internalGatewayName := printf "%s-%s" $fullName .Values.internalGateway.name }}
---
# HTTPRoute for Dashboard via Internal Gateway
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $routeName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "omnia.dashboard.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ $internalGatewayName }}
      namespace: {{ .Release.Namespace }}
  rules:
    # WebSocket routes for the dashboard's WS proxy (:3002): agent consoles,
    # the Arena dev console, and the LSP. See comment above for rationale.
    - matches:
        - path:
            type: PathPrefix
            value: /api/agents/
        - path:
            type: PathPrefix
            value: /api/dev-console
        - path:
            type: PathPrefix
            value: /api/lsp
      backendRefs:
        - name: {{ include "omnia.dashboard.fullname" . }}
          port: 3002
    # Dashboard routes at root path
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "omnia.dashboard.fullname" . }}
          port: 3000
{{- end }}

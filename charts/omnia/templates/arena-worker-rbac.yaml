{{- if and .Values.enterprise.enabled .Values.enterprise.arena.worker.serviceAccount.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "omnia.fullname" . }}-arena-worker
  labels:
    {{- include "omnia.labels" . | nindent 4 }}
    app.kubernetes.io/component: arena-worker
rules:
  # Arena workers read CRDs directly to resolve providers, agents, and tools
  - apiGroups: ["omnia.altairalabs.ai"]
    resources: ["providers", "agentruntimes", "toolregistries", "arenajobs"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "omnia.fullname" . }}-arena-worker
  labels:
    {{- include "omnia.labels" . | nindent 4 }}
    app.kubernetes.io/component: arena-worker
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "omnia.fullname" . }}-arena-worker
subjects:
  - kind: ServiceAccount
    name: {{ .Values.enterprise.arena.worker.serviceAccount.name | default (printf "%s-arena-worker" (include "omnia.fullname" .)) }}
    namespace: {{ .Release.Namespace }}
{{- end }}

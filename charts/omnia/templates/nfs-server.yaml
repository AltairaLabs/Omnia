{{- if and .Values.nfs.server.enabled .Values.nfs.server.internal }}
# Internal NFS server for development environments
# Uses erichough/nfs-server for a lightweight NFS v4 server
# WARNING: Not recommended for production - use external NFS server or cloud storage instead
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "omnia.fullname" . }}-nfs-data
  labels:
    {{- include "omnia.labels" . | nindent 4 }}
    app.kubernetes.io/component: nfs-server
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.nfs.server.storageClass }}
  storageClassName: {{ .Values.nfs.server.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.nfs.server.size | default "50Gi" }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "omnia.fullname" . }}-nfs-server
  labels:
    {{- include "omnia.labels" . | nindent 4 }}
    app.kubernetes.io/component: nfs-server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "omnia.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: nfs-server
  template:
    metadata:
      labels:
        {{- include "omnia.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: nfs-server
    spec:
      initContainers:
        # erichough/nfs-server refuses to boot until the `nfs` kernel module is
        # loaded. On a fresh node whose kernel auto-loads modules lazily (Docker
        # Desktop, OrbStack), nothing has mounted NFS yet, so the module is
        # absent and the server crashloops — and every restart invalidates the
        # client mounts already held by the operator (stale NFS handle). Trigger
        # the kernel's module auto-loader up front: a throwaway `mount -t nfs`
        # makes the kernel request_module("nfs") before it attempts the (refused,
        # no server yet) connection. nfsd itself is built in on these kernels, so
        # only the client module needs coaxing. Best-effort; never fails the pod.
        - name: load-nfs-module
          image: {{ .Values.nfs.server.image.repository }}:{{ .Values.nfs.server.image.tag }}
          imagePullPolicy: {{ .Values.nfs.server.image.pullPolicy | default "IfNotPresent" }}
          command:
            - sh
            - -c
            - |
              if ! grep -q '^nfs ' /proc/modules 2>/dev/null; then
                mkdir -p /tmp/probe
                timeout 5 mount -t nfs 127.0.0.1:/ /tmp/probe 2>/dev/null || true  # keep-hardcoded: short fixed probe timeout
                timeout 5 mount -t nfs4 127.0.0.1:/ /tmp/probe 2>/dev/null || true # keep-hardcoded: short fixed probe timeout
                umount /tmp/probe 2>/dev/null || true
              fi
              grep -q '^nfs ' /proc/modules 2>/dev/null && echo "nfs module loaded" || echo "nfs module not loaded (likely builtin)"
              exit 0
          securityContext:
            privileged: true
            capabilities:
              add:
                - SYS_ADMIN
{{- if .Values.nfs.csiDriver.storageClass.subDir }}
        # The CSI driver creates a per-volume directory when subDir is unset,
        # but a fixed shared subDir is a path it expects to already exist — it
        # is not created during provisioning. On a freshly provisioned backing
        # volume the export root is empty, so every mount of a PVC on this
        # storage class fails with "reason given by server: No such file or
        # directory", and anything mounting workspace-content (the operator,
        # dashboard and vscode-server) never starts.
        #
        # The directory only ever existed because it happened to persist inside
        # an older backing volume, so the failure appears the moment that volume
        # is recreated rather than when the value is set. Creating it here makes
        # the export self-initialising.
        - name: init-shared-subdir
          image: {{ .Values.nfs.server.image.repository }}:{{ .Values.nfs.server.image.tag }}
          imagePullPolicy: {{ .Values.nfs.server.image.pullPolicy | default "IfNotPresent" }}
          command:
            - sh
            - -c
            - |
              set -e
              mkdir -p "/nfsshare/{{ .Values.nfs.csiDriver.storageClass.subDir }}"
              # 0777 mirrors mountPermissions in nfs-storageclass.yaml, where it
              # is likewise fixed, so non-root workloads can write through the
              # mount. Keep the two in step if that ever becomes configurable.
              chmod 0777 "/nfsshare/{{ .Values.nfs.csiDriver.storageClass.subDir }}"
          volumeMounts:
            - name: nfs-data
              mountPath: /nfsshare
{{- end }}
      containers:
        - name: nfs-server
          image: {{ .Values.nfs.server.image.repository }}:{{ .Values.nfs.server.image.tag }}
          imagePullPolicy: {{ .Values.nfs.server.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: nfs
              containerPort: 2049
              protocol: TCP
          env:
            # erichough/nfs-server configuration
            # fsid=0 marks this as the NFSv4 pseudo-root, required for NFSv4 clients
            - name: NFS_EXPORT_0
              value: "/nfsshare *(rw,sync,no_subtree_check,no_root_squash,fsid=0)"
          securityContext:
            privileged: true
            capabilities:
              add:
                - SYS_ADMIN
          volumeMounts:
            - name: nfs-data
              mountPath: /nfsshare
          resources:
            {{- toYaml .Values.nfs.server.resources | nindent 12 }}
      volumes:
        - name: nfs-data
          persistentVolumeClaim:
            claimName: {{ include "omnia.fullname" . }}-nfs-data
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "omnia.fullname" . }}-nfs-server
  labels:
    {{- include "omnia.labels" . | nindent 4 }}
    app.kubernetes.io/component: nfs-server
spec:
  type: ClusterIP
  ports:
    - name: nfs
      port: 2049
      targetPort: nfs
      protocol: TCP
  selector:
    {{- include "omnia.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: nfs-server
{{- end }}

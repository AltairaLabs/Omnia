{{- $apiAddr := include "omnia.toolTest.bindAddress" . }}
{{- $contentApiAddr := include "omnia.contentApi.bindAddress" . }}
{{- if or $apiAddr $contentApiAddr }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "omnia.fullname" . }}-operator
  labels:
    {{- include "omnia.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator-api
spec:
  type: ClusterIP
  ports:
    {{- if $apiAddr }}
    - name: api
      port: {{ trimPrefix ":" $apiAddr }}
      targetPort: api
      protocol: TCP
    {{- end }}
    {{- if $contentApiAddr }}
    - name: content-api
      port: {{ trimPrefix ":" $contentApiAddr }}
      targetPort: content-api
      protocol: TCP
    {{- end }}
  selector:
    {{- include "omnia.selectorLabels" . | nindent 4 }}
{{- end }}

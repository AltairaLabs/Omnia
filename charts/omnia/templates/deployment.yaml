apiVersion: apps/v1
kind: Deployment
{{- $resolvedTracingEndpoint := include "omnia.tracing.endpoint" . | trim }}
{{- $po := .Values.operator.podOverrides | default dict }}
metadata:
  name: {{ include "omnia.fullname" . }}-controller-manager
  labels:
    {{- include "omnia.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "omnia.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
        {{- if and .Values.observability.enabled .Values.prometheus.enabled .Values.metrics.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.metrics.port }}"
        prometheus.io/path: "/metrics"
        {{- if .Values.metrics.secure }}
        prometheus.io/scheme: "https"
        {{- end }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with $po.annotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- with $po.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- include "omnia.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: controller-manager
    spec:
      {{- $pullSecrets := concat (.Values.imagePullSecrets | default list) ($po.imagePullSecrets | default list) }}
      {{- with $pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ $po.serviceAccountName | default (include "omnia.serviceAccountName" .) }}
      {{- with $po.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
        {{- if not (hasKey .Values.podSecurityContext "fsGroup") }}
        # fsGroup required for the manager to write into workspace-content
        # (SkillSource + ArenaSource controllers sync content here).
        fsGroup: 65532
        {{- end }}
      containers:
        - name: manager
          image: {{ include "omnia.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /manager
          args:
            {{- if .Values.leaderElection.enabled }}
            - --leader-elect
            {{- end }}
            - --health-probe-bind-address=:{{ .Values.probes.port }}
            - --facade-image={{ .Values.facade.image.repository }}:{{ .Values.facade.image.tag | default .Chart.AppVersion }}
            - --facade-image-pull-policy={{ .Values.facade.image.pullPolicy }}
            - --framework-image={{ .Values.framework.image.repository }}:{{ .Values.framework.image.tag | default .Chart.AppVersion }}
            - --framework-image-pull-policy={{ .Values.framework.image.pullPolicy }}
            - --session-api-image={{ include "omnia.sessionApi.image" . }}
            - --session-api-image-pull-policy={{ .Values.workspaceServices.sessionApi.image.pullPolicy }}
            - --memory-api-image={{ include "omnia.memoryApi.image" . }}
            - --memory-api-image-pull-policy={{ .Values.workspaceServices.memoryApi.image.pullPolicy }}
            - --agent-workspace-reader-clusterrole={{ include "omnia.fullname" . }}-agent-workspace-reader
            {{- if .Values.dashboard.enabled }}
            {{- /*
              Tell the Workspace controller which Secret holds the dashboard
              mgmt-plane signing keypair. The controller mirrors the public
              cert (tls.crt) into a per-workspace ConfigMap so facade pods
              can validate dashboard-minted debug tokens. When dashboard.enabled
              is false the flag is omitted -> mirror disabled -> facade keeps
              its mgmt-plane-unaware default. BYO override pulls from
              dashboard.signingKey.existingSecret when set.
            */}}
            - --mgmt-plane-signing-secret={{ .Values.dashboard.signingKey.existingSecret | default (printf "%s-signing-keypair" (include "omnia.dashboard.fullname" .)) }}
            {{- end }}
            {{- if and .Values.tracing.enabled $resolvedTracingEndpoint }}
            - --tracing-enabled=true
            - --tracing-endpoint={{ $resolvedTracingEndpoint }}
            {{- end }}
            {{- if .Values.metrics.enabled }}
            - --metrics-bind-address=:{{ .Values.metrics.port }}
            {{- if .Values.metrics.secure }}
            - --metrics-secure=true
            {{- else }}
            - --metrics-secure=false
            {{- end }}
            {{- end }}
            {{- if .Values.workspaces.storage.storageClass }}
            - --workspace-storage-class={{ .Values.workspaces.storage.storageClass }}
            {{- end }}
            {{- if .Values.operator.apiBindAddress }}
            - --api-bind-address={{ .Values.operator.apiBindAddress }}
            {{- end }}
            {{- if .Values.enterprise.enabled }}
            - --enterprise
            - --policy-proxy-image={{ .Values.enterprise.policyProxy.image.repository }}:{{ .Values.enterprise.policyProxy.image.tag | default .Chart.AppVersion }}
            {{- end }}
            {{- if .Values.operator.logLevel }}
            - --zap-log-level={{ .Values.operator.logLevel }}
            {{- end }}
            {{- with .Values.operator.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            {{- if .Values.operator.apiBindAddress }}
            - name: api
              containerPort: {{ trimPrefix ":" .Values.operator.apiBindAddress }}
              protocol: TCP
            {{- end }}
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            {{- end }}
            {{- if .Values.webhook.enabled }}
            - name: webhook
              containerPort: {{ .Values.webhook.port }}
              protocol: TCP
            {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.probes.port }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds | default 5 }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold | default 3 }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.probes.port }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds | default 5 }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold | default 3 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- $env := concat (.Values.operator.extraEnv | default list) ($po.extraEnv | default list) }}
          {{- with $env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- $envFrom := concat (.Values.operator.extraEnvFrom | default list) ($po.extraEnvFrom | default list) }}
          {{- with $envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- $vmMounts := concat (.Values.operator.extraVolumeMounts | default list) ($po.extraVolumeMounts | default list) }}
          {{- if or .Values.workspaceContent.enabled $vmMounts }}
          volumeMounts:
            {{- if .Values.workspaceContent.enabled }}
            - name: workspace-content
              mountPath: {{ .Values.workspaceContent.mountPath | default "/workspace-content" }}
            {{- end }}
            {{- with $vmMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
      {{- $volumes := concat (.Values.operator.extraVolumes | default list) ($po.extraVolumes | default list) }}
      {{- if or .Values.workspaceContent.enabled $volumes }}
      volumes:
        {{- if .Values.workspaceContent.enabled }}
        - name: workspace-content
          persistentVolumeClaim:
            claimName: {{ .Values.workspaceContent.persistence.existingClaim | default (printf "%s-workspace-content" (include "omnia.fullname" .)) }}
        {{- end }}
        {{- with $volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- /* nodeSelector: user keys merged over chart-wide defaults (user wins). */}}
      {{- $nodeSelector := mergeOverwrite (deepCopy (.Values.nodeSelector | default dict)) ($po.nodeSelector | default dict) }}
      {{- with $nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- /* affinity: podOverrides replaces chart-wide when set. */}}
      {{- $affinity := $po.affinity | default .Values.affinity }}
      {{- with $affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- /* tolerations: append podOverrides to chart-wide. */}}
      {{- $tolerations := concat (.Values.tolerations | default list) ($po.tolerations | default list) }}
      {{- with $tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $po.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 30

apiVersion: apps/v1
kind: Deployment
{{- $resolvedTracingEndpoint := include "omnia.tracing.endpoint" . | trim }}
{{- $po := .Values.operator.podOverrides | default dict }}
metadata:
  name: {{ include "omnia.fullname" . }}-controller-manager
  labels:
    {{- include "omnia.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "omnia.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
        {{- if and .Values.observability.enabled .Values.prometheus.enabled .Values.metrics.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.metrics.port }}"
        prometheus.io/path: "/metrics"
        {{- if .Values.metrics.secure }}
        prometheus.io/scheme: "https"
        {{- end }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with $po.annotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- with $po.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- include "omnia.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: controller-manager
    spec:
      {{- $pullSecrets := concat (.Values.imagePullSecrets | default list) ($po.imagePullSecrets | default list) }}
      {{- with $pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ $po.serviceAccountName | default (include "omnia.serviceAccountName" .) }}
      {{- with $po.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
        {{- if not (hasKey .Values.podSecurityContext "fsGroup") }}
        # fsGroup required for the manager to write into workspace-content
        # (SkillSource + ArenaSource controllers sync content here).
        fsGroup: 65532
        {{- end }}
      containers:
        - name: manager
          image: {{ include "omnia.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /manager
          args:
            {{- if .Values.leaderElection.enabled }}
            - --leader-elect
            {{- end }}
            - --health-probe-bind-address=:{{ .Values.probes.port }}
            - --facade-image={{ .Values.facade.image.repository }}:{{ .Values.facade.image.tag | default .Chart.AppVersion }}
            - --facade-image-pull-policy={{ .Values.facade.image.pullPolicy }}
            - --framework-image=promptkit={{ .Values.framework.image.repository }}:{{ .Values.framework.image.tag | default .Chart.AppVersion }}
{{- range $type, $img := .Values.framework.images }}
            - --framework-image={{ $type }}={{ $img.repository }}:{{ $img.tag | default $.Chart.AppVersion }}
{{- end }}
            - --framework-image-pull-policy={{ .Values.framework.image.pullPolicy }}
            - --session-api-image={{ include "omnia.sessionApi.image" . }}
            - --session-api-image-pull-policy={{ .Values.workspaceServices.sessionApi.image.pullPolicy }}
            - --memory-api-image={{ include "omnia.memoryApi.image" . }}
            - --memory-api-image-pull-policy={{ .Values.workspaceServices.memoryApi.image.pullPolicy }}
            - --privacy-api-image={{ include "omnia.privacyApi.image" . }}
            - --privacy-api-image-pull-policy={{ .Values.workspaceServices.privacyApi.image.pullPolicy }}
            - --eval-worker-image={{ include "omnia.workspaceEvalWorker.image" . }}
            - --eval-worker-image-pull-policy={{ .Values.workspaceServices.evalWorker.image.pullPolicy }}
            {{- /*
              Operator-wide Redis configuration for the memory-api cache
              + event publisher and the eval-worker autoscaler.

              --memory-redis-url               Literal URL forwarded to
                                               every per-workspace memory-
                                               api as --redis-url. Set
                                               only when the URL is a
                                               literal value.

              --memory-redis-url-secret-{name,key}   Secret refs forwarded
                                               to ServiceBuilder when the
                                               URL comes from a Secret.
                                               ServiceBuilder mounts the
                                               Secret as REDIS_URL env on
                                               every per-workspace memory-
                                               api pod; memory-api picks
                                               the URL up via the env
                                               fallback on its --redis-url
                                               flag.

              --redis-url                      URL form forwarded to
                                               eval-worker pods via
                                               REDIS_URL env. When the
                                               URL comes from a Secret
                                               (existingSecret form),
                                               this is empty here and
                                               the eval-worker pod
                                               receives the URL via
                                               valueFrom.secretKeyRef
                                               instead — see the
                                               AgentRuntime reconciler
                                               for the env-mount
                                               wiring.

              All resolutions come from the memory-cache consumer path
              (workspaceServices.memoryApi.cache.redis → redis.default).
            */}}
            {{- $memoryConsumer := dict "ctx" . "consumer" "workspaceServices.memoryApi.cache.redis" }}
            {{- $memoryHasSecret := include "omnia.redis.hasSecret" $memoryConsumer }}
            {{- if $memoryHasSecret }}
            {{- $memorySecret := fromYaml (include "omnia.redis._existingSecret" $memoryConsumer) }}
            - --memory-redis-url-secret-name={{ $memorySecret.name }}
            - --memory-redis-url-secret-key={{ $memorySecret.key }}
            {{- else }}
            {{- $memoryRedisURL := include "omnia.redis.url" $memoryConsumer }}
            {{- if $memoryRedisURL }}
            - --memory-redis-url={{ $memoryRedisURL }}
            - --redis-url={{ $memoryRedisURL }}
            {{- end }}
            {{- end }}
            {{- with .Values.workspaceServices.memoryApi.cache.ttl }}
            - --memory-cache-ttl={{ . }}
            {{- end }}
            {{- with .Values.workspaceServices.memoryApi.consolidation.interval }}
            - --memory-consolidation-interval={{ . }}
            {{- end }}
            {{- with .Values.workspaceServices.memoryApi.projection.interval }}
            - --memory-projection-interval={{ . }}
            {{- end }}
            {{- /*
              Session-api hot-cache Redis. Routes through dashboard.
              session.redis (the same consumer block the dashboard
              session store uses, since they share Redis topology by
              default) → redis.default → Bitnami subchart. Operators
              wanting to split session-api hot-cache Redis from
              dashboard session-store Redis can set per-workspace
              overrides via Workspace.spec.services[].session.redis.
            */}}
            {{- $sessionConsumer := dict "ctx" . "consumer" "dashboard.session.redis" }}
            {{- $sessionHasSecret := include "omnia.redis.hasSecret" $sessionConsumer }}
            {{- if $sessionHasSecret }}
            {{- $sessionSecret := fromYaml (include "omnia.redis._existingSecret" $sessionConsumer) }}
            - --session-redis-url-secret-name={{ $sessionSecret.name }}
            - --session-redis-url-secret-key={{ $sessionSecret.key }}
            {{- else }}
            {{- $sessionRedisURL := include "omnia.redis.url" $sessionConsumer }}
            {{- if $sessionRedisURL }}
            - --session-redis-url={{ $sessionRedisURL }}
            {{- end }}
            {{- end }}
            {{- if .Values.rbac.create }}
            - --workspace-reader-rbac=true
            {{- end }}
            {{- if .Values.defaultExposure.enabled }}
            {{- /* Operator-provisioned default external exposure (#1553). Opt-in
              per agent via the primary facade's expose.enabled
              (spec.facades[].expose); the operator creates a host-based
              HTTPRoute attached to this Gateway. */}}
            - --default-exposure-base-domain={{ required "defaultExposure.baseDomain is required when defaultExposure.enabled" .Values.defaultExposure.baseDomain }}
            - --default-exposure-gateway-name={{ required "defaultExposure.gateway.name is required when defaultExposure.enabled" .Values.defaultExposure.gateway.name }}
            {{- with .Values.defaultExposure.gateway.namespace }}
            - --default-exposure-gateway-namespace={{ . }}
            {{- end }}
            {{- with .Values.defaultExposure.gateway.sectionName }}
            - --default-exposure-gateway-section={{ . }}
            {{- end }}
            {{- end }}
            {{- if .Values.internalServiceAuth.enabled }}
            {{- /*
              Internal ServiceAccount auth for the operator-managed
              per-workspace session-api (SEC-1/SEC-5). The operator renders
              SESSION_API_AUTH_* env onto each session-api Deployment, grants
              its SA RBAC to create TokenReviews, and mounts an audience-bound
              projected token onto every caller pod it manages (facade,
              memory-api, eval-worker). The operator authorizes those
              in-workspace callers by NAMESPACE (it sets
              SESSION_API_AUTH_ALLOWED_NAMESPACES to the workspace namespace), so
              the per-AgentRuntime facade SAs pass without being enumerated. The
              chart only passes the audience and the cross-namespace dashboard SA
              as an exact-match extra subject (the dashboard runs in the release
              namespace, not the workspace namespace).
            */}}
            - --session-api-auth-enabled
            - --session-api-auth-audience={{ .Values.internalServiceAuth.audience }}
            - --session-api-auth-token-expiration-seconds={{ .Values.internalServiceAuth.tokenExpirationSeconds }}
            - --session-api-tokenreview-clusterrole={{ include "omnia.fullname" . }}-session-api-tokenreview
            {{- if .Values.internalServiceAuth.istio.enabled }}
            - --session-api-auth-istio-mtls
            {{- end }}
            {{- if .Values.dashboard.enabled }}
            - --session-api-auth-extra-subjects=system:serviceaccount:{{ .Release.Namespace }}:{{ include "omnia.dashboard.serviceAccountName" . }}
            {{- end }}
            {{- end }}
            {{- if .Values.dashboard.enabled }}
            {{- /*
              Tell the operator the dashboard's JWKS URL. Set on every
              facade pod as OMNIA_MGMT_PLANE_JWKS_URL so cmd/agent can
              build a JWKS-backed mgmt-plane validator that fetches the
              dashboard's signing pubkey on demand. Replaces the older
              per-workspace ConfigMap mirror, which silently went stale
              on key rotation. dashboard.jwksUrl wins when set; default
              points at the in-cluster service. dashboard.enabled=false
              omits the flag -> facade stays mgmt-plane-unaware.
            */}}
            - --mgmt-plane-jwks-url={{ .Values.dashboard.jwksUrl | default (printf "http://%s.%s.svc.cluster.local:%d/api/auth/jwks" (include "omnia.dashboard.fullname" .) .Release.Namespace (int .Values.dashboard.service.port)) }}
            {{- end }}
            {{- if and .Values.tracing.enabled $resolvedTracingEndpoint }}
            - --tracing-enabled=true
            - --tracing-endpoint={{ $resolvedTracingEndpoint }}
            {{- end }}
            {{- if .Values.metrics.enabled }}
            - --metrics-bind-address=:{{ .Values.metrics.port }}
            {{- if .Values.metrics.secure }}
            - --metrics-secure=true
            {{- else }}
            - --metrics-secure=false
            {{- end }}
            {{- end }}
            {{- if .Values.workspaces.storage.storageClass }}
            - --workspace-storage-class={{ .Values.workspaces.storage.storageClass }}
            {{- end }}
            - --workspace-content-path={{ .Values.workspaceContent.mountPath | default "/workspace-content" }}
            {{- $toolTestAddr := include "omnia.toolTest.bindAddress" . }}
            {{- if $toolTestAddr }}
            - --api-bind-address={{ $toolTestAddr }}
            {{- if .Values.dashboard.enabled }}
            # Only the dashboard ServiceAccount may call the tool-test API; the
            # operator authenticates the bearer token via TokenReview (#1303).
            - --tool-test-allowed-subjects=system:serviceaccount:{{ .Release.Namespace }}:{{ include "omnia.dashboard.serviceAccountName" . }}
            {{- end }}
            {{- end }}
            {{- $contentApiAddr := include "omnia.contentApi.bindAddress" . }}
            {{- if $contentApiAddr }}
            # Workspace-content API: the dashboard reads/writes content here
            # instead of mounting the NFS volume (#1462). The operator verifies
            # the dashboard-minted identity JWT (via --mgmt-plane-jwks-url) and
            # serves --workspace-content-path.
            - --content-api-bind-address={{ $contentApiAddr }}
            {{- end }}
            {{- $deployApiAddr := include "omnia.deployApi.bindAddress" . }}
            {{- if $deployApiAddr }}
            # Deploy-intent API: the dashboard forwards DeployIntent bodies here; the operator
            # verifies the dashboard-minted identity JWT (via --mgmt-plane-jwks-url) and applies.
            - --deploy-api-bind-address={{ $deployApiAddr }}
            {{- end }}
            {{- if .Values.enterprise.enabled }}
            - --enterprise
            - --policy-broker-image={{ .Values.enterprise.policyBroker.image.repository }}:{{ .Values.enterprise.policyBroker.image.tag | default .Chart.AppVersion }}
            # On enterprise builds, every service pod (session-api, memory-api,
            # privacy-api) runs a privacy watcher. Own-namespace SessionPrivacyPolicy +
            # AgentRuntime reads come from a namespaced Role the operator creates; these
            # two ClusterRoles cover the cross-namespace reads. privacy-default-reader:
            # get on the global omnia-system/default policy (bound to all service pods).
            # memory-consolidation-reader: cluster-wide memorypolicies (memory-api only).
            # Tell the operator both names so it binds the right SAs (#1899).
            - --privacy-default-reader-clusterrole={{ include "omnia.fullname" . }}-privacy-default-reader
            - --memory-consolidation-reader-clusterrole={{ include "omnia.fullname" . }}-memory-consolidation-reader
            # License endpoint (arena-controller), stamped onto data-plane pods as
            # OPERATOR_API_URL so they log a startup nag when unlicensed (#1682).
            # FQDN with namespace because data-plane pods run in workspace namespaces.
            - --license-api-url=http://{{ include "omnia.fullname" . }}-arena-controller.{{ .Release.Namespace }}:{{ ((.Values.enterprise.arena.controller).api).port | default 8082 }}
            {{- end }}
            {{- if .Values.rollout.meshEnabled }}
            # Istio ambient + waypoint present — let the operator manage
            # AgentRuntime rollout VirtualService/DestinationRule for
            # trafficRouting mode=mesh. See examples/values-istio-ambient.yaml.
            - --mesh-enabled
            {{- end }}
            {{- if .Values.operator.logLevel }}
            - --zap-log-level={{ .Values.operator.logLevel }}
            {{- end }}
            {{- with .Values.operator.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- if .Values.webhook.enabled }}
            - --webhook-cert-path={{ .Values.webhook.certPath }}
            {{- end }}
          ports:
            {{- $apiAddr := include "omnia.toolTest.bindAddress" . }}
            {{- if $apiAddr }}
            - name: api
              containerPort: {{ trimPrefix ":" $apiAddr }}
              protocol: TCP
            {{- end }}
            {{- $contentApiAddr := include "omnia.contentApi.bindAddress" . }}
            {{- if $contentApiAddr }}
            - name: content-api
              containerPort: {{ trimPrefix ":" $contentApiAddr }}
              protocol: TCP
            {{- end }}
            {{- $deployApiAddr := include "omnia.deployApi.bindAddress" . }}
            {{- if $deployApiAddr }}
            - name: deploy-api
              containerPort: {{ trimPrefix ":" $deployApiAddr }}
              protocol: TCP
            {{- end }}
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            {{- end }}
            {{- if .Values.webhook.enabled }}
            - name: webhook
              containerPort: {{ .Values.webhook.port }}
              protocol: TCP
            {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.probes.port }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds | default 5 }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold | default 3 }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.probes.port }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds | default 5 }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold | default 3 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- $env := concat (.Values.operator.extraEnv | default list) ($po.extraEnv | default list) }}
          env:
            # POD_NAMESPACE is read by the Workspace controller for the
            # NetworkPolicy auto-allow that lets dashboard / operator /
            # Prometheus traffic reach workspace pods when isolation is on.
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- with $env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- $envFrom := concat (.Values.operator.extraEnvFrom | default list) ($po.extraEnvFrom | default list) }}
          {{- with $envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- $vmMounts := concat (.Values.operator.extraVolumeMounts | default list) ($po.extraVolumeMounts | default list) }}
          volumeMounts:
            - name: workspace-content
              mountPath: {{ .Values.workspaceContent.mountPath | default "/workspace-content" }}
            {{- if .Values.webhook.enabled }}
            - name: webhook-cert
              mountPath: {{ .Values.webhook.certPath }}
              readOnly: true
            {{- end }}
            {{- with $vmMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      {{- $volumes := concat (.Values.operator.extraVolumes | default list) ($po.extraVolumes | default list) }}
      volumes:
        - name: workspace-content
          persistentVolumeClaim:
            claimName: {{ .Values.workspaceContent.persistence.existingClaim | default (printf "%s-workspace-content" (include "omnia.fullname" .)) }}
        {{- if .Values.webhook.enabled }}
        - name: webhook-cert
          secret:
            secretName: {{ .Values.webhook.certSecretName }}
            defaultMode: 0o644
        {{- end }}
        {{- with $volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- /* nodeSelector: user keys merged over chart-wide defaults (user wins). */}}
      {{- $nodeSelector := mergeOverwrite (deepCopy (.Values.nodeSelector | default dict)) ($po.nodeSelector | default dict) }}
      {{- with $nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- /* affinity: podOverrides replaces chart-wide when set. */}}
      {{- $affinity := $po.affinity | default .Values.affinity }}
      {{- with $affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- /* tolerations: append podOverrides to chart-wide. */}}
      {{- $tolerations := concat (.Values.tolerations | default list) ($po.tolerations | default list) }}
      {{- with $tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $po.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 30

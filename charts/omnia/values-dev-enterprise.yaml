# Development values with Enterprise features enabled.
#
# Use with: helm install omnia ./charts/omnia \
#             -f ./charts/omnia/values-dev.yaml \
#             -f ./charts/omnia/values-dev-nfs.yaml \
#             -f ./charts/omnia/values-dev-enterprise.yaml
# Or with Tilt: ENABLE_ENTERPRISE=true tilt up
#
# This configuration enables enterprise features:
#   - Arena controller and CRDs (ArenaSource, ArenaJob)
#   - Redis for Arena work queue
#   - VS Code server for browsing workspace content
#
# NOTE: RWX workspace-content storage (the internal NFS server + omnia-nfs
# storage class) lives in values-dev-nfs.yaml, NOT here — it is required by the
# core platform (the operator), not just enterprise. Tilt always applies it;
# manual enterprise installs must apply values-dev-nfs.yaml too (see above).

# Enable dev mode license (DO NOT USE IN PRODUCTION)
devMode: true

# ============================================================================
# Enterprise Features
# ============================================================================

enterprise:
  enabled: true

  # Community templates default flipped to false in chart 0.9.0-beta.7 (air-gap
  # safety). Dev Enterprise installs want them on for the fast dev loop.
  communityTemplates:
    enabled: true

  arena:
    queue:
      type: redis
      redis:
        # Auto-configured to use Redis subchart
        host: "omnia-redis-master"
        port: 6379

# NFS / RWX workspace-content storage moved to values-dev-nfs.yaml (required by
# the core platform, not enterprise-only). Tilt always applies it.

# ============================================================================
# Redis (for Arena work queue)
# ============================================================================

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: false

# Istio ambient mode (sidecarless) + Gateway API.
# OVERLAY on `values-prod-oauth.yaml`:
#
#   helm install omnia oci://ghcr.io/altairalabs/charts/omnia \
#     -f charts/omnia/examples/values-prod-oauth.yaml \
#     -f charts/omnia/examples/values-istio-ambient.yaml
#
# Pre-reqs in the cluster:
#   - Istio 1.22+ installed with ambient profile (`istioctl install --set profile=ambient`)
#   - Gateway API v1.1+ CRDs installed
#   - ztunnel + waypoint running in the dataplane

# --- Opt pods into the ambient mesh -----------------------------------------
#
# Ambient mode reads the label `istio.io/dataplane-mode: ambient` on the
# pod's NAMESPACE or pod itself. The simplest path: label the release
# namespace once post-install:
#
#   kubectl label namespace <release-ns> istio.io/dataplane-mode=ambient
#
# IMPORTANT for AgentRuntime rollout trafficRouting mode=mesh:
# label EVERY namespace that carries agent pods (facade/runtime) AND the
# arena-eval-worker namespace, not just the release namespace. Operator-
# generated agent pods live in their workspace namespace; if that namespace
# is not enrolled in ambient the candidate/stable split silently degrades.
#
#   kubectl label namespace <workspace-ns> istio.io/dataplane-mode=ambient
#
# If you prefer per-pod opt-in, use podAnnotations / podOverrides
# (example below).

# --- Enable operator-managed mesh routing -----------------------------------
#
# With ambient + a waypoint in place (see below), tell the operator it may
# manage VirtualService/DestinationRule for AgentRuntimes whose
# spec.rollout.trafficRouting.mode is `mesh`. This sets the manager's
# `--mesh-enabled` flag. Without a waypoint the L7 split will NOT take effect
# (ztunnel is L4 only) and the operator auto-degrades to replica weighting.
rollout:
  meshEnabled: true

# --- Waypoint for the agent Service (L7 routing) ----------------------------
#
# REQUIRED for mode=mesh. ztunnel provides L4 mTLS only; the HTTP-level
# weighted split between the `stable` and `candidate` subsets is performed by
# a WAYPOINT proxy. Deploy one waypoint per namespace (or per Service) that
# hosts agent pods. The Gateway below uses the gateway-api `istio-waypoint`
# class — equivalent to `istioctl waypoint apply --enroll-namespace`.
#
# NOTE (on-cluster validation required): the waypoint manifest is rendered
# here for convenience, but the interaction between the waypoint and the
# enterprise OPA policy-proxy on the WebSocket path has only been validated
# on a real ambient cluster for the hero demo namespace. Confirm the
# waypoint adopts agent pods (`istioctl ztunnel-config workloads`) and that
# WS upgrades survive the waypoint before relying on mode=mesh in prod.
#
# Substitute your agent/release namespace for `omnia` below, and add one
# entry per namespace that carries agent pods.
extraObjects:
  - |
    apiVersion: gateway.networking.k8s.io/v1
    kind: Gateway
    metadata:
      name: omnia-waypoint
      namespace: {{ .Release.Namespace }}
      labels:
        istio.io/waypoint-for: service
    spec:
      gatewayClassName: istio-waypoint
      listeners:
        - name: mesh
          port: 15008
          protocol: HBONE

# --- Gateway (ambient-ready) ------------------------------------------------
gateway:
  enabled: true
  className: istio                # Istio's Gateway controller
  listeners:
    http:
      port: 80
      protocol: HTTP
    https:
      enabled: true
      port: 443
      protocol: HTTPS
      tlsSecretName: omnia-tls    # EDIT
  annotations:
    # Force ambient-mode routing for this gateway instance
    networking.istio.io/traffic-distribution: "PreferClose"

# --- Internal gateway (observability tools) ---------------------------------
internalGateway:
  enabled: true
  className: istio

# --- Chart-owned pods join ambient mesh via label --------------------------
#
# These labels propagate to the pod and let ztunnel adopt them as waypoint
# clients. Ambient doesn't need a sidecar, so no init-container noise.

dashboard:
  extraEnv: []  # keep as-is; ambient is an L7 concern, not a container concern

# Nothing else to set — ambient is configured at the namespace / ztunnel level.
# Omnia's operator-generated pods (facade/runtime, session-api, etc.)
# inherit the namespace's dataplane mode automatically.

{{- if and .Values.demoWorkspace.privacyEnabled .Values.demoWorkspace.createDevSecret }}
---
# Dev-only Postgres connection Secret for the demo workspace's privacy-api,
# pointing at the DEDICATED omnia_consent database on the in-cluster dev postgres.
# A separate logical DB keeps consent state isolated from session and memory so
# schema migrations run without cross-service locking. For real clusters set
# demoWorkspace.createDevSecret=false and pre-create this Secret with a
# POSTGRES_CONN key.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.demoWorkspace.privacySecret }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: omnia-demos
    app.kubernetes.io/part-of: {{ include "omnia-demos.name" . }}
type: Opaque
stringData:
  POSTGRES_CONN: {{ .Values.demoWorkspace.devPrivacyConn | quote }}
{{- end }}

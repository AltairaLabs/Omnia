{{- if .Values.sharepointHero.enabled }}
---
apiVersion: omnia.altairalabs.ai/v1alpha1
kind: AgentRuntime
metadata:
  name: rag-hero
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: {{ include "omnia-demos.name" . }}
    omnia.altairalabs.ai/workspace: {{ .Values.sharepointHero.workspace }}
spec:
  promptPackRef:
    name: rag-hero-pack
    version: "1.0.0"
  providers:
    - name: default
      providerRef:
        name: rag-hero-baseline
  toolRegistryRef:
    name: rag-hero-tools
  privacyPolicyRef:
    name: rag-hero-privacy
  {{- if .Values.sharepointHero.azure.enabled }}
  # Keyless Azure OpenAI: run the agent pod as the workload-identity SA and opt
  # into the AKS webhook's federated-token injection (the runtime calls Azure
  # OpenAI with no API key).
  podOverrides:
    {{- include "omnia-demos.azureWorkloadIdentityPodOverrides" . | nindent 4 }}
  {{- end }}
  facade:
    type: websocket
    port: 8080
    handler: runtime
  evals:
    # rag-hero is a PromptKit agent, which self-evaluates lightweight evals
    # inline and is excluded from the out-of-band eval-worker by default. The
    # faithfulness gate is an llm_judge (long-running) eval that only runs in
    # the worker — and only the worker tags omnia_eval_* with the `variant`
    # label the rollout gate keys on. The worker is opted in at the service-
    # group level on the demo Workspace (services[].evalWorker.enabled), so
    # omnia_eval_faithfulness{variant="candidate"} exists for the gate. The
    # default worker groups (long-running/external) run the llm_judge evals.
    enabled: true
  memory:
    enabled: true
    purpose: support_continuity
    retrieval:
      strategy: semantic
      # Keep injected context small: 2 summary references per turn is enough to
      # pick the right doc to fetch_sharepoint, and keeps the agent call (plus
      # the per-turn eval llm_judges) under the gpt-4o deployment's TPM budget.
      limit: 2
      # Governance beat: drop retrieved items from the restricted SharePoint
      # site at retrieval time (defense-in-depth alongside the fetch ToolPolicy).
      accessFilter:
        denyCEL: {{ .Values.sharepointHero.accessFilter.denyCEL | quote }}
    embedding:
      provider: {{ .Values.sharepointHero.embedding.provider }}
      model: {{ .Values.sharepointHero.embedding.model }}
      secretRef:
        name: {{ .Values.sharepointHero.embedding.secretRef }}
  # Rollout. The routing MODE is declared on install so the demo's intent is
  # always visible; the canary itself is idle until shipCandidate=true (candidate
  # nil = idle rollout per the CRD, so install stays stable).
  rollout:
    {{- if .Values.sharepointHero.shipCandidate }}
    # The "ship the change" beat: verbose v2 prompt + pricier candidate model.
    candidate:
      promptPackVersion: "2.0.0"
      providerRefs:
        - name: default
          providerRef:
            name: rag-hero-candidate
    {{- end }}
    steps:
      - setWeight: 20
      - analysis:
          templateName: rag-hero-quality-check
      - setWeight: 100
    rollback:
      mode: automatic
    # Operator-managed Istio ambient mesh routing. With --mesh-enabled on the
    # operator (rollout.meshEnabled=true) + a waypoint enrolled for the
    # omnia-demo namespace, the operator OWNS the VirtualService/DestinationRule
    # for the rag-hero Service and drives the weighted stable/candidate split.
    # Subsets default to stable/canary; hosts default to the agent's own
    # Service DNS (the east-west self-play path used by the Arena loadtest).
    trafficRouting:
      mode: mesh
      mesh: {}
{{- end }}

{{- if .Values.sharepointHero.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sharepoint-adapter
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: sharepoint-adapter
    app.kubernetes.io/part-of: {{ include "omnia-demos.name" . }}
spec:
  replicas: {{ .Values.sharepointHero.adapter.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: sharepoint-adapter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sharepoint-adapter
        app.kubernetes.io/part-of: {{ include "omnia-demos.name" . }}
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: adapter
          image: {{ .Values.sharepointHero.adapter.image }}
          args: ["serve"]
          ports:
            - containerPort: 8080
          env:
            - name: SHAREPOINT_SITE_ID
              value: {{ .Values.sharepointHero.adapter.sharepointSiteId | quote }}
            - name: PORT
              value: "8080"
          envFrom:
            - secretRef:
                name: {{ .Values.sharepointHero.adapter.credentialsSecret }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: sharepoint-adapter
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: sharepoint-adapter
    app.kubernetes.io/part-of: {{ include "omnia-demos.name" . }}
spec:
  selector:
    app.kubernetes.io/name: sharepoint-adapter
  ports:
    - port: 8080
      targetPort: 8080
{{- end }}

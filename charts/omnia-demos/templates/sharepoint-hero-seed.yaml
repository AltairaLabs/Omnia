{{- if .Values.sharepointHero.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: rag-hero-seed
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: {{ include "omnia-demos.name" . }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rag-hero-seed
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: seed
          image: {{ .Values.sharepointHero.adapter.image }}
          args: ["seed"]
          env:
            - name: SHAREPOINT_SITE_ID
              value: {{ .Values.sharepointHero.adapter.sharepointSiteId | quote }}
            - name: MEMORY_API_URL
              value: {{ .Values.sharepointHero.memoryApiUrl | quote }}
            - name: WORKSPACE_ID
              value: {{ .Values.sharepointHero.workspace | quote }}
          envFrom:
            - secretRef:
                name: {{ .Values.sharepointHero.adapter.credentialsSecret }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
{{- end }}

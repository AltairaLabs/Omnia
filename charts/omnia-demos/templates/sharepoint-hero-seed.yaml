{{- if .Values.sharepointHero.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: rag-hero-seed
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: {{ include "omnia-demos.name" . }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rag-hero-seed
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        # distroless:nonroot is UID/GID 65532; the kubelet's runAsNonRoot check
        # rejects the image's named "nonroot" user (non-numeric), so pin it.
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: seed
          image: {{ .Values.sharepointHero.adapter.image }}
          args: ["seed"]
          env:
            - name: SHAREPOINT_SITE_ID
              value: {{ .Values.sharepointHero.adapter.sharepointSiteId | quote }}
            # This is a third-party adapter image with no Kubernetes client, so
            # it cannot resolve its own endpoint. It is one of the two documented
            # exceptions where env injection is the interface rather than a
            # duplicate source of truth — see pkg/servicediscovery/doc.go.
            - name: MEMORY_API_URL
              value: {{ .Values.sharepointHero.memoryApiUrl | quote }}
            - name: WORKSPACE_ID
              value: {{ .Values.sharepointHero.workspace | quote }}
          envFrom:
            - secretRef:
                name: {{ .Values.sharepointHero.adapter.credentialsSecret }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
{{- end }}

{{- if .Values.sharepointHero.enabled }}
# NOTE: the hand-authored DestinationRule/VirtualService (rag-hero-dr /
# rag-hero-vs) were removed when the hero rollout moved to operator-managed
# mesh routing (AgentRuntime spec.rollout.trafficRouting.mode=mesh). The
# operator now OWNS the VS/DR for the rag-hero Service.
{{- if .Values.sharepointHero.meshWaypoint }}
# Waypoint Gateway for the omnia-demo namespace. REQUIRED for the mode=mesh
# weighted split: ztunnel is L4 only, the waypoint does the L7 stable/candidate
# routing across the operator-owned VS/DR. The namespace must also be enrolled
# in ambient (kubectl label namespace omnia-demo istio.io/dataplane-mode=ambient).
# On-cluster validation required: the waypoint <-> CEL policy-proxy interaction
# on the WebSocket path has not yet been smoke-tested on a real ambient cluster.
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: omnia-demo-waypoint
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: {{ include "omnia-demos.name" . }}
    istio.io/waypoint-for: service
spec:
  gatewayClassName: istio-waypoint
  listeners:
    - name: mesh
      port: 15008
      protocol: HBONE
{{- end }}
---
apiVersion: omnia.altairalabs.ai/v1alpha1
kind: RolloutAnalysis
metadata:
  name: rag-hero-quality-check
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: {{ include "omnia-demos.name" . }}
spec:
  metrics:
    - name: candidate-faithfulness
      interval: "30s"
      count: 4
      failureLimit: 2
      successCondition: "result[0] >= 0.8"
      provider:
        prometheus:
          address: {{ .Values.sharepointHero.prometheusUrl | quote }}
          query: |
            avg(omnia_eval_faithfulness{agent="rag-hero", namespace="{{ .Values.namespace }}", variant="candidate"})
{{- end }}

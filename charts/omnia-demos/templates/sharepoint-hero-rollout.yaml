{{- if .Values.sharepointHero.enabled }}
# NOTE: the hand-authored DestinationRule/VirtualService (rag-hero-dr /
# rag-hero-vs) were removed when the hero rollout moved to operator-managed
# mesh routing (AgentRuntime spec.rollout.trafficRouting.mode=mesh). The
# operator now OWNS the VS/DR for the rag-hero Service.
{{- if .Values.sharepointHero.meshWaypoint }}
# Waypoint Gateway for the omnia-demo namespace. REQUIRED for the mode=mesh
# weighted split: ztunnel is L4 only, the waypoint does the L7 stable/candidate
# routing across the operator-owned VS/DR. The namespace is enrolled in ambient
# and bound to this waypoint via spec.namespace.labels in workspace.yaml
# (istio.io/dataplane-mode=ambient + istio.io/use-waypoint=waypoint).
# Named "waypoint" to match the canonical, on-cluster-validated omnia-default
# pattern: a namespace-bound waypoint named "waypoint" programs the L7 route for
# every Service in the namespace (verified live: rag-hero WS routes through the
# waypoint, faithfulness reaches Prometheus, the rollout gate reads it).
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: waypoint
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: {{ include "omnia-demos.name" . }}
    istio.io/waypoint-for: service
spec:
  gatewayClassName: istio-waypoint
  listeners:
    - name: mesh
      port: 15008
      protocol: HBONE
{{- end }}
---
apiVersion: omnia.altairalabs.ai/v1alpha1
kind: RolloutAnalysis
metadata:
  name: rag-hero-quality-check
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: {{ include "omnia-demos.name" . }}
spec:
  metrics:
    - name: candidate-faithfulness
      interval: "30s"
      count: 4
      failureLimit: 2
      successCondition: "result[0] >= 0.8"
      provider:
        prometheus:
          address: {{ .Values.sharepointHero.prometheusUrl | quote }}
          # Windowed mean over NEW observations only, via the omnia_eval_score
          # histogram's _sum/_count counters. A bare gauge (omnia_eval_faithfulness)
          # is last-write-wins and keeps re-scraping its final value, so a new
          # rollout would read the previous run's score before any fresh traffic
          # (#1467). increase(...[2m]) contributes nothing during stale periods,
          # so the gate returns no data and Argo requeues until fresh evals land.
          query: |
            sum(increase(omnia_eval_score_sum{eval_id="faithfulness", agent="rag-hero", namespace="{{ .Values.namespace }}", variant="candidate"}[2m]))
            /
            sum(increase(omnia_eval_score_count{eval_id="faithfulness", agent="rag-hero", namespace="{{ .Values.namespace }}", variant="candidate"}[2m]))
{{- end }}

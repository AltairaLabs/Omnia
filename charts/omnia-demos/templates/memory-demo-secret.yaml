{{- if and .Values.memoryDemo.enabled .Values.memoryDemo.database.createDevSecret }}
---
# Dev-only Postgres connection Secret for the demo memory-api, pointing at a
# DEDICATED omnia_memory_demo database (created by the dev postgres) so the
# demo's 768-dim nomic-embed-text embeddings keep their own embedding column
# dimension, isolated from the shared omnia_memory DB. For non-dev clusters set
# memoryDemo.database.createDevSecret=false and pre-create this Secret.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.memoryDemo.database.memorySecret }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: omnia-demos
    app.kubernetes.io/part-of: {{ include "omnia-demos.name" . }}
type: Opaque
stringData:
  POSTGRES_CONN: {{ .Values.memoryDemo.database.devMemoryConn | quote }}
---
# Dev-only Postgres connection Secret for the demo session-api, pointing at the
# shared omnia_sessions database. Without it session-api crashloops on a missing
# secret, which keeps the workspace's "default" service group from becoming
# ready — and the dashboard's memory proxy returns "Memory API not configured".
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.memoryDemo.database.sessionSecret }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: omnia-demos
    app.kubernetes.io/part-of: {{ include "omnia-demos.name" . }}
type: Opaque
stringData:
  POSTGRES_CONN: {{ .Values.memoryDemo.database.devSessionConn | quote }}
{{- end }}

---
# Workspace CRD for the demo namespace
# This allows the dashboard to discover and display demo agents
apiVersion: omnia.altairalabs.ai/v1alpha1
kind: Workspace
metadata:
  name: demo
  labels:
    app.kubernetes.io/name: omnia-demos
    app.kubernetes.io/part-of: {{ include "omnia-demos.name" . }}
spec:
  displayName: Demo Workspace
  description: Demo workspace for Omnia agents showcasing vision, audio, and tool capabilities
  environment: development
  namespace:
    name: {{ .Values.namespace }}
    create: false
  roleBindings: []
  {{- if .Values.workspace.anonymousAccess.enabled }}
  # Anonymous access configuration
  # WARNING: Granting editor/owner to anonymous users allows unauthenticated write access
  anonymousAccess:
    enabled: true
    role: {{ .Values.workspace.anonymousAccess.role }}
  {{- end }}
  # Workspace storage for Arena content
  storage:
    enabled: true
    size: 5Gi
    accessModes:
      - ReadWriteMany
    {{- if .Values.workspace.storage.storageClass }}
    storageClass: {{ .Values.workspace.storage.storageClass }}
    {{- end }}
  {{- if .Values.sharepointHero.enabled }}
  # Managed memory-api + session-api for the SharePoint RAG hero demo. The
  # database secretRefs name pre-created Secrets (key POSTGRES_CONN) that must
  # exist in this namespace. memory.providerRef binds the embedding Provider
  # (rag-hero-embeddings) so semantic retrieval is configured; with
  # azure.enabled the memory-api pod runs as the workload-identity SA for
  # keyless Azure OpenAI embeddings.
  services:
    - name: default
      mode: managed
      # Opt this service group into the out-of-band eval-worker. rag-hero is a
      # PromptKit agent (excluded from the worker by default); the worker is the
      # only path that runs its llm_judge faithfulness eval AND tags
      # omnia_eval_* with the `variant` label the rollout gate keys on.
      evalWorker:
        enabled: true
        {{- if .Values.sharepointHero.azure.enabled }}
        # The faithfulness/answer_relevance llm_judges call the keyless Azure
        # OpenAI judge provider, so the worker pod runs as the workload-identity
        # SA (the operator binds the eval-worker RBAC to it). Without this the
        # judge can't mint a token and every score is 0.
        podOverrides:
          serviceAccountName: {{ .Values.sharepointHero.azure.workloadIdentity.serviceAccountName }}
          labels:
            azure.workload.identity/use: "true"
        {{- end }}
      session:
        database:
          secretRef:
            name: {{ .Values.sharepointHero.database.sessionSecret }}
      memory:
        database:
          secretRef:
            name: {{ .Values.sharepointHero.database.memorySecret }}
        providerRef:
          name: rag-hero-embeddings
        # Index documents as a condensed summary per doc (not a RAG-chunked
        # copy of the corpus). memory-api reads this MemoryPolicy live via the
        # PolicyLoader at ingest time, so retrieval surfaces a lean reference
        # the agent then resolves through fetch_sharepoint — and prompts stay
        # small enough to fit the gpt-4o deployment's token-per-minute budget.
        policyRef:
          name: rag-hero-memory
        {{- if .Values.sharepointHero.azure.enabled }}
        podOverrides:
          serviceAccountName: {{ .Values.sharepointHero.azure.workloadIdentity.serviceAccountName }}
          labels:
            azure.workload.identity/use: "true"
        {{- end }}
  {{- else if .Values.memoryDemo.enabled }}
  # Managed memory-api + session-api for the memory-API dev demo. The memory
  # service binds the ollama embedding Provider (memory-demo-embeddings) for
  # semantic retrieval and the demo MemoryPolicy (memory-demo-memory), and runs
  # memory-api with ENTERPRISE_ENABLED so the privacy enforcement-stats endpoint
  # is exposed (the PII-blocked / redaction surfaces). Mutually exclusive with
  # sharepointHero above (one hero demo owns the demo Workspace's memory service).
  services:
    - name: default
      mode: managed
      session:
        database:
          secretRef:
            name: {{ .Values.memoryDemo.database.sessionSecret }}
      memory:
        database:
          secretRef:
            name: {{ .Values.memoryDemo.database.memorySecret }}
        providerRef:
          name: memory-demo-embeddings
        policyRef:
          name: memory-demo-memory
        podOverrides:
          extraEnv:
            - name: ENTERPRISE_ENABLED
              value: "true"
  {{- end }}
{{- if .Values.sharepointHero.enabled }}
---
# Ingest each SharePoint document as ONE condensed summary item, not a
# RAG-chunked copy of the full corpus. memory-api reads spec.ingestion live via
# the PolicyLoader at /institutional/ingest time. This keeps Postgres a lean
# reference index (the agent resolves real content through fetch_sharepoint) and
# keeps retrieved context small — full-corpus chunks made a single agent turn
# ~6k tokens, and with the eval llm_judges + tool rounds stacked per turn that
# blew the gpt-4o deployment's 30k token-per-minute budget (429s). Cluster-scoped
# CRD; tiers is required, so institutional retention is pinned to Manual.
apiVersion: omnia.altairalabs.ai/v1alpha1
kind: MemoryPolicy
metadata:
  name: rag-hero-memory
  labels:
    app.kubernetes.io/part-of: {{ include "omnia-demos.name" . }}
spec:
  tiers:
    institutional:
      mode: Manual
  ingestion:
    strategy: summary
    summarizer: extractive
{{- end }}

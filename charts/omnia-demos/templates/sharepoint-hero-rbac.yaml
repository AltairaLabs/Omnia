{{- if and .Values.sharepointHero.enabled .Values.sharepointHero.azure.enabled }}
{{- $az := .Values.sharepointHero.azure }}
# Azure AD Workload Identity ServiceAccount for the hero demo. Bound to the
# runtime managed identity (federated out-of-band — see SHAREPOINT_HERO.md) and
# adopted by the rag-hero agent pod + the workspace memory-api pod via
# podOverrides, so both authenticate to Azure OpenAI without an API key.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $az.workloadIdentity.serviceAccountName }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: {{ include "omnia-demos.name" . }}
  annotations:
    azure.workload.identity/client-id: {{ $az.workloadIdentity.clientId | quote }}
    azure.workload.identity/tenant-id: {{ $az.workloadIdentity.tenantId | quote }}
---
# Overriding the pod ServiceAccount drops the operator-provisioned per-agent
# binding, so re-grant the CRD + Secret reads the facade/runtime/memory-api need.
#
# No manual Workspace-reader re-grant is needed here: the operator's
# workspace-reader ClusterRoleBinding reconcile targets the EFFECTIVE pod SA
# (podOverrides / workspace runtime-default, resolved via
# effectiveFacadeServiceAccountName, #1817), so it already binds this WI SA to
# the per-workspace get-only Workspace reader ClusterRole. The facade also
# resolves its own workspace by name via a scoped Get, not a cluster-wide List
# (#1875/#1902), so nothing here needs to re-grant that read.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $az.workloadIdentity.serviceAccountName }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: {{ include "omnia-demos.name" . }}
rules:
  # toolpolicies (EE): the policy-broker sidecar in the agent pod lists/watches
  # ToolPolicies; without this its initial load fails and enforcement silently
  # degrades. toolregistries/providers/agentruntimes drive runtime config.
  - apiGroups: ["omnia.altairalabs.ai"]
    resources: ["agentruntimes", "providers", "toolregistries", "toolpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["omnia.altairalabs.ai"]
    resources: ["agentruntimes/status"]
    verbs: ["get", "patch"]
  - apiGroups: [""]
    resources: ["secrets", "namespaces"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $az.workloadIdentity.serviceAccountName }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: {{ include "omnia-demos.name" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $az.workloadIdentity.serviceAccountName }}
subjects:
  - kind: ServiceAccount
    name: {{ $az.workloadIdentity.serviceAccountName }}
    namespace: {{ .Values.namespace }}
---
# MemoryPolicy is cluster-scoped. The managed memory-api runs as this WI SA
# (podOverrides on the Workspace memory service) and reads the workspace's
# MemoryPolicy live via the PolicyLoader at ingest time to pick the ingestion
# strategy (summary vs chunk). Overriding the pod SA drops the operator's
# memory-api bindings, so without this the loader fails closed and silently
# falls back to chunk — re-grant cluster-scoped read here.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.namespace }}-{{ $az.workloadIdentity.serviceAccountName }}-memorypolicy-reader
  labels:
    app.kubernetes.io/part-of: {{ include "omnia-demos.name" . }}
rules:
  - apiGroups: ["omnia.altairalabs.ai"]
    resources: ["memorypolicies"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.namespace }}-{{ $az.workloadIdentity.serviceAccountName }}-memorypolicy-reader
  labels:
    app.kubernetes.io/part-of: {{ include "omnia-demos.name" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Values.namespace }}-{{ $az.workloadIdentity.serviceAccountName }}-memorypolicy-reader
subjects:
  - kind: ServiceAccount
    name: {{ $az.workloadIdentity.serviceAccountName }}
    namespace: {{ .Values.namespace }}
{{- end }}

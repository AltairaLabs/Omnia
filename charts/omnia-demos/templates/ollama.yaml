{{- /*
One dedicated Ollama instance per model (.Values.ollama.instances). Serving
multiple models from a single instance thrashes (Ollama unloads/reloads on model
switch) and can OOM a small node, so the demo runs one model per instance. A soft
podAntiAffinity prefers spreading instances one-per-node. Scheduling stays
deployment-agnostic: .Values.ollama.nodeSelector / .Values.ollama.tolerations are
empty by default; a deployment with a dedicated Ollama pool sets them at install
time to pin instances there.
*/ -}}
{{- $ns := .Values.namespace -}}
{{- $img := printf "%s:%s" .Values.ollama.image.repository .Values.ollama.image.tag -}}
{{- range $inst := .Values.ollama.instances }}
---
{{- if $.Values.ollama.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-{{ $inst.name }}-models
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: ollama-{{ $inst.name }}
    app.kubernetes.io/part-of: {{ include "omnia-demos.name" $ }}
  annotations:
    "helm.sh/resource-policy": keep
spec:
  accessModes: ["ReadWriteOnce"]
  {{- with $.Values.ollama.persistence.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
  resources:
    requests:
      storage: {{ $inst.storage | default "12Gi" }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-{{ $inst.name }}
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: ollama-{{ $inst.name }}
    app.kubernetes.io/part-of: {{ include "omnia-demos.name" $ }}
    ollama-instance: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: ollama-{{ $inst.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ollama-{{ $inst.name }}
        app.kubernetes.io/part-of: {{ include "omnia-demos.name" $ }}
        ollama-instance: "true"
    spec:
      {{- with $.Values.ollama.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.ollama.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Prefer to spread instances one-per-node so each model owns its node's
      # RAM. Soft (preferred) so single-node clusters (local kind) still
      # schedule every instance; a multi-node pool gets the spread.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    ollama-instance: "true"
                topologyKey: kubernetes.io/hostname
      initContainers:
        # Pull this instance's single model into the cache volume before serving.
        - name: pull-model
          image: {{ $img }}
          imagePullPolicy: {{ $.Values.ollama.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              ollama serve & PID=$!
              for i in $(seq 1 30); do ollama list >/dev/null 2>&1 && break; sleep 1; done
              MODEL="{{ $inst.model }}"
              PATTERN=$(echo "$MODEL" | sed 's/:/ /')
              ollama list | grep -q "$PATTERN" || ollama pull "$MODEL"
              kill $PID 2>/dev/null || true; wait $PID 2>/dev/null || true
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
      containers:
        - name: ollama
          image: {{ $img }}
          imagePullPolicy: {{ $.Values.ollama.image.pullPolicy }}
          ports:
            - containerPort: 11434
              name: http
          env:
            - name: OLLAMA_KEEP_ALIVE
              value: {{ $.Values.ollama.keepAlive | quote }}
            - name: OLLAMA_NUM_CTX
              value: {{ $inst.numCtx | default $.Values.ollama.contextWindow | quote }}
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
          # Warm the model on start so the first real request doesn't cold-load.
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    for i in $(seq 1 60); do
                      curl -sf http://localhost:11434/ >/dev/null 2>&1 && break
                      sleep 1
                    done
                    curl -sf http://localhost:11434/api/generate \
                      -d '{"model":"{{ $inst.model }}","prompt":"hi","stream":false,"options":{"num_predict":1}}' \
                      >/dev/null 2>&1 || true
          resources:
            {{- toYaml $inst.resources | nindent 12 }}
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          startupProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: models
          {{- if $.Values.ollama.persistence.enabled }}
          persistentVolumeClaim:
            claimName: ollama-{{ $inst.name }}-models
          {{- else }}
          emptyDir: {}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-{{ $inst.name }}
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: ollama-{{ $inst.name }}
    app.kubernetes.io/part-of: {{ include "omnia-demos.name" $ }}
spec:
  selector:
    app.kubernetes.io/name: ollama-{{ $inst.name }}
  ports:
    - port: 11434
      targetPort: http
      name: http
  type: ClusterIP
{{- end }}

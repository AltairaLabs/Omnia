---
# Dummy secret for Ollama (Ollama doesn't require an API key)
apiVersion: v1
kind: Secret
metadata:
  name: ollama-credentials
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: omnia-demos
    app.kubernetes.io/part-of: {{ include "omnia-demos.name" . }}
type: Opaque
stringData:
  # Ollama doesn't require an API key, but Provider requires a secretRef
  api-key: "ollama-local"
---
# Provider configuration for Ollama
apiVersion: omnia.altairalabs.ai/v1alpha1
kind: Provider
metadata:
  name: ollama
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: omnia-demos
    app.kubernetes.io/part-of: {{ include "omnia-demos.name" . }}
spec:
  type: ollama
  model: {{ .Values.ollama.model }}
  baseURL: http://ollama.{{ .Values.namespace }}:11434
  secretRef:
    name: ollama-credentials
  defaults:
    temperature: "0.7"
    # Context window budget - should match or be less than numCtx
    contextWindow: {{ .Values.ollama.contextWindow }}
    truncationStrategy: sliding
---
# ConfigMap for the demo PromptPack (vision-capable)
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-vision-prompts
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: omnia-demos
    app.kubernetes.io/part-of: {{ include "omnia-demos.name" . }}
data:
  pack.json: |
    {
      "$schema": "https://promptpack.org/schema/latest/promptpack.schema.json",
      "id": "demo-vision-prompts",
      "name": "Demo Vision Prompts",
      "version": "1.0.0",
      "template_engine": {
        "version": "v1",
        "syntax": "{{"{{variable}}"}}"
      },
      "prompts": {
        "default": {
          "id": "default",
          "name": "Vision Assistant",
          "version": "1.0.0",
          "system_template": {{ .Values.promptPack.systemPrompt | toJson }},
          "parameters": {
            "temperature": 0.7
          },
          "evals": [
            {
              "id": "vision-max-length",
              "type": "max_length",
              "trigger": "every_turn",
              "description": "Vision responses should stay concise",
              "params": {
                "max_characters": 2000
              },
              "metric": {
                "name": "vision_max_length",
                "type": "boolean"
              }
            },
            {
              "id": "vision-min-length",
              "type": "min_length",
              "trigger": "every_turn",
              "description": "Vision responses should provide meaningful detail",
              "params": {
                "min_characters": 20
              },
              "metric": {
                "name": "vision_min_length",
                "type": "boolean"
              }
            }
          ]
        }
      },
      "evals": [
        {
          "id": "vision-no-hallucinated-urls",
          "type": "regex",
          "trigger": "every_turn",
          "description": "Vision model should not fabricate URLs",
          "params": {
            "pattern": "https?://[a-zA-Z0-9.-]+\\.[a-z]{2,}",
            "expect_match": false
          },
          "metric": {
            "name": "vision_no_hallucinated_urls",
            "type": "boolean"
          }
        },
        {
          "id": "vision-helpfulness",
          "type": "llm_judge",
          "trigger": "on_session_complete",
          "description": "Judge overall quality of vision analysis",
          "params": {
            "judge_prompt": "Rate the assistant's image analysis. Was it accurate, detailed, and helpful? Score 1-5.",
            "passing_score": 3
          },
          "metric": {
            "name": "vision_helpfulness",
            "type": "gauge",
            "range": { "min": 0, "max": 1 }
          }
        }
      ]
    }
---
# PromptPack for the demo agent
apiVersion: omnia.altairalabs.ai/v1alpha1
kind: PromptPack
metadata:
  name: demo-vision-prompts
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: omnia-demos
    app.kubernetes.io/part-of: {{ include "omnia-demos.name" . }}
spec:
  source:
    type: configmap
    configMapRef:
      name: demo-vision-prompts
  version: "1.0.0"
  rollout:
    type: immediate
---
# Demo AgentRuntime using Ollama with vision capabilities
apiVersion: omnia.altairalabs.ai/v1alpha1
kind: AgentRuntime
metadata:
  name: {{ .Values.agent.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: omnia-demos
    app.kubernetes.io/part-of: {{ include "omnia-demos.name" . }}
    omnia.altairalabs.ai/workspace: demo
spec:
  promptPackRef:
    name: demo-vision-prompts
  providerRef:
    name: ollama
  evals:
    enabled: true
  facade:
    type: websocket
    port: 8080
    handler: {{ .Values.agent.handler }}
    extraEnv:
      - name: LOG_LEVEL
        value: debug
  session:
    type: memory
    ttl: "1h"
  runtime:
    replicas: {{ .Values.agent.replicas }}
    extraEnv:
      - name: LOG_LEVEL
        value: debug
    resources:
      {{- toYaml .Values.agent.resources | nindent 6 }}
  {{- with .Values.agent.console }}
  console:
    maxFileSize: {{ .maxFileSize | int64 }}
    maxFiles: {{ .maxFiles }}
    allowedAttachmentTypes:
      {{- toYaml .allowedAttachmentTypes | nindent 6 }}
    {{- with .mediaRequirements }}
    mediaRequirements:
      image:
        maxDimensions:
          width: {{ .image.maxWidth }}
          height: {{ .image.maxHeight }}
        recommendedDimensions:
          width: {{ .image.recommendedWidth }}
          height: {{ .image.recommendedHeight }}
        maxSizeBytes: {{ .image.maxSizeBytes | int64 }}
        preferredFormat: {{ .image.preferredFormat | quote }}
        compressionGuidance: {{ .image.compressionGuidance | quote }}
    {{- end }}
  {{- end }}
{{- /* ============================================================================ */ -}}

---
# Provider configuration for llama3.2 (tool-capable)
apiVersion: omnia.altairalabs.ai/v1alpha1
kind: Provider
metadata:
  name: ollama-tools
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: omnia-tools-demo
    app.kubernetes.io/part-of: {{ include "omnia-demos.name" . }}
spec:
  type: ollama
  model: llama3.2:3b
  baseURL: http://ollama.{{ .Values.namespace }}:11434
  secretRef:
    name: ollama-credentials
  defaults:
    temperature: "0.7"
    contextWindow: {{ .Values.ollama.contextWindow }}
    truncationStrategy: sliding
---
# ConfigMap for the tools demo PromptPack
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-tools-prompts
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: omnia-tools-demo
    app.kubernetes.io/part-of: {{ include "omnia-demos.name" . }}
data:
  pack.json: |
    {
      "$schema": "https://promptpack.org/schema/latest/promptpack.schema.json",
      "id": "demo-tools-prompts",
      "name": "Demo Tools Prompts",
      "version": "1.1.0",
      "template_engine": {
        "version": "v1",
        "syntax": "{{"{{variable}}"}}"
      },
      "prompts": {
        "default": {
          "id": "default",
          "name": "Tools Assistant",
          "version": "1.1.0",
          "system_template": {{ .Values.toolsDemo.promptPack.systemPrompt | toJson }},
          "tools": ["search_places", "get_weather", "calculate", "get_user_location"],
          "parameters": {
            "temperature": 0.7
          },
          "validators": [
            {
              "type": "max_length",
              "enabled": true,
              "fail_on_violation": false,
              "params": {
                "max_characters": 2000
              }
            }
          ],
          "evals": [
            {
              "id": "response-conciseness",
              "type": "regex",
              "trigger": "every_turn",
              "description": "Ensures responses stay concise by flagging excessively long output (over 1000 chars)",
              "params": {
                "pattern": "(?s).{1000,}",
                "expect_match": false
              },
              "metric": {
                "name": "response_conciseness",
                "type": "boolean"
              }
            },
            {
              "id": "no-hallucinated-urls",
              "type": "regex",
              "trigger": "every_turn",
              "description": "Flags responses containing URLs — the model should not fabricate links",
              "params": {
                "pattern": "https?://[a-zA-Z0-9.-]+\\.[a-z]{2,}",
                "expect_match": false
              },
              "metric": {
                "name": "no_hallucinated_urls",
                "type": "boolean"
              }
            },
            {
              "id": "tool-explanation",
              "type": "contains",
              "trigger": "every_turn",
              "description": "Checks the assistant explains what it is doing when using tools",
              "params": {
                "patterns": ["result", "weather"]
              },
              "metric": {
                "name": "tool_explanation",
                "type": "boolean"
              }
            },
            {
              "id": "tools-min-length",
              "type": "min_length",
              "trigger": "every_turn",
              "description": "Tool responses should provide meaningful content",
              "params": {
                "min_characters": 15
              },
              "metric": {
                "name": "tools_min_length",
                "type": "boolean"
              }
            },
            {
              "id": "tools-called",
              "type": "tools_called",
              "trigger": "on_session_complete",
              "description": "Agent should use available tools during the session",
              "params": {
                "tool_names": ["search_places", "get_weather", "calculate"]
              },
              "metric": {
                "name": "tools_called",
                "type": "boolean"
              }
            },
            {
              "id": "tool-chain-weather",
              "type": "tool_call_chain",
              "trigger": "on_session_complete",
              "description": "Agent should search places before getting weather",
              "params": {
                "chain": ["search_places", "get_weather"]
              },
              "metric": {
                "name": "tool_chain_weather",
                "type": "boolean"
              }
            },
            {
              "id": "no-tool-errors",
              "type": "no_tool_errors",
              "trigger": "on_session_complete",
              "description": "All tool calls should complete without errors",
              "params": {},
              "metric": {
                "name": "no_tool_errors",
                "type": "boolean"
              }
            },
            {
              "id": "tool-efficiency",
              "type": "tool_efficiency",
              "trigger": "on_session_complete",
              "description": "Agent should not make excessive or failing tool calls",
              "params": {
                "max_calls": 10,
                "max_error_rate": 0.2
              },
              "metric": {
                "name": "tool_efficiency",
                "type": "boolean"
              }
            }
          ]
        }
      },

      "tools": {
        "search_places": {
          "name": "search_places",
          "description": "Search for a place by name to get its coordinates. Returns latitude, longitude, country, and timezone.",
          "parameters": {
            "type": "object",
            "properties": {
              "name": {
                "type": "string",
                "description": "City or place name to search for"
              }
            },
            "required": ["name"]
          }
        },
        "get_weather": {
          "name": "get_weather",
          "description": "Get current weather for given coordinates. Requires latitude and longitude (use search_places first to get coordinates).",
          "parameters": {
            "type": "object",
            "properties": {
              "latitude": {
                "type": "number",
                "description": "Latitude of the location"
              },
              "longitude": {
                "type": "number",
                "description": "Longitude of the location"
              },
              "current": {
                "type": "string",
                "description": "Comma-separated weather variables: temperature_2m,wind_speed_10m,relative_humidity_2m,weather_code"
              }
            },
            "required": ["latitude", "longitude"]
          }
        },
        "calculate": {
          "name": "calculate",
          "description": "Evaluate a mathematical expression (e.g. \"2 * (3 + 4)\", \"sqrt(16)\", \"sin(pi/2)\")",
          "parameters": {
            "type": "object",
            "properties": {
              "expr": {
                "type": "string",
                "description": "Mathematical expression to evaluate"
              }
            },
            "required": ["expr"]
          }
        },
        "get_user_location": {
          "name": "get_user_location",
          "description": "Get the user's current location from their device. Use this when the user asks about weather, restaurants, or services near them without specifying a city.",
          "parameters": {
            "type": "object",
            "properties": {
              "accuracy": {
                "type": "string",
                "enum": ["high", "low"],
                "description": "GPS accuracy level — high for precise, low for approximate"
              }
            }
          }
        }
      },

      "evals": [
        {
          "id": "session-helpfulness",
          "type": "llm_judge",
          "trigger": "on_session_complete",
          "sample_percentage": 25,
          "description": "Judges overall session helpfulness and appropriate tool usage",
          "params": {
            "judge_prompt": "Review the full conversation. Did the assistant use available tools effectively and provide helpful, accurate responses? Score 1-5.",
            "passing_score": 3
          },
          "metric": {
            "name": "session_helpfulness",
            "type": "gauge",
            "range": { "min": 0, "max": 1 }
          }
        }
      ]
    }
---
# PromptPack for the tools demo agent
apiVersion: omnia.altairalabs.ai/v1alpha1
kind: PromptPack
metadata:
  name: demo-tools-prompts
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: omnia-tools-demo
    app.kubernetes.io/part-of: {{ include "omnia-demos.name" . }}
spec:
  source:
    type: configmap
    configMapRef:
      name: demo-tools-prompts
  version: "1.0.0"
  rollout:
    type: immediate
---
# ToolRegistry for tools demo agents
apiVersion: omnia.altairalabs.ai/v1alpha1
kind: ToolRegistry
metadata:
  name: demo-tools
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: omnia-tools-demo
    app.kubernetes.io/part-of: {{ include "omnia-demos.name" . }}
spec:
  handlers:
    - name: search-places
      type: http
      timeout: 10s
      httpConfig:
        endpoint: https://geocoding-api.open-meteo.com/v1/search
        method: GET
      tool:
        name: search_places
        description: Search for a place by name to get its coordinates. Returns latitude, longitude, country, and timezone.
        inputSchema:
          type: object
          properties:
            name:
              type: string
              description: City or place name to search for
          required:
            - name
        outputSchema:
          type: object
          properties:
            results:
              type: array
              description: List of matching places
              items:
                type: object
                properties:
                  name:
                    type: string
                    description: Place name
                  latitude:
                    type: number
                    description: Latitude coordinate
                  longitude:
                    type: number
                    description: Longitude coordinate
                  country:
                    type: string
                    description: Country name
                  timezone:
                    type: string
                    description: Timezone identifier
                  country_code:
                    type: string
                    description: Two-letter country code
                  population:
                    type: integer
                    description: Population count
    - name: weather
      type: http
      timeout: 10s
      httpConfig:
        endpoint: https://api.open-meteo.com/v1/forecast
        method: GET
      tool:
        name: get_weather
        description: Get current weather for given coordinates. Requires latitude and longitude (use search_places first to get coordinates).
        inputSchema:
          type: object
          properties:
            latitude:
              type: number
              description: Latitude of the location
            longitude:
              type: number
              description: Longitude of the location
            current:
              type: string
              description: "Comma-separated weather variables: temperature_2m,wind_speed_10m,relative_humidity_2m,weather_code"
          required:
            - latitude
            - longitude
        outputSchema:
          type: object
          properties:
            latitude:
              type: number
            longitude:
              type: number
            current:
              type: object
              description: Current weather measurements
              properties:
                time:
                  type: string
                  description: ISO 8601 timestamp
                temperature_2m:
                  type: number
                  description: Temperature at 2m height
                wind_speed_10m:
                  type: number
                  description: Wind speed at 10m height
                relative_humidity_2m:
                  type: number
                  description: Relative humidity percentage
                weather_code:
                  type: integer
                  description: WMO weather code (0=clear, 1-3=cloudy, 51-55=drizzle, 61-65=rain, 71-75=snow, 95-99=thunderstorm)
            current_units:
              type: object
              description: Units for each weather variable
    - name: calculator
      type: http
      timeout: 5s
      httpConfig:
        endpoint: https://api.mathjs.org/v4/
        method: GET
      tool:
        name: calculate
        description: Evaluate a mathematical expression (e.g. "2 * (3 + 4)", "sqrt(16)", "sin(pi/2)")
        inputSchema:
          type: object
          properties:
            expr:
              type: string
              description: Mathematical expression to evaluate
          required:
            - expr
        outputSchema:
          type: string
          description: The computed result as a string (e.g. "14", "4", "1")
    - name: user-location
      type: client
      clientConfig:
        consentMessage: "This agent wants to access your location to provide local results."
        categories:
          - location
      tool:
        name: get_user_location
        description: Get the user's current location from their device. Use this when the user asks about weather, restaurants, or services near them without specifying a city.
        inputSchema:
          type: object
          properties:
            accuracy:
              type: string
              enum: ["high", "low"]
              description: GPS accuracy level — high for precise, low for approximate
---
# Tools Demo AgentRuntime using llama3.2 with tool capabilities
apiVersion: omnia.altairalabs.ai/v1alpha1
kind: AgentRuntime
metadata:
  name: {{ .Values.toolsDemo.agent.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: omnia-tools-demo
    app.kubernetes.io/part-of: {{ include "omnia-demos.name" . }}
    omnia.altairalabs.ai/workspace: demo
spec:
  promptPackRef:
    name: demo-tools-prompts
  providerRef:
    name: ollama-tools
  toolRegistryRef:
    name: demo-tools
  evals:
    enabled: true
  facade:
    type: websocket
    port: 8080
    handler: {{ .Values.toolsDemo.agent.handler }}
    extraEnv:
      - name: LOG_LEVEL
        value: debug
  session:
    type: memory
    ttl: "1h"
  runtime:
    replicas: {{ .Values.toolsDemo.agent.replicas }}
    extraEnv:
      - name: LOG_LEVEL
        value: debug
    resources:
      {{- toYaml .Values.toolsDemo.agent.resources | nindent 6 }}
{{- end }}
{{- /* ============================================================================ */ -}}
{{- /* LangChain Demo Resources */ -}}
{{- /* Mirrors vision-demo and tools-demo using LangChain framework */ -}}
{{- /* ============================================================================ */ -}}
{{- if .Values.langchainDemo.enabled }}
---
# LangChain Vision Demo AgentRuntime
# Uses the same PromptPack and Provider as vision-demo, but with LangChain framework
apiVersion: omnia.altairalabs.ai/v1alpha1
kind: AgentRuntime
metadata:
  name: {{ .Values.langchainDemo.visionAgent.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: omnia-langchain-demo
    app.kubernetes.io/part-of: {{ include "omnia-demos.name" . }}
    omnia.altairalabs.ai/workspace: demo
spec:
  # Use LangChain framework instead of PromptKit
  framework:
    type: langchain
    {{- with .Values.langchainDemo.image }}
    image: "{{ .repository }}:{{ .tag }}"
    {{- end }}
  promptPackRef:
    name: demo-vision-prompts
  providerRef:
    name: ollama
  facade:
    type: websocket
    port: 8080
    handler: runtime
  session:
    type: memory
    ttl: "1h"
  runtime:
    replicas: {{ .Values.langchainDemo.visionAgent.replicas }}
    extraEnv:
      - name: LOG_LEVEL
        value: debug
    resources:
      {{- toYaml .Values.langchainDemo.visionAgent.resources | nindent 6 }}
  {{- with .Values.agent.console }}
  console:
    maxFileSize: {{ .maxFileSize | int64 }}
    maxFiles: {{ .maxFiles }}
    allowedAttachmentTypes:
      {{- toYaml .allowedAttachmentTypes | nindent 6 }}
    {{- with .mediaRequirements }}
    mediaRequirements:
      image:
        maxDimensions:
          width: {{ .image.maxWidth }}
          height: {{ .image.maxHeight }}
        recommendedDimensions:
          width: {{ .image.recommendedWidth }}
          height: {{ .image.recommendedHeight }}
        maxSizeBytes: {{ .image.maxSizeBytes | int64 }}
        preferredFormat: {{ .image.preferredFormat | quote }}
        compressionGuidance: {{ .image.compressionGuidance | quote }}
    {{- end }}
  {{- end }}
---
# LangChain Tools Demo AgentRuntime
# Uses the same PromptPack and Provider as tools-demo, but with LangChain framework
apiVersion: omnia.altairalabs.ai/v1alpha1
kind: AgentRuntime
metadata:
  name: {{ .Values.langchainDemo.toolsAgent.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: omnia-langchain-demo
    app.kubernetes.io/part-of: {{ include "omnia-demos.name" . }}
    omnia.altairalabs.ai/workspace: demo
spec:
  # Use LangChain framework instead of PromptKit
  framework:
    type: langchain
    {{- with .Values.langchainDemo.image }}
    image: "{{ .repository }}:{{ .tag }}"
    {{- end }}
  promptPackRef:
    name: demo-tools-prompts
  providerRef:
    name: ollama-tools
  toolRegistryRef:
    name: demo-tools
  facade:
    type: websocket
    port: 8080
    handler: runtime
  session:
    type: memory
    ttl: "1h"
  runtime:
    replicas: {{ .Values.langchainDemo.toolsAgent.replicas }}
    extraEnv:
      - name: LOG_LEVEL
        value: debug
    resources:
      {{- toYaml .Values.langchainDemo.toolsAgent.resources | nindent 6 }}
{{- end }}

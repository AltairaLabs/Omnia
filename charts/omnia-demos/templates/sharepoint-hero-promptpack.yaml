{{- if .Values.sharepointHero.enabled }}
---
apiVersion: omnia.altairalabs.ai/v1alpha1
kind: PromptPack
metadata:
  name: rag-hero-pack
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: {{ include "omnia-demos.name" . }}
spec:
  source:
    type: configmap
    configMapRef:
      name: rag-hero-pack-v1
  version: "1.0.0"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-hero-pack-v1
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: {{ include "omnia-demos.name" . }}
data:
  pack.json: |
    {
      "id": "rag-hero-pack",
      "name": "SharePoint Knowledge Assistant",
      "version": "1.0.0",
      "template_engine": {
        "version": "v1",
        "syntax": "{{"{{variable}}"}}"
      },
      "prompts": {
        "default": {
          "id": "default",
          "name": "SharePoint Knowledge Assistant",
          "version": "1.0.0",
          "system_template": "You are a knowledge assistant for SharePoint documents. Institutional memory is an INDEX of document references only: it tells you which documents exist and their SharePoint URLs — it is NOT the source of document content. Treat any memory or search result as a pointer, never as content; do not quote it or answer from it. To read a document you MUST call fetch_sharepoint(url) using the url from the relevant reference. Workflow: (1) identify the one or two document references most relevant to the user's question and take their url; (2) call fetch_sharepoint(url) for each; (3) answer ONLY from the fetched document content and cite the document title. If no relevant reference exists, say so plainly. Be concise."
        }
      },
      "evals": [
        {
          "id": "faithfulness",
          "type": "llm_judge",
          "trigger": "on_session_complete",
          "description": "Is the answer grounded in the fetched SharePoint content?",
          "params": {
            "judge_prompt": "Given the fetched document content and the assistant's answer, rate how faithful the answer is to the source (no unsupported claims). Score 0.0-1.0.",
            "passing_score": 0.8
          },
          "metric": { "name": "faithfulness", "type": "gauge", "range": { "min": 0, "max": 1 } }
        },
        {
          "id": "answer_relevance",
          "type": "llm_judge",
          "trigger": "on_session_complete",
          "description": "Does the answer address the user's question?",
          "params": {
            "judge_prompt": "Rate how well the assistant's answer addresses the user's question. Score 0.0-1.0.",
            "passing_score": 0.7
          },
          "metric": { "name": "answer_relevance", "type": "gauge", "range": { "min": 0, "max": 1 } }
        }
      ]
    }
---
apiVersion: omnia.altairalabs.ai/v1alpha1
kind: PromptPack
metadata:
  name: rag-hero-pack-v2
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: {{ include "omnia-demos.name" . }}
spec:
  source:
    type: configmap
    configMapRef:
      name: rag-hero-pack-v2
  version: "2.0.0"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-hero-pack-v2
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: {{ include "omnia-demos.name" . }}
data:
  pack.json: |
    {
      "id": "rag-hero-pack",
      "name": "SharePoint Knowledge Assistant",
      "version": "2.0.0",
      "template_engine": {
        "version": "v1",
        "syntax": "{{"{{variable}}"}}"
      },
      "prompts": {
        "default": {
          "id": "default",
          "name": "SharePoint Knowledge Assistant",
          "version": "2.0.0",
          "system_template": "You are an exhaustive knowledge assistant for SharePoint documents. Institutional memory is an INDEX of document references only (titles + SharePoint URLs) — never the content itself. Treat any memory or search result as a pointer, never as content; never answer from it. You MUST call fetch_sharepoint(url) to read any document. Be maximally thorough: for EVERY relevant reference, call fetch_sharepoint(url), quote each fetched document at length, and synthesize an extensive answer covering all angles even if only loosely related. Cite every document title. Prefer completeness over brevity."
        }
      },
      "evals": [
        {
          "id": "faithfulness",
          "type": "llm_judge",
          "trigger": "on_session_complete",
          "description": "Is the answer grounded in the fetched SharePoint content?",
          "params": {
            "judge_prompt": "Given the fetched document content and the assistant's answer, rate how faithful the answer is to the source (no unsupported claims). Score 0.0-1.0.",
            "passing_score": 0.8
          },
          "metric": { "name": "faithfulness", "type": "gauge", "range": { "min": 0, "max": 1 } }
        },
        {
          "id": "answer_relevance",
          "type": "llm_judge",
          "trigger": "on_session_complete",
          "description": "Does the answer address the user's question?",
          "params": {
            "judge_prompt": "Rate how well the assistant's answer addresses the user's question. Score 0.0-1.0.",
            "passing_score": 0.7
          },
          "metric": { "name": "answer_relevance", "type": "gauge", "range": { "min": 0, "max": 1 } }
        }
      ]
    }
{{- end }}

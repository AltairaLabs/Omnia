{{- if and .Values.demoWorkspace.enabled .Values.demoWorkspace.createDevSecret (not .Values.sharepointHero.enabled) (not .Values.memoryDemo.enabled) }}
---
# Dev-only Postgres connection Secrets for the demo workspace's default managed
# service group, pointing at the shared omnia_sessions / omnia_memory databases
# on the in-cluster dev postgres. Without them session-api/memory-api crashloop
# on a missing secret and the "default" service group never becomes ready (so
# the dashboard reports "session service unavailable"). For real clusters set
# demoWorkspace.createDevSecret=false and pre-create both Secrets.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.demoWorkspace.sessionSecret }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: omnia-demos
    app.kubernetes.io/part-of: {{ include "omnia-demos.name" . }}
type: Opaque
stringData:
  POSTGRES_CONN: {{ .Values.demoWorkspace.devSessionConn | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.demoWorkspace.memorySecret }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: omnia-demos
    app.kubernetes.io/part-of: {{ include "omnia-demos.name" . }}
type: Opaque
stringData:
  POSTGRES_CONN: {{ .Values.demoWorkspace.devMemoryConn | quote }}
{{- end }}

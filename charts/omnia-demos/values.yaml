# Omnia Demos Helm Chart Values
# This chart deploys demo agents showcasing vision, audio, and tool capabilities

# -- Namespace for demo resources
namespace: omnia-demo

# -- Workspace configuration
workspace:
  # -- roleBindings map OIDC groups to workspace roles (viewer | editor | owner)
  # and render into the demo Workspace's spec.roleBindings. Empty by default: a
  # fresh demo Workspace then has NO owner grant, so every dashboard route
  # wrapped in a required role (services list, Memory Galaxy, …) returns 403
  # until a grant exists. Set this — or directGrants, or anonymousAccess — to
  # grant access declaratively instead of a post-install kubectl patch, e.g.
  #   --set 'workspace.roleBindings[0].groups[0]=<oidc-group>' \
  #   --set 'workspace.roleBindings[0].role=owner'
  # Shape matches the Workspace CRD's spec.roleBindings[].
  roleBindings: []
  # -- directGrants grant a workspace role to an individual user by OIDC email
  # claim. Same shape as the Workspace CRD's spec.directGrants[]. Empty by
  # default.
  directGrants: []
  # -- Anonymous access configuration
  # Controls what access unauthenticated users have to this workspace
  anonymousAccess:
    # -- Enable anonymous access to this workspace
    # If false, anonymous users cannot access resources in this workspace
    enabled: false
    # -- Role granted to anonymous users: viewer, editor, or owner
    # WARNING: editor/owner grants write access - only use in dev environments
    role: viewer
  # -- Storage configuration for workspace content
  storage:
    # -- Storage class for workspace content PVC
    # For local dev with NFS: omnia-nfs
    # For production: use cloud storage class (efs-sc, azurefile-csi-nfs, etc.)
    storageClass: ""

# Ollama configuration (local LLM server)
ollama:
  # -- Ollama image
  image:
    repository: ollama/ollama
    tag: latest
    pullPolicy: IfNotPresent
  # -- Keep model loaded in memory
  keepAlive: "24h"
  # -- Default Ollama-side context window (per-instance numCtx overrides this).
  contextWindow: 8192
  # -- Persistence for model cache (models are 4-8GB). Each instance gets its
  # own RWO PVC, sized by instance.storage.
  persistence:
    enabled: true
    storageClass: ""
  # -- Node placement. Empty by default so the demo schedules anywhere (local
  # kind, any cluster). A deployment that runs a dedicated, tainted Ollama pool
  # sets these at install time to pin model RAM off the rest of the platform —
  # e.g. `--set ollama.nodeSelector.workload=ollama` plus a matching toleration.
  nodeSelector: {}
  tolerations: []
  # -- One dedicated instance per model. Serving multiple models from one
  # instance thrashes (Ollama unloads/reloads on switch) and can OOM a small
  # node, so each model gets its own instance + node (spread via podAntiAffinity).
  # Each becomes a Service `ollama-<name>` that Providers point at.
  instances:
    - name: chat
      # Text/tool LLM (tools-demo, summarization).
      model: llama3.2:3b
      numCtx: 8192
      storage: 8Gi
      resources:
        requests:
          cpu: "1"
          memory: "4Gi"
        limits:
          cpu: "3"
          memory: "8Gi"
    - name: vision
      # Multimodal LLM (vision-demo).
      model: llava:7b
      numCtx: 8192
      storage: 12Gi
      resources:
        requests:
          cpu: "1"
          memory: "7Gi"
        limits:
          cpu: "3"
          memory: "10Gi"

# ============================================================================
# Vision Demo Agent (Ollama / llava)
# Demonstrates image understanding with a local multimodal model.
# ============================================================================

visionDemo:
  # -- Enable the vision demo (its Ollama Provider + PromptPack + AgentRuntime,
  # and the LangChain vision mirror). Default true to preserve behaviour.
  # It is ollama/llava-backed, so it needs the `vision` ollama instance (a GPU
  # or a capable CPU pool). On clusters without one the Provider stays
  # Unavailable and the agent is permanently non-functional — set this to false
  # to keep it off across `helm upgrade` / `make demo-content`. (To also skip
  # the heavy vision model server, drop the `vision` entry from
  # `ollama.instances` above.)
  enabled: true

# Vision demo agent configuration (uses Ollama/llava)
agent:
  # -- Agent name
  name: vision-demo
  # -- Facade handler type
  handler: runtime
  # -- Number of replicas
  replicas: 1
  # -- Resource requirements
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  # -- Console configuration for file uploads
  console:
    # -- Maximum file size in bytes (8MB leaves room for base64 overhead)
    maxFileSize: 8388608
    # -- Maximum number of files per message
    maxFiles: 3
    # -- Allowed attachment MIME types
    allowedAttachmentTypes:
      - "image/png"
      - "image/jpeg"
      - "image/webp"
      - "image/gif"
    # -- Media requirements for the vision model
    mediaRequirements:
      image:
        # -- Maximum dimensions (llava:7b supports up to 1344x1344)
        maxWidth: 1344
        maxHeight: 1344
        # -- Recommended dimensions for optimal quality
        recommendedWidth: 672
        recommendedHeight: 672
        # -- Maximum image size in bytes
        maxSizeBytes: 8388608
        # -- Preferred output format
        preferredFormat: "image/jpeg"
        # -- Compression guidance
        compressionGuidance: "lossy-medium"

# Demo PromptPack configuration
promptPack:
  # -- System prompt for the vision demo agent
  systemPrompt: |
    You are a helpful vision-capable AI assistant powered by Ollama.
    You can analyze images and answer questions about them.
    Be concise, friendly, and helpful in your responses.

    When analyzing images:
    - Describe what you see clearly and objectively
    - Point out notable details or interesting elements
    - Answer any specific questions about the image content

# ============================================================================
# Audio Demo Agent (Gemini)
# Demonstrates audio capabilities using Google Gemini
# ============================================================================

audioDemo:
  # -- Enable audio demo agent (requires Gemini API key)
  enabled: false

  # -- Gemini provider configuration
  gemini:
    # -- Gemini model to use (gemini-2.5-flash has audio support)
    model: gemini-2.5-flash
    # -- Gemini API base URL (SDK multimodal path appends /models/<model>)
    # NOTE: Include /v1beta because PromptKit's multimodal path is missing it
    baseURL: https://generativelanguage.googleapis.com/v1beta
    # -- Name of the Kubernetes Secret containing the API key
    # Secret must have a key named 'api-key' with your GEMINI_API_KEY
    # Create with: kubectl create secret generic gemini-credentials -n omnia-demo --from-literal=api-key=YOUR_API_KEY
    secretName: gemini-credentials
    # -- Temperature for generation
    temperature: 0.7
    # -- Pricing per 1K tokens (for cost tracking)
    pricing:
      inputCostPer1K: "0.000075"
      outputCostPer1K: "0.0003"
      cachedCostPer1K: "0.0000375"

  # -- Agent configuration
  agent:
    # -- Agent name
    name: audio-demo
    # -- Facade handler type
    handler: runtime
    # -- Number of replicas
    replicas: 1
    # -- Log level for debugging (info, debug, warn, error)
    logLevel: debug
    # -- Resource requirements
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"

  # -- Console configuration for audio uploads
  console:
    # -- Maximum file size in bytes (8MB for audio)
    maxFileSize: 8388608
    # -- Maximum number of files per message
    maxFiles: 3
    # -- Allowed attachment MIME types
    allowedAttachmentTypes:
      - "audio/mpeg"
      - "audio/wav"
      - "audio/ogg"
      - "audio/flac"
      - "audio/aac"
      - "audio/x-m4a"
      - "image/png"
      - "image/jpeg"
      - "image/webp"
    # -- Media requirements for Gemini audio
    mediaRequirements:
      audio:
        # -- Maximum duration in seconds (9.5 hours for Gemini)
        maxDurationSeconds: 34200
        # -- Recommended sample rate in Hz
        recommendedSampleRate: 16000
        # -- Supports selecting audio segments
        supportsSegmentSelection: true
      image:
        # -- Maximum dimensions for images
        maxWidth: 3072
        maxHeight: 3072
        # -- Recommended dimensions
        recommendedWidth: 1024
        recommendedHeight: 1024
        # -- Maximum image size
        maxSizeBytes: 8388608
        # -- Preferred format
        preferredFormat: "image/jpeg"
        # -- Compression guidance
        compressionGuidance: "lossy-medium"

  # -- PromptPack configuration
  promptPack:
    # -- System prompt for the audio demo agent
    systemPrompt: |
      You are a helpful AI assistant powered by Google Gemini with advanced audio understanding capabilities.
      You can analyze audio files and answer questions about them.
      Be concise, friendly, and helpful in your responses.

      When analyzing audio:
      - Describe what you hear clearly and objectively
      - If it's speech, provide accurate transcription when asked
      - Identify music, sounds, or other audio content
      - Answer any specific questions about the audio content
      - If the audio quality is poor, mention it and do your best

# ============================================================================
# Voice Demo Agent (Gemini Live realtime duplex)
# Realtime two-way voice ("call" console) via spec.duplex. Requires a Gemini
# API key with Live/realtime access. Enable with: ENABLE_VOICE_DEMO=true tilt up
# ============================================================================

voiceDemo:
  # -- Enable the realtime voice agent (requires a Gemini Live API key)
  enabled: false

  # -- Realtime voice provider. Default: OpenAI Realtime (gpt-realtime GA).
  # Switch to Gemini Live via helm-set (type=gemini, model=gemini-3.1-flash-live-preview,
  # baseURL=https://generativelanguage.googleapis.com/v1beta, duplex 16000/pcm)
  # once PromptKit #1666/#1667 land.
  provider:
    # -- Provider type: openai | gemini
    type: openai
    # -- Realtime model (OpenAI gpt-realtime GA; Gemini gemini-3.1-flash-live-preview)
    model: gpt-realtime
    # -- API base URL override; leave empty for the provider default (OpenAI)
    baseURL: ""
    # -- Secret with the API key (key OPENAI_API_KEY or GEMINI_API_KEY)
    secretName: openai-credentials
    # -- Temperature for generation
    temperature: 0.7
    # -- Pricing per 1K tokens (for cost tracking)
    pricing:
      inputCostPer1K: "0.004"
      outputCostPer1K: "0.016"
      cachedCostPer1K: "0.0004"

  # -- Agent configuration
  agent:
    # -- Agent name
    name: voice-demo
    # -- Facade handler type
    handler: runtime
    # -- Number of replicas
    replicas: 1
    # -- Log level (debug surfaces the duplex handshake + provider session)
    logLevel: debug
    # -- Resource requirements
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"

  # -- Realtime duplex audio format advertised as the bounded counter-offer in
  # RuntimeHello. OpenAI Realtime uses 24 kHz PCM16; Gemini Live uses 16 kHz pcm.
  duplex:
    recommendedSampleRate: 24000
    channels: 1
    format: pcm16

  # -- PromptPack configuration
  promptPack:
    # -- System prompt for the voice agent (kept short + spoken-style)
    systemPrompt: |
      You are a warm, concise voice assistant speaking with the user over a
      live voice call. Keep replies short and conversational — a sentence or
      two at a time. Do not use markdown, bullet points, headings, or emoji.
      Spell out anything that must be spoken. If the user interrupts you, stop
      immediately and listen.

# ============================================================================
# Tools Demo Agent (llama3.2 with tool calling)
# Demonstrates tool/function calling capabilities
# ============================================================================

toolsDemo:
  # -- Enable tools demo agent
  enabled: true

  # -- Agent configuration
  agent:
    # -- Agent name
    name: tools-demo
    # -- Facade handler type
    handler: runtime
    # -- Number of replicas
    replicas: 1
    # -- Resource requirements
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"

  # -- PromptPack configuration
  promptPack:
    # -- System prompt for the tools demo agent
    systemPrompt: |
      You are a helpful AI assistant. Answer questions directly when you can.
      You have tools available — use them when needed, but don't force their use.
      Be concise and helpful.

# ============================================================================
# Composition Demo Agent (PromptKit RFC 0010 / 1.5+)
# A document-analysis PromptPack whose `analyze` workflow state runs a
# declarative composition (prompt → parallel → branch → agent). Showcases the
# dashboard's expandable composition sub-flow. Ollama-backed, self-contained.
# ============================================================================

# -- Enterprise demos. Mirrors the omnia chart's `enterprise.enabled` flag and is
# kept in sync with it by Tilt (ENABLE_ENTERPRISE sets both). When true, the
# EE demos (Arena Fleet) light up against the operator's dev license; default
# off so the demo is open-core (EE features show upgrade CTAs).
enterprise:
  enabled: false

# -- Default managed service group (session-api + a minimal lexical memory-api)
# for the demo workspace, so session history + cost/usage light up out of the
# box (open-core; the memory UI itself stays EE-gated). managed mode requires
# both session and memory, so memory is included but has no embedding provider.
# Skipped when sharepointHero/memoryDemo own the demo workspace's service group.
demoWorkspace:
  enabled: true
  # Create dev-only Postgres Secrets pointing at the in-cluster dev postgres
  # (shared omnia_sessions / omnia_memory DBs). For real clusters set
  # createDevSecret=false and pre-create the Secrets with a POSTGRES_CONN key.
  createDevSecret: true
  sessionSecret: omnia-demo-session
  devSessionConn: "postgres://omnia:omnia@omnia-postgres.omnia-system.svc.cluster.local:5432/omnia_sessions?sslmode=disable"
  memorySecret: omnia-demo-memory
  devMemoryConn: "postgres://omnia:omnia@omnia-postgres.omnia-system.svc.cluster.local:5432/omnia_memory?sslmode=disable"
  # -- Enable the per-workspace privacy-api (consent + opt-out). When true the
  # chart adds spec.privacy to the demo Workspace and creates a dev Secret
  # pointing at the omnia_consent database on the in-cluster dev postgres.
  # For real clusters set privacyEnabled=false (or true + createDevSecret=false)
  # and pre-create privacySecret with a POSTGRES_CONN key.
  privacyEnabled: true
  privacySecret: omnia-demo-privacy
  devPrivacyConn: "postgres://omnia:omnia@omnia-postgres.omnia-system.svc.cluster.local:5432/omnia_consent?sslmode=disable"

# -- Anthropic skills SkillSource. Syncs https://github.com/anthropics/skills
# into the demo workspace so the Skills page is populated out of the box.
skills:
  enabled: true
  git:
    url: https://github.com/anthropics/skills.git
    branch: main
  interval: 1h
  timeout: 2m

compositionDemo:
  # -- Enable the composition demo agent + PromptPack
  enabled: true

  # -- Agent configuration
  agent:
    # -- Agent name
    name: composition-demo
    # -- Facade handler type
    handler: runtime
    # -- Number of replicas
    replicas: 1
    # -- Resource requirements
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"

# ============================================================================
# LangChain Demo Agents
# Mirrors vision-demo and tools-demo using the LangChain runtime framework
# ============================================================================

langchainDemo:
  # -- Enable LangChain demo agents
  enabled: false

  # -- LangChain runtime image configuration
  image:
    repository: ghcr.io/altairalabs/omnia-langchain-runtime
    tag: latest
    pullPolicy: IfNotPresent

  # -- Vision demo agent configuration (LangChain)
  visionAgent:
    # -- Agent name
    name: vision-demo-langchain
    # -- Number of replicas
    replicas: 1
    # -- Resource requirements
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

  # -- Tools demo agent configuration (LangChain)
  toolsAgent:
    # -- Agent name
    name: tools-demo-langchain
    # -- Number of replicas
    replicas: 1
    # -- Resource requirements
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

# ============================================================================
# Arena Demo - Prompt evaluation demonstration
# Shows how to run LLM evaluations against test scenarios
# ============================================================================

arenaDemo:
  # -- Enable arena demo (requires enterprise.enabled=true in omnia chart)
  enabled: false

  # -- ArenaSource configuration
  source:
    # -- Name of the ArenaSource
    name: demo-arena-source
    # -- Sync interval
    interval: 5m

  # -- ArenaConfig configuration
  config:
    # -- Name of the ArenaConfig
    name: demo-arena-config
    # -- Evaluation settings
    evaluation:
      timeout: "2m"
      maxRetries: 2
      concurrency: 1

  # -- ArenaJob configuration
  job:
    # -- Name of the ArenaJob
    name: demo-arena-job
    # -- Worker configuration
    workers:
      replicas: 1
    # -- TTL after job completion (1 hour)
    ttlSecondsAfterFinished: 3600

# ============================================================================
# SharePoint Hero Demo — "agents are production workloads"
# Gated behind sharepointHero.enabled. See
# docs/local-backlog/2026-06-01-rag-hero-demo-design.md
# ============================================================================
sharepointHero:
  enabled: false

  # External exposure of rag-hero (A2A + WebSocket) for non-dashboard clients.
  # Off by default; the omnia-azure umbrella's agentExposure routes + DNS/cert
  # publish it under agents.<domain>. a2a.enabled adds a second type:a2a facade
  # (operator opens the :9999 facade port); externalAuth.apiKeys.enabled switches
  # the external listeners to strict per-caller API-key auth (keys created in the
  # dashboard UI). Migrated to the Omnia #1645 facades[] shape. NOTE (#1576 gap):
  # with a websocket primary the a2a agent card still advertises the in-cluster
  # URL, not the external route.
  a2a:
    enabled: false
    # agentCard.name is required by the CRD when the a2a facade is present.
    agentCard:
      name: "SharePoint Knowledge Assistant"
      description: ""
  externalAuth:
    apiKeys:
      enabled: false

  # Set true to activate the canary rollout (the "ship the change" demo beat).
  # Kept separate from enabled so install is stable and the rollout is triggered
  # on demand. The rag-hero AgentRuntime uses trafficRouting.mode=mesh — the
  # operator OWNS the VirtualService/DestinationRule, so no hand-authored VS/DR
  # need pre-exist. Requires the operator's --mesh-enabled flag
  # (rollout.meshEnabled=true on the omnia chart) + an ambient-enrolled
  # omnia-demo namespace with a waypoint (see meshWaypoint below).
  shipCandidate: false

  # Render the agent-Service waypoint Gateway (gateway-api class
  # istio-waypoint). REQUIRED for the mode=mesh weighted split to take effect:
  # ztunnel is L4 only; the waypoint performs the L7 stable/candidate routing.
  # The omnia-demo namespace must ALSO be ambient-enrolled
  # (kubectl label namespace omnia-demo istio.io/dataplane-mode=ambient).
  # Disabled by default since not every demo cluster runs ambient — see
  # SHAREPOINT_HERO.md. On-cluster validation of the waypoint + CEL policy-broker
  # interaction on the WebSocket path is still pending.
  meshWaypoint: false

  # Demo-only SharePoint Graph adapter image, published by the standalone
  # .github/workflows/docker-push-demos.yml (NOT the product release).
  adapter:
    image: ghcr.io/altairalabs/omnia-sharepoint-adapter:main
    replicas: 1
    # Pre-created Secret with AAD client-secret creds (see setup doc).
    # Keys: AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET
    credentialsSecret: sharepoint-adapter-creds
    sharepointSiteId: "REPLACE_WITH_SITE_ID"

  # Embedding provider for semantic memory retrieval. Used when azure.enabled is
  # false; the keyless Azure path uses azure.embeddingModel instead.
  embedding:
    provider: openai          # openai | gemini | voyageai
    model: text-embedding-3-small
    secretRef: embedding-api-key   # pre-created Secret

  # Postgres connection Secrets for the demo's managed memory-api + session-api
  # (the Workspace serviceGroup references these by name). Each must be a
  # pre-created Secret in the namespace with a POSTGRES_CONN key. Reuse the core
  # install's secrets or create demo-specific ones.
  database:
    sessionSecret: omnia-postgres
    memorySecret: omnia-postgres-memory

  # Retrieval-time governance deny-filter (CEL over a retrieved item's metadata).
  # The restricted SharePoint site's URL contains "restricted", so its indexed
  # chunks are dropped before injection. Empty string disables the filter.
  accessFilter:
    denyCEL: 'metadata.url.contains("restricted")'

  # Keyless Azure OpenAI via Azure AD Workload Identity. When enabled:
  #   - the chat Providers render with spec.platform(azure)/auth(workloadIdentity)
  #     and NO secretRef (providers.*.type/secretRef below are ignored)
  #   - the agent pod runs as the workload-identity ServiceAccount this chart
  #     creates (workloadIdentity.serviceAccountName), labelled for the AKS
  #     webhook to inject the federated token
  #   - chatModel is the Azure deployment name used for both baseline + candidate
  #     (the rollout candidate differs by promptPackRef — a different pack)
  # The ServiceAccount must be federated to the managed identity out-of-band —
  # see SHAREPOINT_HERO.md for the `az identity federated-credential create` step.
  azure:
    enabled: false
    # Azure OpenAI resource endpoint, e.g.
    # https://<resource>.cognitiveservices.azure.com/
    endpoint: ""
    # Azure region of the resource, e.g. centralus.
    region: ""
    # Azure deployment name for the chat model (baseline + candidate).
    chatModel: gpt-4o
    # Azure deployment name for the embedding model (memory-api semantic
    # retrieval). Keyless embedding requires PromptKit embedding/chat auth
    # parity; until then this renders a valid Provider but the memory-api falls
    # back per its own support.
    embeddingModel: text-embedding-3-small
    workloadIdentity:
      # ServiceAccount this chart creates in .Values.namespace, federated to the
      # runtime managed identity.
      serviceAccountName: omnia-runtime-wi
      # Managed-identity client-id (azure.workload.identity/client-id annotation).
      clientId: ""
      # AAD tenant-id (azure.workload.identity/tenant-id annotation).
      tenantId: ""

  # LLM providers (baseline + pricier candidate). type: claude | openai | gemini
  # Ignored when azure.enabled=true (see azure block above).
  providers:
    baseline:
      type: claude
      model: claude-sonnet-4-6
      secretRef: anthropic-api-key
    candidate:
      type: claude
      model: claude-opus-4-8
      secretRef: anthropic-api-key

  workspace: demo

  # In-cluster memory-api base URL for the demo workspace (no trailing slash).
  # The operator names the per-workspace memory service
  # memory-<workspace>-<serviceGroup>, so for workspace "demo" + the default
  # service group it is memory-demo-default (NOT the generic memory-api).
  memoryApiUrl: http://memory-demo-default.omnia-demo:8080

  # In-cluster Prometheus query endpoint. Defaults to the Omnia-bundled
  # Prometheus (the `prometheus` community chart deployed as a subchart:
  # Service omnia-prometheus-server in the omnia release namespace). That
  # server runs with --web.route-prefix=/prometheus, so the address MUST
  # include the /prometheus prefix — the RolloutAnalysis Prometheus client
  # appends /api/v1/query to it. Override for a standalone kube-prometheus-stack
  # (e.g. http://prometheus-operated.monitoring:9090).
  prometheusUrl: http://omnia-prometheus-server.omnia/prometheus

  # Arena self-play loadtest: generates realistic multi-turn traffic against the
  # live rag-hero agent (fleet mode over WebSocket), driving candidate-variant
  # eval metrics that the rollout gate reads.
  loadtest:
    trials: 200
    concurrency: 5
    vusPerWorker: 2
    budgetLimit: "25.00"
    workers: 1
    # Linear concurrency ramp so traffic builds smoothly during the demo.
    ramp:
      up: "1m"
      down: "30s"
    # Record sessions so the generated traffic is visible in the dashboard.
    sessionRecording: true
    # ArenaSource reconcile interval for the bundle ConfigMap.
    syncInterval: "5m"
    # User-simulator provider (the self-play "SRE" turns). Defaults to the
    # self-hosted Ollama chat instance so the loadtest is self-contained with no
    # external API key and zero per-turn cost. Set type to claude/openai (with a
    # secretRef) to drive self-play from an external model instead.
    selfplay:
      type: ollama
      model: llama3.2:3b
      # Ollama Service to target; resolved to http://<svc>.<namespace>:11434.
      ollamaService: ollama-chat
      # Only used for non-ollama types (claude/openai); ignored for ollama.
      secretRef: anthropic-api-key

# ---------------------------------------------------------------------------
# Memory-API dev demo (memoryDemo)
# ---------------------------------------------------------------------------
# Self-contained toggle that fills every memory UI surface in the omnia-demo
# workspace at realistic scale. Mirrors the sharepointHero pattern: it wires the
# demo Workspace's memory service at an ollama embedding provider + a demo
# MemoryPolicy, runs memory-api with enterprise enabled (privacy enforcement
# stats), and a post-install seed Job loads templated "Hawkridge Cloud" data
# across all tiers. Dev-only; never enable in production.
# Enable with: --set memoryDemo.enabled=true. Mutually exclusive with
# sharepointHero on the demo Workspace's memory service (sharepointHero wins).
memoryDemo:
  enabled: false

  # Postgres connection Secrets for the demo's managed memory-api + session-api.
  database:
    # session-api's Postgres Secret (POSTGRES_CONN key). When createDevSecret is
    # true the chart creates it (pointing at devSessionConn) — session-api
    # crashloops without it, which blocks the whole service group from becoming
    # ready (and the dashboard's memory proxy 503s). For non-dev clusters set
    # createDevSecret=false and pre-create this Secret.
    sessionSecret: omnia-postgres
    # The memory DB is DEDICATED (omnia_memory_demo) so the demo's embeddings
    # don't collide with another workspace's embedding column dimension in the
    # shared omnia_memory DB.
    memorySecret: omnia-postgres-memory-demo
    # When true (dev/Tilt), the chart creates memorySecret + sessionSecret
    # pointing at the dev connections below. For other clusters, set false and
    # pre-create both Secrets with a POSTGRES_CONN.
    createDevSecret: true
    devMemoryConn: "postgres://omnia:omnia@omnia-postgres.omnia-system.svc.cluster.local:5432/omnia_memory_demo?sslmode=disable"
    devSessionConn: "postgres://omnia:omnia@omnia-postgres.omnia-system.svc.cluster.local:5432/omnia_sessions?sslmode=disable"

  # Embedding configuration for the Memory Galaxy's dense (semantic) projection.
  embedding:
    # The embedding model the in-cluster ollama memory-embed instance pulls/serves
    # (used when provider.type=ollama). DEFAULT all-minilm (22M params, ~45MB,
    # 384-dim) — the smallest sensible embedder; ~6x lighter than nomic-embed-text
    # and fast enough on CPU that the dense-projection backlog reaches coverage
    # (galaxy goes semantic rather than staying on the lexical fallback). For
    # type=ollama this MUST match provider.model below.
    model: all-minilm
    # The memory-demo-embeddings Provider the workspace binds for embeddings.
    #
    # DEFAULTS to `ollama` + all-minilm: multi-arch (works on Apple-Silicon/arm64
    # dev clusters), no API key, tiny + fast — the cheapest embedder that runs
    # anywhere. memoryDemo is dev-only, so a local embedder is the sensible default.
    #
    # Alternatives:
    #   tei    → HF Text Embeddings Inference, the lightest embedder for x86 — but
    #            AMD64-ONLY (no arm64 image), so it will NOT pull on Apple Silicon.
    #            Rendered as an openai-typed Provider -> the in-cluster TEI Service.
    #   openai/gemini/voyageai -> hosted embedder (needs credentialSecret with a key).
    #
    # NOTE: dimensions must match the memory DB's embedding columns. The schema
    # is provisioned on first run; changing it later (e.g. 384<->768) is a
    # destructive re-init gated by a one-shot consent marker.
    provider:
      # type: ollama | tei | openai | gemini | voyageai
      # (tei is a chart alias rendered as an openai-typed Provider -> the TEI Service)
      type: ollama
      # The model in the Provider spec. For ollama: the ollama model name (MUST
      # match embedding.model above). For tei/openai: the served/hosted model id,
      # e.g. tei -> sentence-transformers/all-MiniLM-L6-v2 (also 384-dim).
      model: all-minilm
      dimensions: 384
      distance: cosine
      # API-key Secret for hosted types (openai/gemini/voyageai). NOT created by
      # the chart — provision out-of-band so the key never lands in git. The Secret
      # KEY name is the provider's env-var name (memory-api derives it from the
      # type): openai → OPENAI_API_KEY, gemini → GEMINI_API_KEY.
      #   kubectl create secret generic openai-embeddings-credentials \
      #     -n <ns> --from-literal=OPENAI_API_KEY=$OPENAI_API_KEY
      # Ignored for type=tei (the chart provisions a dummy Secret; TEI needs no key).
      credentialSecret: openai-embeddings-credentials

    # Hugging Face TEI backend, used when provider.type=tei. AMD64-ONLY — the CPU
    # image has no arm64 manifest, so this is for x86 dev/CI clusters, not Apple
    # Silicon. The served model is provider.model above (use the HF path form,
    # e.g. sentence-transformers/all-MiniLM-L6-v2).
    tei:
      image:
        repository: ghcr.io/huggingface/text-embeddings-inference
        tag: cpu-1.5
        pullPolicy: IfNotPresent
      resources:
        requests:
          cpu: "250m"
          memory: "512Mi"
        limits:
          cpu: "1"
          memory: "1Gi"

  # Post-install seed Job (Task 11). The seeder generates a fixed-scale
  # "Hawkridge Cloud" scenario (built-in DefaultScenario — counts are not
  # flag-configurable); only the rng seed is. image is the dev-only seeder
  # image built by Tilt.
  seed:
    image: omnia-memory-seeder-dev:latest
    rngSeed: 1

apiVersion: promptkit.altairalabs.ai/v1alpha1
kind: Scenario
metadata:
  name: incident-runbook
spec:
  id: incident-runbook
  task_type: assistant
  description: >-
    Sev1 database-outage incident. Drives two-stage retrieval (institutional
    memory index -> SharePoint runbook fetch) plus multi-turn self-play. No
    assertions: this is a load-generation workload, not a quality gate.

  trials: 3

  turns:
    - role: user
      content: >-
        We've got a Sev1 — the primary orders database is down. What's the
        escalation path and where's the runbook for a failover?

    - role: sre-user
      persona: sre-user
      turns: 3
      max_turns: 6

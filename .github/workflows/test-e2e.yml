name: Operator E2E Tests

on:
  push:
    branches:
      - main
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile*'
      - 'api/**'
      - 'cmd/**'
      - 'config/**'
      - 'ee/**'
      - 'internal/**'
      - 'pkg/**'
      - 'test/**'
      - 'hack/**'
      - 'charts/**'
      - 'scripts/setup-arena-e2e.sh'
      - '.github/workflows/test-e2e.yml'
  pull_request:
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile*'
      - 'api/**'
      - 'cmd/**'
      - 'config/**'
      - 'ee/**'
      - 'internal/**'
      - 'pkg/**'
      - 'test/**'
      - 'hack/**'
      - 'charts/**'
      - 'scripts/setup-arena-e2e.sh'
      - '.github/workflows/test-e2e.yml'

permissions:
  contents: read
  checks: write

# Cancel in-progress runs when a new commit is pushed to the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # Core operator E2E tests (non-Arena tests)
  test-e2e-core:
    name: Core E2E
    runs-on: ubuntu-latest
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Clone the code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false  # We manage the module/build cache explicitly below.

      # setup-go's built-in cache only reliably restores the Go toolchain,
      # not the module download cache (~/go/pkg/mod) or the compiler build
      # cache (~/.cache/go-build). Without this step, every E2E run re-downloads
      # every module and recompiles every shared package from scratch — costing
      # ~4-6 minutes. Keying on go.sum means the cache is invalidated only when
      # dependencies change. See #732 follow-up.
      - name: Cache Go modules and build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-e2e-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-e2e-${{ runner.os }}-

      - name: Install kind
        run: |
          curl --retry 3 --retry-delay 5 -Lo ./kind https://kind.sigs.k8s.io/dl/v0.20.0/kind-linux-$(go env GOARCH)
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind installation
        run: kind version

      - name: Running Core E2E Tests
        run: |
          # Run only non-arena tests (excludes Label("arena"))
          make test-e2e-junit GINKGO_LABEL_FILTER='!arena'

      - name: Dump debug info on failure
        if: failure()
        run: |
          echo "=== Nodes ==="
          kubectl get nodes -o wide || true
          echo ""
          echo "=== All pods ==="
          kubectl get pods -A -o wide || true
          echo ""
          echo "=== Controller-manager pods ==="
          kubectl get pods -n omnia-system -l control-plane=controller-manager -o wide || true
          echo ""
          echo "=== Controller-manager logs (current) ==="
          kubectl logs -n omnia-system -l control-plane=controller-manager --tail=500 --all-containers=true || true
          echo ""
          echo "=== Controller-manager logs (previous, if restarted) ==="
          kubectl logs -n omnia-system -l control-plane=controller-manager --tail=500 --all-containers=true --previous || true
          echo ""
          echo "=== Events in omnia-system ==="
          kubectl get events -n omnia-system --sort-by=.lastTimestamp | tail -80 || true
          echo ""
          echo "=== Events in test-agents ==="
          kubectl get events -n test-agents --sort-by=.lastTimestamp | tail -80 || true
          echo ""
          echo "=== AgentRuntimes in test-agents ==="
          kubectl get agentruntime -n test-agents -o yaml || true
          echo ""
          echo "=== Providers in test-agents ==="
          kubectl get provider -n test-agents -o yaml || true
          echo ""
          echo "=== PromptPacks in test-agents ==="
          kubectl get promptpack -n test-agents -o yaml || true
          echo ""
          echo "=== ToolRegistries in test-agents ==="
          kubectl get toolregistry -n test-agents -o yaml || true
          echo ""
          echo "=== Workspaces ==="
          kubectl get workspace -A -o yaml || true
          echo ""
          echo "=== Deployments in test-agents ==="
          kubectl get deployment -n test-agents -o yaml || true
          echo ""
          echo "=== Session-API logs ==="
          kubectl logs -n omnia-system -l app=e2e-session-api --tail=200 || true
          echo ""
          echo "=== Postgres logs ==="
          kubectl logs -n omnia-system -l app=e2e-postgres --tail=100 || true
          echo ""
          # Dump stdout for every test python pod. These pods exit non-zero
          # with an AssertionError or traceback on failure, and without their
          # logs we can't tell *why* a spec failed. See #734.
          echo "=== Test pod logs (test-agents) ==="
          for pod in $(kubectl get pods -n test-agents -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
            echo "--- $pod ---"
            kubectl logs -n test-agents "$pod" --tail=500 --all-containers=true || true
          done

      - name: Publish Test Results
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: 'e2e-results.xml'
          check_name: 'Core E2E Test Results'
          detailed_summary: true
          include_passed: true

      - name: Generate Timing Summary
        if: always()
        run: |
          if [ -f e2e-results.xml ]; then
            echo "## ⏱️ Core E2E Test Timing" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Test | Duration |" >> $GITHUB_STEP_SUMMARY
            echo "|------|----------|" >> $GITHUB_STEP_SUMMARY
            grep -oP 'name="[^"]*"[^>]*time="[^"]*"' e2e-results.xml | \
              sed 's/name="\([^"]*\)".*time="\([^"]*\)"/| \1 | \2s |/' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            TOTAL=$(grep -oP 'time="[^"]*"' e2e-results.xml | head -1 | grep -oP '[0-9.]+')
            echo "**Total Duration: ${TOTAL}s**" >> $GITHUB_STEP_SUMMARY
          fi

  # Arena E2E tests (enterprise features)
  test-e2e-arena:
    name: Arena E2E
    runs-on: ubuntu-latest
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Clone the code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false  # We manage the module/build cache explicitly below.

      # See Core E2E for rationale.
      - name: Cache Go modules and build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-e2e-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-e2e-${{ runner.os }}-

      - name: Install kind
        run: |
          curl --retry 3 --retry-delay 5 -Lo ./kind https://kind.sigs.k8s.io/dl/v0.20.0/kind-linux-$(go env GOARCH)
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Verify installations
        run: |
          kind version
          helm version

      - name: Set up Arena E2E environment
        run: |
          # Use the setup script that mirrors Tilt enterprise setup
          ./scripts/setup-arena-e2e.sh
        env:
          KIND_CLUSTER: omnia-arena-e2e

      - name: Running Arena E2E Tests
        run: |
          kubectl config use-context kind-omnia-arena-e2e
          E2E_SKIP_SETUP=true E2E_PREDEPLOYED=true ENABLE_ARENA_E2E=true E2E_SKIP_CLEANUP=true go test -tags=e2e ./test/e2e/ -v -ginkgo.v \
            -ginkgo.label-filter=arena \
            -ginkgo.junit-report=arena-e2e-results.xml \
            -ginkgo.show-node-events \
            -ginkgo.poll-progress-after=30s \
            -timeout 30m

      - name: Dump debug info on failure
        if: failure()
        run: |
          echo "=== Pods in omnia-system ==="
          kubectl get pods -n omnia-system -o wide || true
          echo ""
          echo "=== Pods in test-arena ==="
          kubectl get pods -n test-arena -o wide || true
          echo ""
          echo "=== Events in omnia-system ==="
          kubectl get events -n omnia-system --sort-by=.lastTimestamp | tail -50 || true
          echo ""
          echo "=== Controller logs ==="
          kubectl logs -n omnia-system -l control-plane=controller-manager --tail=100 || true
          echo ""
          echo "=== Arena controller logs ==="
          kubectl logs -n omnia-system -l app.kubernetes.io/component=arena-controller --tail=100 || true
          echo ""
          echo "=== Events in test-arena ==="
          kubectl get events -n test-arena --sort-by=.lastTimestamp | tail -30 || true
          echo ""
          echo "=== Worker pod logs ==="
          for pod in $(kubectl get pods -n test-arena -l app.kubernetes.io/component=worker -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
            echo "--- $pod ---"
            kubectl logs -n test-arena "$pod" --tail=30 || true
          done
          echo ""
          echo "=== Redis logs ==="
          kubectl logs -n omnia-system omnia-redis-master-0 --tail=50 || true
          echo ""
          echo "=== Session-API logs ==="
          kubectl logs -n omnia-system -l app.kubernetes.io/component=session-api --tail=50 || true
          echo ""
          echo "=== Eval-worker logs ==="
          kubectl logs -n omnia-system -l app.kubernetes.io/component=eval-worker --tail=50 || true

      - name: Publish Test Results
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: 'arena-e2e-results.xml'
          check_name: 'Arena E2E Test Results'
          detailed_summary: true
          include_passed: true

      - name: Generate Timing Summary
        if: always()
        run: |
          if [ -f arena-e2e-results.xml ]; then
            echo "## ⏱️ Arena E2E Test Timing" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Test | Duration |" >> $GITHUB_STEP_SUMMARY
            echo "|------|----------|" >> $GITHUB_STEP_SUMMARY
            grep -oP 'name="[^"]*"[^>]*time="[^"]*"' arena-e2e-results.xml | \
              sed 's/name="\([^"]*\)".*time="\([^"]*\)"/| \1 | \2s |/' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            TOTAL=$(grep -oP 'time="[^"]*"' arena-e2e-results.xml | head -1 | grep -oP '[0-9.]+')
            echo "**Total Duration: ${TOTAL}s**" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Cleanup
        if: always()
        run: |
          ./scripts/setup-arena-e2e.sh clean || true
        env:
          KIND_CLUSTER: omnia-arena-e2e

name: Multimodal E2E Tests

on:
  push:
    branches:
      - main
    paths:
      - 'dashboard/**'
      # Dashboard Dockerfile is a build-only concern; Docker Build Matrix
      # covers it on PRs. Multimodal E2E doesn't exercise image build.
      - '!dashboard/Dockerfile'
      - 'cmd/agent/**'
      - 'internal/agent/**'
      - 'internal/facade/**'
      - '.github/workflows/test-e2e-multimodal.yml'
      - '!**.md'
      - '!**.mdx'
  pull_request:
    paths:
      - 'dashboard/**'
      - '!dashboard/Dockerfile'
      - 'cmd/agent/**'
      - 'internal/agent/**'
      - 'internal/facade/**'
      - '.github/workflows/test-e2e-multimodal.yml'
      - '!**.md'
      - '!**.mdx'

permissions:
  contents: read
  checks: write

# Cancel in-progress runs when a new commit is pushed to the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # Multimodal E2E tests (requires Go agent binary with demo handler)
  multimodal-e2e:
    name: Multimodal Console Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # See test-e2e.yml + #1160: continue-on-error silently masks PR
    # failures from auto-merge, so the gate stays on. If a spec is
    # genuinely flaky, fix the spec instead.

    steps:
      - name: Clone the code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Install system deps (libasound2-dev for ebitengine/oto)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Install Playwright browsers
        working-directory: dashboard
        run: npx playwright install --with-deps chromium

      - name: Build Go agent binary
        run: go build -o bin/agent ./cmd/agent

      - name: Run Multimodal E2E Tests
        working-directory: dashboard
        run: npm run test:e2e:multimodal
        env:
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: multimodal-e2e-results
          path: dashboard/test-results/multimodal/
          retention-days: 7

      - name: Publish Test Results
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: 'dashboard/test-results/multimodal/junit.xml'
          check_name: 'Multimodal E2E Test Results'
          detailed_summary: true
          include_passed: true

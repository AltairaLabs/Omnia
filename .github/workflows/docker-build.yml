name: Docker Build Matrix

# Manually-triggered verification build for every image the release workflow
# publishes. Runs ONLY on workflow_dispatch — NOT on PRs. The real release
# builds happen in release.yml's `docker-release` job on version tags; running
# the full (multi-arch) matrix on every PR was slow and was never a required
# check, so it's opt-in now. Trigger this by hand to verify Dockerfiles ad-hoc.
#
# Keep this matrix in sync with the `docker-release` job in release.yml.
# If you add/remove/rename an image there, update here too.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build-matrix:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: omnia-operator
            dockerfile: Dockerfile
            context: .
          - image: omnia-facade
            dockerfile: Dockerfile.agent
            context: .
          - image: omnia-runtime
            dockerfile: Dockerfile.runtime
            context: .
          - image: omnia-dashboard
            dockerfile: dashboard/Dockerfile
            context: dashboard
          - image: omnia-session-api
            dockerfile: Dockerfile.session-api
            context: .
          - image: omnia-memory-api
            dockerfile: Dockerfile.memory-api
            context: .
          - image: omnia-doctor
            dockerfile: Dockerfile.doctor
            context: .
          - image: omnia-compaction
            dockerfile: Dockerfile.compaction
            context: .
          - image: omnia-arena-controller
            dockerfile: ee/Dockerfile.arena-controller
            context: .
          - image: omnia-arena-worker
            dockerfile: ee/Dockerfile.arena-worker
            context: .
          - image: omnia-arena-dev-console
            dockerfile: ee/Dockerfile.arena-dev-console
            context: .
          - image: omnia-eval-worker
            dockerfile: ee/Dockerfile.eval-worker
            context: .
          - image: omnia-promptkit-lsp
            dockerfile: ee/Dockerfile.promptkit-lsp
            context: .
          - image: omnia-privacy-api
            dockerfile: ee/Dockerfile.privacy-api
            context: .
          - image: omnia-policy-broker
            dockerfile: ee/Dockerfile.policy-broker
            context: .
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build (no push, no attestations — verify-only)
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: false
          tags: ${{ matrix.image }}:ci-verify
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

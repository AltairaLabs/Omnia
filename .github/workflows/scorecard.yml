name: Scorecard supply-chain security

on:
  # Re-run when branch protection changes (Scorecard grades it).
  branch_protection_rule:
  schedule:
    - cron: "27 6 * * 1" # weekly, Monday 06:27 UTC
  push:
    branches: ["main"]

# Least-privilege by default; the job below elevates only what it needs.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed for publish_results to attest to the public Scorecard API
      # (this is what powers the dashboard/score).
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2.4.1
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish to the public dashboard/badge at
          # https://securityscorecards.dev — required for the README badge.
          publish_results: true

      # Scorecard results are posture signals, not code vulnerabilities, so they
      # are NOT uploaded to the code-scanning (Security) tab — that floods it
      # with one alert per unpinned dep / token-permission and drowns real
      # findings. The score/badge lives on the public dashboard via
      # publish_results; keep a downloadable SARIF artifact for reference.
      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 5

openapi: 3.0.3
info:
  title: Omnia Memory API
  description: Cross-session agentic memory store for Omnia agents.
  version: 1.1.0
  contact:
    name: Altaira Labs
    url: https://altairalabs.ai

servers:
  - url: /api/v1
    description: Memory API v1

paths:
  /memories:
    get:
      operationId: listMemories
      summary: List memories
      description: Returns a paginated list of memories for the given scope.
      parameters:
        - name: workspace
          in: query
          required: true
          schema:
            type: string
          description: Workspace ID (required)
        - name: user_id
          in: query
          schema:
            type: string
          description: Filter by user ID
        - name: agent
          in: query
          schema:
            type: string
          description: Filter by agent ID
        - name: type
          in: query
          schema:
            type: string
          description: Filter by memory type (e.g., preference, episodic, fact)
        - name: purpose
          in: query
          schema:
            type: string
            enum: [personalisation, support_continuity, safety]
          description: Filter by purpose tag
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Memory list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryListResponse'
        '400':
          description: Missing workspace parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: saveMemory
      summary: Save a memory
      description: |
        Creates or updates a memory entity with an observation. Provenance on
        Metadata[`provenance`] flows through to the `trust_model` and
        `source_type` columns — user_requested yields (explicit,
        user_requested), operator_curated yields (curated, operator_curated),
        agent_extracted / system_generated yield inferred rows.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveMemoryRequest'
      responses:
        '201':
          description: Memory saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryResponse'
        '400':
          description: Invalid request body (e.g. missing user_id)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Request body too large
    delete:
      operationId: deleteAllMemories
      summary: Delete all memories (DSAR)
      description: Hard-deletes all memories for the given scope. Used for GDPR/CCPA data subject access requests.
      parameters:
        - name: workspace
          in: query
          required: true
          schema:
            type: string
        - name: user_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: All memories deleted

  /memories/search:
    get:
      operationId: searchMemories
      summary: Search memories
      description: Searches memories by content query within the given scope.
      parameters:
        - name: workspace
          in: query
          required: true
          schema:
            type: string
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query
        - name: user_id
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
        - name: min_confidence
          in: query
          schema:
            type: number
            format: float
            minimum: 0
            maximum: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryListResponse'
        '400':
          description: Missing workspace or query parameter

  /memories/export:
    get:
      operationId: exportMemories
      summary: Export all memories (DSAR)
      description: Returns all memories for a user as a downloadable JSON file. Used for GDPR data subject access requests.
      parameters:
        - name: workspace
          in: query
          required: true
          schema:
            type: string
        - name: user_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Memory export
          headers:
            Content-Disposition:
              schema:
                type: string
              description: 'attachment; filename="memories-export.json"'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryListResponse'

  /memories/aggregate:
    get:
      operationId: aggregateMemories
      summary: Workspace-scoped memory aggregate
      description: |
        Returns a `[{key, value, count}]` aggregate over `memory_entities`
        for the specified workspace. Composes the `analytics:aggregate`
        consent filter so users without that grant are excluded.
      parameters:
        - name: workspace
          in: query
          required: true
          schema:
            type: string
        - name: groupBy
          in: query
          required: true
          schema:
            type: string
            enum: [category, agent, day, tier]
          description: |
            Dimension to group results by. The `tier` value classifies each row
            into one of `institutional` / `agent` / `user` based on which scope
            columns are populated. The user-tier count reflects only memories
            owned by users who granted `analytics:aggregate` consent;
            institutional and agent rows have no `virtual_user_id` and are
            unaffected by the consent filter.
        - name: metric
          in: query
          required: false
          schema:
            type: string
            enum: [count, distinct_users]
            default: count
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Inclusive RFC3339 lower bound on `created_at`.
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Exclusive RFC3339 upper bound on `created_at`.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [key, value, count]
                  properties:
                    key:
                      type: string
                    value:
                      type: integer
                      format: int64
                    count:
                      type: integer
                      format: int64
        '400':
          description: Invalid query parameter
        '500':
          description: Internal error

  /memories/retrieve:
    post:
      operationId: retrieveMultiTier
      summary: Multi-tier retrieval
      description: |
        Runs a single query across institutional, agent, user, and user-for-
        agent tiers and returns ranked results for RAG context injection.
        Optional `purposes` narrows by `memory_entities.purpose`. Graph and
        structured-lookup additions are Phase 3 multi-mode extensions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetrieveMultiTierRequest'
      responses:
        '200':
          description: Ranked multi-tier memories
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetrieveMultiTierResponse'
        '400':
          description: Missing workspace_id

  /memories/batch:
    delete:
      operationId: batchDeleteMemories
      summary: Batch delete memories (DSAR cascade)
      description: |
        Paginated hard delete for a scope — used by the DSAR cascade so
        large datasets don't need to fit in one transaction. Returns the
        count of rows deleted in this batch; clients repeat until zero.
      parameters:
        - name: workspace
          in: query
          required: true
          schema:
            type: string
        - name: user_id
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 500
            maximum: 10000
      responses:
        '200':
          description: Batch delete result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchDeleteResponse'

  /memories/{id}:
    delete:
      operationId: deleteMemory
      summary: Forget a memory
      description: Soft-deletes a memory (sets forgotten=true).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: workspace
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Memory forgotten
        '400':
          description: Missing memory ID or workspace
        '404':
          description: Memory not found

  /institutional/memories:
    get:
      operationId: listInstitutionalMemories
      summary: List institutional (workspace-scoped) memories
      description: |
        Returns memories with `virtual_user_id IS NULL AND agent_id IS NULL`
        — the operator-curated tier every user in the workspace sees.
      parameters:
        - name: workspace
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Institutional memories
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListInstitutionalResponse'
        '400':
          description: Missing workspace
    post:
      operationId: saveInstitutionalMemory
      summary: Create an institutional memory
      description: |
        Creates a workspace-scoped operator-curated memory. The store
        forces `trust_model=curated`, `source_type=operator_curated` and
        `provenance=operator_curated`. Optional `expires_at` lets operators
        time-box a rule; past values are rejected with 400.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveInstitutionalRequest'
      responses:
        '201':
          description: Institutional memory created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryResponse'
        '400':
          description: Missing workspace_id or expires_at in the past

  /institutional/memories/{id}:
    delete:
      operationId: deleteInstitutionalMemory
      summary: Soft-delete an institutional memory
      description: |
        Refuses (400 with `ErrNotInstitutional`) when the target row
        carries a user_id or agent_id — that prevents misuse of the
        admin path to erase user data.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: workspace
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Institutional memory forgotten
        '400':
          description: Target row isn't institutional

  /agent-memories:
    get:
      operationId: listAgentScopedMemories
      summary: List agent-scoped admin memories
      description: |
        Returns memories with `virtual_user_id IS NULL AND agent_id = Y`
        — operator-curated rows visible to every user of agent Y.
      parameters:
        - name: workspace
          in: query
          required: true
          schema:
            type: string
        - name: agent
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Agent-scoped memories
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAgentScopedResponse'
        '400':
          description: Missing workspace or agent
    post:
      operationId: saveAgentScopedMemory
      summary: Create an agent-scoped admin memory
      description: |
        Creates a (workspace, agent)-scoped operator-curated memory.
        The store sanitizes scope (strips user_id), forces
        `trust_model=curated`, and refuses if workspace or agent_id is
        missing.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveAgentScopedRequest'
      responses:
        '201':
          description: Agent-scoped memory created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryResponse'
        '400':
          description: Missing workspace_id or agent_id

  /agent-memories/{id}:
    delete:
      operationId: deleteAgentScopedMemory
      summary: Soft-delete an agent-scoped memory
      description: |
        Refuses (400 with `ErrNotAgentScoped`) when the target row
        carries a user_id or belongs to a different agent.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: workspace
          in: query
          required: true
          schema:
            type: string
        - name: agent
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Agent-scoped memory forgotten
        '400':
          description: Missing params or target row isn't agent-scoped

  /compaction/candidates:
    get:
      operationId: listCompactionCandidates
      summary: List compaction candidates
      description: |
        Returns `(workspace, user, agent)` buckets of non-superseded
        observations older than `older_than_hours`. Used by a summarizer
        agent to discover which memories to summarize — read-only, never
        mutates rows.
      parameters:
        - name: workspace
          in: query
          required: true
          schema:
            type: string
        - name: older_than_hours
          in: query
          schema:
            type: integer
            default: 720
            minimum: 1
          description: Observations older than this many hours qualify (default 30d).
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 200
          description: Max buckets returned per call.
        - name: max_per_bucket
          in: query
          schema:
            type: integer
            default: 50
            maximum: 500
          description: Max observations attached to each bucket.
        - name: min_group_size
          in: query
          schema:
            type: integer
            default: 10
            minimum: 1
          description: Skip buckets with fewer observations than this.
      responses:
        '200':
          description: Compaction candidates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListCompactionCandidatesResponse'
        '400':
          description: Missing workspace

  /compaction/summaries:
    post:
      operationId: saveCompactionSummary
      summary: Persist a compaction summary
      description: |
        Creates a new summary entity and marks `superseded_by` on each
        listed observation in a single transaction. Returns 409 Conflict
        with the `ErrCompactionRaced` sentinel when another writer
        superseded the targets first — agents should treat that as an
        idempotent no-op.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveCompactionSummaryRequest'
      responses:
        '201':
          description: Summary created and originals superseded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveCompactionSummaryResponse'
        '400':
          description: Missing workspace_id, content, or superseded_observation_ids
        '409':
          description: Another writer already superseded the targets (idempotent)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    Memory:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        type:
          type: string
          description: Free-form memory type (e.g., preference, episodic, fact, need)
        content:
          type: string
          description: Natural language memory content
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
        scope:
          type: object
          additionalProperties:
            type: string
          description: 'Scoping keys: workspace_id (required), user_id, agent_id'
        metadata:
          type: object
          additionalProperties: true
          description: |
            Free-form metadata. Well-known keys the store interprets:
            `provenance` → maps to trust_model/source_type,
            `purpose` → maps to the purpose column.
        sessionId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
          readOnly: true
        accessedAt:
          type: string
          format: date-time
          readOnly: true
        expiresAt:
          type: string
          format: date-time
      required:
        - type
        - content
        - confidence
        - scope

    SaveMemoryRequest:
      type: object
      properties:
        type:
          type: string
        content:
          type: string
        metadata:
          type: object
          additionalProperties: true
        confidence:
          type: number
          format: float
        scope:
          type: object
          additionalProperties:
            type: string
        session_id:
          type: string
          format: uuid
        turn_range:
          type: array
          items:
            type: integer
          minItems: 2
          maxItems: 2
        category:
          type: string
      required:
        - type
        - content
        - confidence
        - scope

    MemoryListResponse:
      type: object
      properties:
        memories:
          type: array
          items:
            $ref: '#/components/schemas/Memory'
        total:
          type: integer

    MemoryResponse:
      type: object
      properties:
        memory:
          $ref: '#/components/schemas/Memory'

    ErrorResponse:
      type: object
      properties:
        error:
          type: string

    BatchDeleteResponse:
      type: object
      properties:
        deleted:
          type: integer
          description: Number of memories deleted in this batch.

    RetrieveMultiTierRequest:
      type: object
      properties:
        workspace_id:
          type: string
        user_id:
          type: string
        agent_id:
          type: string
        query:
          type: string
        types:
          type: array
          items:
            type: string
        purposes:
          type: array
          items:
            type: string
          description: Filter by `memory_entities.purpose`. Empty returns every purpose.
        min_confidence:
          type: number
          format: float
        limit:
          type: integer
      required:
        - workspace_id

    RetrieveMultiTierResponse:
      type: object
      properties:
        memories:
          type: array
          items:
            $ref: '#/components/schemas/MultiTierMemory'
        total:
          type: integer

    MultiTierMemory:
      allOf:
        - $ref: '#/components/schemas/Memory'
        - type: object
          properties:
            tier:
              type: string
              enum: [institutional, agent, user, user_for_agent]
            accessCount:
              type: integer
            score:
              type: number
              format: float

    SaveInstitutionalRequest:
      type: object
      properties:
        workspace_id:
          type: string
        type:
          type: string
        content:
          type: string
        metadata:
          type: object
          additionalProperties: true
        confidence:
          type: number
          format: float
        expires_at:
          type: string
          format: date-time
          description: Optional ISO-8601 UTC timestamp; past values rejected.
      required:
        - workspace_id
        - type
        - content

    ListInstitutionalResponse:
      type: object
      properties:
        memories:
          type: array
          items:
            $ref: '#/components/schemas/Memory'
        total:
          type: integer

    SaveAgentScopedRequest:
      type: object
      properties:
        workspace_id:
          type: string
        agent_id:
          type: string
        type:
          type: string
        content:
          type: string
        metadata:
          type: object
          additionalProperties: true
        confidence:
          type: number
          format: float
      required:
        - workspace_id
        - agent_id
        - type
        - content

    ListAgentScopedResponse:
      type: object
      properties:
        memories:
          type: array
          items:
            $ref: '#/components/schemas/Memory'
        total:
          type: integer

    CompactionEntry:
      type: object
      properties:
        entity_id:
          type: string
          format: uuid
        observation_id:
          type: string
          format: uuid
        kind:
          type: string
        content:
          type: string
        observed_at:
          type: string
          format: date-time

    CompactionCandidate:
      type: object
      properties:
        workspace_id:
          type: string
        user_id:
          type: string
        agent_id:
          type: string
        observation_ids:
          type: array
          items:
            type: string
            format: uuid
        entries:
          type: array
          items:
            $ref: '#/components/schemas/CompactionEntry'

    ListCompactionCandidatesResponse:
      type: object
      properties:
        candidates:
          type: array
          items:
            $ref: '#/components/schemas/CompactionCandidate'
        total:
          type: integer

    SaveCompactionSummaryRequest:
      type: object
      properties:
        workspace_id:
          type: string
        user_id:
          type: string
        agent_id:
          type: string
        kind:
          type: string
          description: Entity kind for the new summary (default `temporal_summary`).
        content:
          type: string
          description: The summarized text that replaces the originals.
        confidence:
          type: number
          format: float
        superseded_observation_ids:
          type: array
          items:
            type: string
            format: uuid
          description: Observation IDs to mark `superseded_by` the new summary.
      required:
        - workspace_id
        - content
        - superseded_observation_ids

    SaveCompactionSummaryResponse:
      type: object
      properties:
        summary_entity_id:
          type: string
          format: uuid

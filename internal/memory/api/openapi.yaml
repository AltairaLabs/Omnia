          type: string
        kind:
          type: string
        user_id:
          type: string
        agent_id:
          type: string
        active_count:
          type: integer

    LinkRequest:
      type: object
      properties:
        source_id:
          type: string
        target_id:
          type: string
        relation_type:
          type: string
        weight:
          type: number
          format: float
        scope:
          type: object
          additionalProperties:
            type: string
          description: Must include workspace_id.
      required:
        - source_id
        - target_id
        - relation_type
        - scope

    LinkResponse:
      type: object
      properties:
        id:
          type: string
          description: The newly-created relation ID.

    ListSummaryCandidatesResponse:
      type: object
      properties:
        candidates:
          type: array
          items:
            $ref: '#/components/schemas/SummaryCandidateResponse'
        total:
          type: integer

    SummaryCandidateResponse:
      type: object
      properties:

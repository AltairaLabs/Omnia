---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-omnia-altairalabs-ai-v1alpha1-agentruntime
  failurePolicy: Fail
  name: vagentruntime.kb.io
  rules:
  - apiGroups:
    - omnia.altairalabs.ai
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - agentruntimes
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-omnia-altairalabs-ai-v1alpha1-provider
  failurePolicy: Ignore
  name: vprovider.kb.io
  rules:
  - apiGroups:
    - omnia.altairalabs.ai
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - providers
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-omnia-altairalabs-ai-v1alpha1-skillsource
  failurePolicy: Fail
  name: vskillsource.kb.io
  rules:
  - apiGroups:
    - omnia.altairalabs.ai
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - skillsources
  sideEffects: None

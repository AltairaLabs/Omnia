# ClusterRole granting service pods (facade/runtime/session-api/memory-api)
# read access to cluster-scoped CRDs they resolve at runtime:
#   - workspaces: agents resolve per-workspace service URLs from
#     Workspace.status.services; the memory-api consolidation worker lists
#     Workspaces cluster-wide to find those opted into each MemoryPolicy.
#   - memorypolicies: the memory-api consolidation worker lists MemoryPolicy
#     CRs cluster-wide each pass to decide which workspaces to consolidate.
#   - sessionprivacypolicies + agentruntimes: the enterprise memory-policy/
#     privacy watcher lists both cluster-wide at startup to load consent
#     enforcement and resolve a policy's target agents/workspaces; without them
#     the watcher fails forbidden and privacy/projection wiring stalls.
# The AgentRuntimeReconciler / WorkspaceReconciler create a ClusterRoleBinding
# per pod that references this ClusterRole by the name passed to
# --agent-workspace-reader-clusterrole (default: "omnia-agent-workspace-reader").
#
# Without this file, kustomize-based deployments (including `make deploy` used
# by e2e) do not create the ClusterRole, leaving the per-agent CRBs dangling
# and breaking Workspace status resolution in agent pods. The Helm chart has
# its own equivalent template under
# charts/omnia/templates/agent-workspace-reader-clusterrole.yaml.
#
# NOTE: the name is "agent-workspace-reader" (without the omnia- prefix)
# because config/default/kustomization.yaml applies `namePrefix: omnia-` to
# all resources. After kustomize transformation the final name is
# `omnia-agent-workspace-reader`, which matches the value passed to the
# operator via --agent-workspace-reader-clusterrole in e2e.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agent-workspace-reader
rules:
  - apiGroups:
      - omnia.altairalabs.ai
    resources:
      - workspaces
      - memorypolicies
      - sessionprivacypolicies
      - agentruntimes
    verbs:
      - get
      - list
      - watch

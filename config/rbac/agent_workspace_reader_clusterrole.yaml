# ClusterRole granting per-workspace SERVICE pods (session-api, memory-api)
# read access to cluster-scoped CRDs they resolve at runtime:
#   - workspaces: the memory-api consolidation worker lists Workspaces
#     cluster-wide to find those opted into each MemoryPolicy.
#   - memorypolicies: the memory-api consolidation worker lists MemoryPolicy
#     CRs cluster-wide each pass to decide which workspaces to consolidate.
#
# Agent pods (facade/runtime) and Arena eval-workers do NOT bind this role.
# They read only their own Workspace, via a per-workspace ClusterRole the
# Workspace reconciler creates with verbs: [get] and resourceNames scoped to
# that one workspace (internal/controller/workspace_rbac.go, #1875). The
# cluster-wide list survives here only because consolidation genuinely needs it.
#
# NOTE: the enterprise privacy watcher also needs sessionprivacypolicies +
# agentruntimes, but they must NOT be added here — the core operator doesn't
# hold sessionprivacypolicies (an EE CRD) and has no bind/escalate, so adding it
# makes Kubernetes' RBAC escalation check block the operator from creating the
# per-pod ClusterRoleBindings to this role. That EE grant belongs in a separate
# enterprise-gated reader role (tracked in #1444).
# The AgentRuntimeReconciler / WorkspaceReconciler create a ClusterRoleBinding
# per pod that references this ClusterRole by the name passed to
# --agent-workspace-reader-clusterrole (default: "omnia-agent-workspace-reader").
#
# Without this file, kustomize-based deployments (including `make deploy` used
# by e2e) do not create the ClusterRole, leaving the per-agent CRBs dangling
# and breaking Workspace status resolution in agent pods. The Helm chart has
# its own equivalent template under
# charts/omnia/templates/agent-workspace-reader-clusterrole.yaml.
#
# NOTE: the name is "agent-workspace-reader" (without the omnia- prefix)
# because config/default/kustomization.yaml applies `namePrefix: omnia-` to
# all resources. After kustomize transformation the final name is
# `omnia-agent-workspace-reader`, which matches the value passed to the
# operator via --agent-workspace-reader-clusterrole in e2e.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agent-workspace-reader
rules:
  - apiGroups:
      - omnia.altairalabs.ai
    resources:
      - workspaces
      - memorypolicies
    verbs:
      - get
      - list
      - watch

apiVersion: omnia.altairalabs.ai/v1alpha1
kind: AgentRuntime
metadata:
  labels:
    app.kubernetes.io/name: omnia
    app.kubernetes.io/managed-by: kustomize
  name: customer-support-agent
spec:
  # Reference to the PromptPack containing agent prompts
  promptPackRef:
    name: customer-support
    track: stable
  # WebSocket facade for client connections
  facade:
    type: websocket
    port: 8080
  # Optional tool registry reference
  toolRegistryRef:
    name: support-tools
  # Session configuration using Redis
  session:
    type: redis
    storeRef:
      name: redis-credentials
    ttl: "24h"
  # Deployment configuration
  runtime:
    replicas: 2
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
  # Reference a Provider CRD for LLM configuration
  providers:
    - name: default
      providerRef:
        name: claude-sonnet
        namespace: omnia-system
---
# Secret containing Redis connection URL
apiVersion: v1
kind: Secret
metadata:
  name: redis-credentials
type: Opaque
stringData:
  url: "redis://redis.cache.svc.cluster.local:6379"

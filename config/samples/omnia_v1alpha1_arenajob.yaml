# Sample ArenaJob - Evaluation with Provider CRD refs
apiVersion: omnia.altairalabs.ai/v1alpha1
kind: ArenaJob
metadata:
  name: assertions-eval-run
  namespace: omnia-system
spec:
  sourceRef:
    name: assertions-eval
  type: evaluation
  providers:
    default:
      - providerRef:
          name: claude-sonnet
      - providerRef:
          name: gpt-4o
    judge:
      - providerRef:
          name: claude-haiku
  evaluation:
    outputFormats:
      - junit
      - json
  workers:
    replicas: 2
  ttlSecondsAfterFinished: 3600
---
# Sample ArenaJob - Evaluation with agent (fleet-style)
apiVersion: omnia.altairalabs.ai/v1alpha1
kind: ArenaJob
metadata:
  name: agent-eval-run
  namespace: omnia-system
spec:
  sourceRef:
    name: assertions-eval
  type: evaluation
  providers:
    default:
      - agentRef:
          name: support-agent
    selfplay:
      - providerRef:
          name: gpt-4o-mini
  workers:
    replicas: 1
---
# Sample ArenaJob - Scheduled evaluation with tool registries
apiVersion: omnia.altairalabs.ai/v1alpha1
kind: ArenaJob
metadata:
  name: nightly-eval
  namespace: omnia-system
spec:
  sourceRef:
    name: assertions-eval
  type: evaluation
  providers:
    default:
      - providerRef:
          name: claude-sonnet
  toolRegistries:
    - name: internal-tools
  workers:
    replicas: 1
  schedule:
    cron: "0 2 * * *"
    timezone: "UTC"
    concurrencyPolicy: Forbid

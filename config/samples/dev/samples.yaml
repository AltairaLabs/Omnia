---
# Namespace for sample resources
apiVersion: v1
kind: Namespace
metadata:
  name: dev-agents
---
# Workspace CRD - maps to dev-agents namespace
# This makes the namespace visible in the dashboard
apiVersion: omnia.altairalabs.ai/v1alpha1
kind: Workspace
metadata:
  name: dev-agents
spec:
  displayName: Development Agents
  description: Development workspace for agent testing
  environment: development
  namespace:
    name: dev-agents
  # Anonymous owner access is the default here because this file is the
  # local-dev sample set — `tilt up` deploys it into a kind/orbstack
  # cluster with no OAuth wired up, and without anonymous owner access
  # the dashboard renders an empty shell with no workspace visible.
  # This file ships only to dev clusters; production Workspaces leave
  # anonymousAccess off (or unset) and rely on real auth.
  # Override locally with: kubectl patch workspace dev-agents \
  #   --type=merge -p '{"spec":{"anonymousAccess":{"enabled":false}}}'
  anonymousAccess:
    enabled: true
    role: owner
  # Per-workspace session-api and memory-api instances.
  # The operator creates Deployments/Services named session-dev-agents-default
  # and memory-dev-agents-default in the dev-agents namespace.
  services:
    - name: default
      mode: managed
      session:
        database:
          secretRef:
            name: omnia-postgres
      memory:
        database:
          secretRef:
            name: omnia-postgres-memory
---
# PostgreSQL connection secrets for per-workspace services.
# Session-api and memory-api use separate databases on the same server.
apiVersion: v1
kind: Secret
metadata:
  name: omnia-postgres
  namespace: dev-agents
type: Opaque
stringData:
  POSTGRES_CONN: "postgres://omnia:omnia@omnia-postgres.omnia-system.svc.cluster.local:5432/omnia_sessions?sslmode=disable"
---
apiVersion: v1
kind: Secret
metadata:
  name: omnia-postgres-memory
  namespace: dev-agents
type: Opaque
stringData:
  POSTGRES_CONN: "postgres://omnia:omnia@omnia-postgres.omnia-system.svc.cluster.local:5432/omnia_memory?sslmode=disable"
---
# =============================================================================
# Credential Secrets for Providers
# These secrets are managed by the dashboard's Credentials Management UI
# Label: omnia.altairalabs.ai/type=credentials makes them visible in the UI
# =============================================================================

# Anthropic credentials (used by claude-provider)
apiVersion: v1
kind: Secret
metadata:
  name: anthropic-credentials
  namespace: dev-agents
  labels:
    omnia.altairalabs.ai/type: credentials
  annotations:
    omnia.altairalabs.ai/provider: claude
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "sk-ant-demo-key-replace-with-real-key"
---
# OpenAI credentials (used by openai-provider)
apiVersion: v1
kind: Secret
metadata:
  name: openai-credentials
  namespace: dev-agents
  labels:
    omnia.altairalabs.ai/type: credentials
  annotations:
    omnia.altairalabs.ai/provider: openai
type: Opaque
stringData:
  OPENAI_API_KEY: "sk-demo-key-replace-with-real-key"
---
# Gemini credentials (used by gemini-provider)
apiVersion: v1
kind: Secret
metadata:
  name: gemini-credentials
  namespace: dev-agents
  labels:
    omnia.altairalabs.ai/type: credentials
  annotations:
    omnia.altairalabs.ai/provider: gemini
type: Opaque
stringData:
  GEMINI_API_KEY: "ya29-demo-key-replace-with-real-key"
---
# =============================================================================
# Provider CRDs
# Reusable LLM provider configurations that reference credential secrets
# =============================================================================

# Claude provider using Anthropic credentials
apiVersion: omnia.altairalabs.ai/v1alpha1
kind: Provider
metadata:
  name: claude-provider
  namespace: dev-agents
spec:
  type: claude
  model: claude-sonnet-4-20250514
  secretRef:
    name: anthropic-credentials
  defaults:
    temperature: "0.7"
    maxTokens: 4096
  pricing:
    inputCostPer1K: "0.003"
    outputCostPer1K: "0.015"
---
# OpenAI provider using OpenAI credentials
apiVersion: omnia.altairalabs.ai/v1alpha1
kind: Provider
metadata:
  name: openai-provider
  namespace: dev-agents
spec:
  type: openai
  model: gpt-4o
  secretRef:
    name: openai-credentials
  defaults:
    temperature: "0.7"
    maxTokens: 4096
  pricing:
    inputCostPer1K: "0.005"
    outputCostPer1K: "0.015"
---
# Gemini provider using Google AI Studio credentials
apiVersion: omnia.altairalabs.ai/v1alpha1
kind: Provider
metadata:
  name: gemini-provider
  namespace: dev-agents
spec:
  type: gemini
  model: gemini-2.5-flash
  secretRef:
    name: gemini-credentials
  defaults:
    temperature: "0.7"
    maxTokens: 4096
  pricing:
    inputCostPer1K: "0.0001"
    outputCostPer1K: "0.0004"
---
# Ollama provider for local LLM with tool calling
apiVersion: omnia.altairalabs.ai/v1alpha1
kind: Provider
metadata:
  name: ollama-provider
  namespace: dev-agents
spec:
  type: ollama
  model: qwen2.5:14b
  baseURL: http://dev-ollama.dev-agents:11434
  defaults:
    temperature: "0.7"
    contextWindow: 8192
    truncationStrategy: sliding
  pricing:
    inputCostPer1K: "0.001"
    outputCostPer1K: "0.002"
---
# ConfigMap for PromptPack (must contain pack.json)
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-prompts
  namespace: dev-agents
data:
  pack.json: |
    {
      "$schema": "https://promptpack.org/schema/latest/promptpack.schema.json",
      "id": "demo-prompts",
      "name": "Demo Prompts",
      "version": "2.0.0",
      "description": "Demo pack showcasing validators, tools, and workflow features.",
      "template_engine": {
        "version": "v1",
        "syntax": "{{variable}}",
        "features": ["basic_substitution"]
      },
      "prompts": {
        "default": {
          "id": "default",
          "name": "General Assistant",
          "description": "Friendly general-purpose assistant with tool access.",
          "version": "2.0.0",
          "system_template": "You are Omnia's demo assistant. You have tools — USE them. These rules are strict and not optional.\n\n1. User states a fact about themselves (name, preferences, opinions, projects, 'I am X', 'I like Y', 'my favourite Z is W') → call `memory__remember` FIRST, then reply. Never just say 'I'll remember' — you MUST call the tool. No exceptions.\n2. User asks about their past or identity ('what's my name?', 'what do I like?', 'what did I tell you about…?') → call `memory__recall` first, then answer from the results. Never call `memory__recall` on a statement of fact — only on questions.\n3. Weather question → call `search_places` for coordinates, then `get_weather` with those coordinates. Summarise in plain English.\n4. Math or arithmetic → call `calculate`. Do not compute in your head.\n\nAfter tool calls, be warm and concise in your reply. Use the user's name once you know it. Refer back to things they've told you. Do not call tools when none of rules 1-4 apply — just answer the question directly.",
          "tools": ["search_places", "get_weather", "calculate"],
          "tool_policy": {
            "tool_choice": "auto",
            "max_rounds": 3
          },
          "parameters": {
            "temperature": 0.7,
            "max_tokens": 1024
          },
          "validators": [
            {
              "type": "max_length",
              "enabled": true,
              "fail_on_violation": false,
              "params": {
                "max_characters": 2000
              }
            }
          ]
        }
      },
      "tools": {
        "search_places": {
          "name": "search_places",
          "description": "Search for a place by name to get its coordinates. Returns latitude, longitude, country, and timezone.",
          "parameters": {
            "type": "object",
            "properties": {
              "name": {
                "type": "string",
                "description": "City or place name to search for"
              }
            },
            "required": ["name"]
          }
        },
        "get_weather": {
          "name": "get_weather",
          "description": "Get current weather for given coordinates. Requires latitude and longitude (use search_places first to get coordinates).",
          "parameters": {
            "type": "object",
            "properties": {
              "latitude": {
                "type": "number",
                "description": "Latitude of the location"
              },
              "longitude": {
                "type": "number",
                "description": "Longitude of the location"
              },
              "current": {
                "type": "string",
                "description": "Comma-separated weather variables: temperature_2m,wind_speed_10m,relative_humidity_2m,weather_code"
              }
            },
            "required": ["latitude", "longitude"]
          }
        },
        "calculate": {
          "name": "calculate",
          "description": "Evaluate a mathematical expression (e.g. \"2 * (3 + 4)\", \"sqrt(16)\", \"sin(pi/2)\")",
          "parameters": {
            "type": "object",
            "properties": {
              "expr": {
                "type": "string",
                "description": "Mathematical expression to evaluate"
              }
            },
            "required": ["expr"]
          }
        }
      },
      "skills": [
        {
          "name": "demo-guidelines",
          "description": "Guidelines for demo conversations",
          "instructions": "This is a demo environment. Keep responses brief and showcase tool usage when relevant. Avoid making real API calls or referencing production systems."
        }
      ],
      "metadata": {
        "domain": "demo",
        "language": "en",
        "tags": ["demo", "general", "tools"]
      }
    }
---
# PromptPack
apiVersion: omnia.altairalabs.ai/v1alpha1
kind: PromptPack
metadata:
  name: demo-prompts
  namespace: dev-agents
spec:
  source:
    type: configmap
    configMapRef:
      name: demo-prompts
  version: "2.0.0"
---
# ToolRegistry with HTTP handlers
apiVersion: omnia.altairalabs.ai/v1alpha1
kind: ToolRegistry
metadata:
  name: demo-tools
  namespace: dev-agents
spec:
  handlers:
  - name: search-places
    type: http
    httpConfig:
      endpoint: "https://geocoding-api.open-meteo.com/v1/search"
      method: GET
    tool:
      name: search_places
      description: Search for a place by name to get its coordinates. Returns latitude, longitude, country, and timezone.
      inputSchema:
        type: object
        properties:
          name:
            type: string
            description: City or place name to search for
        required: [name]
      outputSchema:
        type: object
        properties:
          results:
            type: array
            description: List of matching places
            items:
              type: object
              properties:
                name:
                  type: string
                  description: Place name
                latitude:
                  type: number
                  description: Latitude coordinate
                longitude:
                  type: number
                  description: Longitude coordinate
                country:
                  type: string
                  description: Country name
                timezone:
                  type: string
                  description: Timezone identifier (e.g. America/New_York)
                country_code:
                  type: string
                  description: Two-letter country code
                population:
                  type: integer
                  description: Population count
    timeout: "10s"
  - name: weather
    type: http
    httpConfig:
      endpoint: "https://api.open-meteo.com/v1/forecast"
      method: GET
    tool:
      name: get_weather
      description: Get current weather for given coordinates. Requires latitude and longitude (use search_places first to get coordinates).
      inputSchema:
        type: object
        properties:
          latitude:
            type: number
            description: Latitude of the location
          longitude:
            type: number
            description: Longitude of the location
          current:
            type: string
            description: "Comma-separated weather variables: temperature_2m,wind_speed_10m,relative_humidity_2m,weather_code"
        required: [latitude, longitude]
      outputSchema:
        type: object
        properties:
          latitude:
            type: number
          longitude:
            type: number
          current:
            type: object
            description: Current weather measurements
            properties:
              time:
                type: string
                description: ISO 8601 timestamp of the measurement
              temperature_2m:
                type: number
                description: Temperature at 2m height in configured units
              wind_speed_10m:
                type: number
                description: Wind speed at 10m height in configured units
              relative_humidity_2m:
                type: number
                description: Relative humidity at 2m height as percentage
              weather_code:
                type: integer
                description: WMO weather code (0=clear, 1-3=partly cloudy, 45-48=fog, 51-55=drizzle, 61-65=rain, 71-75=snow, 80-82=showers, 95-99=thunderstorm)
          current_units:
            type: object
            description: Units for each current weather variable
    timeout: "10s"
  - name: calculator
    type: http
    httpConfig:
      endpoint: "https://api.mathjs.org/v4/"
      method: GET
    tool:
      name: calculate
      description: "Evaluate a mathematical expression (e.g. \"2 * (3 + 4)\", \"sqrt(16)\", \"sin(pi/2)\")"
      inputSchema:
        type: object
        properties:
          expr:
            type: string
            description: Mathematical expression to evaluate
        required: [expr]
      outputSchema:
        type: string
        description: The computed result as a string (e.g. "14", "4", "1")
    timeout: "5s"
---
# =============================================================================
# AgentRuntime Examples
# Demonstrates different provider configurations
# =============================================================================

# Demo agent using Claude provider (references anthropic-credentials secret)
apiVersion: omnia.altairalabs.ai/v1alpha1
kind: AgentRuntime
metadata:
  name: demo-agent
  namespace: dev-agents
spec:
  promptPackRef:
    name: demo-prompts
  toolRegistryRef:
    name: demo-tools
  providers:
    - name: default
      providerRef:
        name: claude-provider
  facade:
    type: websocket
    port: 8080
    handler: demo
    extraEnv:
      - name: LOG_LEVEL
        value: debug
  session:
    type: memory
    ttl: "1h"
  runtime:
    replicas: 1
    extraEnv:
      - name: LOG_LEVEL
        value: debug
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "200m"
        memory: "128Mi"
---
# Gemini agent — uses Google AI Studio's Gemini 2.0 Flash
apiVersion: omnia.altairalabs.ai/v1alpha1
kind: AgentRuntime
metadata:
  name: gemini-agent
  namespace: dev-agents
spec:
  promptPackRef:
    name: demo-prompts
  toolRegistryRef:
    name: demo-tools
  providers:
    - name: default
      providerRef:
        name: gemini-provider
  facade:
    type: websocket
    port: 8080
    handler: runtime
    extraEnv:
      - name: LOG_LEVEL
        value: debug
  memory:
    enabled: true
  session:
    type: memory
    ttl: "1h"
  runtime:
    replicas: 1
    extraEnv:
      - name: LOG_LEVEL
        value: debug
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "200m"
        memory: "128Mi"
---
# Ollama agent with memory enabled — uses local LLM with tool calling
apiVersion: omnia.altairalabs.ai/v1alpha1
kind: AgentRuntime
metadata:
  name: ollama-agent
  namespace: dev-agents
spec:
  promptPackRef:
    name: demo-prompts
  toolRegistryRef:
    name: demo-tools
  providers:
    - name: default
      providerRef:
        name: ollama-provider
  facade:
    type: websocket
    port: 8080
    handler: runtime
    extraEnv:
      - name: LOG_LEVEL
        value: debug
  memory:
    enabled: true
  session:
    type: memory
    ttl: "1h"
  runtime:
    replicas: 1
    extraEnv:
      - name: LOG_LEVEL
        value: debug
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
---
# SkillSource - sample skills from https://github.com/anthropics/skills.
# Syncs every hour; each top-level directory in the repo is a skill
# (identified by a SKILL.md file). Referenced from PromptPack.spec.skills
# to make the skill content available to agents.
apiVersion: omnia.altairalabs.ai/v1alpha1
kind: SkillSource
metadata:
  name: anthropic-skills
  namespace: dev-agents
spec:
  type: git
  git:
    url: https://github.com/anthropics/skills.git
    ref:
      branch: main
  interval: 1h
  timeout: 2m

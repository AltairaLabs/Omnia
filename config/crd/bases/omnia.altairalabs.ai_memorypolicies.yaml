                                  pattern: ^(0(\.[0-9]+)?|1(\.0+)?)$
                                  type: string
                                scoreFormula:
                                  description: |-
                                    scoreFormula overrides the default weights. Weights should sum to
                                    roughly 1.0 — the controller doesn't enforce this strictly because
                                    operators sometimes want to emphasise one signal.
                                  properties:
                                    accessFrequencyWeight:
                                      default: "0.3"
                                      pattern: ^(0(\.[0-9]+)?|1(\.0+)?)$
                                      type: string
                                    confidenceWeight:
                                      default: "0.5"
                                      pattern: ^(0(\.[0-9]+)?|1(\.0+)?)$
                                      type: string
                                    recencyWeight:
                                      default: "0.2"
                                      pattern: ^(0(\.[0-9]+)?|1(\.0+)?)$
                                      type: string
                                  type: object
                              type: object
                            lru:
                              description: MemoryLRUConfig configures the LRU branch.
                              properties:
                                enabled:
                                  default: true
                                  type: boolean
                                staleAfter:
                                  default: 120d
                                  description: |-
                                    staleAfter is the accessed_at age beyond which a row is prunable.
                                    Requires the read-path accessed_at updates shipped in retention
                                    Phase 2 — without those, every row looks stale forever.
                                  pattern: ^([0-9]+d)?([0-9]+h)?([0-9]+m)?([0-9]+s)?$
                                  type: string
                              type: object
                            mode:
                              default: Manual
                              description: |-
                                MemoryRetentionMode describes how a tier's memories are considered for
                                auto-pruning. Phase 1 only validates the shape — the RetentionWorker
                                rewrite in Phase 3 is what actually applies these modes.
                              enum:
                              - Manual
                              - TTL
                              - Decay
                              - LRU
                              - Composite
                              type: string
                            softDeleteGraceDays:
                              default: 30
                              description: |-
                                softDeleteGraceDays is the window between soft-delete (forgotten=true)
                                and hard-delete. Applies to every mode.
                              format: int32
                              maximum: 3650
                              minimum: 0
                              type: integer
                            ttl:
                              description: MemoryTTLConfig configures the TTL branch
                                of retention.
                              properties:
                                default:
                                  description: |-
                                    default is applied at write time when the caller doesn't set an
                                    explicit expires_at. Must be a Go duration string (e.g. "180d",
                                    "720h"). Empty means "no default TTL" — rows without an explicit
                                    expires_at never expire via the TTL branch.
                                  pattern: ^([0-9]+d)?([0-9]+h)?([0-9]+m)?([0-9]+s)?$
                                  type: string
                                maxAge:
                                  description: |-
                                    maxAge caps any explicit expires_at so a misbehaving client can't
                                    pin a row in the store for longer than the operator accepts. Empty
                                    means no cap.
                                  pattern: ^([0-9]+d)?([0-9]+h)?([0-9]+m)?([0-9]+s)?$
                                  type: string
                              type: object
                          type: object
                        description: |-
                          perCategory lets operators override the tier policy for specific
                          consent categories (e.g. "memory:health"). Keys are the consent
                          category strings from the consent model; values are a nested
                          tier config applied only to rows carrying that category.
                        type: object
                      softDeleteGraceDays:
                        default: 30
                        description: |-
                          softDeleteGraceDays is the window between soft-delete (forgotten=true)
                          and hard-delete. Applies to every mode.
                        format: int32
                        maximum: 3650
                        minimum: 0
                        type: integer
                      ttl:
                        description: MemoryTTLConfig configures the TTL branch of
                          retention.
                        properties:
                          default:
                            description: |-
                              default is applied at write time when the caller doesn't set an
                              explicit expires_at. Must be a Go duration string (e.g. "180d",
                              "720h"). Empty means "no default TTL" — rows without an explicit
                              expires_at never expire via the TTL branch.
                            pattern: ^([0-9]+d)?([0-9]+h)?([0-9]+m)?([0-9]+s)?$
                            type: string
                          maxAge:
                            description: |-
                              maxAge caps any explicit expires_at so a misbehaving client can't
                              pin a row in the store for longer than the operator accepts. Empty
                              means no cap.
                            pattern: ^([0-9]+d)?([0-9]+h)?([0-9]+m)?([0-9]+s)?$
                            type: string
                        type: object
                    type: object
                type: object
            required:
            - tiers
            type: object
          status:
            description: MemoryPolicyStatus is the observed state.
            properties:
              conditions:
                description: conditions reports individual validation / wiring checks.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: |-
                  observedGeneration is the spec generation the controller last
                  reconciled. Lets the dashboard detect "spec changed but status
                  hasn't caught up".
                format: int64
                type: integer
              phase:
                description: phase is the controller's high-level lifecycle state.
                enum:
                - Active
                - Error
                type: string
              workspaceCount:
                description: |-
                  workspaceCount is the number of per-workspace overrides that
                  resolved successfully (i.e. the named Workspace actually exists).
                  Useful for operator dashboards.
                format: int32
                type: integer
            type: object
        required:
        - spec
        type: object

---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: providers.omnia.altairalabs.ai
spec:
  group: omnia.altairalabs.ai
  names:
    kind: Provider
    listKind: ProviderList
    plural: providers
    shortNames:
    - prov
    singular: provider
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .spec.model
      name: Model
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Provider is the Schema for the providers API.
          It defines a reusable LLM provider configuration that can be referenced by AgentRuntimes.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Provider
            properties:
              auth:
                description: |-
                  auth defines authentication configuration for hyperscaler platforms.
                  Required when spec.platform is set; forbidden otherwise.
                properties:
                  credentialsSecretRef:
                    description: |-
                      credentialsSecretRef references a secret containing platform credentials.
                      Required for accessKey, serviceAccount, and servicePrincipal auth types.
                      Not used with workloadIdentity.

                      Expected secret keys per auth type:
                        accessKey        (bedrock):  AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
                        serviceAccount   (vertex):   credentials.json (GCP SA key JSON)
                        servicePrincipal (azure):    AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET
                    properties:
                      key:
                        description: |-
                          key is the key within the Secret to use.
                          If not specified, the provider-appropriate key is used:
                          - ANTHROPIC_API_KEY for Claude
                          - OPENAI_API_KEY for OpenAI
                          - GEMINI_API_KEY for Gemini
                        type: string
                      name:
                        description: name is the name of the Secret.
                        minLength: 1
                        type: string
                    required:
                    - name
                    type: object
                  roleArn:
                    description: |-
                      roleArn is the AWS IAM role ARN for IRSA (optional override).
                      Only applicable when platform.type is bedrock.
                    type: string
                  serviceAccountEmail:
                    description: |-
                      serviceAccountEmail is the GCP service account email for workload identity.
                      Only applicable when platform.type is vertex.
                    type: string
                  type:
                    description: type is the authentication method.
                    enum:
                    - workloadIdentity
                    - accessKey
                    - serviceAccount
                    - servicePrincipal
                    type: string
                required:
                - type
                type: object
                x-kubernetes-validations:
                - message: credentialsSecretRef is not used with workloadIdentity
                    auth
                  rule: self.type != 'workloadIdentity' || !has(self.credentialsSecretRef)
              baseURL:
                description: |-
                  baseURL overrides the provider's default API endpoint.
                  Useful for proxies, gateways (OpenRouter), or self-hosted models.
                type: string
              capabilities:
                description: |-
                  capabilities lists what this provider supports.
                  Used for capability-based filtering when binding arena providers.
                items:
                  description: ProviderCapability defines a capability that a provider
                    supports.
                  enum:
                  - text
                  - streaming
                  - vision
                  - tools
                  - json
                  - audio
                  - video
                  - documents
                  - duplex
                  type: string
                type: array
              credential:
                description: |-
                  credential defines how to obtain credentials for this provider.
                  Optional for providers that don't require credentials (e.g., mock,
                  ollama, vllm).
                properties:
                  envVar:
                    description: |-
                      envVar specifies an environment variable name containing the credential.
                      The variable must be available in the runtime pod.
                    pattern: ^[A-Za-z_][A-Za-z0-9_]*$
                    type: string
                  filePath:
                    description: |-
                      filePath specifies a path to a file containing the credential.
                      The file must be mounted in the runtime pod.
                    pattern: ^/.*
                    type: string
                  secretRef:
                    description: secretRef references a Kubernetes Secret containing
                      the credential.
                    properties:
                      key:
                        description: |-
                          key is the key within the Secret to use.
                          If not specified, the provider-appropriate key is used:
                          - ANTHROPIC_API_KEY for Claude
                          - OPENAI_API_KEY for OpenAI
                          - GEMINI_API_KEY for Gemini
                        type: string
                      name:
                        description: name is the name of the Secret.
                        minLength: 1
                        type: string
                    required:
                    - name
                    type: object
                type: object
                x-kubernetes-validations:
                - message: at most one credential method may be specified
                  rule: '(has(self.secretRef) ? 1 : 0) + (has(self.envVar) ? 1 : 0)
                    + (has(self.filePath) ? 1 : 0) <= 1'
              defaults:
                description: defaults contains provider tuning parameters.
                properties:
                  contextWindow:
                    description: |-
                      contextWindow is the model's maximum context size in tokens.
                      When conversation history exceeds this budget, truncation is applied.
                      If not specified, no automatic truncation is performed.
                    format: int32
                    type: integer
                  maxTokens:
                    description: maxTokens limits the maximum number of tokens in
                      the response.
                    format: int32
                    type: integer
                  requestTimeout:
                    description: |-
                      requestTimeout caps the wall-clock duration of non-streaming provider
                      HTTP calls (Predict, embeddings). Does not apply to streaming calls.
                      Go duration string, e.g. "2m", "90s". Defaults to the provider's
                      built-in default (typically 60s) when unset.
                    type: string
                  streamIdleTimeout:
                    description: |-
                      streamIdleTimeout bounds how long an SSE streaming body may remain
                      silent (no bytes) between reads before the stream is aborted. The
                      timer resets on every byte received, so legitimately long-running
                      streams are not affected. Useful for slow local models (e.g. Ollama
                      CPU inference) where first-token latency can exceed the default 30s.
                      Go duration string, e.g. "120s", "2m". Defaults to 30s when unset.
                    type: string
                  temperature:
                    description: |-
                      temperature controls randomness in responses (0.0-2.0).
                      Lower values make output more focused and deterministic.
                      Specified as a string to support decimal values (e.g., "0.7").
                    type: string
                  topP:
                    description: |-
                      topP controls nucleus sampling (0.0-1.0).
                      Specified as a string to support decimal values (e.g., "0.9").
                    type: string
                  truncationStrategy:
                    default: sliding
                    description: |-
                      truncationStrategy defines how to handle context overflow.
                      - sliding: Remove oldest messages first (default)
                      - summarize: Summarize old messages before removing
                      - custom: Delegate to custom runtime implementation
                    enum:
                    - sliding
                    - summarize
                    - custom
                    type: string
                type: object
              embedding:
                description: |-
                  embedding is the embedding-role config block. Required when spec.role
                  is 'embedding'; forbidden otherwise (CEL-gated).
                properties:
                  dimensions:
                    description: |-
                      dimensions is the embedding vector size the provider should emit.
                      Some providers (OpenAI text-embedding-3) support trimming; others
                      emit a fixed size and ignore this.
                    format: int32
                    maximum: 4096
                    minimum: 1
                    type: integer
                  distance:
                    description: |-
                      distance is the distance metric the vector store should use with
                      these embeddings (cosine, l2, dot). Advisory — consumers may
                      override.
                    enum:
                    - cosine
                    - l2
                    - dot
                    type: string
                type: object
              headers:
                additionalProperties:
                  type: string
                description: |-
                  headers contains custom HTTP headers to include on every provider request.
                  Useful for gateway providers such as OpenRouter that require custom
                  attribution headers, or for tenant routing in shared vLLM deployments.
                  Collisions with built-in provider headers are rejected by PromptKit.
                type: object
              model:
                description: |-
                  model specifies the model identifier (e.g., "claude-sonnet-4-20250514", "gpt-4o").
                  Required for every provider type except mock — Omnia applies no default, so
                  an empty model reaches the vendor API and is rejected at the first request.
                  A model-less non-mock Provider is admission-rejected and, if it predates that
                  rule, reported ModelValid=False / phase!=Ready by the controller (see #1819).
                  When platform.type is bedrock, a claude release name is auto-mapped to the
                  corresponding Bedrock model ID by PromptKit.
                type: string
              platform:
                description: |-
                  platform defines hyperscaler hosting configuration.
                  Supported provider × platform pairs (PromptKit v1.4.6+):
                    claude:  bedrock, vertex, azure
                    openai:  azure, bedrock
                    gemini:  vertex
                  Three pairs are rejected at admission because the hyperscaler does
                  not host the model vendor as a partner endpoint:
                    openai × vertex, gemini × bedrock, gemini × azure.
                  Auth method is constrained by platform, not by provider type (see
                  spec.auth).

                  Valid for spec.role 'llm' and 'embedding'. For embedding-role providers
                  the same provider × platform pairs apply (e.g. openai × azure for Azure
                  OpenAI embeddings, gemini × vertex); voyageai and ollama embedding
                  providers have no hyperscaler hosting and are rejected with a platform.
                properties:
                  endpoint:
                    description: |-
                      endpoint overrides the default platform API endpoint.
                      Required for azure (the Azure OpenAI resource URL).
                    type: string
                  project:
                    description: project is the GCP project ID. Required for vertex.
                    type: string
                  region:
                    description: |-
                      region is the cloud region (e.g., us-east-1, us-central1, eastus).
                      Required for bedrock and vertex; ignored for azure (inferred from endpoint).
                    type: string
                  type:
                    description: type is the hyperscaler hosting platform.
                    enum:
                    - bedrock
                    - vertex
                    - azure
                    type: string
                required:
                - type
                type: object
                x-kubernetes-validations:
                - message: project is required when platform.type is vertex
                  rule: self.type != 'vertex' || size(self.project) > 0
                - message: endpoint is required when platform.type is azure
                  rule: self.type != 'azure' || size(self.endpoint) > 0
              pricing:
                description: |-
                  pricing configures cost tracking for this provider.
                  If not specified, PromptKit's built-in pricing is used.
                properties:
                  cachedCostPer1K:
                    description: |-
                      cachedCostPer1K is the cost per 1000 cached tokens (e.g., "0.0003").
                      Cached tokens have reduced cost with some providers.
                    type: string
                  inputCostPer1K:
                    description: inputCostPer1K is the cost per 1000 input tokens
                      (e.g., "0.003").
                    type: string
                  outputCostPer1K:
                    description: outputCostPer1K is the cost per 1000 output tokens
                      (e.g., "0.015").
                    type: string
                type: object
              role:
                default: llm
                description: |-
                  role declares which kind of provider this is — selects the factory
                  registry the provider plugs into. Defaults to 'llm' for back-compat;
                  existing Providers continue to work without YAML changes.
                enum:
                - llm
                - embedding
                - tts
                - stt
                - image
                - inference
                type: string
              stt:
                description: |-
                  stt is the STT-role config block. Required when spec.role is 'stt';
                  forbidden otherwise (CEL-gated).
                properties:
                  language:
                    description: |-
                      language is the ISO-639-1 language code for transcription
                      (e.g. "en", "fr", "de"). Empty means provider auto-detects.
                    pattern: ^[a-z]{2}(-[A-Z]{2})?$
                    type: string
                  sampleRate:
                    description: |-
                      sampleRate is the input audio sample rate in Hz the provider should
                      expect.
                    format: int32
                    maximum: 48000
                    minimum: 8000
                    type: integer
                type: object
              tts:
                description: |-
                  tts is the TTS-role config block. Required when spec.role is 'tts';
                  forbidden otherwise (CEL-gated).
                properties:
                  audioFiles:
                    description: |-
                      audioFiles lists fixture audio files for mock TTS providers.
                      Ignored for non-mock providers.
                    items:
                      type: string
                    type: array
                  format:
                    description: |-
                      format is the desired output audio container (e.g. "pcm", "mp3",
                      "opus"). Provider-specific; not all providers honour it.
                    enum:
                    - pcm
                    - mp3
                    - opus
                    - wav
                    - flac
                    type: string
                  sampleRate:
                    description: sampleRate is the output audio sample rate in Hz.
                    format: int32
                    maximum: 48000
                    minimum: 8000
                    type: integer
                  voice:
                    description: |-
                      voice is the vendor's voice identifier (e.g. "alloy" / "echo" for
                      OpenAI; an ElevenLabs voice UUID; a Cartesia voice handle).
                    type: string
                type: object
              type:
                description: type specifies the provider wire protocol / vendor.
                enum:
                - claude
                - openai
                - gemini
                - ollama
                - mock
                - vllm
                - voyageai
                - cartesia
                - elevenlabs
                - imagen
                - huggingface
                type: string
            required:
            - type
            type: object
            x-kubernetes-validations:
            - message: at most one of spec.tts, spec.stt, spec.embedding may be set
              rule: '(has(self.tts) ? 1 : 0) + (has(self.stt) ? 1 : 0) + (has(self.embedding)
                ? 1 : 0) <= 1'
            - message: spec.tts is only valid when spec.role is 'tts'
              rule: '!has(self.tts) || self.role == ''tts'''
            - message: spec.stt is only valid when spec.role is 'stt'
              rule: '!has(self.stt) || self.role == ''stt'''
            - message: spec.embedding is only valid when spec.role is 'embedding'
              rule: '!has(self.embedding) || self.role == ''embedding'''
            - message: role 'llm' requires type in [claude, openai, gemini, ollama,
                mock, vllm]
              rule: self.role != 'llm' || self.type in ['claude', 'openai', 'gemini',
                'ollama', 'mock', 'vllm']
            - message: role 'embedding' requires type in [openai, voyageai, gemini,
                ollama]
              rule: self.role != 'embedding' || self.type in ['openai', 'voyageai',
                'gemini', 'ollama']
            - message: role 'tts' requires type in [openai, cartesia, elevenlabs]
              rule: self.role != 'tts' || self.type in ['openai', 'cartesia', 'elevenlabs']
            - message: role 'stt' requires type in [openai]
              rule: self.role != 'stt' || self.type in ['openai']
            - message: role 'image' requires type in [imagen]
              rule: self.role != 'image' || self.type in ['imagen']
            - message: role 'inference' requires type in [huggingface]
              rule: self.role != 'inference' || self.type in ['huggingface']
            - message: huggingface is an inference-only vendor; set spec.role to 'inference'
              rule: self.type != 'huggingface' || self.role == 'inference'
            - message: voyageai is an embedding-only vendor; set spec.role to 'embedding'
              rule: self.type != 'voyageai' || self.role == 'embedding'
            - message: cartesia is a tts-only vendor; set spec.role to 'tts'
              rule: self.type != 'cartesia' || self.role == 'tts'
            - message: elevenlabs is a tts-only vendor; set spec.role to 'tts'
              rule: self.type != 'elevenlabs' || self.role == 'tts'
            - message: imagen is an image-only vendor; set spec.role to 'image'
              rule: self.type != 'imagen' || self.role == 'image'
            - message: spec.platform is only valid when spec.role is 'llm' or 'embedding'
              rule: '!has(self.platform) || self.role in [''llm'', ''embedding'']'
            - message: platform is only valid for provider types claude, openai, or
                gemini
              rule: '!has(self.platform) || (self.type in [''claude'', ''openai'',
                ''gemini''])'
            - message: spec.platform and spec.auth must be set together
              rule: has(self.platform) == has(self.auth)
            - message: platform.type bedrock requires auth.type of workloadIdentity
                or accessKey
              rule: '!has(self.platform) || self.platform.type != ''bedrock'' || self.auth.type
                in [''workloadIdentity'', ''accessKey'']'
            - message: platform.type vertex requires auth.type of workloadIdentity
                or serviceAccount
              rule: '!has(self.platform) || self.platform.type != ''vertex'' || self.auth.type
                in [''workloadIdentity'', ''serviceAccount'']'
            - message: platform.type azure requires auth.type of workloadIdentity
                or servicePrincipal
              rule: '!has(self.platform) || self.platform.type != ''azure'' || self.auth.type
                in [''workloadIdentity'', ''servicePrincipal'']'
            - message: credentialsSecretRef is required for non-workloadIdentity auth
                types
              rule: '!(has(self.auth) && self.auth.type != ''workloadIdentity'') ||
                has(self.auth.credentialsSecretRef)'
            - message: 'openai on vertex is not supported: Vertex AI does not host
                OpenAI as a partner'
              rule: '!has(self.platform) || self.platform.type != ''vertex'' || self.type
                != ''openai'''
            - message: 'gemini on bedrock is not supported: AWS Bedrock does not host
                Gemini'
              rule: '!has(self.platform) || self.platform.type != ''bedrock'' || self.type
                != ''gemini'''
            - message: 'gemini on azure is not supported: Azure AI Foundry does not
                host Gemini'
              rule: '!has(self.platform) || self.platform.type != ''azure'' || self.type
                != ''gemini'''
            - message: spec.model is required for all provider types except mock
              rule: self.type == 'mock' || (has(self.model) && size(self.model) >
                0)
          status:
            description: status defines the observed state of Provider
            properties:
              conditions:
                description: conditions represent the current state of the Provider
                  resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: observedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
              phase:
                description: phase represents the current lifecycle phase of the Provider.
                enum:
                - Ready
                - Error
                - Unavailable
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}

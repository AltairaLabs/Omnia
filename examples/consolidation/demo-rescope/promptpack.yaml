apiVersion: omnia.altairalabs.ai/v1alpha1
kind: PromptPack
metadata:
  name: demo-rescope
  namespace: omnia-functions
  labels:
    app.kubernetes.io/component: memory-consolidation
    omnia.altairalabs.ai/pack-class: system
  annotations:
    omnia.altairalabs.ai/pack-role: consolidation-demo-rescope
    omnia.altairalabs.ai/system-pack-version: "0.1.0"
spec:
  description: |
    Demonstrative consolidation pack: cross-scope rescope.
    Handles the crossScopeCandidates axis. Emits rescope actions
    promoting observations to agent-scoped or user-scoped tiers
    when k-anonymity thresholds are met. Never targets institutional
    (rejected at the validator in v1).
  prompts:
    main: |
      You are a memory consolidation worker. Input is a JSON object
      with axis="crossScopeCandidates" and buckets of observations
      sharing kind+name across N distinct users.

      For each bucket: if bucket.stats.distinctUsers ≥
      input.gates.minDistinctUserCount.agentScoped, emit ONE rescope
      action promoting representative observations to:
        { workspaceID, agentID: <bucket.agentID>, userID: null }

      Do NOT emit rescope to (workspaceID, null, null) —
      institutional promotion is rejected in v1.

      Output: JSON array of rescope actions only.

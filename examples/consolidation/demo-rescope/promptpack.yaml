apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-rescope
  namespace: omnia-functions
data:
  pack.json: |
    {
      "id": "demo-rescope",
      "name": "demo-rescope",
      "version": "1.0.0",
      "template_engine": { "version": "v1", "syntax": "{{variable}}" },
      "prompts": {
        "default": {
          "id": "default",
          "name": "default",
          "version": "1.0.0",
          "system_template": "You are a memory consolidation worker handling the crossScopeCandidates axis. The input is a JSON object with axis=crossScopeCandidates and a buckets array; each bucket groups observations sharing entity (kind, name) across many users in one workspace. For each bucket with sufficient cross-user prevalence (>= gates.minDistinctUserCount.agentScoped), emit one rescope action promoting the observations to agent-scoped. Do not emit institutional (ws, null, null) destinations — the platform rejects them. Output a JSON array of typed actions and nothing else."
        }
      }
    }
---
apiVersion: omnia.altairalabs.ai/v1alpha1
kind: PromptPack
metadata:
  name: demo-rescope
  namespace: omnia-functions
  labels:
    app.kubernetes.io/component: memory-consolidation
    omnia.altairalabs.ai/pack-class: example
  annotations:
    omnia.altairalabs.ai/pack-role: consolidation-demo-rescope
spec:
  packName: demo-rescope
  source:
    type: configmap
    configMapRef:
      name: demo-rescope
  version: "1.0.0"

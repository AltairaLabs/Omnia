apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-merge-entities
  namespace: omnia-functions
data:
  pack.json: |
    {
      "id": "demo-merge-entities",
      "name": "demo-merge-entities",
      "version": "1.0.0",
      "template_engine": { "version": "v1", "syntax": "{{variable}}" },
      "prompts": {
        "default": {
          "id": "default",
          "name": "default",
          "version": "1.0.0",
          "system_template": "You are a memory consolidation worker handling the entityDuplicateCandidates axis. Each bucket carries two entries representing near-duplicate entities of the same kind (e.g., one entry's name is a typo or synonym of the other). When you are confident the two names refer to the same real-world entity, emit one merge_entities action with canonicalID set to the more authoritative entry's ID and mergeIDs the other entry's ID. When unsure, do not emit a merge — false positives lose information. Output a JSON array of typed actions and nothing else."
        }
      }
    }
---
apiVersion: omnia.altairalabs.ai/v1alpha1
kind: PromptPack
metadata:
  name: demo-merge-entities
  namespace: omnia-functions
  labels:
    app.kubernetes.io/component: memory-consolidation
    omnia.altairalabs.ai/pack-class: example
  annotations:
    omnia.altairalabs.ai/pack-role: consolidation-demo-merge
spec:
  source:
    type: configmap
    configMapRef:
      name: demo-merge-entities
  version: "1.0.0"

apiVersion: omnia.altairalabs.ai/v1alpha1
kind: AgentRuntime
metadata:
  name: demo-merge-entities
  namespace: omnia-functions
  labels:
    app.kubernetes.io/component: memory-consolidation
    omnia.altairalabs.ai/pack-class: example
  annotations:
    omnia.altairalabs.ai/pack-role: consolidation-demo-merge
spec:
  mode: function
  promptPackRef:
    name: demo-merge-entities
  facade:
    type: grpc
    port: 8080
  inputSchema:
    type: object
    required:
      - axis
      - workspaceID
      - buckets
    properties:
      axis:
        type: string
      workspaceID:
        type: string
      buckets:
        type: array
      gates:
        type: object
  outputSchema:
    type: array
    items:
      type: object
      required:
        - action
      properties:
        action:
          type: string
  runtime:
    replicas: 1
  providers:
    - name: default
      providerRef:
        name: mock-provider

version: "2"
run:
  allow-parallel-runners: true
linters:
  default: none
  enable:
    - copyloopvar
    - dupl
    - errcheck
    - ginkgolinter
    - gocognit
    - goconst
    - gocyclo
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
  settings:
    gocognit:
      # Match SonarCloud S3776 — same threshold locally so issues
      # surface at commit/push, not after CI bounces. Existing
      # high-complexity functions are listed in the exclusions block
      # below.
      min-complexity: 15
    goconst:
      # Match SonarCloud S1192 — flag strings duplicated 4+ times.
      min-len: 3
      min-occurrences: 4
    gocyclo:
      # Match SonarCloud-equivalent cyclomatic threshold.
      min-complexity: 15
    revive:
      rules:
        - name: comment-spacings
        - name: import-shadowing
  exclusions:
    generated: lax
    rules:
      - linters:
          - lll
        path: api/*
      - linters:
          - dupl
          - lll
        path: internal/*
      # Test files often have many test cases with similar structure
      - linters:
          - gocognit
        path: _test\.go$
      # TODO: Refactor these high-complexity functions (tracked for SonarCloud compliance)
      # Exclude existing complex functions until they can be refactored
      - linters:
          - gocognit
          - gocyclo
        path: ee/cmd/arena-dev-console/server/promptkit_handler\.go
        text: "executeStreaming"
      - linters:
          - gocognit
          - gocyclo
        path: ee/cmd/arena-worker/worker\.go
        text: "(executeWorkItem|applyProviderOverrides)"
      - linters:
          - gocognit
          - gocyclo
        path: ee/cmd/omnia-arena-controller/main\.go
        text: "main"
      - linters:
          - gocognit
        path: internal/sourcesync/dir\.go
        text: "CopyDirectoryExcluding"
      - linters:
          - gocognit
        path: internal/sourcesync/oci\.go
        text: "extractOCITarToDir"
      - linters:
          - gocyclo
        path: ee/internal/controller/arenajob_controller\.go
        text: "Reconcile"
    paths:
      - third_party$
      - builtin$
      - examples$
      # .claude/ is gitignored tooling state (incl. transient EnterWorktree
      # worktree copies). Never lint it — it isn't part of the module and can
      # contain stale/partial trees that crash the file walker locally.
      - \.claude/
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - \.claude/
      - examples$

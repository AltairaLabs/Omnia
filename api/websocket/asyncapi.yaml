asyncapi: 3.0.0
info:
  title: Omnia Agent WebSocket Protocol
  version: 1.0.0
  description: |
    WebSocket protocol between the Dashboard (browser) and Facade (agent pod).
    All tool calls sent over this channel are client-side; server-side tool
    execution is handled internally by the Runtime and never reaches this layer.

    Source of truth: `internal/facade/protocol.go`
    Generated types: `dashboard/src/types/generated/websocket.ts`

servers:
  agent:
    host: "{agentHost}"
    protocol: ws
    description: WebSocket endpoint on the Facade container

channels:
  agentWs:
    address: /ws
    description: |
      Main WebSocket channel for agent communication.
      Requires `?agent=<name>` query parameter.
      Optional: `?namespace=<ns>`, `?binary=true`

      ## Reconnect / blip-resume

      To re-attach to a parked realtime session after a transient network
      disconnect, add `?resume=<session_id>` to the connect URL. The facade
      looks up the parked session, re-attaches the client, and sends a
      `connected` message with `connected.resumed = true`. If the session is
      not found or has already expired the facade falls back to opening a new
      session (same as a cold connect) and `connected.resumed` will be `false`.

      ## Binary frames (WebSocket opcode 0x2)

      Binary WebSocket messages use the OMNI framing format defined in
      `internal/facade/binary_protocol.go`. The 8-byte header encodes
      `MessageType`, `Flags`, `Sequence` (uint32), and `PayloadLen` (uint32).

      ### Inbound audio frames — duplex audio sessions

      When a duplex audio session is active (initiated by the runtime via a
      `DuplexStart` gRPC message), the client sends raw audio as binary frames
      with `MessageType = BinaryMessageTypeMediaChunk (0x01)`.

      `is_last` contract (CRITICAL for producers):
      - The `FlagIsLast (0x01)` header flag marks the **final frame of the entire
        call** and causes the facade to tear down the duplex session (the runtime's
        `pumpDuplexInput` returns on it, triggering pipeline drain and session close).
      - Producers MUST set `FlagIsLast` **only on the true final frame**, NOT on
        every chunk. Setting it prematurely closes the session mid-call.
      - This is distinct from the outbound `MediaChunkInfo.is_last` field, which
        the server sets per-chunk per TTS stream (different semantic).

      ### Outbound media chunks — TTS / audio output

      The server sends TTS and streaming media as binary frames with
      `MessageType = BinaryMessageTypeMediaChunk`. The payload is encoded as a
      `MediaChunkFrame` (see `binary_protocol.go`). Clients can also receive
      `media_chunk` JSON messages for non-binary paths.
    messages:
      # Client -> Server
      clientMessage:
        $ref: "#/components/messages/ClientMessage"
      clientToolResult:
        $ref: "#/components/messages/ClientToolResult"
      uploadRequest:
        $ref: "#/components/messages/UploadRequest"
      # Server -> Client
      connected:
        $ref: "#/components/messages/Connected"
      chunk:
        $ref: "#/components/messages/Chunk"
      done:
        $ref: "#/components/messages/Done"
      toolCall:
        $ref: "#/components/messages/ToolCall"
      error:
        $ref: "#/components/messages/Error"
      uploadReady:
        $ref: "#/components/messages/UploadReady"
      uploadComplete:
        $ref: "#/components/messages/UploadComplete"
      mediaChunk:
        $ref: "#/components/messages/MediaChunk"
      interrupt:
        $ref: "#/components/messages/Interrupt"
      sessionConfig:
        $ref: "#/components/messages/SessionConfig"

operations:
  sendMessage:
    action: send
    channel:
      $ref: "#/channels/agentWs"
    summary: Client sends a user message
    messages:
      - $ref: "#/channels/agentWs/messages/clientMessage"

  sendToolResult:
    action: send
    channel:
      $ref: "#/channels/agentWs"
    summary: Client sends a tool execution result
    messages:
      - $ref: "#/channels/agentWs/messages/clientToolResult"

  sendUploadRequest:
    action: send
    channel:
      $ref: "#/channels/agentWs"
    summary: Client requests a file upload URL
    messages:
      - $ref: "#/channels/agentWs/messages/uploadRequest"

  receiveConnected:
    action: receive
    channel:
      $ref: "#/channels/agentWs"
    summary: Server sends connection acknowledgement with session ID
    messages:
      - $ref: "#/channels/agentWs/messages/connected"

  receiveChunk:
    action: receive
    channel:
      $ref: "#/channels/agentWs"
    summary: Server streams a text chunk
    messages:
      - $ref: "#/channels/agentWs/messages/chunk"

  receiveDone:
    action: receive
    channel:
      $ref: "#/channels/agentWs"
    summary: Server signals response complete
    messages:
      - $ref: "#/channels/agentWs/messages/done"

  receiveToolCall:
    action: receive
    channel:
      $ref: "#/channels/agentWs"
    summary: Server requests client-side tool execution
    messages:
      - $ref: "#/channels/agentWs/messages/toolCall"

  receiveError:
    action: receive
    channel:
      $ref: "#/channels/agentWs"
    summary: Server sends an error
    messages:
      - $ref: "#/channels/agentWs/messages/error"

  receiveInterrupt:
    action: receive
    channel:
      $ref: "#/channels/agentWs"
    summary: Server signals barge-in; client should clear buffered audio
    messages:
      - $ref: "#/channels/agentWs/messages/interrupt"

  receiveSessionConfig:
    action: receive
    channel:
      $ref: "#/channels/agentWs"
    summary: Server relays the negotiated duplex audio format; client (re)captures at it
    messages:
      - $ref: "#/channels/agentWs/messages/sessionConfig"

components:
  messages:
    ClientMessage:
      name: ClientMessage
      title: User message
      summary: Text or multimodal message from the client
      payload:
        type: object
        required: [type]
        properties:
          type:
            type: string
            const: message
          session_id:
            type: string
            description: Session ID for resuming (required after first message)
          content:
            type: string
            description: Text content (backward compat; Parts takes precedence)
          parts:
            type: array
            items:
              $ref: "#/components/schemas/ContentPart"
          metadata:
            type: object
            additionalProperties:
              type: string
          consent_grants:
            type: array
            items:
              type: string
              enum:
                - memory:identity
                - memory:preferences
                - memory:context
                - memory:location
                - memory:health
                - memory:history
                - analytics:aggregate
            description: |
              Per-message consent override. Replaces session and persistent
              grants for this single turn (last-writer-wins).
          session_consent_grants:
            type: array
            items:
              type: string
              enum:
                - memory:identity
                - memory:preferences
                - memory:context
                - memory:location
                - memory:health
                - memory:history
                - analytics:aggregate
            description: |
              Per-session consent grants. The first message with a non-empty
              list stamps the per-session default on the connection.
              Subsequent messages with a non-empty list replace the cached
              value (last-writer-wins). Empty / omitted lists are ignored —
              to revoke all categories for a session use the binary opt-out
              via the privacy preferences API.

    ClientToolResult:
      name: ClientToolResult
      title: Client-side tool result
      summary: Response to a tool_call message
      payload:
        type: object
        required: [type, tool_result]
        properties:
          type:
            type: string
            const: tool_result
          session_id:
            type: string
          tool_result:
            $ref: "#/components/schemas/ClientToolResultInfo"

    UploadRequest:
      name: UploadRequest
      title: File upload request
      payload:
        type: object
        required: [type, upload_request]
        properties:
          type:
            type: string
            const: upload_request
          upload_request:
            $ref: "#/components/schemas/UploadRequestInfo"

    Connected:
      name: Connected
      title: Connection established
      summary: Sent eagerly on WebSocket open with the session ID
      payload:
        type: object
        required: [type, session_id, timestamp]
        properties:
          type:
            type: string
            const: connected
          session_id:
            type: string
          connected:
            $ref: "#/components/schemas/ConnectedInfo"
          timestamp:
            type: string
            format: date-time

    Chunk:
      name: Chunk
      title: Streaming text chunk
      payload:
        type: object
        required: [type, timestamp]
        properties:
          type:
            type: string
            const: chunk
          session_id:
            type: string
          content:
            type: string
          parts:
            type: array
            items:
              $ref: "#/components/schemas/ContentPart"
          timestamp:
            type: string
            format: date-time

    Done:
      name: Done
      title: Response complete
      payload:
        type: object
        required: [type, timestamp]
        properties:
          type:
            type: string
            const: done
          session_id:
            type: string
          content:
            type: string
          parts:
            type: array
            items:
              $ref: "#/components/schemas/ContentPart"
          timestamp:
            type: string
            format: date-time

    ToolCall:
      name: ToolCall
      title: Client-side tool call
      summary: |
        All tool calls over WebSocket are client-side. Server-side tool calls
        are handled internally by the Runtime and never forwarded.
      payload:
        type: object
        required: [type, timestamp]
        properties:
          type:
            type: string
            const: tool_call
          session_id:
            type: string
          tool_call:
            $ref: "#/components/schemas/ToolCallInfo"
          timestamp:
            type: string
            format: date-time

    Error:
      name: Error
      title: Error response
      payload:
        type: object
        required: [type, timestamp]
        properties:
          type:
            type: string
            const: error
          session_id:
            type: string
          error:
            $ref: "#/components/schemas/ErrorInfo"
          timestamp:
            type: string
            format: date-time

    UploadReady:
      name: UploadReady
      title: Upload URL ready
      payload:
        type: object
        required: [type, timestamp]
        properties:
          type:
            type: string
            const: upload_ready
          session_id:
            type: string
          upload_ready:
            $ref: "#/components/schemas/UploadReadyInfo"
          timestamp:
            type: string
            format: date-time

    UploadComplete:
      name: UploadComplete
      title: Upload complete
      payload:
        type: object
        required: [type, timestamp]
        properties:
          type:
            type: string
            const: upload_complete
          session_id:
            type: string
          upload_complete:
            $ref: "#/components/schemas/UploadCompleteInfo"
          timestamp:
            type: string
            format: date-time

    MediaChunk:
      name: MediaChunk
      title: Streaming media chunk
      payload:
        type: object
        required: [type, timestamp]
        properties:
          type:
            type: string
            const: media_chunk
          session_id:
            type: string
          media_chunk:
            $ref: "#/components/schemas/MediaChunkInfo"
          timestamp:
            type: string
            format: date-time

    Interrupt:
      name: Interrupt
      title: Barge-in interrupt
      summary: |
        Signals that the in-flight audio response was interrupted (barge-in).
        The client should discard any buffered audio output and stop playback.
      payload:
        type: object
        required: [type, timestamp]
        properties:
          type:
            type: string
            const: interrupt
          session_id:
            type: string
          timestamp:
            type: string
            format: date-time

    SessionConfig:
      name: SessionConfig
      title: Negotiated duplex audio format
      summary: |
        Relays the runtime's negotiated duplex audio format (the RuntimeHello
        counter-offer). The client (re)captures at this codec / sample_rate /
        channels for the remainder of the session. Sent once at duplex-session
        start, before audio flows.
      payload:
        type: object
        required: [type, timestamp]
        properties:
          type:
            type: string
            const: session_config
          session_id:
            type: string
          session_config:
            $ref: "#/components/schemas/SessionConfigInfo"
          timestamp:
            type: string
            format: date-time

  schemas:
    ContentPart:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [text, image, audio, video, file]
        text:
          type: string
        media:
          $ref: "#/components/schemas/MediaContent"

    MediaContent:
      type: object
      required: [mime_type]
      properties:
        data:
          type: string
          description: Base64-encoded content
        url:
          type: string
          description: HTTP/HTTPS URL
        storage_ref:
          type: string
          description: Backend storage reference
        mime_type:
          type: string
        filename:
          type: string
        size_bytes:
          type: integer
        width:
          type: integer
        height:
          type: integer
        detail:
          type: string
          enum: [low, high, auto]
        duration_ms:
          type: integer
        sample_rate:
          type: integer
        channels:
          type: integer

    ToolCallInfo:
      type: object
      description: |
        Client-side tool call. No execution field — all tool calls over
        WebSocket are client-side by definition.
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        arguments:
          type: object
          additionalProperties: true
        consent_message:
          type: string
          description: Human-readable consent prompt
        categories:
          type: array
          items:
            type: string
          description: Semantic consent categories (e.g., "location", "filesystem")

    ClientToolResultInfo:
      type: object
      required: [call_id]
      properties:
        call_id:
          type: string
          description: Matches the ToolCallInfo.id
        result:
          description: Tool execution result (JSON-serializable)
        error:
          type: string
          description: Set when the client rejects or fails the tool call

    ToolResultInfo:
      type: object
      required: [id]
      properties:
        id:
          type: string
        result: {}
        error:
          type: string

    ErrorInfo:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum:
            - INVALID_MESSAGE
            - SESSION_NOT_FOUND
            - SESSION_EXPIRED
            - INTERNAL_ERROR
            - AGENT_UNAVAILABLE
            - TOOL_FAILED
            - UPLOAD_FAILED
            - MEDIA_NOT_ENABLED
            - RATE_LIMITED
        message:
          type: string
        details:
          type: object
          additionalProperties: true

    UploadRequestInfo:
      type: object
      required: [filename, mime_type, size_bytes]
      properties:
        filename:
          type: string
        mime_type:
          type: string
        size_bytes:
          type: integer

    UploadReadyInfo:
      type: object
      required: [upload_id, upload_url, storage_ref, expires_at]
      properties:
        upload_id:
          type: string
        upload_url:
          type: string
        storage_ref:
          type: string
        expires_at:
          type: string
          format: date-time

    UploadCompleteInfo:
      type: object
      required: [upload_id, storage_ref, size_bytes]
      properties:
        upload_id:
          type: string
        storage_ref:
          type: string
        size_bytes:
          type: integer

    MediaChunkInfo:
      type: object
      required: [media_id, sequence, is_last, data, mime_type]
      properties:
        media_id:
          type: string
        sequence:
          type: integer
        is_last:
          type: boolean
        data:
          type: string
          description: Base64-encoded chunk data
        mime_type:
          type: string

    SessionConfigInfo:
      type: object
      required: [codec, sample_rate, channels]
      description: The negotiated duplex audio format the client should capture at.
      properties:
        codec:
          type: string
          description: Audio encoding, e.g. "pcm".
        sample_rate:
          type: integer
          description: Sample rate in Hz, e.g. 24000.
        channels:
          type: integer
          description: Channel count, e.g. 1 for mono.

    ConnectedInfo:
      type: object
      properties:
        capabilities:
          $ref: "#/components/schemas/ConnectionCapabilities"
        resumed:
          type: boolean
          description: >
            true when this connection re-attached to a parked realtime session
            rather than starting fresh (i.e. the client supplied a valid
            `?resume=<session_id>` query parameter and the session was found).
            false (or absent) on a normal cold connect.

    ConnectionCapabilities:
      type: object
      required: [binary_frames]
      properties:
        binary_frames:
          type: boolean
        max_payload_size:
          type: integer
        protocol_version:
          type: integer

syntax = "proto3";

package omnia.runtime.v1;

option go_package = "github.com/altairalabs/omnia/pkg/runtime/v1;runtimev1";

// Contract-Version: 1.3.0
//
// The version of this contract, as consumed by third-party runtime
// implementations. Bump the minor version for additive changes (new message,
// new optional field, new oneof variant); bump the major version for any
// change that would break an existing conformant runtime. The value is
// mirrored in pkg/runtime/contract/version.go and the two are asserted equal
// by pkg/runtime/contract/version_test.go — update both together.
//
// Implementors: do NOT hand-copy this file. Published stubs are not
// available yet (they land with a later wave of the custom-runtime epic) —
// until then, generate from this file at a pinned git ref, record the
// Contract-Version you generated against, and report it from Health via
// contract_version. See
// docs/src/content/docs/reference/platform/facade-runtime-protocol.md

// RuntimeService defines the communication protocol between the facade and runtime containers.
// The facade handles external protocol translation (WebSocket/REST/gRPC to internal gRPC),
// while the runtime handles all business logic including sessions, LLM calls, and tool execution.
//
// Caller identity and JWT claims are NOT message fields — they travel as flat
// x-omnia-* gRPC metadata attached by the facade (the raw Authorization bearer
// token is deliberately withheld). See the facade↔runtime protocol reference:
// docs/src/content/docs/reference/platform/facade-runtime-protocol.md
service RuntimeService {
  // Converse handles bidirectional streaming for agent conversations.
  // The client sends messages and receives a stream of responses including
  // text chunks, tool calls, tool results, and completion signals.
  rpc Converse(stream ClientMessage) returns (stream ServerMessage);

  // Invoke runs a one-shot, non-conversational Function call. The facade
  // forwards a payload-in / payload-out request from POST /functions/{name}
  // and waits for the full response. Used for function-mode AgentRuntimes
  // (spec.mode == "function"); see #1102 / #1103.
  //
  // The runtime is schema-agnostic — the facade validates input_json against
  // AgentRuntime.spec.inputSchema before calling, and validates output_json
  // against spec.outputSchema after returning. The runtime just executes
  // the pack once.
  rpc Invoke(InvocationRequest) returns (InvocationResponse);

  // Health checks the runtime's readiness to handle requests.
  rpc Health(HealthRequest) returns (HealthResponse);

  // HasConversation reports whether a session's working context can still be
  // resumed. The runtime owns the context store, so it is the only component
  // that can answer this — a session-api row proves only that the conversation
  // once existed, not that its turns are still in the statestore.
  //
  // The answer is exact rather than approximate: sdk.Resume succeeds precisely
  // when the state store returns a non-nil state for the id, so this RPC
  // performs the same load against the same store.
  rpc HasConversation(HasConversationRequest) returns (HasConversationResponse);
}

// ClientMessage represents a message from the client to the runtime.
message ClientMessage {
  // session_id identifies the conversation session for state management.
  string session_id = 1;

  // content is the user's message text (legacy, for backward compatibility).
  // For multimodal messages, use the parts field instead.
  string content = 2;

  // metadata contains optional key-value pairs for additional context.
  map<string, string> metadata = 3;

  // parts contains multimodal content parts (text, images, audio, video, files).
  // If non-empty, this takes precedence over the content field.
  repeated ContentPart parts = 4;

  // client_tool_result carries the result of a client-side tool execution.
  // Set when responding to a ToolCall with execution=CLIENT.
  ClientToolResult client_tool_result = 5;

  // consent_grants carries per-message consent category grants from the client.
  // When present, these override stored consent for this request.
  repeated string consent_grants = 6;

  // duplex_start, when set on the first message of a Converse stream, switches
  // the stream into bidirectional audio mode (OSS duplex transport).
  DuplexStart duplex_start = 7;

  // audio_input carries one inbound audio frame during a duplex session.
  AudioInputChunk audio_input = 8;
}

// ClientToolResult carries the client's response to a client-side tool call.
message ClientToolResult {
  // call_id matches the ToolCall.id that this result is for.
  string call_id = 1;

  // result_json contains the tool result as a JSON string.
  string result_json = 2;

  // is_rejected indicates the client rejected the tool call.
  bool is_rejected = 3;

  // rejection_reason explains why the client rejected the tool call.
  string rejection_reason = 4;
}

// ServerMessage represents a message from the runtime to the client.
// Uses oneof to ensure only one message type is sent at a time.
message ServerMessage {
  oneof message {
    // chunk contains a partial text response for streaming.
    Chunk chunk = 1;

    // tool_call notifies the facade of a client-side tool invocation.
    // The facade forwards this to the WebSocket client, which must respond
    // with a ClientToolResult before the conversation can continue.
    // Server-side tool calls are handled internally by the runtime and
    // are not sent on this stream.
    ToolCall tool_call = 2;

    // Field 3 was tool_result (removed — server-side tool results are
    // handled internally by the runtime, not sent to the facade).

    // done signals the completion of a response.
    Done done = 4;

    // error indicates an error occurred during processing.
    Error error = 5;

    // media_chunk contains a streaming media chunk (image, audio, video).
    // Sent during streaming when the LLM produces media content, allowing
    // the client to begin processing before the entire media is available.
    MediaChunk media_chunk = 6;

    // interruption signals a barge-in; the client clears buffered audio.
    Interruption interruption = 7;

    // runtime_hello is the runtime's first ServerMessage on a Converse stream:
    // the session's authoritative capability set plus, for a duplex session, a
    // bounded media counter-offer (codec/sample_rate/channels) the facade
    // relays to the client. A runtime that never sends a hello is legacy — the
    // facade proceeds with today's unilateral DuplexStart behaviour.
    RuntimeHello runtime_hello = 8;
  }
}

// Chunk contains a partial text response for streaming output.
message Chunk {
  // content is the text chunk to append to the response.
  string content = 1;

  // role identifies the speaker for this text chunk. Empty means the assistant
  // (the default, back-compatible with text agents). "user" is used on the
  // duplex path to carry the caller's transcribed speech so the client renders
  // it as a user message rather than assistant output.
  string role = 2;
}

// ToolExecution indicates where a tool is executed.
enum ToolExecution {
  // TOOL_EXECUTION_SERVER means the tool runs server-side in the runtime.
  TOOL_EXECUTION_SERVER = 0;

  // TOOL_EXECUTION_CLIENT means the tool must be fulfilled by the client.
  TOOL_EXECUTION_CLIENT = 1;
}

// ToolCall represents a tool invocation.
// For server-side tools this is informational (UI display only).
// For client-side tools the client must send back a ClientToolResult.
message ToolCall {
  // id is a unique identifier for this tool call.
  string id = 1;

  // name is the name of the tool being called.
  string name = 2;

  // arguments_json contains the tool arguments as a JSON string.
  string arguments_json = 3;

  // execution indicates whether this tool runs server-side or client-side.
  ToolExecution execution = 4;

  // consent_message is a human-readable consent prompt for client-side tools.
  string consent_message = 5;

  // categories are semantic consent categories (e.g., "location", "filesystem").
  repeated string categories = 6;
}

// ToolResult contains the result of a tool execution (informational for UI display).
message ToolResult {
  // id matches the corresponding ToolCall id.
  string id = 1;

  // result_json contains the tool result as a JSON string.
  string result_json = 2;

  // is_error indicates whether the tool execution failed.
  bool is_error = 3;
}

// Done signals the completion of a conversation turn.
message Done {
  // final_content contains the complete response text (optional).
  // For text-only responses, this contains the full response.
  // For multimodal responses, use the parts field instead.
  string final_content = 1;

  // usage contains token usage statistics for this turn.
  Usage usage = 2;

  // parts contains multimodal content parts (text, images, audio, video).
  // If non-empty, this takes precedence over final_content for rich responses.
  repeated ContentPart parts = 3;
}

// ContentPart represents a single piece of content in a multimodal message.
message ContentPart {
  // type indicates the content type: "text", "image", "audio", "video"
  string type = 1;

  // text contains text content (only set when type="text")
  string text = 2;

  // media contains media content (only set when type="image", "audio", or "video")
  MediaContent media = 3;
}

// MediaContent represents media data (image, audio, video) in a message.
message MediaContent {
  // Exactly one of data or url should be set.

  // data contains base64-encoded media data (for resolved file:// and mock:// URLs)
  string data = 1;

  // url contains the media URL (for http:// and https:// URLs that are passed through)
  string url = 2;

  // mime_type indicates the media format (e.g., "image/png", "audio/mp3")
  string mime_type = 3;

  // storage_ref is an opaque backend storage reference (e.g. "omnia://sessions/{id}/media/{mediaID}").
  // When set, the runtime resolves it to media bytes at provider-call time via the injected media store.
  string storage_ref = 4;
}

// Usage contains token usage and cost information.
message Usage {
  // input_tokens is the number of tokens in the input/prompt.
  int32 input_tokens = 1;

  // output_tokens is the number of tokens in the output/response.
  int32 output_tokens = 2;

  // cost_usd is the estimated cost in USD for this request.
  float cost_usd = 3;
}

// Error represents an error that occurred during processing.
message Error {
  // code is a machine-readable error code.
  string code = 1;

  // message is a human-readable error description.
  string message = 2;
}

// Interruption signals that the in-flight response was interrupted (e.g. the
// user started speaking over the agent during a duplex session). The client
// must clear any buffered audio playback immediately.
message Interruption {}

// MediaChunk contains a streaming media chunk for progressive media delivery.
// All chunks sharing the same media_id belong to the same media stream.
message MediaChunk {
  // media_id is the unique identifier for this media stream.
  string media_id = 1;

  // sequence is the 0-indexed sequence number for ordering chunks.
  int32 sequence = 2;

  // is_last indicates this is the final chunk for this media stream.
  bool is_last = 3;

  // mime_type indicates the media format (e.g., "image/png", "audio/mp3").
  string mime_type = 4;

  // data contains raw media bytes (avoids base64 overhead in gRPC path).
  bytes data = 5;
}

// InvocationRequest carries a Function call from the facade.
message InvocationRequest {
  // input_json is the raw JSON payload submitted by the caller. The facade
  // has already validated this against AgentRuntime.spec.inputSchema; the
  // runtime treats it as an opaque user message body.
  string input_json = 1;

  // invocation_id is a UUID for this Function call, used for log and
  // trace correlation. Assigned by the facade.
  string invocation_id = 2;

  // metadata carries optional key-value context (caller identity, auth
  // subject, custom headers). Not interpreted by the runtime.
  map<string, string> metadata = 3;
}

// InvocationResponse carries the runtime's reply to the facade. On
// success the facade then validates output_json against
// AgentRuntime.spec.outputSchema before returning to the HTTP caller.
message InvocationResponse {
  // output_json is the raw assistant text. The facade validates it
  // against the output schema; if invalid, the facade returns HTTP 502
  // with this raw payload in the response body (per Q2 lock on #1103).
  string output_json = 1;

  // usage contains token + cost statistics for the call.
  Usage usage = 2;

  // duration_ms is the wall-clock time spent executing in the runtime.
  int32 duration_ms = 3;

  // invocation_id echoes InvocationRequest.invocation_id for correlation.
  string invocation_id = 4;
}

// HealthRequest is an empty message for health checks.
message HealthRequest {}

// HealthResponse contains the health status of the runtime.
message HealthResponse {
  // healthy indicates whether the runtime is ready to handle requests.
  bool healthy = 1;

  // status provides additional status information.
  string status = 2;

  // contract_version is the omnia.runtime.v1 contract version this runtime
  // was built against, as a semver string (see the Contract-Version marker at
  // the top of this file). A runtime that reports an empty value predates
  // contract versioning and must be treated as unversioned.
  string contract_version = 3;

  // capabilities lists the contract features this runtime implements (e.g.
  // "invoke", "duplex_audio", "client_tools"). An OPEN set — consumers must
  // display/ignore names they don't recognize. Empty => a pre-negotiation
  // (legacy) runtime.
  repeated string capabilities = 4;
}

// HasConversationRequest asks whether one session's context is resumable.
message HasConversationRequest {
  // session_id is the conversation id to probe.
  string session_id = 1;
}

// ResumeState is the disposition of a session's working context.
//
// The three states exist because the facade must act differently on each: a
// missing conversation is a client-visible expiry, whereas an unreachable
// store is a server fault. Collapsing them would recreate the bug this RPC
// exists to fix — telling a client its session expired when in fact the
// context is intact and the store was merely briefly unreachable.
enum ResumeState {
  // Unset. Treated as RESUME_STATE_UNAVAILABLE by callers.
  RESUME_STATE_UNSPECIFIED = 0;

  // Context is present; sdk.Resume will succeed.
  RESUME_STATE_RESUMABLE = 1;

  // Store answered definitively that no context exists for this id — it
  // expired, or was never persisted. The session cannot be continued.
  RESUME_STATE_NOT_FOUND = 2;

  // The store could not be consulted (unreachable, timed out, or no store is
  // configured). Resumability is unknown; this is NOT an expiry.
  RESUME_STATE_UNAVAILABLE = 3;
}

// HasConversationResponse reports one session's resume disposition.
message HasConversationResponse {
  // state is the disposition of the session's working context.
  ResumeState state = 1;

  // detail carries store-level error text when state is
  // RESUME_STATE_UNAVAILABLE. Diagnostic only; never surfaced to end clients.
  string detail = 2;
}

// DuplexStart opens a bidirectional audio session on a Converse stream.
message DuplexStart {
  // codec is the audio encoding, e.g. "pcm".
  string codec = 1;
  // sample_rate in Hz, e.g. 16000.
  int32 sample_rate = 2;
  // channels, e.g. 1 for mono.
  int32 channels = 3;
  // system_instruction is the optional system prompt for the session.
  string system_instruction = 4;
}

// RuntimeHello is the runtime's first ServerMessage on a Converse stream. It
// carries the session's authoritative capability set and, for a duplex session,
// the media parameters the runtime requires — a bounded counter-offer to the
// facade's DuplexStart proposal. Absence of a hello marks a legacy runtime.
message RuntimeHello {
  // capabilities is the per-session, authoritative capability set (open set;
  // consumers display or ignore unknown values).
  repeated string capabilities = 1;
  // media is the bounded media counter-offer. Set only for a duplex session.
  MediaNegotiation media = 2;
}

// MediaNegotiation is the bounded counter-offer parameter set. A zero value for
// a field means "no requirement / accept the client's proposal" for that field.
message MediaNegotiation {
  // codec is the required audio encoding, e.g. "pcm".
  string codec = 1;
  // sample_rate is the required sample rate in Hz, e.g. 24000.
  int32 sample_rate = 2;
  // channels is the required channel count, e.g. 1 for mono.
  int32 channels = 3;
  // frame_rate is the required video frame rate (carried, not yet enforced).
  int32 frame_rate = 4;
  // resolution is the required video resolution (carried, not yet enforced).
  int32 resolution = 5;
}

// AudioInputChunk is one inbound audio frame during a duplex session.
message AudioInputChunk {
  // data is raw audio bytes (never base64 on the gRPC path).
  bytes data = 1;
  // sequence is the 0-indexed frame number.
  uint32 sequence = 2;
  // is_last marks the final frame (client hangup / stream end).
  bool is_last = 3;
}

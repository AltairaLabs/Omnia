openapi: 3.0.3
info:
  title: Omnia Dashboard API
  description: REST API for the Omnia AI Agent Orchestration Platform dashboard
  version: 1.0.0
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://localhost:8082
    description: Local development
  - url: http://omnia-controller-manager.omnia-system.svc.cluster.local:8082
    description: In-cluster

tags:
  - name: agents
    description: AgentRuntime operations
  - name: logs
    description: Agent log operations
  - name: promptpacks
    description: PromptPack operations
  - name: toolregistries
    description: ToolRegistry operations
  - name: providers
    description: Provider operations
  - name: agentpolicies
    description: AgentPolicy operations
  - name: toolpolicies
    description: ToolPolicy operations (Enterprise)
  - name: stats
    description: Aggregated statistics
  - name: namespaces
    description: Kubernetes namespaces

paths:
  /api/v1/agents:
    get:
      tags: [agents]
      summary: List all AgentRuntimes
      operationId: listAgents
      parameters:
        - name: namespace
          in: query
          description: Filter by namespace
          schema:
            type: string
        - name: labelSelector
          in: query
          description: Kubernetes label selector for filtering
          schema:
            type: string
      responses:
        '200':
          description: List of agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgentRuntime'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [agents]
      summary: Create a new AgentRuntime
      operationId: createAgent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentRuntime'
      responses:
        '201':
          description: Agent created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRuntime'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Agent already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/agents/{namespace}/{name}:
    get:
      tags: [agents]
      summary: Get a specific AgentRuntime
      operationId: getAgent
      parameters:
        - name: namespace
          in: path
          required: true
          schema:
            type: string
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Agent details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRuntime'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/agents/{namespace}/{name}/scale:
    put:
      tags: [agents]
      summary: Scale an AgentRuntime
      operationId: scaleAgent
      parameters:
        - name: namespace
          in: path
          required: true
          schema:
            type: string
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScaleRequest'
      responses:
        '200':
          description: Agent scaled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRuntime'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/agents/{namespace}/{name}/logs:
    get:
      tags: [logs]
      summary: Get logs from an agent's pods
      operationId: getAgentLogs
      parameters:
        - name: namespace
          in: path
          required: true
          schema:
            type: string
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: tailLines
          in: query
          description: Number of lines to return from the end of logs
          schema:
            type: integer
            default: 100
        - name: sinceSeconds
          in: query
          description: Return logs from the last N seconds
          schema:
            type: integer
            default: 3600
        - name: container
          in: query
          description: Filter logs by container name
          schema:
            type: string
      responses:
        '200':
          description: Log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LogEntry'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/promptpacks:
    get:
      tags: [promptpacks]
      summary: List all PromptPacks
      operationId: listPromptPacks
      parameters:
        - name: namespace
          in: query
          description: Filter by namespace
          schema:
            type: string
        - name: labelSelector
          in: query
          description: Kubernetes label selector for filtering
          schema:
            type: string
      responses:
        '200':
          description: List of prompt packs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PromptPack'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [promptpacks]
      summary: Create a new PromptPack
      description: |
        Creates a PromptPack CRD. If the optional `content` field is provided in the
        request body, a backing ConfigMap is created automatically and the PromptPack's
        `spec.source` is set to reference it.
      operationId: createPromptPack
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromptPackCreateRequest'
      responses:
        '201':
          description: PromptPack created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptPack'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: PromptPack already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/promptpacks/{namespace}/{name}:
    get:
      tags: [promptpacks]
      summary: Get a specific PromptPack
      operationId: getPromptPack
      parameters:
        - name: namespace
          in: path
          required: true
          schema:
            type: string
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: PromptPack details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptPack'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      tags: [promptpacks]
      summary: Update a PromptPack
      description: |
        Updates a PromptPack CRD. If the optional `content` field is provided,
        the backing ConfigMap is updated (or created if it doesn't exist).
      operationId: updatePromptPack
      parameters:
        - name: namespace
          in: path
          required: true
          schema:
            type: string
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromptPackUpdateRequest'
      responses:
        '200':
          description: PromptPack updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptPack'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags: [promptpacks]
      summary: Delete a PromptPack
      description: |
        Deletes a PromptPack CRD and its backing ConfigMap (if one exists
        with the naming convention `{name}-content`).
      operationId: deletePromptPack
      parameters:
        - name: namespace
          in: path
          required: true
          schema:
            type: string
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: PromptPack deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'


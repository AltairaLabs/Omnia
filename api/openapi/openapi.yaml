components:
  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    BadRequest:
      description: Bad request - invalid input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

    ScaleRequest:
      type: object
      required: [replicas]
      properties:
        replicas:
          type: integer
          minimum: 0
          maximum: 100
          description: Desired number of replicas

    LogEntry:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        level:
          type: string
          enum: [info, warn, error, debug]
        message:
          type: string
        container:
          type: string

    ObjectMeta:
      type: object
      properties:
        name:
          type: string
        namespace:
          type: string
        uid:
          type: string
        resourceVersion:
          type: string
        creationTimestamp:
          type: string
          format: date-time
        labels:
          type: object
          additionalProperties:
            type: string
        annotations:
          type: object
          additionalProperties:
            type: string

    AgentRuntime:
      type: object
      properties:
        apiVersion:
          type: string
        kind:
          type: string
        metadata:
          $ref: '#/components/schemas/ObjectMeta'
        spec:
          $ref: '#/components/schemas/AgentRuntimeSpec'
        status:
          $ref: '#/components/schemas/AgentRuntimeStatus'

    AgentRuntimeSpec:
      type: object
      properties:
        promptPackRef:
          $ref: '#/components/schemas/LocalObjectReference'
        toolRegistryRef:
          $ref: '#/components/schemas/LocalObjectReference'
        providers:
          type: array
          items:
            $ref: '#/components/schemas/NamedProviderRef'
        facade:
          $ref: '#/components/schemas/FacadeConfig'
        session:
          $ref: '#/components/schemas/SessionConfig'
        runtime:
          $ref: '#/components/schemas/RuntimeConfig'
        console:
          $ref: '#/components/schemas/ConsoleConfig'
        rollout:
          $ref: '#/components/schemas/RolloutConfig'

    LocalObjectReference:
      type: object
      properties:
        name:
          type: string
        namespace:
          type: string

    NamedProviderRef:
      type: object
      required: [name, providerRef]
      properties:
        name:
          type: string
        providerRef:
          $ref: '#/components/schemas/LocalObjectReference'

    FacadeConfig:
      type: object
      properties:
        type:
          type: string
          enum: [websocket, grpc]
        port:
          type: integer
        handler:
          type: string

    SessionConfig:
      type: object
      properties:
        type:
          type: string
          enum: [memory, redis]
        ttl:
          type: string
        storeRef:
          $ref: '#/components/schemas/LocalObjectReference'

    RuntimeConfig:
      type: object
      properties:
        replicas:
          type: integer
        resources:
          $ref: '#/components/schemas/ResourceRequirements'
        autoscaling:
          $ref: '#/components/schemas/AutoscalingConfig'

    ResourceRequirements:
      type: object
      properties:
        requests:
          type: object
          additionalProperties:
            type: string
        limits:
          type: object
          additionalProperties:
            type: string

    AutoscalingConfig:
      type: object
      properties:
        enabled:
          type: boolean
        type:
          type: string
          enum: [hpa, keda]
        minReplicas:
          type: integer
        maxReplicas:
          type: integer

    ConsoleConfig:
      type: object
      description: Configuration for dashboard console UI
      properties:
        allowedAttachmentTypes:
          type: array
          description: MIME types allowed for file uploads (e.g., "image/*", "application/pdf")
          items:
            type: string
        allowedExtensions:
          type: array
          description: File extensions as fallback (e.g., ".png", ".pdf")
          items:
            type: string
        maxFileSize:
          type: integer
          format: int64
          description: Maximum file size in bytes
          default: 10485760
        maxFiles:
          type: integer
          description: Maximum number of files per message
          default: 5
          minimum: 1
          maximum: 20
        mediaRequirements:
          $ref: '#/components/schemas/MediaRequirements'

    Dimensions:
      type: object
      description: Width and height in pixels
      required: [width, height]
      properties:
        width:
          type: integer
          minimum: 1
          description: Width in pixels
        height:
          type: integer
          minimum: 1
          description: Height in pixels

    ImageRequirements:
      type: object
      description: Requirements for image media
      properties:
        maxSizeBytes:
          type: integer
          format: int64
          minimum: 1
          description: Maximum file size in bytes for images
        maxDimensions:
          $ref: '#/components/schemas/Dimensions'
        recommendedDimensions:
          $ref: '#/components/schemas/Dimensions'
        supportedFormats:
          type: array
          items:
            type: string
          description: Supported image formats (e.g., "png", "jpeg", "gif", "webp")
        preferredFormat:
          type: string
          description: Preferred format for best results
        compressionGuidance:
          type: string
          enum: [none, lossless, lossy-high, lossy-medium, lossy-low]
          description: Guidance on image compression

    VideoRequirements:
      type: object
      description: Requirements for video media
      properties:
        maxDurationSeconds:
          type: integer
          minimum: 1
          description: Maximum video duration in seconds
        supportsSegmentSelection:
          type: boolean
          description: Whether segment selection is supported
        processingMode:
          type: string
          enum: [frames, transcription, both, native]
          description: How video is processed
        frameExtractionInterval:
          type: integer
          minimum: 1
          description: Interval in seconds between extracted frames

    AudioRequirements:
      type: object
      description: Requirements for audio media
      properties:
        maxDurationSeconds:
          type: integer
          minimum: 1
          description: Maximum audio duration in seconds
        recommendedSampleRate:
          type: integer
          minimum: 1
          description: Recommended sample rate in Hz
        supportsSegmentSelection:
          type: boolean
          description: Whether segment selection is supported

    DocumentRequirements:
      type: object
      description: Requirements for document media
      properties:
        maxPages:
          type: integer
          minimum: 1
          description: Maximum number of pages
        supportsOCR:
          type: boolean
          description: Whether OCR is supported for scanned documents

    MediaRequirements:
      type: object
      description: Provider-specific requirements for different media types
      properties:
        image:
          $ref: '#/components/schemas/ImageRequirements'
        video:
          $ref: '#/components/schemas/VideoRequirements'
        audio:
          $ref: '#/components/schemas/AudioRequirements'
        document:
          $ref: '#/components/schemas/DocumentRequirements'

    AgentRuntimeStatus:
      type: object
      properties:
        phase:
          type: string
          enum: [Pending, Running, Failed]
        conditions:
          type: array
          items:
            $ref: '#/components/schemas/Condition'
        readyReplicas:
          type: integer
        replicas:
          type: integer
        serviceEndpoint:
          type: string
          description: Internal Kubernetes service endpoint for agent facade
        rollout:
          $ref: '#/components/schemas/RolloutStatus'

    Condition:
      type: object
      properties:
        type:
          type: string
        status:
          type: string
          enum: ['True', 'False', 'Unknown']
        lastTransitionTime:
          type: string
          format: date-time
        reason:
          type: string
        message:
          type: string

    PromptPack:
      type: object
      properties:
        apiVersion:
          type: string
        kind:
          type: string
        metadata:
          $ref: '#/components/schemas/ObjectMeta'
        spec:
          $ref: '#/components/schemas/PromptPackSpec'
        status:
          $ref: '#/components/schemas/PromptPackStatus'

    PromptPackSpec:
      type: object
      properties:
        version:
          type: string
          description: Semantic version of the prompt pack (e.g., "2.1.0")
        source:
          $ref: '#/components/schemas/PromptPackSource'

    PromptPackSource:
      type: object
      properties:
        type:
          type: string
          enum: [configmap, git]
        configMapRef:
          $ref: '#/components/schemas/LocalObjectReference'
        gitRef:
          $ref: '#/components/schemas/GitSource'

    GitSource:
      type: object
      properties:
        url:
          type: string
        ref:
          type: string
        path:
          type: string

    RolloutConfig:
      type: object
      description: |
        Step-based rollout configuration for AgentRuntime. All rollout patterns
        (canary, blue-green, experiment) are expressed as different step sequences.
      properties:
        candidate:
          $ref: '#/components/schemas/CandidateOverrides'
        steps:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/RolloutStep'
        stickySession:
          type: object
          properties:
            hashOn:
              type: string
              description: HTTP header for consistent hashing (e.g., "x-user-id")
        rollback:
          type: object
          properties:
            mode:
              type: string
              enum: [automatic, manual, disabled]
              default: manual
            cooldown:
              type: string
              description: Minimum wait time before allowing another rollout after rollback
              default: "5m"
        trafficRouting:
          type: object
          properties:
            istio:
              type: object
              properties:
                virtualService:
                  type: object
                  required: [name, routes]
                  properties:
                    name:
                      type: string
                    routes:
                      type: array
                      items:
                        type: string
                destinationRule:
                  type: object
                  required: [name]
                  properties:
                    name:
                      type: string
                    stableSubset:
                      type: string
                      default: stable
                    candidateSubset:
                      type: string
                      default: canary

    CandidateOverrides:
      type: object
      description: Sparse overrides for the candidate version during a rollout.
      properties:
        promptPackVersion:
          type: string
          description: Override PromptPack version for the candidate
        providerRefs:
          type: array
          items:
            $ref: '#/components/schemas/NamedProviderRef'
        toolRegistryRef:
          $ref: '#/components/schemas/LocalObjectReference'

    RolloutStep:
      type: object
      description: A single step in a rollout sequence. Exactly one field should be set.
      properties:
        setWeight:
          type: integer
          minimum: 0
          maximum: 100
          description: Set candidate traffic weight percentage
        pause:
          type: object
          properties:
            duration:
              type: string
              description: Duration to pause (e.g., "5m"). Nil means pause indefinitely.
        analysis:
          type: object
          properties:
            templateName:
              type: string
              description: Name of the RolloutAnalysis CRD to run
            args:
              type: array
              items:
                type: object
                required: [name, value]
                properties:
                  name:
                    type: string
                  value:
                    type: string

    RolloutStatus:
      type: object
      description: Observed state of an active rollout
      properties:
        active:
          type: boolean
        currentStep:
          type: integer
        currentWeight:
          type: integer
        stableVersion:
          type: string
        candidateVersion:
          type: string
        startedAt:
          type: string
          format: date-time
        message:
          type: string

    PromptPackStatus:
      type: object
      properties:
        phase:
          type: string
          enum: [Pending, Active, Failed]
        conditions:
          type: array
          items:
            $ref: '#/components/schemas/Condition'
        activeVersion:
          type: string

    PromptPackCreateRequest:
      type: object
      description: |
        Request body for creating a PromptPack. Extends the standard PromptPack
        with an optional `content` field. When `content` is provided, a ConfigMap
        named `{metadata.name}-content` is created with the given key-value pairs,
        and the PromptPack's `spec.source` is automatically set to reference it.
      properties:
        metadata:
          $ref: '#/components/schemas/ObjectMeta'
        spec:
          $ref: '#/components/schemas/PromptPackSpec'
        content:
          type: object
          description: |
            Optional inline content for the backing ConfigMap. Keys are filenames
            (e.g., "pack.json", "prompt.yaml"), values are the file contents as strings.
            When provided, a ConfigMap is created and `spec.source.configMapRef` is set automatically.
          additionalProperties:
            type: string
          example:
            pack.json: '{"system_prompt": "You are a helpful assistant", "model": "claude-sonnet"}'

    PromptPackUpdateRequest:
      type: object
      description: |
        Request body for updating a PromptPack. Same as create — if `content` is
        provided, the backing ConfigMap is updated (or created if it doesn't exist).
      properties:
        metadata:
          $ref: '#/components/schemas/ObjectMeta'
        spec:
          $ref: '#/components/schemas/PromptPackSpec'
        content:
          type: object
          description: Optional inline content for the backing ConfigMap.
          additionalProperties:
            type: string

    ToolRegistry:
      type: object
      properties:
        apiVersion:
          type: string
        kind:
          type: string
        metadata:
          $ref: '#/components/schemas/ObjectMeta'
        spec:
          $ref: '#/components/schemas/ToolRegistrySpec'
        status:
          $ref: '#/components/schemas/ToolRegistryStatus'

    ToolRegistrySpec:
      type: object
      properties:
        tools:
          type: array
          items:
            $ref: '#/components/schemas/ToolDefinition'
        selector:
          $ref: '#/components/schemas/ServiceSelector'

    ToolDefinition:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [http, grpc, mcp]
        url:
          type: string
        inputSchema:
          type: object
          additionalProperties: true

    ServiceSelector:
      type: object
      properties:
        matchLabels:
          type: object
          additionalProperties:
            type: string

    ToolRegistryStatus:
      type: object
      properties:
        phase:
          type: string
          enum: [Pending, Ready, Degraded, Failed]
        conditions:
          type: array
          items:
            $ref: '#/components/schemas/Condition'
        discoveredToolsCount:
          type: integer
        discoveredTools:
          type: array
          items:
            $ref: '#/components/schemas/DiscoveredTool'

    DiscoveredTool:
      type: object
      properties:
        name:
          type: string
        endpoint:
          type: string
        status:
          type: string
          enum: [Available, Unavailable]

    Provider:
      type: object
      properties:
        apiVersion:
          type: string
        kind:
          type: string
        metadata:
          $ref: '#/components/schemas/ObjectMeta'
        spec:
          $ref: '#/components/schemas/ProviderSpec'
        status:
          $ref: '#/components/schemas/ProviderStatus'

    ProviderSpec:
      type: object
      properties:
        type:
          type: string
          enum: [claude, openai, gemini, ollama, mock]
        model:
          type: string
        baseURL:
          type: string
          description: Override the provider's default API endpoint
        secretRef:
          $ref: '#/components/schemas/SecretKeyRef'
        defaults:
          $ref: '#/components/schemas/ProviderDefaults'
        pricing:
          $ref: '#/components/schemas/ProviderPricing'
        validateCredentials:
          type: boolean
          description: Enable credential validation on reconciliation

    SecretKeyRef:
      type: object
      required: [name]
      properties:
        name:
          type: string
        key:
          type: string

    ProviderDefaults:
      type: object
      properties:
        temperature:
          type: string
        topP:
          type: string
        maxTokens:
          type: integer
        contextWindow:
          type: integer
        truncationStrategy:
          type: string
          enum: [sliding, summarize, custom]

    ProviderPricing:
      type: object
      properties:
        inputCostPer1K:
          type: string
        outputCostPer1K:
          type: string
        cachedCostPer1K:
          type: string

    ProviderStatus:
      type: object
      properties:
        phase:
          type: string
          enum: [Ready, Error]
        conditions:
          type: array
          items:
            $ref: '#/components/schemas/Condition'
        lastValidatedAt:
          type: string
          format: date-time
        observedGeneration:
          type: integer

    AgentPolicy:
      type: object
      properties:
        apiVersion: { type: string }
        kind: { type: string }
        metadata: { $ref: '#/components/schemas/ObjectMeta' }
        spec: { $ref: '#/components/schemas/AgentPolicySpec' }
        status: { $ref: '#/components/schemas/AgentPolicyStatus' }

    AgentPolicySpec:
      type: object
      properties:
        selector:
          type: object
          properties:
            agents: { type: array, items: { type: string } }
        claimMapping:
          type: object
          properties:
            forwardClaims:
              type: array
              items:
                type: object
                required: [claim, header]
                properties:
                  claim: { type: string }
                  header: { type: string }
        toolAccess:
          type: object
          properties:
            mode: { type: string, enum: [allowlist, denylist] }
            rules:
              type: array
              items:
                type: object
                required: [registry, tools]
                properties:
                  registry: { type: string }
                  tools: { type: array, items: { type: string } }
        mode: { type: string, enum: [enforce, permissive], default: enforce }
        onFailure: { type: string, enum: [deny, allow], default: deny }

    AgentPolicyStatus:
      type: object
      properties:
        phase: { type: string, enum: [Active, Error] }
        matchedAgents: { type: integer }
        conditions: { type: array, items: { $ref: '#/components/schemas/Condition' } }
        observedGeneration: { type: integer }

    ToolPolicy:
      type: object
      properties:
        apiVersion: { type: string }
        kind: { type: string }
        metadata: { $ref: '#/components/schemas/ObjectMeta' }
        spec: { $ref: '#/components/schemas/ToolPolicySpec' }
        status: { $ref: '#/components/schemas/ToolPolicyStatus' }

    ToolPolicySpec:
      type: object
      required: [selector, rules]
      properties:
        selector:
          type: object
          required: [registry]
          properties:
            registry: { type: string }
            tools: { type: array, items: { type: string } }
        rules:
          type: array
          minItems: 1
          items:
            type: object
            required: [name, deny]
            properties:
              name: { type: string }
              description: { type: string }
              deny:
                type: object
                required: [cel, message]
                properties:
                  cel: { type: string }
                  message: { type: string }
        requiredClaims:
          type: array
          items:
            type: object
            required: [claim, message]
            properties:
              claim: { type: string }
              message: { type: string }
        mode: { type: string, enum: [enforce, audit], default: enforce }
        onFailure: { type: string, enum: [deny, allow], default: deny }
        headerInjection:
          type: array
          items:
            type: object
            required: [header]
            properties:
              header: { type: string }
              value: { type: string }
              cel: { type: string }
        audit:
          type: object
          properties:
            logDecisions: { type: boolean }
            redactFields: { type: array, items: { type: string } }

    ToolPolicyStatus:
      type: object
      properties:
        phase: { type: string, enum: [Active, Error] }
        conditions: { type: array, items: { $ref: '#/components/schemas/Condition' } }
        observedGeneration: { type: integer }
        ruleCount: { type: integer }

    Stats:
      type: object
      properties:
        agents:
          type: object
          properties:
            total:
              type: integer
            running:
              type: integer
            pending:
              type: integer
            failed:
              type: integer
        promptPacks:
          type: object
          properties:
            total:
              type: integer
            active:
              type: integer
            canary:
              type: integer
        tools:
          type: object
          properties:
            total:
              type: integer
            available:
              type: integer
            degraded:
              type: integer
